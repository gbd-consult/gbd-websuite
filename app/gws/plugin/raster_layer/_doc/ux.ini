# UX-Strings für das raster_layer-Plugin.
#
# Schlüsselformat: gws.plugin.raster_layer.<modul>.<class>[.<property>].<feldname>

[de]

# --- provider ---------------------------------------------------------------

gws.plugin.raster_layer.provider.Config.label = Raster-Provider
gws.plugin.raster_layer.provider.Config.purpose = Sammelt Raster-Bilddateien (z.B. GeoTIFF, JP2) aus dem Server-Dateisystem. Liefert die Bildliste an den Raster-Layer und baut intern einen räumlichen Index auf.
gws.plugin.raster_layer.provider.Config.whenToUse = Wenn eine Sammlung georeferenzierter Bilder als ein Layer dargestellt werden soll. Alle Bilder müssen im selben CRS liegen.
gws.plugin.raster_layer.provider.Config.complexity = intermediate

gws.plugin.raster_layer.provider.Config.paths.label = Bilddateien
gws.plugin.raster_layer.provider.Config.paths.purpose = Liste konkreter Pfade zu Raster-Bilddateien. Alternative zu pathPattern.
gws.plugin.raster_layer.provider.Config.paths.example = ["/data/dop/tile_001.tif", "/data/dop/tile_002.tif"]

gws.plugin.raster_layer.provider.Config.pathPattern.label = Pfad-Muster
gws.plugin.raster_layer.provider.Config.pathPattern.purpose = Glob-Muster, das alle passenden Bilddateien einschließt. Alternative zu paths.
gws.plugin.raster_layer.provider.Config.pathPattern.example = "/data/dop/*.tif"

gws.plugin.raster_layer.provider.Config.crs.label = Standard-CRS
gws.plugin.raster_layer.provider.Config.crs.purpose = Default-Koordinatensystem für Bilder, deren CRS sich nicht aus den Metadaten lesen lässt.
gws.plugin.raster_layer.provider.Config.crs.complexity = advanced
gws.plugin.raster_layer.provider.Config.crs.example = "EPSG:25832"

# --- layer ------------------------------------------------------------------

gws.plugin.raster_layer.layer.Config.label = Raster-Layer
gws.plugin.raster_layer.layer.Config.purpose = Karten-Layer auf Basis einer Sammlung georeferenzierter Bilddateien. Rendert die Bilder über MapServer mit räumlichem Index — performant für viele Kacheln.
gws.plugin.raster_layer.layer.Config.whenToUse = Für Luft- und Schrägbilder, gescannte Karten, DGM-Schummerungen oder andere Rasterprodukte, die als ein zusammenhängender Layer angezeigt werden sollen.
gws.plugin.raster_layer.layer.Config.complexity = intermediate
gws.plugin.raster_layer.layer.Config.useCases = DOP-Mosaike, gescannte historische Karten, Höhenrelief-Schummerungen, Multispektralbilder.
gws.plugin.raster_layer.layer.Config.seeAlso = gws.plugin.mbtiles_layer.layer.Config

gws.plugin.raster_layer.layer.Config.provider.label = Raster-Provider
gws.plugin.raster_layer.layer.Config.provider.purpose = Inline-Konfiguration des Raster-Providers (Pfade oder Pfad-Muster).

gws.plugin.raster_layer.layer.Config.processing.label = Verarbeitungsdirektiven
gws.plugin.raster_layer.layer.Config.processing.purpose = MapServer-PROCESSING-Direktiven, etwa für Resampling, Bandauswahl oder Skalierung.
gws.plugin.raster_layer.layer.Config.processing.complexity = advanced
gws.plugin.raster_layer.layer.Config.processing.example = ["RESAMPLE=BILINEAR", "BANDS=1,2,3"]

gws.plugin.raster_layer.layer.Config.transparentColor.label = Transparenzfarbe
gws.plugin.raster_layer.layer.Config.transparentColor.purpose = Farbe, die als transparent behandelt werden soll (Hex-Code oder rgb()).
gws.plugin.raster_layer.layer.Config.transparentColor.complexity = advanced
gws.plugin.raster_layer.layer.Config.transparentColor.example = "#000000"

gws.plugin.raster_layer.layer.Config.sldPath.label = SLD-Datei
gws.plugin.raster_layer.layer.Config.sldPath.purpose = Pfad zu einer SLD-Datei (Styled Layer Descriptor) für die Symbolisierung des Layers.
gws.plugin.raster_layer.layer.Config.sldPath.complexity = advanced

gws.plugin.raster_layer.layer.Config.sldName.label = SLD-NamedLayer
gws.plugin.raster_layer.layer.Config.sldName.purpose = Name eines NamedLayer innerhalb der SLD-Datei, der angewendet werden soll.
gws.plugin.raster_layer.layer.Config.sldName.complexity = advanced

[en]

# --- provider ---------------------------------------------------------------

gws.plugin.raster_layer.provider.Config.label = Raster provider
gws.plugin.raster_layer.provider.Config.purpose = Collects raster image files (e.g. GeoTIFF, JP2) from the server file system. Provides the image list to the raster layer and builds a spatial index internally.
gws.plugin.raster_layer.provider.Config.whenToUse = When a collection of georeferenced images should be exposed as a single layer. All images must share the same CRS.
gws.plugin.raster_layer.provider.Config.complexity = intermediate

gws.plugin.raster_layer.provider.Config.paths.label = Image files
gws.plugin.raster_layer.provider.Config.paths.purpose = Explicit list of paths to raster image files. Alternative to pathPattern.
gws.plugin.raster_layer.provider.Config.paths.example = ["/data/dop/tile_001.tif", "/data/dop/tile_002.tif"]

gws.plugin.raster_layer.provider.Config.pathPattern.label = Path pattern
gws.plugin.raster_layer.provider.Config.pathPattern.purpose = Glob pattern matching all image files to include. Alternative to paths.
gws.plugin.raster_layer.provider.Config.pathPattern.example = "/data/dop/*.tif"

gws.plugin.raster_layer.provider.Config.crs.label = Default CRS
gws.plugin.raster_layer.provider.Config.crs.purpose = Default coordinate reference system for images whose CRS cannot be derived from metadata.
gws.plugin.raster_layer.provider.Config.crs.complexity = advanced
gws.plugin.raster_layer.provider.Config.crs.example = "EPSG:25832"

# --- layer ------------------------------------------------------------------

gws.plugin.raster_layer.layer.Config.label = Raster layer
gws.plugin.raster_layer.layer.Config.purpose = Map layer backed by a collection of georeferenced image files. Renders the images via MapServer with a spatial index — efficient for many tiles.
gws.plugin.raster_layer.layer.Config.whenToUse = For aerial and oblique imagery, scanned maps, DEM hillshades or other raster products that should be shown as a single coherent layer.
gws.plugin.raster_layer.layer.Config.complexity = intermediate
gws.plugin.raster_layer.layer.Config.useCases = Orthophoto mosaics, scanned historical maps, DEM hillshades, multi-spectral imagery.
gws.plugin.raster_layer.layer.Config.seeAlso = gws.plugin.mbtiles_layer.layer.Config

gws.plugin.raster_layer.layer.Config.provider.label = Raster provider
gws.plugin.raster_layer.layer.Config.provider.purpose = Inline configuration of the raster provider (paths or path pattern).

gws.plugin.raster_layer.layer.Config.processing.label = Processing directives
gws.plugin.raster_layer.layer.Config.processing.purpose = MapServer PROCESSING directives, e.g. resampling, band selection or scaling.
gws.plugin.raster_layer.layer.Config.processing.complexity = advanced
gws.plugin.raster_layer.layer.Config.processing.example = ["RESAMPLE=BILINEAR", "BANDS=1,2,3"]

gws.plugin.raster_layer.layer.Config.transparentColor.label = Transparent color
gws.plugin.raster_layer.layer.Config.transparentColor.purpose = Color to treat as transparent (hex code or rgb()).
gws.plugin.raster_layer.layer.Config.transparentColor.complexity = advanced
gws.plugin.raster_layer.layer.Config.transparentColor.example = "#000000"

gws.plugin.raster_layer.layer.Config.sldPath.label = SLD file
gws.plugin.raster_layer.layer.Config.sldPath.purpose = Path to an SLD (Styled Layer Descriptor) file used to style the layer.
gws.plugin.raster_layer.layer.Config.sldPath.complexity = advanced

gws.plugin.raster_layer.layer.Config.sldName.label = SLD NamedLayer
gws.plugin.raster_layer.layer.Config.sldName.purpose = Name of a NamedLayer within the SLD file to apply.
gws.plugin.raster_layer.layer.Config.sldName.complexity = advanced
