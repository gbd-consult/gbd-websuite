# UX-Strings für das auth_session_manager-Plugin.
#
# Schlüsselformat: gws.plugin.auth_session_manager.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Aktuelle Implementierungen: SQLite (Default). Die Basisfelder
# (lifeTime usw.) leben in gws.base.auth.session_manager.

[de]

# --- sqlite -----------------------------------------------------------------

gws.plugin.auth_session_manager.sqlite.Config.label = SQLite-Sessions
gws.plugin.auth_session_manager.sqlite.Config.purpose = Speichert Login-Sessions in einer lokalen SQLite-Datenbank. Default-Implementierung des Session-Managers, wenn keine andere konfiguriert ist.
gws.plugin.auth_session_manager.sqlite.Config.whenToUse = Geeignet für Single-Node-Setups. Für Multi-Worker-Setups auf einem Host ist SQLite ausreichend; für mehrere Hosts sollte ein gemeinsam erreichbarer Speicher verwendet werden.
gws.plugin.auth_session_manager.sqlite.Config.complexity = basic
gws.plugin.auth_session_manager.sqlite.Config.useCases = Standardfall für lokale und produktive Single-Server-Installationen.
gws.plugin.auth_session_manager.sqlite.Config.seeAlso = gws.base.auth.session_manager.Config

gws.plugin.auth_session_manager.sqlite.Config.path.label = Pfad der Session-Datenbank
gws.plugin.auth_session_manager.sqlite.Config.path.purpose = Dateipfad der SQLite-Datenbank, in der Sessions abgelegt werden. Wenn leer, wird ein versionsspezifischer Default unterhalb des Misc-Verzeichnisses verwendet.
gws.plugin.auth_session_manager.sqlite.Config.path.complexity = advanced
gws.plugin.auth_session_manager.sqlite.Config.path.example = "/var/gws/var/sessions.sqlite"

gws.plugin.auth_session_manager.sqlite.Object.label = SQLite-Session-Manager
gws.plugin.auth_session_manager.sqlite.Object.purpose = Laufzeit-Objekt des SQLite-Session-Managers. Erzeugt, liest, aktualisiert und löscht Session-Datensätze in der konfigurierten SQLite-Datei.
gws.plugin.auth_session_manager.sqlite.Object.complexity = advanced


[en]

# --- sqlite -----------------------------------------------------------------

gws.plugin.auth_session_manager.sqlite.Config.label = SQLite sessions
gws.plugin.auth_session_manager.sqlite.Config.purpose = Stores login sessions in a local SQLite database. Default session manager implementation when no other one is configured.
gws.plugin.auth_session_manager.sqlite.Config.whenToUse = Suitable for single-node setups. SQLite is fine for multi-worker on one host; for multi-host setups use a shared backend instead.
gws.plugin.auth_session_manager.sqlite.Config.complexity = basic
gws.plugin.auth_session_manager.sqlite.Config.useCases = Default for local and production single-server installations.
gws.plugin.auth_session_manager.sqlite.Config.seeAlso = gws.base.auth.session_manager.Config

gws.plugin.auth_session_manager.sqlite.Config.path.label = Session database path
gws.plugin.auth_session_manager.sqlite.Config.path.purpose = File path of the SQLite database that holds the sessions. If empty, a version-specific default below the misc directory is used.
gws.plugin.auth_session_manager.sqlite.Config.path.complexity = advanced
gws.plugin.auth_session_manager.sqlite.Config.path.example = "/var/gws/var/sessions.sqlite"

gws.plugin.auth_session_manager.sqlite.Object.label = SQLite session manager
gws.plugin.auth_session_manager.sqlite.Object.purpose = Runtime object of the SQLite session manager. Creates, reads, updates and deletes session records in the configured SQLite file.
gws.plugin.auth_session_manager.sqlite.Object.complexity = advanced
