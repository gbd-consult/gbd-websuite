# UX-Strings für base/metadata (Welle B).
#
# Schlüsselformat: gws.base.metadata.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Inhalte aus den Klassen-Docstrings und core.py abgeleitet — keine
# Phantasie-Texte. Detail-Felder zu INSPIRE und ISO werden bewusst nur
# kurz beschriftet; die Semantik kommt aus den jeweiligen Standards.

[de]

# --- core.Config ----------------------------------------------------
# Sammelobjekt für beschreibende Metadaten (WMS/WFS-Capabilities,
# CSW-Katalog, ISO 19115, INSPIRE).

gws.base.metadata.core.Config.label = Metadaten
gws.base.metadata.core.Config.purpose = Beschreibende Metadaten zu Anwendung, Projekt oder Layer. Werden in OGC-Capabilities (WMS, WFS, WMTS), CSW-Katalogen und ISO-19115-Datensätzen ausgespielt.
gws.base.metadata.core.Config.whenToUse = Wenn die WebSuite eigene Daten oder Dienste veröffentlicht und INSPIRE-/ISO-konforme Metadaten gefordert sind, oder wenn die Capabilities-Antworten von WMS/WFS aussagekräftige Beschreibungen enthalten sollen.
gws.base.metadata.core.Config.complexity = intermediate
gws.base.metadata.core.Config.useCases = Capabilities-Antworten für WMS/WFS, CSW-Katalogeinträge, INSPIRE-Konformitäts-Pflichtfelder, projektweites Impressum/Lizenz.

# Kern-Felder

gws.base.metadata.core.Config.name.label = Name
gws.base.metadata.core.Config.name.purpose = Technischer Name des Objekts (oft identisch mit der UID).
gws.base.metadata.core.Config.name.complexity = basic

gws.base.metadata.core.Config.title.label = Titel
gws.base.metadata.core.Config.title.purpose = Lesbarer Titel des Objekts.
gws.base.metadata.core.Config.title.complexity = basic

gws.base.metadata.core.Config.abstract.label = Kurzbeschreibung
gws.base.metadata.core.Config.abstract.purpose = Kurzer beschreibender Text. Wird z. B. in WMS-Capabilities als <Abstract> ausgegeben.
gws.base.metadata.core.Config.abstract.complexity = basic

gws.base.metadata.core.Config.keywords.label = Schlagworte
gws.base.metadata.core.Config.keywords.purpose = Liste von Schlagworten. Vokabular kann vorangestellt werden ("gemet:river").
gws.base.metadata.core.Config.keywords.complexity = intermediate
gws.base.metadata.core.Config.keywords.example = ["umwelt", "gemet:river"]

gws.base.metadata.core.Config.language.label = Sprache
gws.base.metadata.core.Config.language.purpose = ISO-639-1-Sprachcode der Metadaten (z. B. "de", "en").
gws.base.metadata.core.Config.language.example = "de"

gws.base.metadata.core.Config.image.label = Vorschaubild
gws.base.metadata.core.Config.image.purpose = URL oder Pfad zu einem repräsentativen Bild.
gws.base.metadata.core.Config.image.complexity = intermediate

