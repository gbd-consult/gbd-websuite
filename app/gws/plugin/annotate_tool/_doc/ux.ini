# UX-Strings für das Annotation-Werkzeug (Welle C).

[de]

# --- action ---------------------------------------------------------------

gws.plugin.annotate_tool.action.Config.label = Annotation-Werkzeug
gws.plugin.annotate_tool.action.Config.purpose = Aktiviert ein Werkzeug, mit dem Anwender freie Markierungen (Punkte, Linien, Polygone, Text) in die Karte zeichnen und beschriften können. Die Annotationen sind temporär oder können über einen Speicher gesichert werden.
gws.plugin.annotate_tool.action.Config.whenToUse = In Anwendungen, in denen Anwender Karten mit eigenen Notizen, Beschriftungen oder Maßen versehen sollen.
gws.plugin.annotate_tool.action.Config.complexity = basic
gws.plugin.annotate_tool.action.Config.useCases = Notizen für Drucke, Markierung von Begehungspunkten, einfache Skizzen und Längen-/Flächenmessungen.

gws.plugin.annotate_tool.action.Config.labels.label = Standard-Beschriftungs-Vorlagen
gws.plugin.annotate_tool.action.Config.labels.purpose = Default-Beschriftungs-Templates pro Geometrietyp (z. B. Längenformat für Linien, Flächenformat für Polygone).

gws.plugin.annotate_tool.action.Config.storage.label = Speicher-Konfiguration
gws.plugin.annotate_tool.action.Config.storage.purpose = Optionale Konfiguration eines Speichers, in dem Anwender ihre Annotationen unter einem Namen ablegen und später wieder laden können.

[en]

# --- action ---------------------------------------------------------------

gws.plugin.annotate_tool.action.Config.label = Annotation tool
gws.plugin.annotate_tool.action.Config.purpose = Enables a tool that lets users draw free-form markers (points, lines, polygons, text) on the map and label them. Annotations are either transient or persisted via a storage backend.
gws.plugin.annotate_tool.action.Config.whenToUse = In applications where users need to add notes, labels or measurements to the map.
gws.plugin.annotate_tool.action.Config.complexity = basic
gws.plugin.annotate_tool.action.Config.useCases = Notes for printouts, marking inspection points, simple sketches and length/area measurements.

gws.plugin.annotate_tool.action.Config.labels.label = Default label templates
gws.plugin.annotate_tool.action.Config.labels.purpose = Default label templates per geometry type (e.g. length format for lines, area format for polygons).

gws.plugin.annotate_tool.action.Config.storage.label = Storage configuration
gws.plugin.annotate_tool.action.Config.storage.purpose = Optional storage configuration that lets users save annotations by name and reload them later.
