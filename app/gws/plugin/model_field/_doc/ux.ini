# UX-Strings for the model-field plugins.
#
# Eine ux.ini deckt alle Field-Typen (text, integer, float, bool, date,
# time, datetime, geometry, file, related_*).
# Hier werden die Top-Level-Configs poliert; Object/Props bleiben mit
# bootstrap-Defaults.

[de]

# --- bool ------------------------------------------------------------------

gws.plugin.model_field.bool.Config.label = Boolean-Feld
gws.plugin.model_field.bool.Config.purpose = Modellfeld für Wahrheitswerte (ja/nein, true/false). Wird im Client typischerweise als Checkbox oder Toggle dargestellt.
gws.plugin.model_field.bool.Config.complexity = basic
gws.plugin.model_field.bool.Config.useCases = Editierbare Statusflags, Aktiv/Inaktiv-Schalter, Sichtbarkeitsmarker.

# --- text ------------------------------------------------------------------

gws.plugin.model_field.text.Config.label = Text-Feld
gws.plugin.model_field.text.Config.purpose = Modellfeld für Zeichenketten beliebiger Länge. Standardwahl für Namen, Beschreibungen und IDs.
gws.plugin.model_field.text.Config.complexity = basic
gws.plugin.model_field.text.Config.useCases = Bezeichnungen, Adressen, Aktenzeichen, freier Beschreibungstext.

gws.plugin.model_field.text.Config.textSearch.label = Volltextsuche
gws.plugin.model_field.text.Config.textSearch.purpose = Aktiviert serverseitige Textsuche (Substring oder Trigram-Index in PostgreSQL) auf diesem Feld.
gws.plugin.model_field.text.Config.textSearch.complexity = intermediate

# --- integer ---------------------------------------------------------------

gws.plugin.model_field.integer.Config.label = Ganzzahl-Feld
gws.plugin.model_field.integer.Config.purpose = Modellfeld für ganze Zahlen. Geeignet für Zähler, IDs, Mengen ohne Nachkommastellen.
gws.plugin.model_field.integer.Config.complexity = basic
gws.plugin.model_field.integer.Config.useCases = Numerische IDs, Stückzahlen, Jahreszahlen, Sortier-Indizes.

# --- float -----------------------------------------------------------------

gws.plugin.model_field.float.Config.label = Dezimalzahl-Feld
gws.plugin.model_field.float.Config.purpose = Modellfeld für Fließkommazahlen. Geeignet für Maßangaben, Koordinaten, statistische Werte.
gws.plugin.model_field.float.Config.complexity = basic
gws.plugin.model_field.float.Config.useCases = Flächen, Längen, Höhen, Geldbeträge, Messwerte.

# --- date / time / datetime ------------------------------------------------

gws.plugin.model_field.date.Config.label = Datums-Feld
gws.plugin.model_field.date.Config.purpose = Modellfeld für ein Datum ohne Uhrzeit. Wird im Client als Datepicker dargestellt.
gws.plugin.model_field.date.Config.complexity = intermediate
gws.plugin.model_field.date.Config.useCases = Eintragsdatum, Stichtag, Erfassungstag.

gws.plugin.model_field.time.Config.label = Uhrzeit-Feld
gws.plugin.model_field.time.Config.purpose = Modellfeld für eine Tageszeit ohne Datum.
gws.plugin.model_field.time.Config.complexity = intermediate

gws.plugin.model_field.datetime.Config.label = Datum/Uhrzeit-Feld
gws.plugin.model_field.datetime.Config.purpose = Modellfeld für einen kombinierten Zeitstempel aus Datum und Uhrzeit. Häufig für Erstellungs- und Änderungsmarker eingesetzt.
gws.plugin.model_field.datetime.Config.complexity = intermediate
gws.plugin.model_field.datetime.Config.useCases = Erstellt-am, Geändert-am, Ereigniszeitpunkt.

# --- geometry --------------------------------------------------------------

gws.plugin.model_field.geometry.Config.label = Geometrie-Feld
gws.plugin.model_field.geometry.Config.purpose = Modellfeld für eine räumliche Geometrie (Punkt, Linie, Polygon, ...). Trägt das Geo-Objekt eines editierbaren Vektor-Layers.
gws.plugin.model_field.geometry.Config.whenToUse = Pflicht für jeden Vektor-Layer, der editiert oder räumlich durchsucht werden soll.
gws.plugin.model_field.geometry.Config.complexity = intermediate
gws.plugin.model_field.geometry.Config.useCases = Editierbare PostGIS-Geometrien, ALKIS-Flurstücksflächen, Nutzer-erfasste Punkte und Linien.

gws.plugin.model_field.geometry.Config.crs.label = Koordinatensystem
gws.plugin.model_field.geometry.Config.crs.purpose = EPSG-Code des Koordinatenbezugssystems der Geometrie. Ohne Angabe wird das CRS aus der Datenquelle übernommen.
gws.plugin.model_field.geometry.Config.crs.example = "EPSG:25832"

gws.plugin.model_field.geometry.Config.geometryType.label = Geometrietyp
gws.plugin.model_field.geometry.Config.geometryType.purpose = Erlaubter Geometrietyp (point, linestring, polygon, multi*). Steuert die Zeichenwerkzeuge im Editier-Client.
gws.plugin.model_field.geometry.Config.geometryType.example = "polygon"

# --- file ------------------------------------------------------------------

gws.plugin.model_field.file.Config.label = Datei-Feld
gws.plugin.model_field.file.Config.purpose = Modellfeld für Datei-Anhänge. Inhalt und Metadaten können in der Datenbank oder im Dateisystem abgelegt werden — die Spalten werden über `contentColumn`, `pathColumn` und `nameColumn` zugewiesen.
gws.plugin.model_field.file.Config.whenToUse = Wenn pro Datensatz Dokumente, Fotos oder andere Anhänge gespeichert werden sollen.
gws.plugin.model_field.file.Config.complexity = advanced
gws.plugin.model_field.file.Config.useCases = Foto-Anhänge an Inspektionspunkten, gescannte Akten, Plan-Dateien.

gws.plugin.model_field.file.Config.contentColumn.label = Inhaltsspalte
gws.plugin.model_field.file.Config.contentColumn.purpose = Spaltenname für den binären Dateiinhalt (BYTEA). Nur ausfüllen, wenn die Datei in der Datenbank liegt.
gws.plugin.model_field.file.Config.contentColumn.complexity = advanced

gws.plugin.model_field.file.Config.pathColumn.label = Pfadspalte
gws.plugin.model_field.file.Config.pathColumn.purpose = Spaltenname für den Dateipfad im Dateisystem. Alternative zu `contentColumn`.
gws.plugin.model_field.file.Config.pathColumn.complexity = advanced

gws.plugin.model_field.file.Config.nameColumn.label = Namensspalte
gws.plugin.model_field.file.Config.nameColumn.purpose = Spaltenname für den ursprünglichen Dateinamen.
gws.plugin.model_field.file.Config.nameColumn.complexity = advanced

# --- related_feature (1:1 / N:1) -------------------------------------------

gws.plugin.model_field.related_feature.Config.label = Beziehungs-Feld (Einzelreferenz)
gws.plugin.model_field.related_feature.Config.purpose = Verknüpft jeden Datensatz mit genau einem Datensatz eines anderen Modells über einen Fremdschlüssel. Klassisches N:1-Verhältnis (z. B. „Gehört zu Eigentümer").
gws.plugin.model_field.related_feature.Config.whenToUse = Wenn pro Datensatz höchstens ein verknüpftes Objekt referenziert wird.
gws.plugin.model_field.related_feature.Config.complexity = intermediate
gws.plugin.model_field.related_feature.Config.useCases = Flurstück → Eigentümer, Vorgang → Sachbearbeiter, Foto → Standort.

gws.plugin.model_field.related_feature.Config.fromColumn.label = Fremdschlüsselspalte
gws.plugin.model_field.related_feature.Config.fromColumn.purpose = Spalte in der eigenen Tabelle, die den Schlüssel des verknüpften Datensatzes hält.
gws.plugin.model_field.related_feature.Config.fromColumn.complexity = basic
gws.plugin.model_field.related_feature.Config.fromColumn.example = "owner_id"

gws.plugin.model_field.related_feature.Config.toModel.label = Zielmodell
gws.plugin.model_field.related_feature.Config.toModel.purpose = UID des Modells, auf das verwiesen wird.
gws.plugin.model_field.related_feature.Config.toModel.complexity = basic

gws.plugin.model_field.related_feature.Config.toColumn.label = Zielspalte
gws.plugin.model_field.related_feature.Config.toColumn.purpose = Spalte im Zielmodell, gegen die abgeglichen wird. Standard: Primärschlüssel des Zielmodells.

# --- related_feature_list (1:N) --------------------------------------------

gws.plugin.model_field.related_feature_list.Config.label = Beziehungs-Feld (Liste)
gws.plugin.model_field.related_feature_list.Config.purpose = Verknüpft einen Datensatz mit einer Liste von Datensätzen eines anderen Modells über eine Fremdschlüsselspalte im Zielmodell. Klassisches 1:N-Verhältnis.
gws.plugin.model_field.related_feature_list.Config.whenToUse = Wenn pro Datensatz mehrere abhängige Objekte gehören (Eltern → Kinder).
gws.plugin.model_field.related_feature_list.Config.complexity = intermediate
gws.plugin.model_field.related_feature_list.Config.useCases = Vorgang → Bearbeitungsschritte, Gebäude → Etagen, Kunde → Bestellungen.

gws.plugin.model_field.related_feature_list.Config.toModel.label = Zielmodell
gws.plugin.model_field.related_feature_list.Config.toModel.purpose = UID des Modells, das die abhängigen Datensätze enthält.
gws.plugin.model_field.related_feature_list.Config.toModel.complexity = basic

gws.plugin.model_field.related_feature_list.Config.toColumn.label = Fremdschlüssel im Zielmodell
gws.plugin.model_field.related_feature_list.Config.toColumn.purpose = Spalte im Zielmodell, die auf die eigene Tabelle verweist.
gws.plugin.model_field.related_feature_list.Config.toColumn.complexity = basic
gws.plugin.model_field.related_feature_list.Config.toColumn.example = "parent_id"

gws.plugin.model_field.related_feature_list.Config.fromColumn.label = Eigene Schlüsselspalte
gws.plugin.model_field.related_feature_list.Config.fromColumn.purpose = Spalte in der eigenen Tabelle, gegen die abgeglichen wird. Standard: eigener Primärschlüssel.

# --- related_linked_feature_list (M:N über Linktabelle) --------------------

gws.plugin.model_field.related_linked_feature_list.Config.label = Beziehungs-Feld (M:N über Linktabelle)
gws.plugin.model_field.related_linked_feature_list.Config.purpose = Verknüpft Datensätze über eine separate Linktabelle. Modelliert ein klassisches M:N-Verhältnis ohne Zusatzattribute auf der Linktabelle.
gws.plugin.model_field.related_linked_feature_list.Config.whenToUse = Wenn jeder Datensatz mehreren Zieldatensätzen zugewiesen sein darf und umgekehrt.
gws.plugin.model_field.related_linked_feature_list.Config.complexity = advanced
gws.plugin.model_field.related_linked_feature_list.Config.useCases = Person ↔ Rolle, Layer ↔ Themengruppe, Flurstück ↔ Verfahren.

gws.plugin.model_field.related_linked_feature_list.Config.toModel.label = Zielmodell
gws.plugin.model_field.related_linked_feature_list.Config.toModel.purpose = UID des verknüpften Modells.
gws.plugin.model_field.related_linked_feature_list.Config.toModel.complexity = basic

gws.plugin.model_field.related_linked_feature_list.Config.linkTableName.label = Linktabelle
gws.plugin.model_field.related_linked_feature_list.Config.linkTableName.purpose = Vollqualifizierter Name der Verknüpfungstabelle.
gws.plugin.model_field.related_linked_feature_list.Config.linkTableName.complexity = basic
gws.plugin.model_field.related_linked_feature_list.Config.linkTableName.example = "schema.parcel_procedure"

gws.plugin.model_field.related_linked_feature_list.Config.linkFromColumn.label = Linkspalte (eigene Seite)
gws.plugin.model_field.related_linked_feature_list.Config.linkFromColumn.purpose = Spalte in der Linktabelle, die auf das eigene Modell verweist.

gws.plugin.model_field.related_linked_feature_list.Config.linkToColumn.label = Linkspalte (Zielseite)
gws.plugin.model_field.related_linked_feature_list.Config.linkToColumn.purpose = Spalte in der Linktabelle, die auf das Zielmodell verweist.

gws.plugin.model_field.related_linked_feature_list.Config.fromColumn.label = Eigene Schlüsselspalte
gws.plugin.model_field.related_linked_feature_list.Config.fromColumn.purpose = Eigene Spalte für den Linktabellen-Abgleich. Standard: eigener Primärschlüssel.

gws.plugin.model_field.related_linked_feature_list.Config.toColumn.label = Schlüsselspalte des Zielmodells
gws.plugin.model_field.related_linked_feature_list.Config.toColumn.purpose = Spalte im Zielmodell für den Linktabellen-Abgleich. Standard: Primärschlüssel des Zielmodells.

# --- related_multi_feature_list (polymorphe Liste) -------------------------

gws.plugin.model_field.related_multi_feature_list.Config.label = Beziehungs-Feld (polymorphe Liste)
gws.plugin.model_field.related_multi_feature_list.Config.purpose = Polymorphe 1:N-Beziehung — der Datensatz kann von mehreren unterschiedlichen Zielmodellen referenziert werden, jedes mit eigener Fremdschlüsselspalte.
gws.plugin.model_field.related_multi_feature_list.Config.whenToUse = Wenn die abhängigen Objekte aus verschiedenen Tabellen stammen können (z. B. „verlinkte Dokumente von Vorgang oder Person").
gws.plugin.model_field.related_multi_feature_list.Config.complexity = advanced

gws.plugin.model_field.related_multi_feature_list.Config.related.label = Verknüpfte Modelle
gws.plugin.model_field.related_multi_feature_list.Config.related.purpose = Liste der Zielmodelle und ihrer jeweiligen Fremdschlüsselspalten.
gws.plugin.model_field.related_multi_feature_list.Config.related.complexity = advanced

gws.plugin.model_field.related_multi_feature_list.Config.fromColumn.label = Eigene Schlüsselspalte
gws.plugin.model_field.related_multi_feature_list.Config.fromColumn.purpose = Eigene Spalte für den Abgleich. Standard: Primärschlüssel.

gws.plugin.model_field.related_multi_feature_list.RelatedItem.label = Verknüpftes Modell
gws.plugin.model_field.related_multi_feature_list.RelatedItem.purpose = Zuordnung eines einzelnen Zielmodells und seiner Fremdschlüsselspalte.

gws.plugin.model_field.related_multi_feature_list.RelatedItem.toModel.label = Zielmodell
gws.plugin.model_field.related_multi_feature_list.RelatedItem.toModel.purpose = UID des verknüpften Modells.
gws.plugin.model_field.related_multi_feature_list.RelatedItem.toModel.complexity = basic

gws.plugin.model_field.related_multi_feature_list.RelatedItem.toColumn.label = Fremdschlüsselspalte
gws.plugin.model_field.related_multi_feature_list.RelatedItem.toColumn.purpose = Fremdschlüsselspalte im Zielmodell.
gws.plugin.model_field.related_multi_feature_list.RelatedItem.toColumn.complexity = basic

# --- geometry (Props) ------------------------------------------------------

gws.plugin.model_field.geometry.Props.geometryType.label = Geometrietyp
gws.plugin.model_field.geometry.Props.geometryType.purpose = Geometrietyp des Feldes (z.B. POINT, LINESTRING, POLYGON), wird vom Client für Editier-Werkzeuge ausgewertet.


[en]

# --- bool ------------------------------------------------------------------

gws.plugin.model_field.bool.Config.label = Boolean field
gws.plugin.model_field.bool.Config.purpose = Model field for truth values (yes/no, true/false). Typically rendered as a checkbox or toggle in the client.
gws.plugin.model_field.bool.Config.complexity = basic
gws.plugin.model_field.bool.Config.useCases = Editable status flags, active/inactive switches, visibility markers.

# --- text ------------------------------------------------------------------

gws.plugin.model_field.text.Config.label = Text field
gws.plugin.model_field.text.Config.purpose = Model field for character strings of arbitrary length. Default choice for names, descriptions, and IDs.
gws.plugin.model_field.text.Config.complexity = basic
gws.plugin.model_field.text.Config.useCases = Names, addresses, file numbers, free description text.

gws.plugin.model_field.text.Config.textSearch.label = Full-text search
gws.plugin.model_field.text.Config.textSearch.purpose = Enables server-side text search (substring or PostgreSQL trigram index) on this field.
gws.plugin.model_field.text.Config.textSearch.complexity = intermediate

# --- integer ---------------------------------------------------------------

gws.plugin.model_field.integer.Config.label = Integer field
gws.plugin.model_field.integer.Config.purpose = Model field for whole numbers. Suitable for counters, IDs, and quantities without decimals.
gws.plugin.model_field.integer.Config.complexity = basic
gws.plugin.model_field.integer.Config.useCases = Numeric IDs, item counts, year numbers, sort indexes.

# --- float -----------------------------------------------------------------

gws.plugin.model_field.float.Config.label = Decimal field
gws.plugin.model_field.float.Config.purpose = Model field for floating-point numbers. Suitable for measurements, coordinates, and statistical values.
gws.plugin.model_field.float.Config.complexity = basic
gws.plugin.model_field.float.Config.useCases = Areas, lengths, heights, monetary amounts, measurements.

# --- date / time / datetime ------------------------------------------------

gws.plugin.model_field.date.Config.label = Date field
gws.plugin.model_field.date.Config.purpose = Model field for a date without time. Rendered as a date picker in the client.
gws.plugin.model_field.date.Config.complexity = intermediate
gws.plugin.model_field.date.Config.useCases = Entry date, deadline, capture day.

gws.plugin.model_field.time.Config.label = Time field
gws.plugin.model_field.time.Config.purpose = Model field for a time of day without a date.
gws.plugin.model_field.time.Config.complexity = intermediate

gws.plugin.model_field.datetime.Config.label = Datetime field
gws.plugin.model_field.datetime.Config.purpose = Model field for a combined date-and-time timestamp. Often used for creation and modification markers.
gws.plugin.model_field.datetime.Config.complexity = intermediate
gws.plugin.model_field.datetime.Config.useCases = Created-at, modified-at, event timestamps.

# --- geometry --------------------------------------------------------------

gws.plugin.model_field.geometry.Config.label = Geometry field
gws.plugin.model_field.geometry.Config.purpose = Model field for a spatial geometry (point, line, polygon, ...). Carries the geo object of an editable vector layer.
gws.plugin.model_field.geometry.Config.whenToUse = Required for any vector layer that should be edited or spatially queried.
gws.plugin.model_field.geometry.Config.complexity = intermediate
gws.plugin.model_field.geometry.Config.useCases = Editable PostGIS geometries, ALKIS parcel polygons, user-captured points and lines.

gws.plugin.model_field.geometry.Config.crs.label = Coordinate system
gws.plugin.model_field.geometry.Config.crs.purpose = EPSG code of the geometry's reference system. If omitted, taken from the data source.
gws.plugin.model_field.geometry.Config.crs.example = "EPSG:25832"

gws.plugin.model_field.geometry.Config.geometryType.label = Geometry type
gws.plugin.model_field.geometry.Config.geometryType.purpose = Allowed geometry type (point, linestring, polygon, multi*). Drives the drawing tools in the editor client.
gws.plugin.model_field.geometry.Config.geometryType.example = "polygon"

# --- file ------------------------------------------------------------------

gws.plugin.model_field.file.Config.label = File field
gws.plugin.model_field.file.Config.purpose = Model field for file attachments. Content and metadata can live in the database or on the file system — columns are wired up via `contentColumn`, `pathColumn`, and `nameColumn`.
gws.plugin.model_field.file.Config.whenToUse = When each record needs documents, photos, or other attachments.
gws.plugin.model_field.file.Config.complexity = advanced
gws.plugin.model_field.file.Config.useCases = Photo attachments at inspection points, scanned files, plan documents.

gws.plugin.model_field.file.Config.contentColumn.label = Content column
gws.plugin.model_field.file.Config.contentColumn.purpose = Column name for the binary file content (BYTEA). Only set if the file is stored in the database.
gws.plugin.model_field.file.Config.contentColumn.complexity = advanced

gws.plugin.model_field.file.Config.pathColumn.label = Path column
gws.plugin.model_field.file.Config.pathColumn.purpose = Column name for the file path in the file system. Alternative to `contentColumn`.
gws.plugin.model_field.file.Config.pathColumn.complexity = advanced

gws.plugin.model_field.file.Config.nameColumn.label = Name column
gws.plugin.model_field.file.Config.nameColumn.purpose = Column name for the original file name.
gws.plugin.model_field.file.Config.nameColumn.complexity = advanced

# --- related_feature -------------------------------------------------------

gws.plugin.model_field.related_feature.Config.label = Relation field (single reference)
gws.plugin.model_field.related_feature.Config.purpose = Links each record to exactly one record in another model via a foreign key. Classic N:1 relation (e.g. "belongs to owner").
gws.plugin.model_field.related_feature.Config.whenToUse = When at most one related object is referenced per record.
gws.plugin.model_field.related_feature.Config.complexity = intermediate
gws.plugin.model_field.related_feature.Config.useCases = Parcel → owner, case → caseworker, photo → location.

gws.plugin.model_field.related_feature.Config.fromColumn.label = Foreign-key column
gws.plugin.model_field.related_feature.Config.fromColumn.purpose = Column in this table holding the key of the related record.
gws.plugin.model_field.related_feature.Config.fromColumn.complexity = basic
gws.plugin.model_field.related_feature.Config.fromColumn.example = "owner_id"

gws.plugin.model_field.related_feature.Config.toModel.label = Target model
gws.plugin.model_field.related_feature.Config.toModel.purpose = UID of the model being referenced.
gws.plugin.model_field.related_feature.Config.toModel.complexity = basic

gws.plugin.model_field.related_feature.Config.toColumn.label = Target column
gws.plugin.model_field.related_feature.Config.toColumn.purpose = Column in the target model the key resolves against. Defaults to its primary key.

# --- related_feature_list --------------------------------------------------

gws.plugin.model_field.related_feature_list.Config.label = Relation field (list)
gws.plugin.model_field.related_feature_list.Config.purpose = Links a record to a list of records in another model via a foreign-key column on the target side. Classic 1:N relation.
gws.plugin.model_field.related_feature_list.Config.whenToUse = When several dependent objects belong to one record (parent → children).
gws.plugin.model_field.related_feature_list.Config.complexity = intermediate
gws.plugin.model_field.related_feature_list.Config.useCases = Case → processing steps, building → floors, customer → orders.

gws.plugin.model_field.related_feature_list.Config.toModel.label = Target model
gws.plugin.model_field.related_feature_list.Config.toModel.purpose = UID of the model holding the dependent records.
gws.plugin.model_field.related_feature_list.Config.toModel.complexity = basic

gws.plugin.model_field.related_feature_list.Config.toColumn.label = Foreign key on target
gws.plugin.model_field.related_feature_list.Config.toColumn.purpose = Column on the target model that points back to this table.
gws.plugin.model_field.related_feature_list.Config.toColumn.complexity = basic
gws.plugin.model_field.related_feature_list.Config.toColumn.example = "parent_id"

gws.plugin.model_field.related_feature_list.Config.fromColumn.label = Own key column
gws.plugin.model_field.related_feature_list.Config.fromColumn.purpose = Column on this table the foreign key resolves against. Defaults to the own primary key.

# --- related_linked_feature_list -------------------------------------------

gws.plugin.model_field.related_linked_feature_list.Config.label = Relation field (M:N via link table)
gws.plugin.model_field.related_linked_feature_list.Config.purpose = Links records via a separate link table. Models a classic M:N relation without extra attributes on the link table.
gws.plugin.model_field.related_linked_feature_list.Config.whenToUse = When each record can be assigned to many target records and vice versa.
gws.plugin.model_field.related_linked_feature_list.Config.complexity = advanced
gws.plugin.model_field.related_linked_feature_list.Config.useCases = Person ↔ role, layer ↔ theme group, parcel ↔ procedure.

gws.plugin.model_field.related_linked_feature_list.Config.toModel.label = Target model
gws.plugin.model_field.related_linked_feature_list.Config.toModel.purpose = UID of the linked model.
gws.plugin.model_field.related_linked_feature_list.Config.toModel.complexity = basic

gws.plugin.model_field.related_linked_feature_list.Config.linkTableName.label = Link table
gws.plugin.model_field.related_linked_feature_list.Config.linkTableName.purpose = Fully-qualified name of the link table.
gws.plugin.model_field.related_linked_feature_list.Config.linkTableName.complexity = basic
gws.plugin.model_field.related_linked_feature_list.Config.linkTableName.example = "schema.parcel_procedure"

gws.plugin.model_field.related_linked_feature_list.Config.linkFromColumn.label = Link column (own side)
gws.plugin.model_field.related_linked_feature_list.Config.linkFromColumn.purpose = Column in the link table referencing this model.

gws.plugin.model_field.related_linked_feature_list.Config.linkToColumn.label = Link column (target side)
gws.plugin.model_field.related_linked_feature_list.Config.linkToColumn.purpose = Column in the link table referencing the target model.

gws.plugin.model_field.related_linked_feature_list.Config.fromColumn.label = Own key column
gws.plugin.model_field.related_linked_feature_list.Config.fromColumn.purpose = Own column for the link-table match. Defaults to the own primary key.

gws.plugin.model_field.related_linked_feature_list.Config.toColumn.label = Target key column
gws.plugin.model_field.related_linked_feature_list.Config.toColumn.purpose = Column in the target model for the link-table match. Defaults to the target primary key.

# --- related_multi_feature_list --------------------------------------------

gws.plugin.model_field.related_multi_feature_list.Config.label = Relation field (polymorphic list)
gws.plugin.model_field.related_multi_feature_list.Config.purpose = Polymorphic 1:N relation — the record can be referenced by several distinct target models, each with its own foreign-key column.
gws.plugin.model_field.related_multi_feature_list.Config.whenToUse = When dependent objects can come from different tables (e.g. "linked documents from a case or a person").
gws.plugin.model_field.related_multi_feature_list.Config.complexity = advanced

gws.plugin.model_field.related_multi_feature_list.Config.related.label = Related models
gws.plugin.model_field.related_multi_feature_list.Config.related.purpose = List of target models and their respective foreign-key columns.
