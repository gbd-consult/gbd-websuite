[en]

# --- action.Config ----------------------------------------------------------

gws.plugin.alkis.action.Config.label = ALKIS action
gws.plugin.alkis.action.Config.purpose = Backend action for cadastral parcel ("Flurstück") search, address search and parcel export. Connects to an ALKIS database, builds internal indexes and serves the data to the sidebar UI as well as print and export functions.
gws.plugin.alkis.action.Config.whenToUse = Required configuration whenever ALKIS data should be searchable from the WebSuite.
gws.plugin.alkis.action.Config.complexity = advanced
gws.plugin.alkis.action.Config.useCases = Parcel search in the sidebar, owner and ledger lookup with access controls, CSV/GeoJSON export of parcels, printable parcel reports.
gws.plugin.alkis.action.Config.docsLink = /admin-de/plugin/alkis

gws.plugin.alkis.action.Config.dbUid.label = Database provider
gws.plugin.alkis.action.Config.dbUid.purpose = UID of the PostgreSQL/PostGIS provider that holds the ALKIS data.

gws.plugin.alkis.action.Config.crs.label = ALKIS CRS
gws.plugin.alkis.action.Config.crs.purpose = Coordinate reference system the ALKIS geometries are stored in. In Germany typically UTM zone 32 or 33.
gws.plugin.alkis.action.Config.crs.example = "EPSG:25832"

gws.plugin.alkis.action.Config.dataSchema.label = ALKIS schema
gws.plugin.alkis.action.Config.dataSchema.purpose = PostgreSQL schema that contains the ALKIS source tables (NAS import). The plugin only reads from this schema, never writes.
gws.plugin.alkis.action.Config.dataSchema.example = "public"

gws.plugin.alkis.action.Config.indexSchema.label = Index schema
gws.plugin.alkis.action.Config.indexSchema.purpose = PostgreSQL schema where the GWS-internal ALKIS indexes (parcels, addresses, owners) are created and updated.
gws.plugin.alkis.action.Config.indexSchema.example = "gws8"

gws.plugin.alkis.action.Config.excludeGemarkung.label = Excluded Gemarkungen
gws.plugin.alkis.action.Config.excludeGemarkung.purpose = List of Gemarkung (cadastral district) codes to skip during indexing.
gws.plugin.alkis.action.Config.excludeGemarkung.complexity = advanced

gws.plugin.alkis.action.Config.gemarkungFilter.label = Gemarkung filter
gws.plugin.alkis.action.Config.gemarkungFilter.purpose = List of Gemarkung codes the search should be limited to.
gws.plugin.alkis.action.Config.gemarkungFilter.complexity = advanced

gws.plugin.alkis.action.Config.eigentuemer.label = Owner configuration
gws.plugin.alkis.action.Config.eigentuemer.purpose = Access rules and privacy controls for the owner (Eigentümer) lookup.
gws.plugin.alkis.action.Config.eigentuemer.complexity = advanced

gws.plugin.alkis.action.Config.buchung.label = Ledger configuration
gws.plugin.alkis.action.Config.buchung.purpose = Access rules for the ledger (Buchung/Grundbuch) lookup — book pages and entries.
gws.plugin.alkis.action.Config.buchung.complexity = advanced

gws.plugin.alkis.action.Config.limit.label = Result limit
gws.plugin.alkis.action.Config.limit.purpose = Maximum number of hits a parcel search returns.
gws.plugin.alkis.action.Config.limit.example = 100

gws.plugin.alkis.action.Config.templates.label = Templates
gws.plugin.alkis.action.Config.templates.purpose = HTML templates for parcel and address rendering (title, teaser, description, label).
gws.plugin.alkis.action.Config.templates.complexity = advanced

gws.plugin.alkis.action.Config.printers.label = Print configurations
gws.plugin.alkis.action.Config.printers.purpose = Print templates available for ALKIS reports.
gws.plugin.alkis.action.Config.printers.complexity = advanced

gws.plugin.alkis.action.Config.ui.label = UI options
gws.plugin.alkis.action.Config.ui.purpose = Sidebar UI configuration (list modes and enabled features such as export, selection, history).

gws.plugin.alkis.action.Config.strasseSearchOptions.label = Street name search options
gws.plugin.alkis.action.Config.strasseSearchOptions.purpose = Text search behaviour for street names (e.g. exact, prefix or substring matching).

gws.plugin.alkis.action.Config.nameSearchOptions.label = Person name search options
gws.plugin.alkis.action.Config.nameSearchOptions.purpose = Text search behaviour for owner names.
gws.plugin.alkis.action.Config.nameSearchOptions.complexity = advanced

gws.plugin.alkis.action.Config.buchungsblattSearchOptions.label = Ledger page search options
gws.plugin.alkis.action.Config.buchungsblattSearchOptions.purpose = Text search behaviour for ledger page numbers.
gws.plugin.alkis.action.Config.buchungsblattSearchOptions.complexity = advanced

gws.plugin.alkis.action.Config.storage.label = Storage
gws.plugin.alkis.action.Config.storage.purpose = Storage configuration for saved selections (parcel collections).
gws.plugin.alkis.action.Config.storage.complexity = advanced

gws.plugin.alkis.action.Config.exporters.label = Exporters
gws.plugin.alkis.action.Config.exporters.purpose = List of export profiles (CSV, GeoJSON) offered as download options in the UI.
gws.plugin.alkis.action.Config.exporters.complexity = advanced

# --- action.EigentuemerConfig -----------------------------------------------

gws.plugin.alkis.action.EigentuemerConfig.label = Owner lookup
gws.plugin.alkis.action.EigentuemerConfig.purpose = Access rules and privacy controls for showing owner data. Owner data is subject to data protection laws and may not be displayed without proper authorisation.
gws.plugin.alkis.action.EigentuemerConfig.whenToUse = When authorised users need to look up owner information from ALKIS.
gws.plugin.alkis.action.EigentuemerConfig.complexity = advanced

gws.plugin.alkis.action.EigentuemerConfig.controlMode.label = Control mode
gws.plugin.alkis.action.EigentuemerConfig.controlMode.purpose = If enabled, every owner request must include a justification (e.g. case number) which is validated against controlRules and logged in logTable.

gws.plugin.alkis.action.EigentuemerConfig.controlRules.label = Control rules
gws.plugin.alkis.action.EigentuemerConfig.controlRules.purpose = List of regular expressions; the supplied justification must match at least one of them.
gws.plugin.alkis.action.EigentuemerConfig.controlRules.example = ["^[A-Z][A-Z]/[0-9][0-9]$"]

gws.plugin.alkis.action.EigentuemerConfig.logTable.label = Audit log table
gws.plugin.alkis.action.EigentuemerConfig.logTable.purpose = Name of a PostgreSQL table that records every owner lookup (user, IP, justification, hit count).
gws.plugin.alkis.action.EigentuemerConfig.logTable.example = "eigen_log"

# --- action.BuchungConfig ---------------------------------------------------

gws.plugin.alkis.action.BuchungConfig.label = Ledger lookup
gws.plugin.alkis.action.BuchungConfig.purpose = Access rules for showing ledger data (book pages, entries, name numbers). Ledger data carries ownership information and is access-restricted accordingly.
gws.plugin.alkis.action.BuchungConfig.whenToUse = When authorised users need access to the ledger ("Buchung") information of ALKIS.
gws.plugin.alkis.action.BuchungConfig.complexity = advanced

# --- action.Ui --------------------------------------------------------------

gws.plugin.alkis.action.Ui.label = ALKIS UI options
gws.plugin.alkis.action.Ui.purpose = Configuration of the parcel search sidebar.

gws.plugin.alkis.action.Ui.useExport.label = Enable export
gws.plugin.alkis.action.Ui.useExport.purpose = Enables the export function (CSV/GeoJSON) in the sidebar.

gws.plugin.alkis.action.Ui.useSelect.label = Selection mode
gws.plugin.alkis.action.Ui.useSelect.purpose = Enables multi-parcel selection and the selection store.

gws.plugin.alkis.action.Ui.usePick.label = Direct pick
gws.plugin.alkis.action.Ui.usePick.purpose = Enables the "pick parcel directly" function via map click.

gws.plugin.alkis.action.Ui.useHistory.label = History
gws.plugin.alkis.action.Ui.useHistory.purpose = Enables history controls (search and display of historical, retired parcels).
gws.plugin.alkis.action.Ui.useHistory.complexity = advanced

gws.plugin.alkis.action.Ui.searchSelection.label = Search in selection
gws.plugin.alkis.action.Ui.searchSelection.purpose = Enables the "search within current selection" function.

gws.plugin.alkis.action.Ui.searchSpatial.label = Spatial search
gws.plugin.alkis.action.Ui.searchSpatial.purpose = Enables the spatial search (polygon or bounding box).

gws.plugin.alkis.action.Ui.gemarkungListMode.label = Gemarkung list mode
gws.plugin.alkis.action.Ui.gemarkungListMode.purpose = How the Gemarkung dropdown is rendered: just Gemarkung, "Gemarkung (Gemeinde)", a tree, or hidden.

gws.plugin.alkis.action.Ui.strasseListMode.label = Street list format
gws.plugin.alkis.action.Ui.strasseListMode.purpose = Rendering of street names in the dropdown, with or without Gemeinde/Gemarkung suffix.

gws.plugin.alkis.action.Ui.autoSpatialSearch.label = Automatic spatial search
gws.plugin.alkis.action.Ui.autoSpatialSearch.purpose = If enabled, the form expects a spatial restriction once the user submits the search.
gws.plugin.alkis.action.Ui.autoSpatialSearch.complexity = advanced

# --- action.Object ----------------------------------------------------------

gws.plugin.alkis.action.Object.label = ALKIS action (runtime)

# --- action.Props -----------------------------------------------------------

gws.plugin.alkis.action.Props.label = ALKIS action (client props)
gws.plugin.alkis.action.Props.purpose = Properties published to the client. Consumed by the sidebar module.

# --- action.FindFlurstueckRequest -------------------------------------------

gws.plugin.alkis.action.FindFlurstueckRequest.label = Parcel search request
gws.plugin.alkis.action.FindFlurstueckRequest.purpose = Parameters of the parcel search API. Fields can be set individually or in combination; empty fields are ignored. Structure follows the ALKIS administrative hierarchy (Land, regional district, county, municipality, Gemarkung, Flur, numerator/denominator, parcel sequence).

# --- action.FindAdresseRequest ----------------------------------------------

gws.plugin.alkis.action.FindAdresseRequest.label = Address search request
gws.plugin.alkis.action.FindAdresseRequest.purpose = Parameters of the ALKIS address search. Addresses are looked up against the ALKIS address register, not via external geocoders.

# --- action.GetToponymsRequest ----------------------------------------------

gws.plugin.alkis.action.GetToponymsRequest.label = Toponym request
gws.plugin.alkis.action.GetToponymsRequest.purpose = Returns the list of all Gemeinden, Gemarkungen and streets from the ALKIS index — used by the client to populate the dropdown lists.

# --- action.PrintFlurstueckRequest ------------------------------------------

gws.plugin.alkis.action.PrintFlurstueckRequest.label = Parcel print request
gws.plugin.alkis.action.PrintFlurstueckRequest.purpose = Parameters for printing a parcel report. Combines parcel search parameters with a print request.

# --- action.ExportFlurstueckRequest -----------------------------------------

gws.plugin.alkis.action.ExportFlurstueckRequest.label = Parcel export request
gws.plugin.alkis.action.ExportFlurstueckRequest.purpose = Parameters for exporting parcels. Picks an exporter (CSV or GeoJSON) and supplies a parcel search request.

# --- data.exporter.Config ---------------------------------------------------

gws.plugin.alkis.data.exporter.Config.label = ALKIS export profile
gws.plugin.alkis.data.exporter.Config.purpose = Defines an export profile for parcel data (CSV or GeoJSON), including the selection of exported fields.
gws.plugin.alkis.data.exporter.Config.whenToUse = When users should be able to download search results as a file (e.g. for Excel or QGIS).
gws.plugin.alkis.data.exporter.Config.complexity = advanced

gws.plugin.alkis.data.exporter.Config.type.label = Export format
gws.plugin.alkis.data.exporter.Config.type.purpose = Output format — currently "csv" or "geojson".
gws.plugin.alkis.data.exporter.Config.type.example = "csv"

gws.plugin.alkis.data.exporter.Config.title.label = Display title
gws.plugin.alkis.data.exporter.Config.title.purpose = Label under which this export profile is offered in the UI.

gws.plugin.alkis.data.exporter.Config.model.label = Export data model
gws.plugin.alkis.data.exporter.Config.model.purpose = Data model selecting the exported fields. Without a custom model, a default selection (parcel identifier, Gemeinde/Gemarkung, Flur/numerator/denominator, area, label point) is used.
gws.plugin.alkis.data.exporter.Config.model.complexity = advanced

# --- cli.Object -------------------------------------------------------------

gws.plugin.alkis.cli.Object.label = ALKIS CLI
gws.plugin.alkis.cli.Object.purpose = Command-line tools to build, inspect and export the ALKIS index.

# --- cli.CreateIndexParams --------------------------------------------------

gws.plugin.alkis.cli.CreateIndexParams.label = Index build parameters
gws.plugin.alkis.cli.CreateIndexParams.purpose = Parameters for `gws alkis index` — builds the GWS-internal ALKIS indexes from the NAS data.

gws.plugin.alkis.cli.CreateIndexParams.projectUid.label = Project UID
gws.plugin.alkis.cli.CreateIndexParams.projectUid.purpose = Project UID, if the ALKIS action is configured per-project.

gws.plugin.alkis.cli.CreateIndexParams.force.label = Force
gws.plugin.alkis.cli.CreateIndexParams.force.purpose = Rebuild the index even when it is already complete.

gws.plugin.alkis.cli.CreateIndexParams.cache.label = Object cache
gws.plugin.alkis.cli.CreateIndexParams.cache.purpose = Use an object cache during indexing (speeds up repeated runs against the same dataset).
gws.plugin.alkis.cli.CreateIndexParams.cache.complexity = advanced

# --- cli.StatusParams -------------------------------------------------------

gws.plugin.alkis.cli.StatusParams.label = Status parameters
gws.plugin.alkis.cli.StatusParams.purpose = Parameters for `gws alkis status` — reports whether the ALKIS index is complete, partial (e.g. base data only, no owner/ledger) or missing.

gws.plugin.alkis.cli.StatusParams.projectUid.label = Project UID
gws.plugin.alkis.cli.StatusParams.projectUid.purpose = Project UID, if configured per-project.

# --- cli.ExportParams -------------------------------------------------------

gws.plugin.alkis.cli.ExportParams.label = Export parameters
gws.plugin.alkis.cli.ExportParams.purpose = Parameters for `gws alkis export` — exports the full parcel set including owner/ledger data into a file (batch run, executed as the system user).
gws.plugin.alkis.cli.ExportParams.complexity = advanced

gws.plugin.alkis.cli.ExportParams.projectUid.label = Project UID
gws.plugin.alkis.cli.ExportParams.projectUid.purpose = Project UID, if configured per-project.

gws.plugin.alkis.cli.ExportParams.exporterUid.label = Exporter UID
gws.plugin.alkis.cli.ExportParams.exporterUid.purpose = UID of a configured export profile. If omitted, the first available profile is used.

gws.plugin.alkis.cli.ExportParams.path.label = Output path
gws.plugin.alkis.cli.ExportParams.path.purpose = Path of the output file.

# --- cli.DumpParams ---------------------------------------------------------

gws.plugin.alkis.cli.DumpParams.label = Dump parameters
gws.plugin.alkis.cli.DumpParams.purpose = Parameters for `gws alkis dump` — writes the internal JSON representation of selected parcels to a file. Diagnostic / debug helper.
gws.plugin.alkis.cli.DumpParams.complexity = advanced

gws.plugin.alkis.cli.DumpParams.projectUid.label = Project UID
gws.plugin.alkis.cli.DumpParams.projectUid.purpose = Project UID, if configured per-project.

gws.plugin.alkis.cli.DumpParams.fs.label = Parcel UIDs
gws.plugin.alkis.cli.DumpParams.fs.purpose = Comma- or whitespace-separated list of parcel UIDs (e.g. ALKIS identifiers or GML IDs).

gws.plugin.alkis.cli.DumpParams.path.label = Output path
gws.plugin.alkis.cli.DumpParams.path.purpose = Path of the output file.

# --- action.Props (client properties) ---------------------------------------

gws.plugin.alkis.action.Props.exporters.label = Exporters
gws.plugin.alkis.action.Props.exporters.purpose = List of available export profiles (UID and display title) published to the client.

gws.plugin.alkis.action.Props.limit.label = Result limit
gws.plugin.alkis.action.Props.limit.purpose = Result limit for parcel search published to the client.

gws.plugin.alkis.action.Props.printer.label = Printer
gws.plugin.alkis.action.Props.printer.purpose = Print configuration for parcel reports published to the client.

gws.plugin.alkis.action.Props.ui.label = UI options
gws.plugin.alkis.action.Props.ui.purpose = UI options of the ALKIS sidebar published to the client.

gws.plugin.alkis.action.Props.storage.label = Storage
gws.plugin.alkis.action.Props.storage.purpose = Storage properties for saved parcel selections published to the client.

gws.plugin.alkis.action.Props.strasseSearchOptions.label = Street name search options
gws.plugin.alkis.action.Props.strasseSearchOptions.purpose = Search options for street names reported to the client.

gws.plugin.alkis.action.Props.nameSearchOptions.label = Person name search options
gws.plugin.alkis.action.Props.nameSearchOptions.purpose = Search options for owner names reported to the client.

gws.plugin.alkis.action.Props.buchungsblattSearchOptions.label = Ledger page search options
gws.plugin.alkis.action.Props.buchungsblattSearchOptions.purpose = Search options for ledger page numbers reported to the client.

gws.plugin.alkis.action.Props.withBuchung.label = Ledger lookup available
gws.plugin.alkis.action.Props.withBuchung.purpose = Indicates to the client that the ledger lookup is enabled.

gws.plugin.alkis.action.Props.withEigentuemer.label = Owner lookup available
gws.plugin.alkis.action.Props.withEigentuemer.purpose = Indicates to the client that the owner lookup is enabled.

gws.plugin.alkis.action.Props.withEigentuemerControl.label = Justification required
gws.plugin.alkis.action.Props.withEigentuemerControl.purpose = Indicates that owner lookup requires a justification input.

gws.plugin.alkis.action.Props.withFlurnummer.label = Flur input
gws.plugin.alkis.action.Props.withFlurnummer.purpose = Indicates that the Flur (cadastral district map) input is enabled in the form.

# --- FindFlurstueckRequest --------------------------------------------------

gws.plugin.alkis.action.FindFlurstueckRequest.land.label = Land
gws.plugin.alkis.action.FindFlurstueckRequest.land.purpose = Federal state name (top level of the ALKIS administrative key).

gws.plugin.alkis.action.FindFlurstueckRequest.landCode.label = Land code
gws.plugin.alkis.action.FindFlurstueckRequest.landCode.purpose = Federal state code (two digits) per ALKIS administrative key.

gws.plugin.alkis.action.FindFlurstueckRequest.regierungsbezirk.label = Regierungsbezirk
gws.plugin.alkis.action.FindFlurstueckRequest.regierungsbezirk.purpose = Name of the regional district (Regierungsbezirk).

gws.plugin.alkis.action.FindFlurstueckRequest.regierungsbezirkCode.label = Regierungsbezirk code
gws.plugin.alkis.action.FindFlurstueckRequest.regierungsbezirkCode.purpose = Regional district code per ALKIS administrative key.

gws.plugin.alkis.action.FindFlurstueckRequest.kreis.label = Kreis
gws.plugin.alkis.action.FindFlurstueckRequest.kreis.purpose = Name of the county (Kreis).

gws.plugin.alkis.action.FindFlurstueckRequest.kreisCode.label = Kreis code
gws.plugin.alkis.action.FindFlurstueckRequest.kreisCode.purpose = County code per ALKIS administrative key.

gws.plugin.alkis.action.FindFlurstueckRequest.gemeinde.label = Gemeinde
gws.plugin.alkis.action.FindFlurstueckRequest.gemeinde.purpose = Name of the municipality (Gemeinde).

gws.plugin.alkis.action.FindFlurstueckRequest.gemeindeCode.label = Gemeinde code
gws.plugin.alkis.action.FindFlurstueckRequest.gemeindeCode.purpose = Municipality code per ALKIS administrative key.

gws.plugin.alkis.action.FindFlurstueckRequest.gemarkung.label = Gemarkung
gws.plugin.alkis.action.FindFlurstueckRequest.gemarkung.purpose = Name of the cadastral district (Gemarkung) — area unit below the municipality.

gws.plugin.alkis.action.FindFlurstueckRequest.gemarkungCode.label = Gemarkung code
gws.plugin.alkis.action.FindFlurstueckRequest.gemarkungCode.purpose = Cadastral district code per ALKIS.

gws.plugin.alkis.action.FindFlurstueckRequest.flurnummer.label = Flur number
gws.plugin.alkis.action.FindFlurstueckRequest.flurnummer.purpose = Number of the Flur within the Gemarkung.

gws.plugin.alkis.action.FindFlurstueckRequest.zaehler.label = Numerator
gws.plugin.alkis.action.FindFlurstueckRequest.zaehler.purpose = Numerator of the parcel number (numerator/denominator pair).

gws.plugin.alkis.action.FindFlurstueckRequest.nenner.label = Denominator
gws.plugin.alkis.action.FindFlurstueckRequest.nenner.purpose = Denominator of the parcel number. Empty if the parcel has no denominator.

gws.plugin.alkis.action.FindFlurstueckRequest.flurstuecksfolge.label = Parcel sequence
gws.plugin.alkis.action.FindFlurstueckRequest.flurstuecksfolge.purpose = Parcel sequence (ALKIS-specific suffix to the parcel number).

gws.plugin.alkis.action.FindFlurstueckRequest.fsnummer.label = Full parcel number
gws.plugin.alkis.action.FindFlurstueckRequest.fsnummer.purpose = Full parcel identifier (Flur, numerator/denominator, optional sequence) as a single string.

gws.plugin.alkis.action.FindFlurstueckRequest.flaecheVon.label = Min area (m²)
gws.plugin.alkis.action.FindFlurstueckRequest.flaecheVon.purpose = Lower bound of the official parcel area filter.

gws.plugin.alkis.action.FindFlurstueckRequest.flaecheBis.label = Max area (m²)
gws.plugin.alkis.action.FindFlurstueckRequest.flaecheBis.purpose = Upper bound of the official parcel area filter.

gws.plugin.alkis.action.FindFlurstueckRequest.strasse.label = Street
gws.plugin.alkis.action.FindFlurstueckRequest.strasse.purpose = Street name for the combined address/parcel search.

gws.plugin.alkis.action.FindFlurstueckRequest.hausnummer.label = House number
gws.plugin.alkis.action.FindFlurstueckRequest.hausnummer.purpose = House number for the combined address/parcel search.

gws.plugin.alkis.action.FindFlurstueckRequest.bblatt.label = Ledger page number
gws.plugin.alkis.action.FindFlurstueckRequest.bblatt.purpose = Ledger page number (Buchungsblatt — land register link). Filters for parcels of a given ledger page.

gws.plugin.alkis.action.FindFlurstueckRequest.personName.label = Owner surname
gws.plugin.alkis.action.FindFlurstueckRequest.personName.purpose = Owner's surname (effective only with owner permission).
gws.plugin.alkis.action.FindFlurstueckRequest.personName.complexity = advanced

gws.plugin.alkis.action.FindFlurstueckRequest.personVorname.label = Owner given name
gws.plugin.alkis.action.FindFlurstueckRequest.personVorname.purpose = Owner's given name (effective only with owner permission).
gws.plugin.alkis.action.FindFlurstueckRequest.personVorname.complexity = advanced

gws.plugin.alkis.action.FindFlurstueckRequest.combinedFlurstueckCode.label = Combined parcel code
gws.plugin.alkis.action.FindFlurstueckRequest.combinedFlurstueckCode.purpose = Full ALKIS parcel identifier (Land/Gemarkung/Flur/numerator/denominator) as a single value.

gws.plugin.alkis.action.FindFlurstueckRequest.shapes.label = Search geometries
gws.plugin.alkis.action.FindFlurstueckRequest.shapes.purpose = Geometries for the spatial restriction — parcels intersecting these shapes are searched.

gws.plugin.alkis.action.FindFlurstueckRequest.uids.label = Parcel UIDs
gws.plugin.alkis.action.FindFlurstueckRequest.uids.purpose = List of explicit parcel UIDs (e.g. ALKIS identifiers or GML IDs) to look up.

gws.plugin.alkis.action.FindFlurstueckRequest.crs.label = Result CRS
gws.plugin.alkis.action.FindFlurstueckRequest.crs.purpose = Coordinate reference system for the result geometries.

gws.plugin.alkis.action.FindFlurstueckRequest.eigentuemerControlInput.label = Justification
gws.plugin.alkis.action.FindFlurstueckRequest.eigentuemerControlInput.purpose = User-supplied justification for the owner lookup (e.g. case number). Validated against controlRules and logged.
gws.plugin.alkis.action.FindFlurstueckRequest.eigentuemerControlInput.complexity = advanced

gws.plugin.alkis.action.FindFlurstueckRequest.limit.label = Result limit
gws.plugin.alkis.action.FindFlurstueckRequest.limit.purpose = Maximum number of results for this request; cannot exceed the configured limit.

gws.plugin.alkis.action.FindFlurstueckRequest.wantEigentuemer.label = Include owner data
gws.plugin.alkis.action.FindFlurstueckRequest.wantEigentuemer.purpose = If enabled, owner data is included in the result (requires permission).
gws.plugin.alkis.action.FindFlurstueckRequest.wantEigentuemer.complexity = advanced

gws.plugin.alkis.action.FindFlurstueckRequest.wantHistorySearch.label = Search history
gws.plugin.alkis.action.FindFlurstueckRequest.wantHistorySearch.purpose = If enabled, historical (retired) parcels are included in the search.
gws.plugin.alkis.action.FindFlurstueckRequest.wantHistorySearch.complexity = advanced

gws.plugin.alkis.action.FindFlurstueckRequest.wantHistoryDisplay.label = Show history
gws.plugin.alkis.action.FindFlurstueckRequest.wantHistoryDisplay.purpose = If enabled, predecessor/successor parcels from the ALKIS history are returned alongside each hit.
gws.plugin.alkis.action.FindFlurstueckRequest.wantHistoryDisplay.complexity = advanced

gws.plugin.alkis.action.FindFlurstueckRequest.displayThemes.label = Display themes
gws.plugin.alkis.action.FindFlurstueckRequest.displayThemes.purpose = Selection of themes shown for each hit (location, ledger, owner, land use).

