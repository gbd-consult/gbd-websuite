# UX-Strings für Server-Engine-Optionen (uWSGI, MapProxy, Spool, Logging).

[de]

gws.server.core.Config.label = Server
gws.server.core.Config.purpose = Laufzeit-Optionen der WebSuite-Engine — uWSGI-Worker, Logging, Hintergrund-Spool, MapProxy- und QGIS-Server-Bündelung sowie Konfigurations-Hooks.
gws.server.core.Config.whenToUse = Top-Level-Bereich, der typischerweise nur bei Performance-Tuning oder Containerisierung angefasst wird.
gws.server.core.Config.complexity = advanced

gws.server.core.Config.autoRun.label = Auto-Run-Hook
gws.server.core.Config.autoRun.purpose = Shell-Befehl, der vor dem Server-Start ausgeführt wird (z. B. Dateninitialisierung).
gws.server.core.Config.autoRun.example = "/data/scripts/init.sh"
gws.server.core.Config.autoRun.complexity = advanced

gws.server.core.Config.log.label = Logging
gws.server.core.Config.log.purpose = Konfiguration der Server-Logs (Pfad, Level, Format).

gws.server.core.Config.mapproxy.label = MapProxy
gws.server.core.Config.mapproxy.purpose = Eingebettetes MapProxy-Modul für Tile-Caching und Reprojektion.
gws.server.core.Config.mapproxy.complexity = advanced

gws.server.core.Config.monitor.label = Monitor
gws.server.core.Config.monitor.purpose = Datei-Watcher, der Konfigurations-Änderungen erkennt und automatisches Reload triggert.
gws.server.core.Config.monitor.complexity = advanced

gws.server.core.Config.postConfigure.label = Post-Configure-Hook
gws.server.core.Config.postConfigure.purpose = Shell- oder Python-Skript, das nach dem Konfigurations-Setup, vor dem Server-Start läuft.
gws.server.core.Config.postConfigure.complexity = advanced

gws.server.core.Config.preConfigure.label = Pre-Configure-Hook
gws.server.core.Config.preConfigure.purpose = Shell- oder Python-Skript, das vor dem Konfigurations-Setup läuft.
gws.server.core.Config.preConfigure.complexity = advanced

gws.server.core.Config.qgis.label = QGIS-Server
gws.server.core.Config.qgis.purpose = Konfiguration des gebündelten QGIS-Servers (Worker, Cache, Auto-Reload).
gws.server.core.Config.qgis.complexity = advanced

gws.server.core.Config.spool.label = Spool-Server
gws.server.core.Config.spool.purpose = Hintergrund-Spool für asynchrone Jobs (Druck, Tile-Seeding, Export).
gws.server.core.Config.spool.complexity = advanced

gws.server.core.Config.templates.label = Konfigurations-Templates
gws.server.core.Config.templates.purpose = Konfigurations-Vorlagen, die im uWSGI-Setup zur Laufzeit ausgerollt werden.
gws.server.core.Config.templates.complexity = advanced

gws.server.core.Config.timeZone.label = Zeitzone
gws.server.core.Config.timeZone.purpose = Zeitzone des Servers (für Logging und Datums-Felder).
gws.server.core.Config.timeZone.example = "Europe/Berlin"

gws.server.core.Config.web.label = Web-Modul
gws.server.core.Config.web.purpose = uWSGI-Worker für die HTTP-Schicht (Anzahl Worker, Timeouts).
gws.server.core.Config.web.complexity = advanced

gws.server.core.Config.withMapproxy.label = MapProxy aktiv
gws.server.core.Config.withMapproxy.purpose = Schaltet das MapProxy-Modul ein/aus. Bei aktiviertem Tile-Caching meist aktiv.

gws.server.core.Config.withMonitor.label = Monitor aktiv
gws.server.core.Config.withMonitor.purpose = Schaltet den Datei-Monitor zur Erkennung von Konfigurations-Änderungen ein/aus.

gws.server.core.Config.withSpool.label = Spool aktiv
gws.server.core.Config.withSpool.purpose = Schaltet den Spool-Server für asynchrone Hintergrund-Jobs ein/aus.

gws.server.core.Config.withWeb.label = Web-Server aktiv
gws.server.core.Config.withWeb.purpose = Schaltet die HTTP-Schicht (uWSGI-Web-Worker) ein/aus.

# --- LogConfig --------------------------------------------------------------

gws.server.core.LogConfig.level.label = Log-Level
gws.server.core.LogConfig.level.purpose = Detailtiefe der Log-Ausgabe (z. B. DEBUG, INFO, WARN, ERROR).
gws.server.core.LogConfig.level.example = "INFO"

gws.server.core.LogConfig.path.label = Log-Pfad
gws.server.core.LogConfig.path.purpose = Datei-Pfad für die Server-Logs. Leer = stdout.

# --- MapproxyConfig ---------------------------------------------------------

gws.server.core.MapproxyConfig.enabled.label = MapProxy aktiviert
gws.server.core.MapproxyConfig.enabled.purpose = Aktiviert das MapProxy-Modul (deprecated in 8.2 — bitte withMapproxy auf Top-Level verwenden).
gws.server.core.MapproxyConfig.enabled.complexity = advanced

gws.server.core.MapproxyConfig.forceStart.label = Erzwungener Start
gws.server.core.MapproxyConfig.forceStart.purpose = Startet MapProxy auch dann, wenn keine Caching-Konfiguration vorhanden ist.
gws.server.core.MapproxyConfig.forceStart.complexity = advanced

gws.server.core.MapproxyConfig.host.label = Host
gws.server.core.MapproxyConfig.host.purpose = Hostname oder IP, an die das MapProxy-Modul gebunden wird.
gws.server.core.MapproxyConfig.host.example = "localhost"

gws.server.core.MapproxyConfig.port.label = Port
gws.server.core.MapproxyConfig.port.purpose = TCP-Port des MapProxy-Moduls.
gws.server.core.MapproxyConfig.port.example = 5000

gws.server.core.MapproxyConfig.workers.label = Worker-Anzahl
gws.server.core.MapproxyConfig.workers.purpose = Anzahl der MapProxy-Worker-Prozesse.
gws.server.core.MapproxyConfig.workers.example = 4

# --- MonitorConfig ----------------------------------------------------------

gws.server.core.MonitorConfig.disableWatch.label = Datei-Watching deaktivieren
gws.server.core.MonitorConfig.disableWatch.purpose = Deaktiviert die Datei-System-Überwachung (kein Auto-Reload bei Konfig-Änderungen).
gws.server.core.MonitorConfig.disableWatch.complexity = advanced

gws.server.core.MonitorConfig.enabled.label = Monitor aktiviert
gws.server.core.MonitorConfig.enabled.purpose = Aktiviert das Monitor-Modul (deprecated in 8.2 — bitte withMonitor auf Top-Level verwenden).
gws.server.core.MonitorConfig.enabled.complexity = advanced

gws.server.core.MonitorConfig.frequency.label = Prüf-Intervall
gws.server.core.MonitorConfig.frequency.purpose = Intervall, in dem der Monitor seine periodischen Aufgaben ausführt.
gws.server.core.MonitorConfig.frequency.example = "30"

gws.server.core.MonitorConfig.ignore.label = Ignorier-Muster
gws.server.core.MonitorConfig.ignore.purpose = Liste von regulären Ausdrücken; passende Pfade werden vom Monitor ignoriert. (deprecated in 8.2)
gws.server.core.MonitorConfig.ignore.complexity = advanced

# --- QgisConfig -------------------------------------------------------------

gws.server.core.QgisConfig.host.label = QGIS-Host
gws.server.core.QgisConfig.host.purpose = Hostname oder IP des externen QGIS-Servers.
gws.server.core.QgisConfig.host.example = "qgis"

gws.server.core.QgisConfig.port.label = QGIS-Port
gws.server.core.QgisConfig.port.purpose = TCP-Port des externen QGIS-Servers.
gws.server.core.QgisConfig.port.example = 80

# --- SpoolConfig ------------------------------------------------------------

gws.server.core.SpoolConfig.enabled.label = Spool aktiviert
gws.server.core.SpoolConfig.enabled.purpose = Aktiviert den Spool-Server (deprecated in 8.2 — bitte withSpool auf Top-Level verwenden).
gws.server.core.SpoolConfig.enabled.complexity = advanced

gws.server.core.SpoolConfig.jobFrequency.label = Job-Prüf-Intervall
gws.server.core.SpoolConfig.jobFrequency.purpose = Intervall, in dem der Spool nach neuen Hintergrund-Jobs sucht.
gws.server.core.SpoolConfig.jobFrequency.example = "3"

gws.server.core.SpoolConfig.timeout.label = Job-Timeout
gws.server.core.SpoolConfig.timeout.purpose = Maximale Laufzeit eines Hintergrund-Jobs, bevor er abgebrochen wird.
gws.server.core.SpoolConfig.timeout.example = "300"

gws.server.core.SpoolConfig.workers.label = Worker-Anzahl
gws.server.core.SpoolConfig.workers.purpose = Anzahl der Spool-Worker-Prozesse.
gws.server.core.SpoolConfig.workers.example = 4

# --- WebConfig --------------------------------------------------------------

gws.server.core.WebConfig.enabled.label = Web-Server aktiviert
gws.server.core.WebConfig.enabled.purpose = Aktiviert den Web-Server (deprecated in 8.2 — bitte withWeb auf Top-Level verwenden).
gws.server.core.WebConfig.enabled.complexity = advanced

gws.server.core.WebConfig.maxRequestLength.label = Max. Request-Größe
gws.server.core.WebConfig.maxRequestLength.purpose = Maximale Größe eines HTTP-Requests in Megabyte.
gws.server.core.WebConfig.maxRequestLength.example = 10

gws.server.core.WebConfig.timeout.label = Web-Timeout
gws.server.core.WebConfig.timeout.purpose = Maximale Bearbeitungszeit eines Web-Requests, bevor der Worker abbricht.
gws.server.core.WebConfig.timeout.example = "60"

gws.server.core.WebConfig.workers.label = Worker-Anzahl
gws.server.core.WebConfig.workers.purpose = Anzahl der uWSGI-Web-Worker-Prozesse.
gws.server.core.WebConfig.workers.example = 4

# --- cli (server) -----------------------------------------------------------

gws.server.cli.Params.config.label = Konfigurationsdatei
gws.server.cli.Params.config.purpose = Pfad zur Server-Konfigurationsdatei.

gws.server.cli.Params.manifest.label = Manifest-Datei
gws.server.cli.Params.manifest.purpose = Pfad zur Manifest-Datei mit aktiven Plugins.

gws.server.cli.ConfigTestParams.config.label = Konfigurationsdatei
gws.server.cli.ConfigTestParams.config.purpose = Pfad zur Server-Konfigurationsdatei.

gws.server.cli.ConfigTestParams.manifest.label = Manifest-Datei
gws.server.cli.ConfigTestParams.manifest.purpose = Pfad zur Manifest-Datei mit aktiven Plugins.

gws.server.cli.ConfigTestParams.dirs.label = Watch-Verzeichnisse
gws.server.cli.ConfigTestParams.dirs.purpose = Verzeichnisse, die im Watch-Modus auf Änderungen überwacht werden.

gws.server.cli.ConfigTestParams.watch.label = Watch-Modus
gws.server.cli.ConfigTestParams.watch.purpose = Wenn aktiv, prüft der Befehl die Konfiguration kontinuierlich bei Datei-Änderungen.

gws.server.cli.ConfigTestParams.parse.label = Nur parsen
gws.server.cli.ConfigTestParams.parse.purpose = Wenn aktiv, wird die Konfiguration nur geparst, aber nicht validiert oder aktiviert.

[en]

gws.server.core.Config.label = Server
gws.server.core.Config.purpose = Runtime options of the WebSuite engine — uWSGI workers, logging, background spool, MapProxy and QGIS Server bundling, configuration hooks.
gws.server.core.Config.whenToUse = Top-level area typically touched only for performance tuning or containerisation.
gws.server.core.Config.complexity = advanced

gws.server.core.Config.autoRun.label = Auto-run hook
gws.server.core.Config.autoRun.purpose = Shell command executed before the server starts (e.g. data init).
gws.server.core.Config.autoRun.example = "/data/scripts/init.sh"
gws.server.core.Config.autoRun.complexity = advanced

gws.server.core.Config.log.label = Logging
gws.server.core.Config.log.purpose = Server log configuration (path, level, format).

gws.server.core.Config.mapproxy.label = MapProxy
gws.server.core.Config.mapproxy.purpose = Embedded MapProxy module for tile caching and reprojection.
gws.server.core.Config.mapproxy.complexity = advanced

gws.server.core.Config.monitor.label = Monitor
gws.server.core.Config.monitor.purpose = File watcher that detects config changes and triggers auto-reload.
gws.server.core.Config.monitor.complexity = advanced

gws.server.core.Config.postConfigure.label = Post-configure hook
gws.server.core.Config.postConfigure.purpose = Shell or Python script executed after configuration setup, before the server starts.
gws.server.core.Config.postConfigure.complexity = advanced

gws.server.core.Config.preConfigure.label = Pre-configure hook
gws.server.core.Config.preConfigure.purpose = Shell or Python script executed before configuration setup.
gws.server.core.Config.preConfigure.complexity = advanced

gws.server.core.Config.qgis.label = QGIS Server
gws.server.core.Config.qgis.purpose = Configuration of the bundled QGIS Server (workers, cache, auto-reload).
gws.server.core.Config.qgis.complexity = advanced

gws.server.core.Config.spool.label = Spool server
gws.server.core.Config.spool.purpose = Background spool for asynchronous jobs (print, tile seeding, export).
gws.server.core.Config.spool.complexity = advanced

gws.server.core.Config.templates.label = Configuration templates
gws.server.core.Config.templates.purpose = Configuration templates rolled out during uWSGI setup.
gws.server.core.Config.templates.complexity = advanced

gws.server.core.Config.timeZone.label = Time zone
gws.server.core.Config.timeZone.purpose = Server time zone (used in logging and date fields).
gws.server.core.Config.timeZone.example = "Europe/Berlin"

gws.server.core.Config.web.label = Web module
gws.server.core.Config.web.purpose = uWSGI workers for the HTTP layer (worker count, timeouts).
gws.server.core.Config.web.complexity = advanced

gws.server.core.Config.withMapproxy.label = MapProxy active
gws.server.core.Config.withMapproxy.purpose = Enables/disables the MapProxy module. Usually on when tile caching is in use.

gws.server.core.Config.withMonitor.label = Monitor active
gws.server.core.Config.withMonitor.purpose = Enables/disables the file monitor that detects configuration changes.

gws.server.core.Config.withSpool.label = Spool active
gws.server.core.Config.withSpool.purpose = Enables/disables the spool server for asynchronous background jobs.

gws.server.core.Config.withWeb.label = Web server active
gws.server.core.Config.withWeb.purpose = Enables/disables the HTTP layer (uWSGI web workers).

# --- LogConfig --------------------------------------------------------------

gws.server.core.LogConfig.level.label = Log level
gws.server.core.LogConfig.level.purpose = Verbosity of the log output (e.g. DEBUG, INFO, WARN, ERROR).
gws.server.core.LogConfig.level.example = "INFO"

gws.server.core.LogConfig.path.label = Log path
gws.server.core.LogConfig.path.purpose = File path for the server logs. Empty = stdout.

# --- MapproxyConfig ---------------------------------------------------------

gws.server.core.MapproxyConfig.enabled.label = MapProxy enabled
gws.server.core.MapproxyConfig.enabled.purpose = Enables the MapProxy module (deprecated in 8.2 — use withMapproxy at top level).
gws.server.core.MapproxyConfig.enabled.complexity = advanced

gws.server.core.MapproxyConfig.forceStart.label = Force start
gws.server.core.MapproxyConfig.forceStart.purpose = Starts MapProxy even if no caching configuration is defined.
gws.server.core.MapproxyConfig.forceStart.complexity = advanced

gws.server.core.MapproxyConfig.host.label = Host
gws.server.core.MapproxyConfig.host.purpose = Hostname or IP the MapProxy module binds to.
gws.server.core.MapproxyConfig.host.example = "localhost"

gws.server.core.MapproxyConfig.port.label = Port
gws.server.core.MapproxyConfig.port.purpose = TCP port of the MapProxy module.
gws.server.core.MapproxyConfig.port.example = 5000

gws.server.core.MapproxyConfig.workers.label = Worker count
gws.server.core.MapproxyConfig.workers.purpose = Number of MapProxy worker processes.
gws.server.core.MapproxyConfig.workers.example = 4

# --- MonitorConfig ----------------------------------------------------------

gws.server.core.MonitorConfig.disableWatch.label = Disable watching
gws.server.core.MonitorConfig.disableWatch.purpose = Disables file system watching (no auto-reload on config changes).
gws.server.core.MonitorConfig.disableWatch.complexity = advanced

gws.server.core.MonitorConfig.enabled.label = Monitor enabled
gws.server.core.MonitorConfig.enabled.purpose = Enables the monitor module (deprecated in 8.2 — use withMonitor at top level).
gws.server.core.MonitorConfig.enabled.complexity = advanced

gws.server.core.MonitorConfig.frequency.label = Check interval
gws.server.core.MonitorConfig.frequency.purpose = Interval at which the monitor performs its periodic tasks.
gws.server.core.MonitorConfig.frequency.example = "30"

gws.server.core.MonitorConfig.ignore.label = Ignore patterns
gws.server.core.MonitorConfig.ignore.purpose = List of regular expressions; matching paths are ignored by the monitor. (deprecated in 8.2)
gws.server.core.MonitorConfig.ignore.complexity = advanced

# --- QgisConfig -------------------------------------------------------------

gws.server.core.QgisConfig.host.label = QGIS host
gws.server.core.QgisConfig.host.purpose = Hostname or IP of the external QGIS server.
gws.server.core.QgisConfig.host.example = "qgis"

gws.server.core.QgisConfig.port.label = QGIS port
gws.server.core.QgisConfig.port.purpose = TCP port of the external QGIS server.
gws.server.core.QgisConfig.port.example = 80

# --- SpoolConfig ------------------------------------------------------------

gws.server.core.SpoolConfig.enabled.label = Spool enabled
gws.server.core.SpoolConfig.enabled.purpose = Enables the spool server (deprecated in 8.2 — use withSpool at top level).
gws.server.core.SpoolConfig.enabled.complexity = advanced

gws.server.core.SpoolConfig.jobFrequency.label = Job check interval
gws.server.core.SpoolConfig.jobFrequency.purpose = Interval at which the spool checks for new background jobs.
gws.server.core.SpoolConfig.jobFrequency.example = "3"

gws.server.core.SpoolConfig.timeout.label = Job timeout
gws.server.core.SpoolConfig.timeout.purpose = Maximum runtime of a background job before it is aborted.
gws.server.core.SpoolConfig.timeout.example = "300"

gws.server.core.SpoolConfig.workers.label = Worker count
gws.server.core.SpoolConfig.workers.purpose = Number of spool worker processes.
gws.server.core.SpoolConfig.workers.example = 4

# --- WebConfig --------------------------------------------------------------

gws.server.core.WebConfig.enabled.label = Web server enabled
gws.server.core.WebConfig.enabled.purpose = Enables the web server (deprecated in 8.2 — use withWeb at top level).
gws.server.core.WebConfig.enabled.complexity = advanced

gws.server.core.WebConfig.maxRequestLength.label = Max request size
gws.server.core.WebConfig.maxRequestLength.purpose = Maximum size of an HTTP request in megabytes.
gws.server.core.WebConfig.maxRequestLength.example = 10

gws.server.core.WebConfig.timeout.label = Web timeout
gws.server.core.WebConfig.timeout.purpose = Maximum processing time per web request before the worker aborts.
gws.server.core.WebConfig.timeout.example = "60"

gws.server.core.WebConfig.workers.label = Worker count
gws.server.core.WebConfig.workers.purpose = Number of uWSGI web worker processes.
gws.server.core.WebConfig.workers.example = 4

# --- cli (server) -----------------------------------------------------------

gws.server.cli.Params.config.label = Config file
gws.server.cli.Params.config.purpose = Path to the server configuration file.

gws.server.cli.Params.manifest.label = Manifest file
gws.server.cli.Params.manifest.purpose = Path to the manifest file listing active plugins.

gws.server.cli.ConfigTestParams.config.label = Config file
gws.server.cli.ConfigTestParams.config.purpose = Path to the server configuration file.

gws.server.cli.ConfigTestParams.manifest.label = Manifest file
gws.server.cli.ConfigTestParams.manifest.purpose = Path to the manifest file listing active plugins.

gws.server.cli.ConfigTestParams.dirs.label = Watch directories
gws.server.cli.ConfigTestParams.dirs.purpose = Directories watched for changes in watch mode.

gws.server.cli.ConfigTestParams.watch.label = Watch mode
gws.server.cli.ConfigTestParams.watch.purpose = When active, the command continuously re-checks the configuration on file changes.

gws.server.cli.ConfigTestParams.parse.label = Parse only
gws.server.cli.ConfigTestParams.parse.purpose = When active, the configuration is only parsed, not validated or activated.
