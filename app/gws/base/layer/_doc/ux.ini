# UX-Strings für base/layer (core, group, tree, ows).
#
# Schlüsselformat: gws.base.layer.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Inhalte konservativ aus Klassen-Docstrings und Source abgeleitet —
# keine Phantasie-Texte. Interne Props/Properties (z.B. clientOptions-
# Details) bleiben mit minimalem Label.

[de]

# --- core.Config (gemeinsame Layer-Basis) -----------------------------------

gws.base.layer.core.Config.label = Layer
gws.base.layer.core.Config.purpose = Gemeinsame Konfiguration für jeden Karten-Layer. Liefert Titel, Sichtbarkeit, Maßstabsbereich, Darstellung sowie die Anbindung an Datenmodelle, Suchen, Templates, Legenden und OWS-Veröffentlichung.
gws.base.layer.core.Config.whenToUse = Wird (über Subtypen wie qgis, postgres, tile, group) in jeder Karte verwendet. Diese Basis-Felder gelten für alle Layer-Typen.
gws.base.layer.core.Config.complexity = basic
gws.base.layer.core.Config.useCases = Sichtbarkeit und Reihenfolge im Layer-Baum, Maßstabs-/Auflösungs-Einschränkungen, Transparenz, Cache-Steuerung, Suchanbindung.

gws.base.layer.core.Config.title.label = Titel
gws.base.layer.core.Config.title.purpose = Anzeigename des Layers in Karte, Layer-Baum und OWS-Capabilities.
gws.base.layer.core.Config.title.complexity = basic
gws.base.layer.core.Config.title.example = "Bebauungspläne"

gws.base.layer.core.Config.display.label = Darstellungsmodus
gws.base.layer.core.Config.display.purpose = Wie der Layer im Client gerendert wird: als Box (gerendertes Bild der gesamten Ansicht), als Tile-Pyramide oder als clientseitiges Vector/SVG.
gws.base.layer.core.Config.display.complexity = intermediate
gws.base.layer.core.Config.display.example = "tile"

gws.base.layer.core.Config.opacity.label = Deckkraft
gws.base.layer.core.Config.opacity.purpose = Transparenz des Layers, 0 (vollständig durchsichtig) bis 1 (deckend).
gws.base.layer.core.Config.opacity.complexity = basic
gws.base.layer.core.Config.opacity.example = 0.7

gws.base.layer.core.Config.extent.label = Ausdehnung
gws.base.layer.core.Config.extent.purpose = Bounding-Box des Layers im Karten-CRS als [minX, minY, maxX, maxY]. Begrenzt die Datenanfragen auf diesen Bereich.
gws.base.layer.core.Config.extent.complexity = intermediate
gws.base.layer.core.Config.extent.example = [2500000, 5500000, 2700000, 5700000]

gws.base.layer.core.Config.zoomExtent.label = Zoom-Ausdehnung
gws.base.layer.core.Config.zoomExtent.purpose = Eigene Bounding-Box für die "Zum Layer zoomen"-Funktion. Fällt zurück auf extent.
gws.base.layer.core.Config.zoomExtent.complexity = advanced

gws.base.layer.core.Config.extentBuffer.label = Extent-Puffer
gws.base.layer.core.Config.extentBuffer.purpose = Erweiterung der Layer-Ausdehnung in Karten-Einheiten, um Randabschneidungen bei Kachel-Anfragen zu vermeiden.
gws.base.layer.core.Config.extentBuffer.complexity = advanced

gws.base.layer.core.Config.zoom.label = Auflösungen / Maßstäbe
gws.base.layer.core.Config.zoom.purpose = Erlaubte Maßstabsstufen oder Pixel-Auflösungen, in denen der Layer sichtbar ist.
gws.base.layer.core.Config.zoom.complexity = intermediate

gws.base.layer.core.Config.clientOptions.label = Client-Optionen
gws.base.layer.core.Config.clientOptions.purpose = Steuert Anzeige und Vorbelegung im Layer-Baum (anfangs sichtbar, ausgeklappt, ausgewählt usw.).
gws.base.layer.core.Config.clientOptions.complexity = basic

gws.base.layer.core.Config.legend.label = Legende
gws.base.layer.core.Config.legend.purpose = Konfiguration der Legende dieses Layers (statisches Bild, externe URL, HTML-Template oder kombiniert).
gws.base.layer.core.Config.legend.complexity = intermediate
gws.base.layer.core.Config.legend.seeAlso = gws.plugin.legend.static.Config, gws.plugin.legend.remote.Config, gws.plugin.legend.html.Config

gws.base.layer.core.Config.withLegend.label = Legende aktiv
gws.base.layer.core.Config.withLegend.purpose = Schaltet die Legende für diesen Layer ein oder aus, unabhängig vom Vorhandensein einer Legend-Konfiguration.
gws.base.layer.core.Config.withLegend.complexity = intermediate

gws.base.layer.core.Config.withSearch.label = Suche aktiv
gws.base.layer.core.Config.withSearch.purpose = Schaltet die Such-/Identify-Funktion (GetFeatureInfo, Datenbank-Suche) für diesen Layer ein oder aus.
gws.base.layer.core.Config.withSearch.complexity = intermediate

gws.base.layer.core.Config.withCache.label = Cache aktiv
gws.base.layer.core.Config.withCache.purpose = Schaltet das Caching der gerenderten Kacheln über MapProxy ein. Erfordert eine sinnvolle cache-/grid-Konfiguration.
gws.base.layer.core.Config.withCache.complexity = advanced

gws.base.layer.core.Config.withOws.label = OWS-Veröffentlichung aktiv
gws.base.layer.core.Config.withOws.purpose = Steuert, ob der Layer in den OWS-Diensten (WMS, WFS, WMTS) der WebSuite erscheint.
gws.base.layer.core.Config.withOws.complexity = intermediate

gws.base.layer.core.Config.cache.label = Cache
gws.base.layer.core.Config.cache.purpose = Detail-Konfiguration des Tile-Caches: Lebensdauer, maximales Zoom-Level, Pixel-Puffer.
gws.base.layer.core.Config.cache.complexity = advanced

gws.base.layer.core.Config.grid.label = Tile-Grid
gws.base.layer.core.Config.grid.purpose = Eigenes Kachel-Grid für den Client (CRS, Ausdehnung, Auflösungen, Tile-Größe). Üblicherweise vom Eltern-Layer/der Karte geerbt.
gws.base.layer.core.Config.grid.complexity = advanced

gws.base.layer.core.Config.imageFormat.label = Bildformat
gws.base.layer.core.Config.imageFormat.purpose = MIME-Typ und Encoder-Optionen der gerenderten Bilder (z.B. png8, png24, jpeg).
gws.base.layer.core.Config.imageFormat.complexity = advanced

gws.base.layer.core.Config.metadata.label = Metadaten
gws.base.layer.core.Config.metadata.purpose = Layer-eigene ISO-/INSPIRE-Metadaten (Titel, Abstract, Keywords, Lizenz). Wird in OWS-Capabilities ausgegeben.
gws.base.layer.core.Config.metadata.complexity = intermediate

gws.base.layer.core.Config.models.label = Datenmodelle
gws.base.layer.core.Config.models.purpose = Datenmodelle für Editier-/Lese-Operationen auf den Features dieses Layers.
gws.base.layer.core.Config.models.complexity = intermediate

gws.base.layer.core.Config.finders.label = Suchanbieter
gws.base.layer.core.Config.finders.purpose = Layer-spezifische Such-/Identify-Provider (zusätzlich zu den Karten-globalen).
gws.base.layer.core.Config.finders.complexity = intermediate

gws.base.layer.core.Config.templates.label = Templates
gws.base.layer.core.Config.templates.purpose = Templates für Tooltip, Beschreibung, Suchergebnis-Darstellung dieses Layers.
gws.base.layer.core.Config.templates.complexity = intermediate

gws.base.layer.core.Config.ows.label = OWS-Veröffentlichung
gws.base.layer.core.Config.ows.purpose = Detail-Einstellungen für die Veröffentlichung dieses Layers in WMS/WFS/WMTS-Diensten (Layer-Name, Feature-Name, erlaubte Dienste).
gws.base.layer.core.Config.ows.complexity = advanced
gws.base.layer.core.Config.ows.seeAlso = gws.base.layer.ows.Config

gws.base.layer.core.Config.loadingStrategy.label = Lade-Strategie
gws.base.layer.core.Config.loadingStrategy.purpose = Wann Vector-Features geladen werden — alle auf einmal, nur die im Sichtbereich (BBOX) oder lazy.
gws.base.layer.core.Config.loadingStrategy.complexity = advanced
gws.base.layer.core.Config.loadingStrategy.example = "bbox"

gws.base.layer.core.Config.cssSelector.label = CSS-Selector
gws.base.layer.core.Config.cssSelector.purpose = CSS-Klasse für die Symbolisierung von Vektor-Features im Client.
gws.base.layer.core.Config.cssSelector.complexity = advanced
gws.base.layer.core.Config.cssSelector.example = ".my-layer-style"

# --- core.CacheConfig --------------------------------------------------------

gws.base.layer.core.CacheConfig.label = Cache-Optionen
gws.base.layer.core.CacheConfig.purpose = Detail-Konfiguration des MapProxy-Tile-Caches für einen Layer.
gws.base.layer.core.CacheConfig.complexity = advanced

gws.base.layer.core.CacheConfig.maxAge.label = Maximales Alter
gws.base.layer.core.CacheConfig.maxAge.purpose = Lebensdauer einer Kachel im Cache, danach wird neu gerendert. Default: 7 Tage.
gws.base.layer.core.CacheConfig.maxAge.example = "7d"

gws.base.layer.core.CacheConfig.maxLevel.label = Maximales Zoom-Level
gws.base.layer.core.CacheConfig.maxLevel.purpose = Höchste Zoom-Stufe, bis zu der Kacheln gecacht werden. Höhere Stufen werden on-the-fly gerendert.
gws.base.layer.core.CacheConfig.maxLevel.example = 12

gws.base.layer.core.CacheConfig.requestBuffer.label = Request-Puffer (Pixel)
gws.base.layer.core.CacheConfig.requestBuffer.purpose = Pixel-Puffer beim Anfordern von Tiles, um Beschriftungs-Abschneidungen an Kachel-Rändern zu vermeiden.

gws.base.layer.core.CacheConfig.requestTiles.label = Tiles pro Anfrage
gws.base.layer.core.CacheConfig.requestTiles.purpose = Anzahl der pro Upstream-Request angeforderten Tiles. Größere Werte reduzieren die Request-Anzahl, vergrößern aber das Bild.

# --- core.GridConfig ---------------------------------------------------------

gws.base.layer.core.GridConfig.label = Grid-Konfiguration
gws.base.layer.core.GridConfig.purpose = Eigenes Tile-Grid für Cache und gekachelte Datenquellen.
gws.base.layer.core.GridConfig.complexity = advanced

gws.base.layer.core.GridConfig.crs.label = CRS
gws.base.layer.core.GridConfig.crs.purpose = Ziel-CRS des Grids. Default: CRS des Eltern-Layers.
gws.base.layer.core.GridConfig.crs.example = "EPSG:25832"

gws.base.layer.core.GridConfig.extent.label = Ausdehnung
gws.base.layer.core.GridConfig.extent.purpose = Ausdehnung des Grids im Grid-CRS.

gws.base.layer.core.GridConfig.origin.label = Ursprung
gws.base.layer.core.GridConfig.origin.purpose = Eckpunkt, an dem das Grid beginnt. Default: nordwest (nw).
gws.base.layer.core.GridConfig.origin.example = "nw"

gws.base.layer.core.GridConfig.resolutions.label = Auflösungen
gws.base.layer.core.GridConfig.resolutions.purpose = Pixel-Auflösungen pro Grid-Level. Default: vom Eltern-Layer geerbt.

gws.base.layer.core.GridConfig.tileSize.label = Tile-Größe (Pixel)
gws.base.layer.core.GridConfig.tileSize.purpose = Kachelgröße in Pixeln. Default: 256.
gws.base.layer.core.GridConfig.tileSize.example = 256

# --- core.ClientOptions ------------------------------------------------------

gws.base.layer.core.ClientOptions.label = Client-Optionen
gws.base.layer.core.ClientOptions.purpose = Anfangsdarstellung des Layers im Layer-Baum des Clients.
gws.base.layer.core.ClientOptions.complexity = basic

gws.base.layer.core.ClientOptions.expanded.label = Anfangs ausgeklappt
gws.base.layer.core.ClientOptions.expanded.purpose = Gruppe ist beim Laden ausgeklappt.

gws.base.layer.core.ClientOptions.unlisted.label = Im Baum verbergen
gws.base.layer.core.ClientOptions.unlisted.purpose = Layer wird im Layer-Baum nicht aufgelistet (aber gerendert, falls sichtbar).

gws.base.layer.core.ClientOptions.selected.label = Anfangs ausgewählt
gws.base.layer.core.ClientOptions.selected.purpose = Layer ist beim Laden ausgewählt.

gws.base.layer.core.ClientOptions.hidden.label = Anfangs unsichtbar
gws.base.layer.core.ClientOptions.hidden.purpose = Layer ist beim Laden ausgeschaltet, kann aber vom Nutzer aktiviert werden.

gws.base.layer.core.ClientOptions.unfolded.label = Aufgelöst anzeigen
gws.base.layer.core.ClientOptions.unfolded.purpose = Gruppe selbst wird nicht im Baum gezeigt, nur ihre Kind-Layer.

gws.base.layer.core.ClientOptions.exclusive.label = Exklusiv-Gruppe
gws.base.layer.core.ClientOptions.exclusive.purpose = Innerhalb dieser Gruppe ist immer nur ein Kind-Layer gleichzeitig sichtbar (Radio-Button-Verhalten).
gws.base.layer.core.ClientOptions.exclusive.complexity = intermediate

gws.base.layer.core.ClientOptions.treeClassName.label = CSS-Klasse
gws.base.layer.core.ClientOptions.treeClassName.purpose = Eigene CSS-Klasse für den Eintrag im Layer-Baum.
gws.base.layer.core.ClientOptions.treeClassName.complexity = advanced

# --- core.AutoLayersOptions --------------------------------------------------

gws.base.layer.core.AutoLayersOptions.label = Auto-Layer-Optionen
gws.base.layer.core.AutoLayersOptions.purpose = Regel zur automatischen Konfiguration von Layern, die aus einer externen Quelle (QGIS-Projekt, WMS-Capabilities) erzeugt werden. Filtert die Quell-Layer und überlagert pro Treffer eine Teil-Konfiguration.
gws.base.layer.core.AutoLayersOptions.complexity = advanced
gws.base.layer.core.AutoLayersOptions.useCases = Einheitliches Setzen von Cache, CSS oder Sichtbarkeitsregeln auf alle automatisch importierten Layer eines QGIS-Projekts.

gws.base.layer.core.AutoLayersOptions.applyTo.label = Anwenden auf
gws.base.layer.core.AutoLayersOptions.applyTo.purpose = Filterausdruck für die Quell-Layer (Name, Pfad, Typ), auf die die Konfiguration angewendet wird.

gws.base.layer.core.AutoLayersOptions.config.label = Konfiguration
gws.base.layer.core.AutoLayersOptions.config.purpose = Layer-Teilkonfiguration, die mit den Treffern gemerged wird.

# --- core.GridProps / core.Props (clientseitige Props) -----------------------

gws.base.layer.core.GridProps.label = Tile-Grid (Client-Props)
gws.base.layer.core.GridProps.purpose = Vom Server an den Client gelieferte Grid-Eigenschaften. Wird nicht direkt konfiguriert.
gws.base.layer.core.GridProps.complexity = advanced

gws.base.layer.core.GridProps.extent.label = Ausdehnung
gws.base.layer.core.GridProps.origin.label = Ursprung
gws.base.layer.core.GridProps.resolutions.label = Auflösungen
gws.base.layer.core.GridProps.tileSize.label = Tile-Größe

gws.base.layer.core.Props.label = Layer (Client-Props)
gws.base.layer.core.Props.purpose = Vom Server an den Client gelieferte Layer-Eigenschaften. Wird nicht direkt konfiguriert.
gws.base.layer.core.Props.complexity = advanced

gws.base.layer.core.Props.clientOptions.label = Client-Optionen
gws.base.layer.core.Props.cssSelector.label = CSS-Selector
gws.base.layer.core.Props.displayMode.label = Darstellungsmodus
gws.base.layer.core.Props.extent.label = Ausdehnung
gws.base.layer.core.Props.geometryType.label = Geometrietyp
gws.base.layer.core.Props.grid.label = Grid
gws.base.layer.core.Props.layers.label = Kind-Layer
gws.base.layer.core.Props.loadingStrategy.label = Lade-Strategie
gws.base.layer.core.Props.metadata.label = Metadaten
gws.base.layer.core.Props.model.label = Datenmodell
gws.base.layer.core.Props.opacity.label = Deckkraft
gws.base.layer.core.Props.resolutions.label = Auflösungen
gws.base.layer.core.Props.title.label = Titel
gws.base.layer.core.Props.title.complexity = basic
gws.base.layer.core.Props.type.label = Typ
gws.base.layer.core.Props.uid.label = UID
gws.base.layer.core.Props.uid.complexity = basic
gws.base.layer.core.Props.url.label = URL
gws.base.layer.core.Props.url.complexity = basic
gws.base.layer.core.Props.zoomExtent.label = Zoom-Ausdehnung

# --- group ------------------------------------------------------------------

gws.base.layer.group.Config.label = Layer-Gruppe
gws.base.layer.group.Config.purpose = Container-Layer, der mehrere Kind-Layer im Baum zusammenfasst. Erbt Maßstabsbereich, Bounds und Auflösungen aus den Kindern, sofern nicht eigens gesetzt.
gws.base.layer.group.Config.whenToUse = Wenn fachliche Layer thematisch gruppiert werden sollen oder eine Exklusiv-/Radio-Auswahl gewünscht ist.
gws.base.layer.group.Config.complexity = intermediate
gws.base.layer.group.Config.useCases = "Bestand"-Gruppe mit mehreren Fachlayern, exklusive Hintergrundkarten-Auswahl, Hierarchien aus QGIS-Projekten.

gws.base.layer.group.Config.layers.label = Kind-Layer
gws.base.layer.group.Config.layers.purpose = Liste der in dieser Gruppe enthaltenen Layer (beliebige Layer-Typen).

gws.base.layer.group.Object.label = Layer-Gruppe (Object)
gws.base.layer.group.Object.purpose = Laufzeit-Repräsentation einer Layer-Gruppe.
gws.base.layer.group.Object.complexity = advanced

gws.base.layer.group.Props.label = Layer-Gruppe (Client-Props)
gws.base.layer.group.Props.complexity = advanced
gws.base.layer.group.Props.layers.label = Kind-Layer

# --- ows --------------------------------------------------------------------

gws.base.layer.ows.Config.label = OWS-Veröffentlichung
gws.base.layer.ows.Config.purpose = Steuert, wie der Layer in den OWS-Diensten der WebSuite (WMS, WFS, WMTS) erscheint: Anzeige-Name, Feature-/Geometrie-Name in WFS, XML-Namespace und Whitelist/Blacklist von Diensten.
gws.base.layer.ows.Config.whenToUse = Wenn der Layer in einem oder mehreren OWS-Diensten unter einem definierten Namen veröffentlicht oder aus bestimmten Diensten ausgenommen werden soll.
gws.base.layer.ows.Config.complexity = advanced
gws.base.layer.ows.Config.useCases = Eigene WMS-Layer-Namen für externe Konsumenten, Trennung interner und öffentlicher WFS-Dienste, INSPIRE-konforme Namensräume.

gws.base.layer.ows.Config.layerName.label = WMS-Layer-Name
gws.base.layer.ows.Config.layerName.purpose = Name des Layers in WMS-Capabilities. Optional mit Namespace-Präfix (ns:Name).
gws.base.layer.ows.Config.layerName.example = "bplan"

gws.base.layer.ows.Config.featureName.label = WFS-Feature-Name
gws.base.layer.ows.Config.featureName.purpose = Type-Name der Features in WFS-Antworten. Optional mit Namespace-Präfix.
gws.base.layer.ows.Config.featureName.example = "ns:Bebauungsplan"

gws.base.layer.ows.Config.geometryName.label = WFS-Geometriespalte
gws.base.layer.ows.Config.geometryName.purpose = Name der Geometrie-Property in WFS-Antworten.
gws.base.layer.ows.Config.geometryName.example = "geom"

gws.base.layer.ows.Config.xmlns.label = XML-Namespace-Präfix
gws.base.layer.ows.Config.xmlns.purpose = Default-XML-Namespace-Präfix für Feature-/Layer-Namen, falls nicht inline angegeben.
gws.base.layer.ows.Config.xmlns.example = "ns"

gws.base.layer.ows.Config.allowedServices.label = Erlaubte Dienste
gws.base.layer.ows.Config.allowedServices.purpose = Whitelist der OWS-Dienst-UIDs, die diesen Layer enthalten dürfen. Leer = alle Dienste, die withOws beachten.

gws.base.layer.ows.Config.deniedServices.label = Gesperrte Dienste
gws.base.layer.ows.Config.deniedServices.purpose = Blacklist der OWS-Dienst-UIDs, die diesen Layer nicht enthalten dürfen. Hat Vorrang vor allowedServices.

gws.base.layer.ows.Config.models.label = OWS-Datenmodelle
gws.base.layer.ows.Config.models.purpose = Eigene Datenmodelle für die OWS-Veröffentlichung (z.B. um interne Felder zu verbergen). Falls leer, werden die Layer-Modelle verwendet.
gws.base.layer.ows.Config.models.complexity = advanced

# --- tree -------------------------------------------------------------------

gws.base.layer.tree.Config.label = Layer-Baum-Optionen
gws.base.layer.tree.Config.purpose = Steuert, wie aus den Quell-Layern (z.B. eines QGIS-Projekts oder einer WMS-Capabilities-Antwort) der Layer-Baum der WebSuite aufgebaut wird.
gws.base.layer.tree.Config.whenToUse = Bei automatisch erzeugten Layer-Hierarchien aus QGIS oder WMS, wenn nur ein Teil verwendet, eine Ebene flachgezogen oder eine Auto-Konfiguration angewendet werden soll.
gws.base.layer.tree.Config.complexity = intermediate
gws.base.layer.tree.Config.useCases = Nur bestimmte Wurzelgruppen aus QGIS importieren, ab Tiefe N alle Untergruppen flach legen, einheitliche Cache-Konfiguration auf alle Auto-Layer setzen.

gws.base.layer.tree.Config.rootLayers.label = Wurzel-Layer
gws.base.layer.tree.Config.rootLayers.purpose = Filter, welche Quell-Layer als Wurzeln des erzeugten Baums dienen. Default: alle Top-Level-Layer.

gws.base.layer.tree.Config.excludeLayers.label = Auszuschließende Layer
gws.base.layer.tree.Config.excludeLayers.purpose = Filter, welche Quell-Layer im Baum übergangen werden.

gws.base.layer.tree.Config.flattenLayers.label = Hierarchie flachziehen
gws.base.layer.tree.Config.flattenLayers.purpose = Ab welcher Tiefe Untergruppen zu einem einzelnen Bild-Layer zusammengefasst werden.
gws.base.layer.tree.Config.flattenLayers.complexity = advanced

gws.base.layer.tree.Config.autoLayers.label = Auto-Layer-Regeln
gws.base.layer.tree.Config.autoLayers.purpose = Liste von Match-Filter-Regeln, mit denen automatisch erzeugte Layer eine zusätzliche Konfiguration erhalten.
gws.base.layer.tree.Config.autoLayers.complexity = advanced

gws.base.layer.tree.FlattenConfig.label = Flatten-Optionen
gws.base.layer.tree.FlattenConfig.purpose = Konfiguration der Hierarchie-Flachlegung.
gws.base.layer.tree.FlattenConfig.complexity = advanced

gws.base.layer.tree.FlattenConfig.level.label = Flatten-Tiefe
gws.base.layer.tree.FlattenConfig.level.purpose = Ab dieser absoluten Tiefe im Quell-Baum werden Untergruppen zu einem einzelnen Layer zusammengefasst.
gws.base.layer.tree.FlattenConfig.level.example = 2

gws.base.layer.tree.FlattenConfig.useGroups.label = Gruppennamen verwenden
gws.base.layer.tree.FlattenConfig.useGroups.purpose = Wenn true, behalten zusammengefasste Gruppen ihren Gruppennamen; sonst werden sie nach den enthaltenen Bild-Layern benannt.

[en]

# --- core.Config ------------------------------------------------------------

gws.base.layer.core.Config.label = Layer
gws.base.layer.core.Config.purpose = Common configuration for any map layer. Provides title, visibility, scale range, display, and bindings to data models, search providers, templates, legends and OWS publication.
gws.base.layer.core.Config.whenToUse = Used (via subtypes like qgis, postgres, tile, group) in every map. These base fields apply to all layer types.
gws.base.layer.core.Config.complexity = basic
gws.base.layer.core.Config.useCases = Visibility and ordering in the layer tree, scale/resolution constraints, opacity, cache control, search binding.

gws.base.layer.core.Config.title.label = Title
gws.base.layer.core.Config.title.purpose = Display name of the layer in the map, the layer tree and OWS capabilities.
gws.base.layer.core.Config.title.complexity = basic
gws.base.layer.core.Config.title.example = "Land use plans"

gws.base.layer.core.Config.display.label = Display mode
gws.base.layer.core.Config.display.purpose = How the layer is rendered in the client: as a box (one rendered image per view), as a tile pyramid, or as client-side vector/SVG.
gws.base.layer.core.Config.display.complexity = intermediate
gws.base.layer.core.Config.display.example = "tile"

gws.base.layer.core.Config.opacity.label = Opacity
gws.base.layer.core.Config.opacity.purpose = Layer transparency, 0 (fully transparent) to 1 (fully opaque).
gws.base.layer.core.Config.opacity.complexity = basic
gws.base.layer.core.Config.opacity.example = 0.7

gws.base.layer.core.Config.extent.label = Extent
gws.base.layer.core.Config.extent.purpose = Bounding box of the layer in the map CRS as [minX, minY, maxX, maxY]. Constrains data requests to this area.
gws.base.layer.core.Config.extent.complexity = intermediate

gws.base.layer.core.Config.zoomExtent.label = Zoom extent
gws.base.layer.core.Config.zoomExtent.purpose = Separate bounding box for the "zoom to layer" action. Falls back to extent.
gws.base.layer.core.Config.zoomExtent.complexity = advanced

gws.base.layer.core.Config.extentBuffer.label = Extent buffer
gws.base.layer.core.Config.extentBuffer.purpose = Padding around the layer extent in map units, used to avoid edge clipping in tile requests.
gws.base.layer.core.Config.extentBuffer.complexity = advanced

gws.base.layer.core.Config.zoom.label = Resolutions / scales
gws.base.layer.core.Config.zoom.purpose = Allowed scale levels or pixel resolutions at which the layer is visible.
gws.base.layer.core.Config.zoom.complexity = intermediate

gws.base.layer.core.Config.clientOptions.label = Client options
gws.base.layer.core.Config.clientOptions.purpose = Initial state of the layer in the client tree (visible, expanded, selected, etc.).
gws.base.layer.core.Config.clientOptions.complexity = basic

gws.base.layer.core.Config.legend.label = Legend
gws.base.layer.core.Config.legend.purpose = Legend configuration for this layer (static image, external URL, HTML template or combined).
gws.base.layer.core.Config.legend.complexity = intermediate

gws.base.layer.core.Config.withLegend.label = Legend enabled
gws.base.layer.core.Config.withLegend.purpose = Enables/disables the legend for this layer regardless of whether a legend config is present.
gws.base.layer.core.Config.withLegend.complexity = intermediate

gws.base.layer.core.Config.withSearch.label = Search enabled
gws.base.layer.core.Config.withSearch.purpose = Enables/disables search/identify (GetFeatureInfo, database queries) on this layer.
gws.base.layer.core.Config.withSearch.complexity = intermediate

gws.base.layer.core.Config.withCache.label = Cache enabled
gws.base.layer.core.Config.withCache.purpose = Enables tile caching via MapProxy. Requires a sensible cache/grid configuration.
gws.base.layer.core.Config.withCache.complexity = advanced

gws.base.layer.core.Config.withOws.label = OWS publication enabled
gws.base.layer.core.Config.withOws.purpose = Controls whether the layer is exposed by the WebSuite OWS services (WMS, WFS, WMTS).
gws.base.layer.core.Config.withOws.complexity = intermediate

gws.base.layer.core.Config.cache.label = Cache options
gws.base.layer.core.Config.cache.purpose = Detailed tile cache configuration: max age, max zoom level, pixel buffer.
gws.base.layer.core.Config.cache.complexity = advanced

gws.base.layer.core.Config.grid.label = Tile grid
gws.base.layer.core.Config.grid.purpose = Custom client tile grid (CRS, extent, resolutions, tile size). Usually inherited from the parent layer/map.
gws.base.layer.core.Config.grid.complexity = advanced

gws.base.layer.core.Config.imageFormat.label = Image format
gws.base.layer.core.Config.imageFormat.purpose = MIME type and encoder options for rendered images (e.g. png8, png24, jpeg).
gws.base.layer.core.Config.imageFormat.complexity = advanced

gws.base.layer.core.Config.metadata.label = Metadata
gws.base.layer.core.Config.metadata.purpose = ISO/INSPIRE metadata for this layer (title, abstract, keywords, license). Emitted in OWS capabilities.
gws.base.layer.core.Config.metadata.complexity = intermediate

gws.base.layer.core.Config.models.label = Data models
gws.base.layer.core.Config.models.purpose = Data models for read/edit operations on the features of this layer.
gws.base.layer.core.Config.models.complexity = intermediate

gws.base.layer.core.Config.finders.label = Search providers
gws.base.layer.core.Config.finders.purpose = Layer-specific search/identify providers (in addition to map-level ones).
gws.base.layer.core.Config.finders.complexity = intermediate

gws.base.layer.core.Config.templates.label = Templates
gws.base.layer.core.Config.templates.purpose = Templates for tooltip, description and search-result rendering of this layer.
gws.base.layer.core.Config.templates.complexity = intermediate

gws.base.layer.core.Config.ows.label = OWS publication
gws.base.layer.core.Config.ows.purpose = Per-layer settings for OWS publication (layer name, feature name, allow/deny lists).
gws.base.layer.core.Config.ows.complexity = advanced

gws.base.layer.core.Config.loadingStrategy.label = Loading strategy
gws.base.layer.core.Config.loadingStrategy.purpose = When vector features are loaded — all at once, only inside the bounding box, or lazy.
gws.base.layer.core.Config.loadingStrategy.complexity = advanced
gws.base.layer.core.Config.loadingStrategy.example = "bbox"

gws.base.layer.core.Config.cssSelector.label = CSS selector
gws.base.layer.core.Config.cssSelector.purpose = CSS class used to style vector features in the client.
gws.base.layer.core.Config.cssSelector.complexity = advanced

# --- core.CacheConfig --------------------------------------------------------

gws.base.layer.core.CacheConfig.label = Cache options
gws.base.layer.core.CacheConfig.purpose = Detailed MapProxy tile cache configuration for a layer.
gws.base.layer.core.CacheConfig.complexity = advanced

gws.base.layer.core.CacheConfig.maxAge.label = Max age
gws.base.layer.core.CacheConfig.maxAge.purpose = Lifetime of a cached tile before it is re-rendered. Default: 7 days.
gws.base.layer.core.CacheConfig.maxAge.example = "7d"

gws.base.layer.core.CacheConfig.maxLevel.label = Max zoom level
gws.base.layer.core.CacheConfig.maxLevel.purpose = Highest zoom level that is cached. Levels above are rendered on the fly.
gws.base.layer.core.CacheConfig.maxLevel.example = 12

gws.base.layer.core.CacheConfig.requestBuffer.label = Request buffer (pixels)
gws.base.layer.core.CacheConfig.requestBuffer.purpose = Pixel buffer when fetching tiles, to avoid label clipping at tile borders.

gws.base.layer.core.CacheConfig.requestTiles.label = Tiles per request
gws.base.layer.core.CacheConfig.requestTiles.purpose = Number of tiles fetched per upstream request. Larger values reduce request count but enlarge images.

# --- core.GridConfig ---------------------------------------------------------

gws.base.layer.core.GridConfig.label = Grid configuration
gws.base.layer.core.GridConfig.purpose = Custom tile grid for cache and tiled data sources.
gws.base.layer.core.GridConfig.complexity = advanced

gws.base.layer.core.GridConfig.crs.label = CRS
gws.base.layer.core.GridConfig.crs.purpose = Target CRS of the grid. Default: parent layer CRS.
gws.base.layer.core.GridConfig.crs.example = "EPSG:25832"

gws.base.layer.core.GridConfig.extent.label = Extent
gws.base.layer.core.GridConfig.extent.purpose = Grid extent in the grid CRS.

gws.base.layer.core.GridConfig.origin.label = Origin
gws.base.layer.core.GridConfig.origin.purpose = Corner where the grid starts. Default: north-west (nw).
gws.base.layer.core.GridConfig.origin.example = "nw"

gws.base.layer.core.GridConfig.resolutions.label = Resolutions
gws.base.layer.core.GridConfig.resolutions.purpose = Pixel resolutions per grid level. Default: inherited from the parent layer.

gws.base.layer.core.GridConfig.tileSize.label = Tile size (pixels)
gws.base.layer.core.GridConfig.tileSize.purpose = Tile size in pixels. Default: 256.
gws.base.layer.core.GridConfig.tileSize.example = 256

# --- core.ClientOptions ------------------------------------------------------

gws.base.layer.core.ClientOptions.label = Client options
gws.base.layer.core.ClientOptions.purpose = Initial display state of the layer in the client tree.
gws.base.layer.core.ClientOptions.complexity = basic

gws.base.layer.core.ClientOptions.expanded.label = Initially expanded
gws.base.layer.core.ClientOptions.expanded.purpose = Group is expanded on load.

gws.base.layer.core.ClientOptions.unlisted.label = Hidden in tree
gws.base.layer.core.ClientOptions.unlisted.purpose = Layer is not listed in the layer tree (but rendered if visible).

gws.base.layer.core.ClientOptions.selected.label = Initially selected
gws.base.layer.core.ClientOptions.selected.purpose = Layer is selected on load.

gws.base.layer.core.ClientOptions.hidden.label = Initially hidden
gws.base.layer.core.ClientOptions.hidden.purpose = Layer is off on load but can be enabled by the user.

gws.base.layer.core.ClientOptions.unfolded.label = Show unfolded
gws.base.layer.core.ClientOptions.unfolded.purpose = The group itself is not shown in the tree, only its children.

gws.base.layer.core.ClientOptions.exclusive.label = Exclusive group
gws.base.layer.core.ClientOptions.exclusive.purpose = Within this group only one child layer is visible at a time (radio-button behaviour).
gws.base.layer.core.ClientOptions.exclusive.complexity = intermediate

gws.base.layer.core.ClientOptions.treeClassName.label = CSS class
gws.base.layer.core.ClientOptions.treeClassName.purpose = Custom CSS class for the layer-tree entry.
gws.base.layer.core.ClientOptions.treeClassName.complexity = advanced

# --- core.AutoLayersOptions --------------------------------------------------

gws.base.layer.core.AutoLayersOptions.label = Auto-layer options
gws.base.layer.core.AutoLayersOptions.purpose = Rule for automatically configuring layers generated from an external source (QGIS project, WMS capabilities). Filters the source layers and overlays a partial config on each match.
gws.base.layer.core.AutoLayersOptions.complexity = advanced

gws.base.layer.core.AutoLayersOptions.applyTo.label = Apply to
gws.base.layer.core.AutoLayersOptions.applyTo.purpose = Filter expression for source layers (name, path, type) the configuration is applied to.

gws.base.layer.core.AutoLayersOptions.config.label = Config
gws.base.layer.core.AutoLayersOptions.config.purpose = Partial layer configuration merged into matching layers.

# --- core.GridProps / core.Props (client props) -----------------------------

gws.base.layer.core.GridProps.label = Tile grid (client props)
gws.base.layer.core.GridProps.purpose = Grid properties delivered from server to client. Not configured directly.
gws.base.layer.core.GridProps.complexity = advanced

gws.base.layer.core.GridProps.extent.label = Extent
gws.base.layer.core.GridProps.origin.label = Origin
gws.base.layer.core.GridProps.resolutions.label = Resolutions
gws.base.layer.core.GridProps.tileSize.label = Tile size

gws.base.layer.core.Props.label = Layer (client props)
gws.base.layer.core.Props.purpose = Layer properties delivered from server to client. Not configured directly.
gws.base.layer.core.Props.complexity = advanced

gws.base.layer.core.Props.clientOptions.label = Client options
gws.base.layer.core.Props.cssSelector.label = CSS selector
gws.base.layer.core.Props.displayMode.label = Display mode
gws.base.layer.core.Props.extent.label = Extent
gws.base.layer.core.Props.geometryType.label = Geometry type
gws.base.layer.core.Props.grid.label = Grid
gws.base.layer.core.Props.layers.label = Child layers
gws.base.layer.core.Props.loadingStrategy.label = Loading strategy
gws.base.layer.core.Props.metadata.label = Metadata
gws.base.layer.core.Props.model.label = Model
gws.base.layer.core.Props.opacity.label = Opacity
gws.base.layer.core.Props.resolutions.label = Resolutions
gws.base.layer.core.Props.title.label = Title
gws.base.layer.core.Props.title.complexity = basic
gws.base.layer.core.Props.type.label = Type
gws.base.layer.core.Props.uid.label = UID
gws.base.layer.core.Props.uid.complexity = basic
gws.base.layer.core.Props.url.label = URL
gws.base.layer.core.Props.url.complexity = basic
gws.base.layer.core.Props.zoomExtent.label = Zoom extent

# --- group ------------------------------------------------------------------

gws.base.layer.group.Config.label = Layer group
gws.base.layer.group.Config.purpose = Container layer that aggregates several child layers in the tree. Inherits scale range, bounds and resolutions from its children unless set explicitly.
gws.base.layer.group.Config.whenToUse = When layers should be grouped thematically or an exclusive/radio selection is required.
gws.base.layer.group.Config.complexity = intermediate
gws.base.layer.group.Config.useCases = "Cadastre" group with multiple thematic layers, exclusive base-map selection, hierarchies imported from QGIS projects.

gws.base.layer.group.Config.layers.label = Child layers
gws.base.layer.group.Config.layers.purpose = List of layers contained in this group (any layer types).

gws.base.layer.group.Object.label = Layer group (object)
gws.base.layer.group.Object.purpose = Runtime representation of a layer group.
gws.base.layer.group.Object.complexity = advanced

gws.base.layer.group.Props.label = Layer group (client props)
gws.base.layer.group.Props.complexity = advanced
gws.base.layer.group.Props.layers.label = Child layers

# --- ows --------------------------------------------------------------------

gws.base.layer.ows.Config.label = OWS publication
gws.base.layer.ows.Config.purpose = Controls how this layer is exposed by the WebSuite OWS services (WMS, WFS, WMTS): display name, feature/geometry name in WFS, XML namespace and allow/deny list of services.
gws.base.layer.ows.Config.whenToUse = When the layer should be published in one or more OWS services under a specific name, or excluded from selected services.
gws.base.layer.ows.Config.complexity = advanced
gws.base.layer.ows.Config.useCases = Custom WMS layer names for external consumers, separation of internal and public WFS endpoints, INSPIRE-compliant namespaces.

gws.base.layer.ows.Config.layerName.label = WMS layer name
gws.base.layer.ows.Config.layerName.purpose = Layer name in WMS capabilities. Optional namespace prefix (ns:Name).

gws.base.layer.ows.Config.featureName.label = WFS feature name
gws.base.layer.ows.Config.featureName.purpose = Type name of features in WFS responses. Optional namespace prefix.

gws.base.layer.ows.Config.geometryName.label = WFS geometry property
gws.base.layer.ows.Config.geometryName.purpose = Name of the geometry property in WFS responses.

gws.base.layer.ows.Config.xmlns.label = XML namespace prefix
gws.base.layer.ows.Config.xmlns.purpose = Default XML namespace prefix for feature/layer names if not given inline.

gws.base.layer.ows.Config.allowedServices.label = Allowed services
gws.base.layer.ows.Config.allowedServices.purpose = Whitelist of OWS service UIDs that may include this layer. Empty = all services that respect withOws.

gws.base.layer.ows.Config.deniedServices.label = Denied services
gws.base.layer.ows.Config.deniedServices.purpose = Blacklist of OWS service UIDs that must not include this layer. Takes precedence over allowedServices.

gws.base.layer.ows.Config.models.label = OWS data models
gws.base.layer.ows.Config.models.purpose = Dedicated data models for OWS publication (e.g. to hide internal fields). Falls back to the layer models if empty.
gws.base.layer.ows.Config.models.complexity = advanced

# --- tree -------------------------------------------------------------------

gws.base.layer.tree.Config.label = Layer-tree options
gws.base.layer.tree.Config.purpose = Controls how the WebSuite layer tree is built from source layers (e.g. a QGIS project or a WMS capabilities response).
gws.base.layer.tree.Config.whenToUse = With auto-generated layer hierarchies from QGIS or WMS, when only a subtree should be used, a level should be flattened, or auto-config rules should be applied.
gws.base.layer.tree.Config.complexity = intermediate
gws.base.layer.tree.Config.useCases = Import only specific root groups from QGIS, flatten subgroups below depth N, apply uniform cache config to all auto layers.

gws.base.layer.tree.Config.rootLayers.label = Root layers
gws.base.layer.tree.Config.rootLayers.purpose = Filter selecting which source layers serve as roots of the generated tree. Default: all top-level layers.

gws.base.layer.tree.Config.excludeLayers.label = Excluded layers
gws.base.layer.tree.Config.excludeLayers.purpose = Filter for source layers that should be skipped.

gws.base.layer.tree.Config.flattenLayers.label = Flatten hierarchy
gws.base.layer.tree.Config.flattenLayers.purpose = Below which depth subgroups are merged into a single image layer.
gws.base.layer.tree.Config.flattenLayers.complexity = advanced

gws.base.layer.tree.Config.autoLayers.label = Auto-layer rules
gws.base.layer.tree.Config.autoLayers.purpose = List of match-filter rules that attach extra config to auto-generated layers.
gws.base.layer.tree.Config.autoLayers.complexity = advanced

gws.base.layer.tree.FlattenConfig.label = Flatten options
gws.base.layer.tree.FlattenConfig.purpose = Configuration of hierarchy flattening.
gws.base.layer.tree.FlattenConfig.complexity = advanced

gws.base.layer.tree.FlattenConfig.level.label = Flatten depth
gws.base.layer.tree.FlattenConfig.level.purpose = From this absolute depth in the source tree, subgroups are merged into a single layer.
gws.base.layer.tree.FlattenConfig.level.example = 2

gws.base.layer.tree.FlattenConfig.useGroups.label = Use group names
gws.base.layer.tree.FlattenConfig.useGroups.purpose = If true, merged groups keep their group name; otherwise they are named after the contained image layers.
