# UX-Strings für die Custom-Font-Konfiguration.

[de]

gws.lib.font.Config.label = Benutzerdefinierte Schriftarten
gws.lib.font.Config.purpose = Konfiguration eines Verzeichnisses mit zusätzlichen Schriftarten, die von der WebSuite (insbesondere Print/Symbology) verwendet werden können.
gws.lib.font.Config.whenToUse = Wenn Karten oder Drucke Schriftarten verwenden sollen, die nicht systemweit installiert sind.

gws.lib.font.Config.dir.label = Schriftarten-Verzeichnis
gws.lib.font.Config.dir.purpose = Pfad zu einem Verzeichnis mit TTF/OTF-Schriftartdateien.
gws.lib.font.Config.dir.example = "/data/fonts"

[en]

gws.lib.font.Config.label = Custom fonts
gws.lib.font.Config.purpose = Configuration of a directory with additional fonts available to the WebSuite (especially print and symbology).
gws.lib.font.Config.whenToUse = When maps or prints should use fonts that are not installed system-wide.

gws.lib.font.Config.dir.label = Fonts directory
gws.lib.font.Config.dir.purpose = Path to a directory containing TTF/OTF font files.
gws.lib.font.Config.dir.example = "/data/fonts"
