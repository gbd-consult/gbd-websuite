# UX-Strings für die Image-Format-Konfiguration (Pillow-basiert).

[de]

gws.lib.image.FormatConfig.label = Bildformat
gws.lib.image.FormatConfig.purpose = Konfiguration eines Bildformats inklusive MIME-Typen und Pillow-spezifischer Optionen wie `mode` (z. B. `P`, `RGB`), `quality` oder `dpi`.

gws.lib.image.FormatConfig.name.label = Format-Name
gws.lib.image.FormatConfig.name.purpose = Interner Name des Formats (z. B. `png`, `jpeg`).
gws.lib.image.FormatConfig.name.example = "png"

gws.lib.image.FormatConfig.mimeTypes.label = MIME-Typen
gws.lib.image.FormatConfig.mimeTypes.purpose = Liste der MIME-Typen, die diesem Format zugeordnet werden.
gws.lib.image.FormatConfig.mimeTypes.example = ["image/png"]

gws.lib.image.FormatConfig.options.label = Bild-Optionen
gws.lib.image.FormatConfig.options.purpose = Zusätzliche Pillow-Optionen wie `mode`, `quality`, `dpi` als Schlüssel-Wert-Paare.
gws.lib.image.FormatConfig.options.complexity = advanced

[en]

gws.lib.image.FormatConfig.label = Image format
gws.lib.image.FormatConfig.purpose = Configuration of an image format including MIME types and Pillow-specific options like `mode` (e.g. `P`, `RGB`), `quality` or `dpi`.

gws.lib.image.FormatConfig.name.label = Format name
gws.lib.image.FormatConfig.name.purpose = Internal name of the format (e.g. `png`, `jpeg`).
gws.lib.image.FormatConfig.name.example = "png"

gws.lib.image.FormatConfig.mimeTypes.label = MIME types
gws.lib.image.FormatConfig.mimeTypes.purpose = List of MIME types associated with this format.
gws.lib.image.FormatConfig.mimeTypes.example = ["image/png"]

gws.lib.image.FormatConfig.options.label = Image options
gws.lib.image.FormatConfig.options.purpose = Additional Pillow options such as `mode`, `quality`, `dpi` as key/value pairs.
gws.lib.image.FormatConfig.options.complexity = advanced
