# UX-Strings für die Editieren-Konfiguration (Welle C).
#
# Edit ist ein dünner Action-Wrapper um die Daten-Modelle: die eigentliche
# Editierfähigkeit kommt aus den Modellen (z. B. postgres.model). Diese
# Datei beschreibt nur die Action-Klasse; die zugehörigen Request-Typen
# (DeleteFeatureRequest, GetFeatureRequest, …) sind interne API-Schemas
# und für Konfigurations-UIs nicht relevant.

[de]

# --- action ---------------------------------------------------------------

gws.base.edit.action.Config.label = Editieren
gws.base.edit.action.Config.purpose = Aktiviert die Edit-API. Stellt die JSON-RPC-Endpunkte bereit, mit denen das Frontend Features lesen, anlegen, ändern und löschen kann. Welche Modelle/Layer editierbar sind, regeln die jeweiligen Daten-Modelle.
gws.base.edit.action.Config.whenToUse = Pflicht-Action für jede Anwendung, in der Anwender Vektordaten in der Karte bearbeiten sollen.
gws.base.edit.action.Config.complexity = intermediate
gws.base.edit.action.Config.useCases = Editieren von PostGIS-Layern, Bürger-Beteiligung mit eigener Datenebene, Pflege von Fachdaten-Layern durch Sachbearbeiter.

[en]

# --- action ---------------------------------------------------------------

gws.base.edit.action.Config.label = Edit
gws.base.edit.action.Config.purpose = Enables the edit API. Provides the JSON-RPC endpoints used by the frontend to read, create, update and delete features. Which models/layers are editable is decided by the data models themselves.
gws.base.edit.action.Config.whenToUse = Required action for any application where users edit vector data on the map.
gws.base.edit.action.Config.complexity = intermediate
gws.base.edit.action.Config.useCases = Editing PostGIS layers, citizen-participation with a custom data layer, domain-data maintenance by clerks.
