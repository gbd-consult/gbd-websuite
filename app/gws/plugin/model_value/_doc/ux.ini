# UX-Strings for the model-value plugins.
#
# Eine ux.ini deckt alle Value-Provider-Typen.
# Hier werden die Top-Level-Configs poliert; Object bleibt mit
# bootstrap-Defaults.

[de]

# --- static ----------------------------------------------------------------

gws.plugin.model_value.static.Config.label = Konstanter Wert
gws.plugin.model_value.static.Config.purpose = Setzt einen festen, vorgegebenen Wert in das Feld. Sinnvoll für Default-Werte oder System-konstante Felder.
gws.plugin.model_value.static.Config.complexity = basic
gws.plugin.model_value.static.Config.useCases = Default-Status („neu"), feste Mandanten-IDs, vorbelegte Auswahlen.

gws.plugin.model_value.static.Config.value.label = Wert
gws.plugin.model_value.static.Config.value.purpose = Konstanter Wert, der in das Feld geschrieben wird.
gws.plugin.model_value.static.Config.value.complexity = basic
gws.plugin.model_value.static.Config.value.example = "neu"

# --- current_timestamp -----------------------------------------------------

gws.plugin.model_value.current_timestamp.Config.label = Aktueller Zeitstempel
gws.plugin.model_value.current_timestamp.Config.purpose = Setzt den aktuellen Zeitpunkt der Server-Operation in das Feld. Klassischer Wert für Erstellungs- und Änderungs-Zeitstempel.
gws.plugin.model_value.current_timestamp.Config.whenToUse = Mit `forCreate=true` für Erstellungs-Zeitstempel, mit `forUpdate=true` für Änderungs-Zeitstempel.
gws.plugin.model_value.current_timestamp.Config.complexity = basic
gws.plugin.model_value.current_timestamp.Config.useCases = `created_at`, `updated_at`, Audit-Trail-Felder.

# --- current_user ----------------------------------------------------------

gws.plugin.model_value.current_user.Config.label = Aktueller Benutzer
gws.plugin.model_value.current_user.Config.purpose = Setzt eine Information über den aktuell angemeldeten Benutzer in das Feld (z. B. UID oder Anzeigename).
gws.plugin.model_value.current_user.Config.whenToUse = Audit-Felder, die festhalten, wer einen Datensatz angelegt oder geändert hat.
gws.plugin.model_value.current_user.Config.complexity = intermediate
gws.plugin.model_value.current_user.Config.useCases = `created_by`, `updated_by`, Bearbeiter-Felder.

gws.plugin.model_value.current_user.Config.format.label = Format
gws.plugin.model_value.current_user.Config.format.purpose = Format-String, der bestimmt, welche Information aus dem Benutzer-Objekt geschrieben wird (z. B. `{user.uid}` oder `{user.displayName}`).
gws.plugin.model_value.current_user.Config.format.complexity = intermediate
gws.plugin.model_value.current_user.Config.format.example = "{user.uid}"

# --- format ----------------------------------------------------------------

gws.plugin.model_value.format.Config.label = Format-Wert
gws.plugin.model_value.format.Config.purpose = Berechnet den Feldwert aus einem Format-String über andere Feature-Attribute. Praktisch für abgeleitete Anzeige-Felder.
gws.plugin.model_value.format.Config.complexity = intermediate
gws.plugin.model_value.format.Config.useCases = Anzeige-Label aus mehreren Spalten, generierte Aktenzeichen, virtuelle Anzeigefelder.

gws.plugin.model_value.format.Config.format.label = Format-String
gws.plugin.model_value.format.Config.format.purpose = Format-String mit Platzhaltern für Feature-Attribute.
gws.plugin.model_value.format.Config.format.complexity = intermediate
gws.plugin.model_value.format.Config.format.example = "{vorname} {nachname}"

# --- expression ------------------------------------------------------------

gws.plugin.model_value.expression.Config.label = Python-Ausdruck
gws.plugin.model_value.expression.Config.purpose = Berechnet den Feldwert über einen Python-Ausdruck. Mächtigste, aber auch riskanteste Variante — Code wird serverseitig ausgeführt.
gws.plugin.model_value.expression.Config.whenToUse = Komplexe Ableitungen, die mit `format`-Strings nicht abbildbar sind.
gws.plugin.model_value.expression.Config.complexity = advanced

gws.plugin.model_value.expression.Config.expression.label = Ausdruck
gws.plugin.model_value.expression.Config.expression.purpose = Python-Ausdruck, der ausgewertet wird. Hat Zugriff auf das aktuelle Feature und seine Attribute.
gws.plugin.model_value.expression.Config.expression.complexity = advanced

gws.plugin.model_value.expression.Config.imports.label = Zusätzliche Module
gws.plugin.model_value.expression.Config.imports.purpose = Liste zusätzlicher Python-Module, die im Ausdruck zur Verfügung stehen sollen.
gws.plugin.model_value.expression.Config.imports.complexity = advanced
gws.plugin.model_value.expression.Config.imports.example = ["math", "datetime"]


[en]

# --- static ----------------------------------------------------------------

gws.plugin.model_value.static.Config.label = Static value
gws.plugin.model_value.static.Config.purpose = Writes a fixed, predefined value into the field. Useful for defaults or system-constant columns.
gws.plugin.model_value.static.Config.complexity = basic
gws.plugin.model_value.static.Config.useCases = Default status ("new"), fixed tenant IDs, pre-filled choices.

gws.plugin.model_value.static.Config.value.label = Value
gws.plugin.model_value.static.Config.value.purpose = Constant value written into the field.
gws.plugin.model_value.static.Config.value.complexity = basic
gws.plugin.model_value.static.Config.value.example = "new"

# --- current_timestamp -----------------------------------------------------

gws.plugin.model_value.current_timestamp.Config.label = Current timestamp
gws.plugin.model_value.current_timestamp.Config.purpose = Writes the current server-side timestamp into the field. Standard pattern for creation and modification timestamps.
gws.plugin.model_value.current_timestamp.Config.whenToUse = With `forCreate=true` for creation timestamps; with `forUpdate=true` for modification timestamps.
gws.plugin.model_value.current_timestamp.Config.complexity = basic
gws.plugin.model_value.current_timestamp.Config.useCases = `created_at`, `updated_at`, audit-trail columns.

# --- current_user ----------------------------------------------------------

gws.plugin.model_value.current_user.Config.label = Current user
gws.plugin.model_value.current_user.Config.purpose = Writes information about the currently logged-in user into the field (e.g. UID or display name).
gws.plugin.model_value.current_user.Config.whenToUse = Audit columns that track who created or modified a record.
gws.plugin.model_value.current_user.Config.complexity = intermediate
gws.plugin.model_value.current_user.Config.useCases = `created_by`, `updated_by`, editor columns.

gws.plugin.model_value.current_user.Config.format.label = Format
gws.plugin.model_value.current_user.Config.format.purpose = Format string that picks the user attribute to write (e.g. `{user.uid}` or `{user.displayName}`).
gws.plugin.model_value.current_user.Config.format.complexity = intermediate
gws.plugin.model_value.current_user.Config.format.example = "{user.uid}"

# --- format ----------------------------------------------------------------

gws.plugin.model_value.format.Config.label = Format value
gws.plugin.model_value.format.Config.purpose = Computes the field value from a format string over other feature attributes. Useful for derived display columns.
gws.plugin.model_value.format.Config.complexity = intermediate
gws.plugin.model_value.format.Config.useCases = Display labels combining multiple columns, generated file numbers, virtual display fields.

gws.plugin.model_value.format.Config.format.label = Format string
gws.plugin.model_value.format.Config.format.purpose = Format string with placeholders for feature attributes.
gws.plugin.model_value.format.Config.format.complexity = intermediate
gws.plugin.model_value.format.Config.format.example = "{first_name} {last_name}"

# --- expression ------------------------------------------------------------

gws.plugin.model_value.expression.Config.label = Python expression
gws.plugin.model_value.expression.Config.purpose = Computes the field value through a Python expression. The most powerful but also the riskiest variant — code is executed server-side.
gws.plugin.model_value.expression.Config.whenToUse = Complex derivations that can't be expressed with `format` strings.
gws.plugin.model_value.expression.Config.complexity = advanced

gws.plugin.model_value.expression.Config.expression.label = Expression
gws.plugin.model_value.expression.Config.expression.purpose = Python expression to evaluate. Has access to the current feature and its attributes.
gws.plugin.model_value.expression.Config.expression.complexity = advanced

gws.plugin.model_value.expression.Config.imports.label = Additional modules
gws.plugin.model_value.expression.Config.imports.purpose = List of additional Python modules to import for the expression.
gws.plugin.model_value.expression.Config.imports.complexity = advanced
gws.plugin.model_value.expression.Config.imports.example = ["math", "datetime"]
