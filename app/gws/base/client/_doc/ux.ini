# UX-Strings für die Client-Konfiguration (Browser-Oberfläche).

[de]

gws.base.client.core.Config.label = Client
gws.base.client.core.Config.purpose = Konfiguration der Browser-Oberfläche — Layout-Elemente, aktive Werkzeuge, Sprachen, Theme-Optionen.
gws.base.client.core.Config.whenToUse = Pflicht-Bereich, sobald die WebSuite eine Web-UI ausliefert.
gws.base.client.core.Config.complexity = basic

gws.base.client.core.Config.elements.label = UI-Elemente
gws.base.client.core.Config.elements.purpose = Liste der angezeigten UI-Komponenten (Sidebar, Toolbar, Karten-Buttons usw.). Reihenfolge bestimmt das Layout.

gws.base.client.core.Config.addElements.label = UI-Elemente hinzufügen
gws.base.client.core.Config.addElements.purpose = Erweitert die geerbte Liste der Eltern-Konfiguration um zusätzliche UI-Elemente.

gws.base.client.core.Config.removeElements.label = UI-Elemente entfernen
gws.base.client.core.Config.removeElements.purpose = Entfernt UI-Elemente aus der geerbten Liste, ohne die anderen anzufassen.

gws.base.client.core.Config.options.label = Client-Optionen
gws.base.client.core.Config.options.purpose = Globale Browser-Optionen wie Default-Sprache, Theme, Karten-Voreinstellungen.

gws.base.client.core.ElementConfig.label = UI-Element
gws.base.client.core.ElementConfig.purpose = Konfiguration eines einzelnen UI-Bausteins. Das `tag`-Feld referenziert eine vom Client implementierte Komponente.

gws.base.client.core.ElementConfig.tag.label = Element-Tag
gws.base.client.core.ElementConfig.tag.purpose = Identifier der Client-Komponente.
gws.base.client.core.ElementConfig.tag.example = "Sidebar.Layers"

gws.base.client.core.ElementConfig.before.label = Vor-Anker
gws.base.client.core.ElementConfig.before.purpose = Bei Insert: das neue Element wird vor diesem Tag eingefügt.

gws.base.client.core.ElementConfig.after.label = Nach-Anker
gws.base.client.core.ElementConfig.after.purpose = Bei Insert: das neue Element wird nach diesem Tag eingefügt.

gws.base.client.core.ElementConfig.options.label = Element-Optionen
gws.base.client.core.ElementConfig.options.purpose = Frei definierte Optionen, die der Client beim Rendern an die Komponente übergibt.

# --- core.Props / ElementProps (Client-Sicht) ---------------------------

gws.base.client.core.ElementProps.tag.label = Element-Tag
gws.base.client.core.ElementProps.tag.purpose = Identifier der Client-Komponente.

gws.base.client.core.Props.elements.label = UI-Elemente
gws.base.client.core.Props.elements.purpose = Liste der vom Client darzustellenden UI-Komponenten.

gws.base.client.core.Props.options.label = Client-Optionen
gws.base.client.core.Props.options.purpose = Globale Client-Optionen (Default-Sprache, Theme, Karten-Voreinstellungen).

[en]

gws.base.client.core.Config.label = Client
gws.base.client.core.Config.purpose = Browser UI configuration — layout elements, active tools, languages, theme options.
gws.base.client.core.Config.whenToUse = Required when the WebSuite serves a web UI.
gws.base.client.core.Config.complexity = basic

gws.base.client.core.Config.elements.label = UI elements
gws.base.client.core.Config.elements.purpose = List of rendered UI components (sidebar, toolbar, map buttons …). Order drives the layout.

gws.base.client.core.Config.addElements.label = Add UI elements
gws.base.client.core.Config.addElements.purpose = Extends the inherited parent list with additional UI elements.

gws.base.client.core.Config.removeElements.label = Remove UI elements
gws.base.client.core.Config.removeElements.purpose = Removes UI elements from the inherited list without touching the rest.

gws.base.client.core.Config.options.label = Client options
gws.base.client.core.Config.options.purpose = Global browser options like default language, theme, map defaults.

gws.base.client.core.ElementConfig.label = UI element
gws.base.client.core.ElementConfig.purpose = Configuration of a single UI building block. The `tag` field references a client-implemented component.

gws.base.client.core.ElementConfig.tag.label = Element tag
gws.base.client.core.ElementConfig.tag.purpose = Client component identifier.
gws.base.client.core.ElementConfig.tag.example = "Sidebar.Layers"

gws.base.client.core.ElementConfig.before.label = Before anchor
gws.base.client.core.ElementConfig.before.purpose = On insert: the new element is placed before this tag.

gws.base.client.core.ElementConfig.after.label = After anchor
gws.base.client.core.ElementConfig.after.purpose = On insert: the new element is placed after this tag.

gws.base.client.core.ElementConfig.options.label = Element options
gws.base.client.core.ElementConfig.options.purpose = Free-form options passed by the client to the component on render.

# --- core.Props / ElementProps -----------------------------------------

gws.base.client.core.ElementProps.tag.label = Element tag
gws.base.client.core.Props.elements.label = UI elements
gws.base.client.core.Props.options.label = Client options
