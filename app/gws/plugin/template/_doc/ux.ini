# UX-Strings für Vorlagentypen (plugin/template).
#
# Schlüsselformat: gws.plugin.template.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.

[de]

# --- html --------------------------------------------------------------------

gws.plugin.template.html.Config.label = HTML-Template
gws.plugin.template.html.Config.purpose = HTML-Vorlage auf Basis der Jump-Engine. Erzeugt HTML, PDF (für den Druck) und Bildausgaben. Unterstützt eingebettete Karten, Legenden, Kopf- und Fußzeilen über @page-, @map-, @legend-, @header- und @footer-Befehle.
gws.plugin.template.html.Config.whenToUse = Standard-Vorlage für Druck-Layouts, Feature-Infoboxen, Layer-Beschreibungen und alles, was als HTML oder PDF ausgegeben wird.
gws.plugin.template.html.Config.complexity = intermediate
gws.plugin.template.html.Config.useCases = Druck-Layout mit Karte und Kopfzeile, Feature-Tooltip, projektweite Legendenseite.
gws.plugin.template.html.Config.docsLink = /admin-de/config/template

gws.plugin.template.html.Config.path.label = Datei-Pfad
gws.plugin.template.html.Config.path.purpose = Pfad zu einer externen Vorlagendatei. Alternative zu text.
gws.plugin.template.html.Config.path.example = "/data/templates/print_a4.cx.html"

gws.plugin.template.html.Config.text.label = Inline-Inhalt
gws.plugin.template.html.Config.text.purpose = Vorlageninhalt direkt in der Konfiguration. Alternative zu path.

# --- map ---------------------------------------------------------------------

gws.plugin.template.map.Config.label = Karten-Template
gws.plugin.template.map.Config.purpose = Reine Karten-Vorlage ohne weiteren HTML-Rahmen. Rendert die aktuelle Kartenansicht in der konfigurierten Seitengröße und gibt sie als Bild oder PDF aus.
gws.plugin.template.map.Config.whenToUse = Wenn nur die Karte selbst gedruckt oder exportiert werden soll, ohne Kopfzeile, Tabellen oder Logos.
gws.plugin.template.map.Config.complexity = intermediate
gws.plugin.template.map.Config.useCases = Schneller Karten-Screenshot, einfacher Druck ohne Layout, Kartenausschnitt für externe Dokumente.

# --- text --------------------------------------------------------------------

gws.plugin.template.text.Config.label = Text-Template
gws.plugin.template.text.Config.purpose = Reine Text-Vorlage auf Basis der Jump-Engine, ohne HTML-spezifische Befehle. Erzeugt nur Textausgaben.
gws.plugin.template.text.Config.whenToUse = Für kurze Beschriftungen wie Feature-Titel, Tooltips, E-Mail-Betreffzeilen oder generische Textfragmente.
gws.plugin.template.text.Config.complexity = basic
gws.plugin.template.text.Config.useCases = Feature-Titel aus Attributen, dynamischer Layer-Name, kurze Statusmeldung.

gws.plugin.template.text.Config.path.label = Datei-Pfad
gws.plugin.template.text.Config.path.purpose = Pfad zu einer externen Vorlagendatei. Alternative zu text.

gws.plugin.template.text.Config.text.label = Inline-Inhalt
gws.plugin.template.text.Config.text.purpose = Vorlageninhalt direkt in der Konfiguration.
gws.plugin.template.text.Config.text.example = "{name} ({fid})"

# --- py ----------------------------------------------------------------------

gws.plugin.template.py.Config.label = Python-Template
gws.plugin.template.py.Config.purpose = Vorlage als Python-Modul. Das Modul muss eine Funktion main(args) bereitstellen, die ein gws.Response-Objekt zurückgibt. Erlaubt beliebige Render-Logik in Python.
gws.plugin.template.py.Config.whenToUse = Wenn die Ausgabe nicht über eine Text- oder HTML-Vorlage ausgedrückt werden kann — etwa wenn fremde Bibliotheken eingebunden, Daten transformiert oder Binärdateien zusammengebaut werden müssen.
gws.plugin.template.py.Config.complexity = advanced
gws.plugin.template.py.Config.useCases = Spezial-Reports, dynamische Bildgenerierung, Brücke zu externen Render-Bibliotheken.

gws.plugin.template.py.Config.path.label = Datei-Pfad
gws.plugin.template.py.Config.path.purpose = Pfad zur Python-Datei mit der main-Funktion.
gws.plugin.template.py.Config.path.example = "/data/templates/report.py"

[en]

# --- html --------------------------------------------------------------------

gws.plugin.template.html.Config.label = HTML template
gws.plugin.template.html.Config.purpose = HTML template based on the Jump engine. Produces HTML, PDF (for printing) and image outputs. Supports embedded maps, legends, headers and footers via @page, @map, @legend, @header and @footer commands.
gws.plugin.template.html.Config.whenToUse = Default template for print layouts, feature infoboxes, layer descriptions, and anything served as HTML or PDF.
gws.plugin.template.html.Config.complexity = intermediate
gws.plugin.template.html.Config.useCases = Print layout with map and header, feature tooltip, project-wide legend page.

gws.plugin.template.html.Config.path.label = File path
gws.plugin.template.html.Config.path.purpose = Path to an external template file. Alternative to text.

gws.plugin.template.html.Config.text.label = Inline content
gws.plugin.template.html.Config.text.purpose = Template content embedded directly in the configuration. Alternative to path.

# --- map ---------------------------------------------------------------------

gws.plugin.template.map.Config.label = Map template
gws.plugin.template.map.Config.purpose = Map-only template without any HTML wrapping. Renders the current map view at the configured page size and emits it as an image or PDF.
gws.plugin.template.map.Config.whenToUse = When only the map itself should be printed or exported, with no header, tables or logos.
gws.plugin.template.map.Config.complexity = intermediate

# --- text --------------------------------------------------------------------

gws.plugin.template.text.Config.label = Text template
gws.plugin.template.text.Config.purpose = Plain-text template based on the Jump engine, without HTML-specific commands. Produces text output only.
gws.plugin.template.text.Config.whenToUse = For short labels such as feature titles, tooltips, email subjects, or generic text fragments.
gws.plugin.template.text.Config.complexity = basic

gws.plugin.template.text.Config.path.label = File path
gws.plugin.template.text.Config.path.purpose = Path to an external template file. Alternative to text.

gws.plugin.template.text.Config.text.label = Inline content
gws.plugin.template.text.Config.text.purpose = Template content embedded directly in the configuration.

# --- py ----------------------------------------------------------------------

gws.plugin.template.py.Config.label = Python template
gws.plugin.template.py.Config.purpose = Template as a Python module. The module must expose a function main(args) returning a gws.Response object. Allows arbitrary render logic in Python.
gws.plugin.template.py.Config.whenToUse = When the output cannot be expressed through a text or HTML template — for example to integrate third-party libraries, transform data, or assemble binary outputs.
gws.plugin.template.py.Config.complexity = advanced

gws.plugin.template.py.Config.path.label = File path
gws.plugin.template.py.Config.path.purpose = Path to the Python file providing the main function.
