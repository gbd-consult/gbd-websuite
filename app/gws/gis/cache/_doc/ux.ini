# UX-Strings für die globale Cache-Konfiguration der WebSuite.

[de]

gws.gis.cache.core.Config.label = Cache-Optionen
gws.gis.cache.core.Config.purpose = Globale Einstellungen für den Karten-Tile-Cache (MapProxy-basiert) — Concurrency und Zeitlimit für Seeding-Jobs.
gws.gis.cache.core.Config.whenToUse = Pflicht, sobald MapProxy-Caching aktiv ist (Layer mit `withCache`).
gws.gis.cache.core.Config.complexity = advanced

gws.gis.cache.core.Config.seedingConcurrency.label = Parallele Seeding-Jobs
gws.gis.cache.core.Config.seedingConcurrency.purpose = Anzahl gleichzeitig laufender Cache-Seeding-Threads.
gws.gis.cache.core.Config.seedingConcurrency.example = 4
gws.gis.cache.core.Config.seedingConcurrency.complexity = advanced

gws.gis.cache.core.Config.seedingMaxTime.label = Max. Seeding-Dauer
gws.gis.cache.core.Config.seedingMaxTime.purpose = Maximale Laufzeit eines Seeding-Jobs in Sekunden, bevor er abgebrochen wird.
gws.gis.cache.core.Config.seedingMaxTime.example = 7200
gws.gis.cache.core.Config.seedingMaxTime.complexity = advanced

# --- cli ---------------------------------------------------------------------

gws.gis.cache.cli.StatusParams.layer.label = Layer-IDs
gws.gis.cache.cli.StatusParams.layer.purpose = Liste der Layer-UIDs, deren Cache-Status abgefragt wird. Leer = alle.

gws.gis.cache.cli.DropParams.layer.label = Layer-IDs
gws.gis.cache.cli.DropParams.layer.purpose = Liste der Layer-UIDs, deren Cache verworfen werden soll. Leer = alle.

gws.gis.cache.cli.SeedParams.layer.label = Layer-IDs
gws.gis.cache.cli.SeedParams.layer.purpose = Liste der Layer-UIDs, für die der Cache befüllt wird.

gws.gis.cache.cli.SeedParams.levels.label = Zoom-Level
gws.gis.cache.cli.SeedParams.levels.purpose = Liste der Zoom-Level, für die der Cache befüllt wird.
gws.gis.cache.cli.SeedParams.levels.example = [0, 1, 2, 3]

gws.gis.cache.cli.SeedParams.concurrency.label = Parallelität
gws.gis.cache.cli.SeedParams.concurrency.purpose = Anzahl gleichzeitig laufender Seeding-Threads. 0 = automatisch.
gws.gis.cache.cli.SeedParams.concurrency.example = 4
gws.gis.cache.cli.SeedParams.concurrency.complexity = advanced

[en]

gws.gis.cache.core.Config.label = Cache options
gws.gis.cache.core.Config.purpose = Global settings for the map tile cache (MapProxy-based) — concurrency and time limit for seeding jobs.
gws.gis.cache.core.Config.whenToUse = Required when MapProxy caching is active (layers with `withCache`).
gws.gis.cache.core.Config.complexity = advanced

gws.gis.cache.core.Config.seedingConcurrency.label = Concurrent seeding jobs
gws.gis.cache.core.Config.seedingConcurrency.purpose = Number of cache seeding threads running in parallel.
gws.gis.cache.core.Config.seedingConcurrency.example = 4
gws.gis.cache.core.Config.seedingConcurrency.complexity = advanced

gws.gis.cache.core.Config.seedingMaxTime.label = Max seeding time
gws.gis.cache.core.Config.seedingMaxTime.purpose = Maximum runtime of a single seeding job in seconds before it is aborted.
gws.gis.cache.core.Config.seedingMaxTime.example = 7200
gws.gis.cache.core.Config.seedingMaxTime.complexity = advanced

# --- cli ---------------------------------------------------------------------

gws.gis.cache.cli.StatusParams.layer.label = Layer IDs
gws.gis.cache.cli.StatusParams.layer.purpose = List of layer UIDs whose cache status is queried. Empty = all.

gws.gis.cache.cli.DropParams.layer.label = Layer IDs
gws.gis.cache.cli.DropParams.layer.purpose = List of layer UIDs whose cache should be dropped. Empty = all.

gws.gis.cache.cli.SeedParams.layer.label = Layer IDs
gws.gis.cache.cli.SeedParams.layer.purpose = List of layer UIDs for which the cache is seeded.

gws.gis.cache.cli.SeedParams.levels.label = Zoom levels
gws.gis.cache.cli.SeedParams.levels.purpose = List of zoom levels for which the cache is seeded.
gws.gis.cache.cli.SeedParams.levels.example = [0, 1, 2, 3]

gws.gis.cache.cli.SeedParams.concurrency.label = Concurrency
gws.gis.cache.cli.SeedParams.concurrency.purpose = Number of concurrent seeding threads. 0 = automatic.
gws.gis.cache.cli.SeedParams.concurrency.example = 4
gws.gis.cache.cli.SeedParams.concurrency.complexity = advanced
