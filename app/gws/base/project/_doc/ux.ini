# UX-Strings für base/project (Welle B).
#
# Schlüsselformat: gws.base.project.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Inhalte aus den Klassen-Docstrings, strings.ini und der core.py
# abgeleitet — keine Phantasie-Texte. Lücken sind OK.

[de]

# --- core.Config ----------------------------------------------------
# Top-Level eines Projekts in der WebSuite-Konfiguration.

gws.base.project.core.Config.label = Projekt
gws.base.project.core.Config.purpose = Top-Level-Konfiguration eines Projekts. Bündelt Karte, Übersichtskarte, Datenmodelle, Suche, Druck, OWS-Dienste und projektspezifische Aktionen unter einer eindeutigen UID.
gws.base.project.core.Config.whenToUse = Pflicht-Container für jede in der WebSuite ausgelieferte Karte oder Anwendung. Pro Projekt entsteht im Client genau ein eigenständiger Arbeitsbereich.
gws.base.project.core.Config.complexity = basic
gws.base.project.core.Config.useCases = Klassisches Karten-Frontend, Editier-Anwendung mit Datenmodellen, OWS-Veröffentlichung (WMS/WFS), Sammlung mehrerer Themen-Apps unter einer Anwendung.

gws.base.project.core.Config.title.label = Titel
gws.base.project.core.Config.title.purpose = Anzeigename des Projekts in Client und Katalog. Fällt sonst auf den Metadaten-Titel oder die UID zurück.
gws.base.project.core.Config.title.complexity = basic
gws.base.project.core.Config.title.example = "Stadtplan Musterstadt"

gws.base.project.core.Config.map.label = Karte
gws.base.project.core.Config.map.purpose = Hauptkarte des Projekts mit Layern, Maßstäben und Koordinatensystem.
gws.base.project.core.Config.map.complexity = basic
gws.base.project.core.Config.map.seeAlso = gws.base.map.core.Config

gws.base.project.core.Config.overviewMap.label = Übersichtskarte
gws.base.project.core.Config.overviewMap.purpose = Optionale, kleinere Karte für die Navigationsorientierung im Client. Verwendet die gleiche Struktur wie die Hauptkarte.
gws.base.project.core.Config.overviewMap.complexity = intermediate
gws.base.project.core.Config.overviewMap.seeAlso = gws.base.map.core.Config

gws.base.project.core.Config.metadata.label = Metadaten
gws.base.project.core.Config.metadata.purpose = Beschreibende Metadaten zum Projekt (Titel, Kontakt, Schlagworte, Lizenz). Wird in OWS-Capabilities und Katalogen sichtbar.
gws.base.project.core.Config.metadata.complexity = intermediate
gws.base.project.core.Config.metadata.seeAlso = gws.base.metadata.core.Config

gws.base.project.core.Config.actions.label = Aktionen
gws.base.project.core.Config.actions.purpose = Projektspezifische Aktionen, die der Client per JSON-RPC aufrufen kann. Überschreibt oder ergänzt die anwendungsweiten Aktionen.
gws.base.project.core.Config.actions.complexity = intermediate

gws.base.project.core.Config.assets.label = Statische Assets
gws.base.project.core.Config.assets.purpose = Verzeichnis mit projekteigenen statischen Dateien (CSS, Bilder, JS), die unter einer projektbezogenen URL ausgeliefert werden.
gws.base.project.core.Config.assets.complexity = intermediate

gws.base.project.core.Config.client.label = Client
gws.base.project.core.Config.client.purpose = Projektspezifische Anpassung der Client-Oberfläche (verfügbare Werkzeuge, Layout-Optionen).
gws.base.project.core.Config.client.complexity = intermediate

gws.base.project.core.Config.exporters.label = Exporter
gws.base.project.core.Config.exporters.purpose = Konfigurierte Daten-Exporte (z. B. CSV, GeoPackage), die der Nutzer aus dem Projekt heraus auslöst.
gws.base.project.core.Config.exporters.complexity = intermediate

gws.base.project.core.Config.finders.label = Suchanbieter
gws.base.project.core.Config.finders.purpose = Sucheinträge auf Projektebene. Greifen z. B. auf Datenbanken, OGC-Dienste oder Nominatim zu.
gws.base.project.core.Config.finders.complexity = intermediate

gws.base.project.core.Config.locales.label = Sprachen
gws.base.project.core.Config.locales.purpose = Liste verfügbarer Locales für dieses Projekt (z. B. de_DE, en_US). Fällt sonst auf die Anwendungs-Locales zurück.
gws.base.project.core.Config.locales.complexity = intermediate
gws.base.project.core.Config.locales.example = ["de_DE", "en_US"]

gws.base.project.core.Config.models.label = Datenmodelle
gws.base.project.core.Config.models.purpose = Projektweite Datenmodelle für Feature-Editierung, Validierung und strukturierte Anzeige.
gws.base.project.core.Config.models.complexity = advanced

gws.base.project.core.Config.owsServices.label = OWS-Dienste
gws.base.project.core.Config.owsServices.purpose = Vom Projekt veröffentlichte OGC-Dienste (WMS, WFS, WMTS, CSW). Die Dienste antworten relativ zur Projekt-UID.
gws.base.project.core.Config.owsServices.complexity = advanced

gws.base.project.core.Config.printers.label = Drucker
gws.base.project.core.Config.printers.purpose = Druck-Templates und Layouts, die im Projekt ausgewählt werden können.
gws.base.project.core.Config.printers.complexity = intermediate

gws.base.project.core.Config.templates.label = Vorlagen
gws.base.project.core.Config.templates.purpose = Projekt-Vorlagen für Beschreibung, Pop-ups und Reports. Die Subjects (z. B. project.description) bestimmen den Einsatzort.
gws.base.project.core.Config.templates.complexity = intermediate

gws.base.project.core.Config.vars.label = Variablen
gws.base.project.core.Config.vars.purpose = Frei verwendbare Schlüssel-Wert-Map. In Templates über var(...) abrufbar.
gws.base.project.core.Config.vars.complexity = advanced

# --- core.Object / core.Props (intern) ------------------------------
# Object und Props sind Laufzeit-Repräsentationen; im UI selten direkt
# editierbar.

gws.base.project.core.Object.label = Projekt
gws.base.project.core.Object.purpose = Laufzeit-Objekt eines Projekts. Wird aus einer Project-Config aufgebaut.
gws.base.project.core.Object.complexity = advanced

gws.base.project.core.Props.label = Projekt-Props
gws.base.project.core.Props.purpose = Sicht auf das Projekt, die der Client erhält. Enthält Karte, Drucker, Modelle, Metadaten und Aktionen für den aktuellen Nutzer.
gws.base.project.core.Props.complexity = advanced
gws.base.project.core.Props.title.label = Titel
gws.base.project.core.Props.title.complexity = basic
gws.base.project.core.Props.uid.label = UID
gws.base.project.core.Props.uid.purpose = Eindeutige Kennung des Projekts; Teil der URL und API-Aufrufe.
gws.base.project.core.Props.uid.complexity = basic
gws.base.project.core.Props.description.label = Beschreibung
gws.base.project.core.Props.description.purpose = Gerenderte Projektbeschreibung (aus dem Template "project.description").
gws.base.project.core.Props.actions.label = Aktionen
gws.base.project.core.Props.client.label = Client
gws.base.project.core.Props.exporters.label = Exporter
gws.base.project.core.Props.locales.label = Sprachen
gws.base.project.core.Props.map.label = Karte
gws.base.project.core.Props.metadata.label = Metadaten
gws.base.project.core.Props.models.label = Datenmodelle
gws.base.project.core.Props.overviewMap.label = Übersichtskarte
gws.base.project.core.Props.printers.label = Drucker

# --- action.Config / .Object / .Props -------------------------------

gws.base.project.action.Config.label = Projekt-Info-Aktion
gws.base.project.action.Config.purpose = Aktion, über die der Client das Projekt mitsamt Locale und Nutzerinformationen abruft.
gws.base.project.action.Config.complexity = advanced

gws.base.project.action.Object.label = Projekt-Info-Aktion
gws.base.project.action.Object.purpose = Laufzeit-Objekt der Projekt-Info-Aktion (projectInfo).
gws.base.project.action.Object.complexity = advanced

gws.base.project.action.Props.label = Projekt-Info-Aktion
gws.base.project.action.Props.complexity = advanced


[en]

# --- core.Config ----------------------------------------------------

gws.base.project.core.Config.label = Project
gws.base.project.core.Config.purpose = Top-level configuration of a project. Bundles map, overview map, data models, search, print, OWS services and project-specific actions under one UID.
gws.base.project.core.Config.whenToUse = Required container for every map or app served by the WebSuite. Each project becomes a self-contained client workspace.
gws.base.project.core.Config.complexity = basic
gws.base.project.core.Config.useCases = Classic map frontend, editing app with data models, OWS publication (WMS/WFS), bundling several themed apps under one application.

gws.base.project.core.Config.title.label = Title
gws.base.project.core.Config.title.purpose = Display name of the project in client and catalogue. Falls back to the metadata title or the UID.
gws.base.project.core.Config.title.complexity = basic
gws.base.project.core.Config.title.example = "City Map Sample Town"

gws.base.project.core.Config.map.label = Map
gws.base.project.core.Config.map.purpose = Main map of the project with its layers, scales and CRS.
gws.base.project.core.Config.map.complexity = basic

gws.base.project.core.Config.overviewMap.label = Overview map
gws.base.project.core.Config.overviewMap.purpose = Optional smaller map for navigation context in the client. Same structure as the main map.
gws.base.project.core.Config.overviewMap.complexity = intermediate

gws.base.project.core.Config.metadata.label = Metadata
gws.base.project.core.Config.metadata.purpose = Descriptive metadata for the project (title, contact, keywords, licence). Surfaces in OWS capabilities and catalogues.
gws.base.project.core.Config.metadata.complexity = intermediate

gws.base.project.core.Config.actions.label = Actions
gws.base.project.core.Config.actions.purpose = Project-specific actions callable from the client. Override or extend application-wide actions.
gws.base.project.core.Config.actions.complexity = intermediate

gws.base.project.core.Config.assets.label = Static assets
gws.base.project.core.Config.assets.purpose = Directory of project-owned static files (CSS, images, JS) served under a project URL.
gws.base.project.core.Config.assets.complexity = intermediate

gws.base.project.core.Config.client.label = Client
gws.base.project.core.Config.client.purpose = Project-specific tweaks of the client UI (available tools, layout).
gws.base.project.core.Config.client.complexity = intermediate

gws.base.project.core.Config.exporters.label = Exporters
gws.base.project.core.Config.exporters.purpose = Configured data exports (CSV, GeoPackage etc.) reachable from this project.
gws.base.project.core.Config.exporters.complexity = intermediate

gws.base.project.core.Config.finders.label = Search providers
gws.base.project.core.Config.finders.purpose = Search providers at project level — databases, OGC services, Nominatim, etc.
gws.base.project.core.Config.finders.complexity = intermediate

gws.base.project.core.Config.locales.label = Locales
gws.base.project.core.Config.locales.purpose = Available locales for the project (e.g. de_DE, en_US). Falls back to the application locales.
gws.base.project.core.Config.locales.complexity = intermediate

gws.base.project.core.Config.models.label = Data models
gws.base.project.core.Config.models.purpose = Project-wide data models for feature editing, validation and structured display.
gws.base.project.core.Config.models.complexity = advanced

gws.base.project.core.Config.owsServices.label = OWS services
gws.base.project.core.Config.owsServices.purpose = OGC services (WMS, WFS, WMTS, CSW) published from this project, addressed by project UID.
gws.base.project.core.Config.owsServices.complexity = advanced

gws.base.project.core.Config.printers.label = Printers
gws.base.project.core.Config.printers.purpose = Print templates and layouts available within the project.
gws.base.project.core.Config.printers.complexity = intermediate

gws.base.project.core.Config.templates.label = Templates
gws.base.project.core.Config.templates.purpose = Project templates for description, pop-ups and reports. The subject (e.g. project.description) decides where they apply.
gws.base.project.core.Config.templates.complexity = intermediate

gws.base.project.core.Config.vars.label = Variables
gws.base.project.core.Config.vars.purpose = Free-form key/value map; readable from templates via var(...).
gws.base.project.core.Config.vars.complexity = advanced

# --- core.Object / core.Props ---------------------------------------

gws.base.project.core.Object.label = Project
gws.base.project.core.Object.purpose = Runtime project object built from a project Config.
gws.base.project.core.Object.complexity = advanced

gws.base.project.core.Props.label = Project props
gws.base.project.core.Props.purpose = Client-facing view of the project: map, printers, models, metadata and actions for the current user.
gws.base.project.core.Props.complexity = advanced
gws.base.project.core.Props.title.label = Title
gws.base.project.core.Props.title.complexity = basic
gws.base.project.core.Props.uid.label = UID
gws.base.project.core.Props.uid.purpose = Unique project identifier; part of URLs and API calls.
gws.base.project.core.Props.uid.complexity = basic
gws.base.project.core.Props.description.label = Description
gws.base.project.core.Props.description.purpose = Rendered project description (template "project.description").

# --- action.Config / .Object / .Props -------------------------------

gws.base.project.action.Config.label = Project info action
gws.base.project.action.Config.purpose = Action through which the client retrieves the project plus locale and user info.
gws.base.project.action.Config.complexity = advanced

gws.base.project.action.Object.label = Project info action
gws.base.project.action.Object.purpose = Runtime object of the project info action (projectInfo).
gws.base.project.action.Object.complexity = advanced

gws.base.project.action.Props.label = Project info action
gws.base.project.action.Props.complexity = advanced
