# UX-Strings für den storage_provider-Plugin-Bereich (Welle C).
#
# Schlüsselformat: gws.plugin.storage_provider.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Inhalte konservativ aus Klassen-Docstrings abgeleitet — keine Phantasie-Texte.

[de]

# --- sqlite ---------------------------------------------------------------

gws.plugin.storage_provider.sqlite.Config.label = SQLite-Speicher-Provider
gws.plugin.storage_provider.sqlite.Config.purpose = Persistenter Speicher für benannte Datenobjekte (z. B. gespeicherte Auswahlen, Annotationen) in einer SQLite-Datei. Eine Standardinstallation reicht für kleine bis mittlere Setups.
gws.plugin.storage_provider.sqlite.Config.whenToUse = Wenn Anwender Auswahlen, Markierungen oder Suchergebnisse speichern und wieder laden sollen, ohne externe Datenbank.
gws.plugin.storage_provider.sqlite.Config.complexity = advanced

gws.plugin.storage_provider.sqlite.Config.path.label = Datei-Pfad
gws.plugin.storage_provider.sqlite.Config.path.purpose = Pfad zur SQLite-Datei. Ohne Angabe wird ein Default unterhalb des MISC-Verzeichnisses verwendet.
gws.plugin.storage_provider.sqlite.Config.path.example = "/var/gws/storage/storage.sqlite"

[en]

# --- sqlite ---------------------------------------------------------------

gws.plugin.storage_provider.sqlite.Config.label = SQLite storage provider
gws.plugin.storage_provider.sqlite.Config.purpose = Persistent storage backend for named data objects (e.g. saved selections, annotations) in a SQLite file. The default setup is sufficient for small to medium installations.
gws.plugin.storage_provider.sqlite.Config.whenToUse = When users should be able to save and reload selections, markers or search results without an external database.
gws.plugin.storage_provider.sqlite.Config.complexity = advanced

gws.plugin.storage_provider.sqlite.Config.path.label = File path
gws.plugin.storage_provider.sqlite.Config.path.purpose = Path to the SQLite file. If omitted a default below the MISC directory is used.
gws.plugin.storage_provider.sqlite.Config.path.example = "/var/gws/storage/storage.sqlite"
