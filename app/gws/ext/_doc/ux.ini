# UX-Strings für die VARIANT-Eltern unter gws.ext.config.*.
#
# Die VARIANTen werden vom Generator synthetisch aus app/gws/ext/types.txt
# erzeugt; sie haben kein Plugin-Verzeichnis. Diese Datei pflegt die
# Hilfetexte für die "X hinzufügen"-Drawer im Konfigurator (Auswahl-Dialog
# vor der Wahl eines konkreten Members).
#
# Jeder Eintrag:
#   <variant-uid>.label    Kurzer Anzeigename der Variant-Familie
#   <variant-uid>.purpose  Was haben die Member gemeinsam
#   <variant-uid>.useCases Typische Einsatzzwecke (1-2 Sätze)
#   <variant-uid>.complexity  Einstiegshürde der Familie als Ganzes

[de]

gws.ext.config.action.label = Backend-Aktion
gws.ext.config.action.purpose = Eine Aktion ist eine Server-seitige Funktion, die der Client über die JSON-RPC-API aufrufen kann (z. B. Suche, Druck, Editieren). Über die Aktionen wird der Funktionsumfang des Backends modular zusammengestellt.
gws.ext.config.action.useCases = Standard-Werkzeuge wie Suche, Identifizieren, Druck und Edit aktivieren; eigene Fachverfahren wie ALKIS-Auskunft anbinden.
gws.ext.config.action.complexity = intermediate

gws.ext.config.authMethod.label = Authentifizierungs-Methode
gws.ext.config.authMethod.purpose = Eine Methode legt fest, wie sich Benutzer beim Server anmelden — Cookie-Login (Web), HTTP-Basic, Token im Header. Methoden lassen sich kombinieren; mehrere Methoden können parallel aktiv sein.
gws.ext.config.authMethod.useCases = Browser-Login mit Session-Cookie, scriptbasierter API-Zugriff per Token, Server-zu-Server-Authentifizierung.
gws.ext.config.authMethod.complexity = intermediate

gws.ext.config.authMultiFactorAdapter.label = Mehrfaktor-Adapter
gws.ext.config.authMultiFactorAdapter.purpose = Adapter, der einen zweiten Faktor neben Benutzername/Passwort prüft (TOTP, E-Mail-Code). Wird einer Authentifizierungs-Methode zugeordnet.
gws.ext.config.authMultiFactorAdapter.useCases = TOTP für Administratoren, E-Mail-Bestätigung für sensitive Konten, abgestufte 2FA-Anforderungen je nach Rolle.
gws.ext.config.authMultiFactorAdapter.complexity = advanced

gws.ext.config.authProvider.label = Authentifizierungs-Anbieter
gws.ext.config.authProvider.purpose = Quelle für Benutzerkonten und Rollen — JSON-Datei, LDAP/Active-Directory, PostgreSQL-Tabellen oder die in WebSuite gepflegte Account-Verwaltung. Mehrere Provider können parallel konfiguriert sein.
gws.ext.config.authProvider.useCases = Lokale Demo-Datei mit wenigen Benutzern, Anbindung an die zentrale AD-Benutzerverwaltung, Datenbank-gestützte Self-Service-Konten.
gws.ext.config.authProvider.complexity = intermediate

gws.ext.config.authSessionManager.label = Sitzungsverwaltung
gws.ext.config.authSessionManager.purpose = Speichert aktive Anmelde-Sitzungen, damit eingeloggte Benutzer zwischen Requests erkannt werden. Gespeichert wird in der konfigurierten Backend-Komponente (typisch: SQLite-Datei).
gws.ext.config.authSessionManager.useCases = Persistente Sitzungen über Server-Neustart hinweg, kontrollierte Sitzungs-Lebensdauer für Compliance-Vorgaben.
gws.ext.config.authSessionManager.complexity = basic

gws.ext.config.databaseProvider.label = Datenbank-Anbieter
gws.ext.config.databaseProvider.purpose = Verbindung zu einem relationalen Datenbank-Server. Mehrere Layer, Modelle und Authentifizierungs-Quellen teilen sich denselben Provider, um Verbindungspools zu nutzen.
gws.ext.config.databaseProvider.useCases = Zentrale PostgreSQL/PostGIS-Verbindung für alle Vektor-Layer und Editierfunktionen; Anbindung an PostgreSQL-Backends von Fachverfahren.
gws.ext.config.databaseProvider.complexity = intermediate

gws.ext.config.exporter.label = Export-Modul
gws.ext.config.exporter.purpose = Komponente, die Such- oder Editier-Ergebnisse in Austauschformate exportiert (z. B. Shapefile). Wird Aktionen oder Modellen zugeordnet.
gws.ext.config.exporter.useCases = Shapefile-Export von Suchergebnissen, CSV-Übergabe an Fachverfahren.
gws.ext.config.exporter.complexity = intermediate

gws.ext.config.finder.label = Suche
gws.ext.config.finder.purpose = Implementierung einer Such-Quelle — Datenbank-Abfrage, OWS-WFS, Geocoder-Dienst, QGIS-Layer-Suche. Eine Aktion kann mehrere Finder bündeln, die parallel abgefragt werden.
gws.ext.config.finder.useCases = Volltextsuche über eine PostGIS-Tabelle, Adress-Suche per Nominatim, Suche in QGIS-Layern und externen WFS-Diensten.
gws.ext.config.finder.complexity = intermediate

gws.ext.config.helper.label = Helper-Modul
gws.ext.config.helper.purpose = Querschnitts-Komponente, die Funktionen für andere Plugins bereitstellt (CSV-Erzeugung, E-Mail-Versand, XML-Hilfen, Konten-Verwaltung). Helper sind keine Aktionen, sondern Build-Blocks anderer Server-Funktionen.
gws.ext.config.helper.useCases = Einheitliche CSV-Spaltenformatierung, projekt-zentrale SMTP-Konfiguration, gemeinsamer XML-Namespace-Pool.
gws.ext.config.helper.complexity = intermediate

gws.ext.config.layer.label = Karten-Layer
gws.ext.config.layer.purpose = Darstellungs- oder Datenebene in einer Karte: Vektor aus PostGIS, Bilder aus QGIS-Server, Tile-Caches, externe WMS, Layer-Gruppen zur Strukturierung. Layer sind die wichtigste Bauform der Kartenkonfiguration.
gws.ext.config.layer.useCases = Hintergrund-Tile-Layer, eigene Vektor-Layer aus der Datenbank, eingebundene WMS- und QGIS-Server, Layer-Bäume mit Gruppen.
gws.ext.config.layer.complexity = intermediate

gws.ext.config.legend.label = Legenden-Quelle
gws.ext.config.legend.purpose = Liefert die Legenden-Grafik für einen Layer — als statisches Bild, als HTML, als Remote-WMS-Aufruf oder zusammengesetzt aus Teilen mehrerer Layer.
gws.ext.config.legend.useCases = Statische Legende aus einem PNG, kombinierte Legende einer Layer-Gruppe, automatische Legende vom QGIS-Server.
gws.ext.config.legend.complexity = basic

gws.ext.config.model.label = Datenmodell
gws.ext.config.model.purpose = Beschreibung der Felder, Beziehungen und Editier-Regeln einer Sachdaten-Tabelle. Wird Layern zugeordnet (für Editieren) und Such-/Edit-Aktionen.
gws.ext.config.model.useCases = Editierbarer Vektor-Layer mit Feld-Validierung, Such-Treffer-Aufbereitung, strukturierte Datentabellen in QGIS-Projekten.
gws.ext.config.model.complexity = intermediate

gws.ext.config.modelField.label = Modellfeld
gws.ext.config.modelField.purpose = Einzelnes Feld in einem Datenmodell mit Typ (Text, Zahl, Datum, Geometrie, Bezug) sowie Validatoren und Anzeige-Optionen.
gws.ext.config.modelField.useCases = Pflicht-Textfelder, numerische Eingaben mit Bereich, Datums-Picker, Geometrie-Editierung, Beziehungen zu Nachschlage-Tabellen.
gws.ext.config.modelField.complexity = intermediate

gws.ext.config.modelValidator.label = Validator
gws.ext.config.modelValidator.purpose = Prüft den Wert eines Modellfeldes gegen Regeln (Pflichtfeld, Regex, Zahlenbereich, Datumsbereich). Liefert lokalisierte Fehlermeldungen.
gws.ext.config.modelValidator.useCases = Eingaben-Plausibilisierung, Format-Erzwingung (Postleitzahl, Identifier-Schema), Pflichtfeld-Prüfung beim Speichern.
gws.ext.config.modelValidator.complexity = basic

gws.ext.config.modelValue.label = Vorgabewert
gws.ext.config.modelValue.purpose = Berechneter oder konstanter Wert für ein Modellfeld — z. B. „aktueller Zeitstempel", „angemeldeter Benutzer", Ausdruck oder feste Konstante.
gws.ext.config.modelValue.useCases = created_at automatisch füllen, Erfasser-Benutzernamen mitschreiben, abgeleitete Felder per Ausdruck erzeugen.
gws.ext.config.modelValue.complexity = intermediate

gws.ext.config.modelWidget.label = Eingabe-Widget
gws.ext.config.modelWidget.purpose = UI-Komponente, mit der ein Modellfeld bearbeitet wird — Texteingabe, Auswahlliste, Datums-Picker, Datei-Upload, Geometrie-Editor, Feature-Auswahl.
gws.ext.config.modelWidget.useCases = Codelisten als Dropdowns, Datei-Anhänge an Features, verknüpfte Features auswählen statt freier ID-Eingabe.
gws.ext.config.modelWidget.complexity = intermediate

gws.ext.config.owsService.label = OWS-Dienst
gws.ext.config.owsService.purpose = Vom Server bereitgestellter OGC-Web-Dienst — WMS, WMTS, WFS oder CSW. Layer und Modelle werden auf diese Dienste publiziert und sind so für externe GIS-Clients konsumierbar.
gws.ext.config.owsService.useCases = Eigene Karten-Layer als WMS für externe Kunden veröffentlichen, Vektor-Layer als WFS bereitstellen, Metadatenkatalog per CSW publizieren.
gws.ext.config.owsService.complexity = advanced

gws.ext.config.printer.label = Druck-Konfiguration
gws.ext.config.printer.purpose = Definiert Druck-Templates und Druck-Workflow für die Karten-Ausgabe als PDF, PNG oder anderes Format.
gws.ext.config.printer.useCases = A4-PDF-Vorlage mit Logo und Maßstab, mehrseitige Druck-Layouts, automatischer Karten-Export.
gws.ext.config.printer.complexity = intermediate

gws.ext.config.storageProvider.label = Speicher-Anbieter
gws.ext.config.storageProvider.purpose = Backend zur Persistierung von Konfigurations-Snapshots und Annotationen. Aktuell SQLite-basiert; weitere Provider sind möglich.
gws.ext.config.storageProvider.useCases = Speicherung von Bemaßungs-Annotationen, Persistenz benutzerdefinierter Layer-Sichtbarkeit.
gws.ext.config.storageProvider.complexity = basic

gws.ext.config.template.label = Vorlage
gws.ext.config.template.purpose = Text-, HTML-, Karten- oder QGIS-Vorlage, die Server-seitig gerendert wird (z. B. für Druck-Layouts, Suche-Treffer, E-Mails). Der Inhalt wird mit einer einfachen Template-Sprache zusammengesetzt.
gws.ext.config.template.useCases = HTML-Tooltips bei Identifizieren, Map-Templates für PDF-Druck, Mail-Vorlagen für Account-Workflows.
gws.ext.config.template.complexity = intermediate

[en]

gws.ext.config.action.label = Backend action
gws.ext.config.action.purpose = An action is a server-side function the client invokes via JSON-RPC (e.g. search, print, edit). Actions are how the backend's feature set is composed modularly.
gws.ext.config.action.useCases = Enable standard tools like search, identify, print and edit; integrate domain plugins like ALKIS land registry.
gws.ext.config.action.complexity = intermediate

gws.ext.config.authMethod.label = Authentication method
gws.ext.config.authMethod.purpose = A method specifies how users sign in to the server — cookie login, HTTP basic, token in header. Multiple methods can run side-by-side.
gws.ext.config.authMethod.useCases = Browser login with session cookie, scripted API access via token, server-to-server authentication.
gws.ext.config.authMethod.complexity = intermediate

gws.ext.config.authMultiFactorAdapter.label = Multi-factor adapter
gws.ext.config.authMultiFactorAdapter.purpose = Adapter that verifies a second factor in addition to username/password (TOTP, e-mail code). Attached to an authentication method.
gws.ext.config.authMultiFactorAdapter.useCases = TOTP for administrators, e-mail confirmation for sensitive accounts, role-based 2FA escalation.
gws.ext.config.authMultiFactorAdapter.complexity = advanced

gws.ext.config.authProvider.label = Authentication provider
gws.ext.config.authProvider.purpose = Source of user accounts and roles — JSON file, LDAP/Active Directory, PostgreSQL tables or the WebSuite-managed account store. Multiple providers can be active in parallel.
gws.ext.config.authProvider.useCases = Local demo file with a few users, integration with central AD user directory, database-backed self-service accounts.
gws.ext.config.authProvider.complexity = intermediate

gws.ext.config.authSessionManager.label = Session manager
gws.ext.config.authSessionManager.purpose = Stores active login sessions so signed-in users are recognised across requests. Persists in the configured backend (typically a SQLite file).
gws.ext.config.authSessionManager.useCases = Sessions persisting through server restarts, controlled session lifetime for compliance.
gws.ext.config.authSessionManager.complexity = basic

gws.ext.config.databaseProvider.label = Database provider
gws.ext.config.databaseProvider.purpose = Connection to a relational database server. Multiple layers, models and auth sources share the same provider to reuse connection pools.
gws.ext.config.databaseProvider.useCases = Central PostgreSQL/PostGIS connection for all vector layers and editing; backend connection for domain plugins.
gws.ext.config.databaseProvider.complexity = intermediate

gws.ext.config.exporter.label = Exporter
gws.ext.config.exporter.purpose = Component that exports search or edit results into interchange formats (e.g. Shapefile). Attached to actions or models.
gws.ext.config.exporter.useCases = Shapefile export of search results, CSV hand-off to domain workflows.
gws.ext.config.exporter.complexity = intermediate

gws.ext.config.finder.label = Search source
gws.ext.config.finder.purpose = Implementation of a search source — database query, OWS-WFS, geocoder service, QGIS layer search. A single search action can bundle multiple finders that run in parallel.
gws.ext.config.finder.useCases = Full-text search across a PostGIS table, address lookup via Nominatim, search across QGIS layers and external WFS services.
gws.ext.config.finder.complexity = intermediate

gws.ext.config.helper.label = Helper module
gws.ext.config.helper.purpose = Cross-cutting component providing functions for other plugins (CSV, e-mail, XML helpers, account management). Helpers are not actions but building blocks of other server functions.
gws.ext.config.helper.useCases = Consistent CSV column formatting, project-wide SMTP configuration, shared XML namespace pool.
gws.ext.config.helper.complexity = intermediate

gws.ext.config.layer.label = Map layer
gws.ext.config.layer.purpose = Display or data layer in a map: vector from PostGIS, images from QGIS Server, tile caches, external WMS, layer groups for structure. Layers are the central building block of map configuration.
gws.ext.config.layer.useCases = Background tile layers, own vector layers from the database, embedded WMS and QGIS servers, layer trees with groups.
gws.ext.config.layer.complexity = intermediate

gws.ext.config.legend.label = Legend source
gws.ext.config.legend.purpose = Provides the legend image for a layer — as a static file, HTML, remote WMS call or composed from parts of multiple layers.
gws.ext.config.legend.useCases = Static legend from a PNG, combined legend for a layer group, automatic legend from QGIS Server.
gws.ext.config.legend.complexity = basic

gws.ext.config.model.label = Data model
gws.ext.config.model.purpose = Description of fields, relations and editing rules of an attribute table. Attached to layers (for editing) and search/edit actions.
gws.ext.config.model.useCases = Editable vector layer with field validation, search-result formatting, structured tables in QGIS projects.
gws.ext.config.model.complexity = intermediate

gws.ext.config.modelField.label = Model field
gws.ext.config.modelField.purpose = Single field of a data model with type (text, number, date, geometry, relation) plus validators and display options.
gws.ext.config.modelField.useCases = Mandatory text fields, numeric input with range, date picker, geometry editing, relations to lookup tables.
gws.ext.config.modelField.complexity = intermediate

gws.ext.config.modelValidator.label = Validator
gws.ext.config.modelValidator.purpose = Checks a model field's value against rules (required, regex, number range, date range). Returns localised error messages.
gws.ext.config.modelValidator.useCases = Plausibility checks, format enforcement (postal code, identifier scheme), required-field check on save.
gws.ext.config.modelValidator.complexity = basic

gws.ext.config.modelValue.label = Default value
gws.ext.config.modelValue.purpose = Computed or constant value for a model field — current timestamp, current user, expression or a fixed constant.
gws.ext.config.modelValue.useCases = Auto-fill created_at, capture editor user name, compute derived fields by expression.
gws.ext.config.modelValue.complexity = intermediate

gws.ext.config.modelWidget.label = Edit widget
gws.ext.config.modelWidget.purpose = UI control used to edit a model field — text input, dropdown, date picker, file upload, geometry editor, feature selector.
gws.ext.config.modelWidget.useCases = Code lists as dropdowns, file attachments to features, picking related features instead of typing IDs.
gws.ext.config.modelWidget.complexity = intermediate

gws.ext.config.owsService.label = OWS service
gws.ext.config.owsService.purpose = OGC web service published by the server — WMS, WMTS, WFS or CSW. Layers and models are exposed on these services for external GIS clients.
gws.ext.config.owsService.useCases = Publish own map layers as WMS for external customers, expose vector layers as WFS, publish a metadata catalog as CSW.
gws.ext.config.owsService.complexity = advanced

gws.ext.config.printer.label = Print configuration
gws.ext.config.printer.purpose = Defines print templates and print workflow for map output as PDF, PNG or other formats.
gws.ext.config.printer.useCases = A4 PDF templates with logo and scale, multi-page print layouts, automated map export.
gws.ext.config.printer.complexity = intermediate

gws.ext.config.storageProvider.label = Storage provider
gws.ext.config.storageProvider.purpose = Backend for persisting configuration snapshots and annotations. Currently SQLite-backed; further providers are possible.
gws.ext.config.storageProvider.useCases = Persist drawing annotations, persist user-defined layer visibility.
gws.ext.config.storageProvider.complexity = basic

gws.ext.config.template.label = Template
gws.ext.config.template.purpose = Text, HTML, map or QGIS template rendered server-side (for print layouts, search results, e-mails). Content is composed using a small template language.
gws.ext.config.template.useCases = HTML tooltips on identify, map templates for PDF print, mail templates for account workflows.
gws.ext.config.template.complexity = intermediate
