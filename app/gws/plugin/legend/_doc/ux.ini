# UX-Strings für plugin/legend (combined, html, remote, static).
#
# Schlüsselformat: gws.plugin.legend.<modul>.<class>[.<property>].<feldname>
#
# Inhalte konservativ aus Klassen-Docstrings und Source abgeleitet —
# keine Phantasie-Texte.

[de]

# --- combined ---------------------------------------------------------------

gws.plugin.legend.combined.Config.label = Kombinierte Legende
gws.plugin.legend.combined.Config.purpose = Legende, die die Einzel-Legenden mehrerer Layer zu einer einzigen Legende zusammenführt. Lädt für jede Layer-UID die jeweilige Layer-Legende und kombiniert die Bilder.
gws.plugin.legend.combined.Config.whenToUse = Für Gruppen-Layer oder Karten-Übersichten, in denen mehrere Quell-Layer eine gemeinsame Legende erhalten sollen.
gws.plugin.legend.combined.Config.complexity = intermediate
gws.plugin.legend.combined.Config.useCases = Gruppen-Layer mit mehreren WMS-Diensten, thematische Übersichten über mehrere Fachlayer.
gws.plugin.legend.combined.Config.seeAlso = gws.base.layer.core.Config.legend, gws.plugin.legend.static.Config

gws.plugin.legend.combined.Config.layerUids.label = Layer-UIDs
gws.plugin.legend.combined.Config.layerUids.purpose = UIDs der Layer, deren Legenden zu einer kombinierten Legende zusammengefasst werden. Die Reihenfolge bestimmt die Reihenfolge im resultierenden Bild.

gws.plugin.legend.combined.Object.label = Kombinierte Legende (Object)
gws.plugin.legend.combined.Object.purpose = Laufzeit-Repräsentation einer kombinierten Legende.
gws.plugin.legend.combined.Object.complexity = advanced

# --- html -------------------------------------------------------------------

gws.plugin.legend.html.Config.label = HTML-Legende
gws.plugin.legend.html.Config.purpose = Legende, die aus einem HTML-Template generiert und anschließend zu einem Bild gerendert wird.
gws.plugin.legend.html.Config.whenToUse = Wenn die Legende aus eigenen Inhalten (z.B. Tabelle, Klassifikation) generiert werden soll, statt sie als Bild oder externe URL zu laden.
gws.plugin.legend.html.Config.complexity = intermediate
gws.plugin.legend.html.Config.useCases = Klassifizierte Vektor-Layer mit Legendentabelle, mehrsprachige Legenden, Layer ohne fertige Legend-Grafik.

gws.plugin.legend.html.Config.template.label = HTML-Template
gws.plugin.legend.html.Config.template.purpose = Template, das den HTML-Inhalt der Legende erzeugt. Wird intern zu PNG gerendert.

gws.plugin.legend.html.Object.label = HTML-Legende (Object)
gws.plugin.legend.html.Object.purpose = Laufzeit-Repräsentation einer HTML-Legende.
gws.plugin.legend.html.Object.complexity = advanced

# --- remote -----------------------------------------------------------------

gws.plugin.legend.remote.Config.label = Externe Legende
gws.plugin.legend.remote.Config.purpose = Legende, deren Bild(er) von einer externen URL geladen werden — typischerweise ein WMS-GetLegendGraphic-Aufruf.
gws.plugin.legend.remote.Config.whenToUse = Für Layer, die ihren Inhalt von einem WMS-Server beziehen und dort auch eine Legendengrafik anbieten.
gws.plugin.legend.remote.Config.complexity = basic
gws.plugin.legend.remote.Config.useCases = WMS-Layer mit GetLegendGraphic, eingebettete Legenden aus Drittanbieter-Diensten.

gws.plugin.legend.remote.Config.urls.label = Legend-URLs
gws.plugin.legend.remote.Config.urls.purpose = Liste der URLs, von denen Legendenbilder geladen werden. Mehrere URLs werden zu einer Legende zusammengefügt.
gws.plugin.legend.remote.Config.urls.example = ["https://wms.example.com/?REQUEST=GetLegendGraphic&LAYER=foo"]

gws.plugin.legend.remote.Object.label = Externe Legende (Object)
gws.plugin.legend.remote.Object.purpose = Laufzeit-Repräsentation einer externen Legende.
gws.plugin.legend.remote.Object.complexity = advanced

# --- static -----------------------------------------------------------------

gws.plugin.legend.static.Config.label = Statische Legende
gws.plugin.legend.static.Config.purpose = Legende, deren Inhalt aus einer fest hinterlegten Bild-Datei kommt.
gws.plugin.legend.static.Config.whenToUse = Wenn eine vorbereitete Legendengrafik (PNG, SVG, JPEG) verwendet werden soll.
gws.plugin.legend.static.Config.complexity = basic
gws.plugin.legend.static.Config.useCases = Manuell gestaltete Legenden, gescannte Legenden aus bestehenden Karten, einheitliche Layout-Legenden in Reports.

gws.plugin.legend.static.Config.path.label = Bilddatei
gws.plugin.legend.static.Config.path.purpose = Pfad zur Legend-Bilddatei. Relativ zum Projekt oder absolut.
gws.plugin.legend.static.Config.path.example = "legends/bplan.png"

gws.plugin.legend.static.Object.label = Statische Legende (Object)
gws.plugin.legend.static.Object.purpose = Laufzeit-Repräsentation einer statischen Legende.
gws.plugin.legend.static.Object.complexity = advanced

[en]

# --- combined ---------------------------------------------------------------

gws.plugin.legend.combined.Config.label = Combined legend
gws.plugin.legend.combined.Config.purpose = Legend that merges the individual legends of several layers into one. Loads each per-layer legend and combines the images.
gws.plugin.legend.combined.Config.whenToUse = For group layers or map overviews where several source layers should share a single legend.
gws.plugin.legend.combined.Config.complexity = intermediate
gws.plugin.legend.combined.Config.useCases = Group layers with multiple WMS services, thematic overviews spanning several feature layers.

gws.plugin.legend.combined.Config.layerUids.label = Layer UIDs
gws.plugin.legend.combined.Config.layerUids.purpose = UIDs of the layers whose legends are merged. The order determines the order in the resulting image.

gws.plugin.legend.combined.Object.label = Combined legend (object)
gws.plugin.legend.combined.Object.purpose = Runtime representation of a combined legend.
gws.plugin.legend.combined.Object.complexity = advanced

# --- html -------------------------------------------------------------------

gws.plugin.legend.html.Config.label = HTML legend
gws.plugin.legend.html.Config.purpose = Legend produced from an HTML template and rendered to an image.
gws.plugin.legend.html.Config.whenToUse = When the legend should be generated from custom content (e.g. classification table) rather than loaded as an image or remote URL.
gws.plugin.legend.html.Config.complexity = intermediate
gws.plugin.legend.html.Config.useCases = Classified vector layers with legend tables, multilingual legends, layers without ready-made legend graphics.

gws.plugin.legend.html.Config.template.label = HTML template
gws.plugin.legend.html.Config.template.purpose = Template producing the HTML body of the legend. Internally rasterised to PNG.

gws.plugin.legend.html.Object.label = HTML legend (object)
gws.plugin.legend.html.Object.purpose = Runtime representation of an HTML legend.
gws.plugin.legend.html.Object.complexity = advanced

# --- remote -----------------------------------------------------------------

gws.plugin.legend.remote.Config.label = External legend
gws.plugin.legend.remote.Config.purpose = Legend whose images are loaded from an external URL — typically a WMS GetLegendGraphic call.
gws.plugin.legend.remote.Config.whenToUse = For layers backed by a WMS service that also provides a legend graphic.
gws.plugin.legend.remote.Config.complexity = basic
gws.plugin.legend.remote.Config.useCases = WMS layers with GetLegendGraphic, embedded legends from third-party services.

gws.plugin.legend.remote.Config.urls.label = Legend URLs
gws.plugin.legend.remote.Config.urls.purpose = List of URLs from which legend images are fetched. Multiple URLs are merged into a single legend.
gws.plugin.legend.remote.Config.urls.example = ["https://wms.example.com/?REQUEST=GetLegendGraphic&LAYER=foo"]

gws.plugin.legend.remote.Object.label = External legend (object)
gws.plugin.legend.remote.Object.purpose = Runtime representation of an external legend.
gws.plugin.legend.remote.Object.complexity = advanced

# --- static -----------------------------------------------------------------

gws.plugin.legend.static.Config.label = Static legend
gws.plugin.legend.static.Config.purpose = Legend whose content comes from a fixed image file.
gws.plugin.legend.static.Config.whenToUse = When a prepared legend graphic (PNG, SVG, JPEG) should be used.
gws.plugin.legend.static.Config.complexity = basic
gws.plugin.legend.static.Config.useCases = Manually designed legends, scanned legends from existing maps, uniform legends in reports.

gws.plugin.legend.static.Config.path.label = Image file
gws.plugin.legend.static.Config.path.purpose = Path to the legend image file. Relative to the project or absolute.
gws.plugin.legend.static.Config.path.example = "legends/bplan.png"

gws.plugin.legend.static.Object.label = Static legend (object)
gws.plugin.legend.static.Object.purpose = Runtime representation of a static legend.
gws.plugin.legend.static.Object.complexity = advanced
