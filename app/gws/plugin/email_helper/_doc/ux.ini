# UX-Strings für den E-Mail-Helper (plugin/email_helper).
#
# Schlüsselformat: gws.plugin.email_helper.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.

[de]

# --- email_helper ------------------------------------------------------------

gws.plugin.email_helper.Config.label = E-Mail-Helper
gws.plugin.email_helper.Config.purpose = Konfiguriert den SMTP-Versand. Stellt einen wiederverwendbaren Helper bereit, mit dem Aktionen Mails senden können (Benachrichtigungen, Druckergebnisse als Anhang, Passwort-Resets).
gws.plugin.email_helper.Config.whenToUse = Pflicht für jede Installation, in der das System Mails verschicken soll — z. B. für Auftragsbestätigungen, Job-Notifications oder den Versand exportierter Daten.
gws.plugin.email_helper.Config.complexity = basic
gws.plugin.email_helper.Config.useCases = Hinweismails an Sachbearbeiter, Übergabe von Druckergebnissen per Mail, Passwort-Reset im File-Auth-Provider.

gws.plugin.email_helper.Config.smtp.label = SMTP-Server
gws.plugin.email_helper.Config.smtp.purpose = Konfiguration des verwendeten SMTP-Servers.

gws.plugin.email_helper.Config.mailFrom.label = Absenderadresse
gws.plugin.email_helper.Config.mailFrom.purpose = Default-Absender ('From'-Adresse), wenn die einzelne Nachricht keinen eigenen Absender setzt.
gws.plugin.email_helper.Config.mailFrom.example = "noreply@example.com"

# --- SmtpConfig --------------------------------------------------------------

gws.plugin.email_helper.SmtpConfig.label = SMTP-Konfiguration
gws.plugin.email_helper.SmtpConfig.purpose = Verbindungsparameter zum SMTP-Server: Host, Port, Verbindungsmodus und optionale Login-Daten.
gws.plugin.email_helper.SmtpConfig.complexity = basic

gws.plugin.email_helper.SmtpConfig.host.label = SMTP-Host
gws.plugin.email_helper.SmtpConfig.host.purpose = Hostname oder IP-Adresse des SMTP-Servers.
gws.plugin.email_helper.SmtpConfig.host.complexity = basic
gws.plugin.email_helper.SmtpConfig.host.example = "smtp.example.com"

gws.plugin.email_helper.SmtpConfig.port.label = SMTP-Port
gws.plugin.email_helper.SmtpConfig.port.purpose = Port des SMTP-Servers. Default je nach Modus: plain=25, ssl=465, tls=587.
gws.plugin.email_helper.SmtpConfig.port.complexity = basic
gws.plugin.email_helper.SmtpConfig.port.example = 587

gws.plugin.email_helper.SmtpConfig.mode.label = Verbindungsmodus
gws.plugin.email_helper.SmtpConfig.mode.purpose = Verschlüsselungsmodus der Verbindung: plain (unverschlüsselt), ssl (SMTPS), tls (STARTTLS). Default ist ssl.
gws.plugin.email_helper.SmtpConfig.mode.example = "tls"

gws.plugin.email_helper.SmtpConfig.login.label = Login-Name
gws.plugin.email_helper.SmtpConfig.login.purpose = Benutzername für die SMTP-Authentifizierung. Leer lassen, wenn der Server ohne Login arbeitet.

gws.plugin.email_helper.SmtpConfig.password.label = Passwort
gws.plugin.email_helper.SmtpConfig.password.purpose = Passwort für die SMTP-Authentifizierung.
gws.plugin.email_helper.SmtpConfig.password.complexity = basic

gws.plugin.email_helper.SmtpConfig.timeout.label = Timeout
gws.plugin.email_helper.SmtpConfig.timeout.purpose = Timeout der SMTP-Verbindung als Dauer-Wert. Default ist 30 Sekunden.
gws.plugin.email_helper.SmtpConfig.timeout.complexity = advanced
gws.plugin.email_helper.SmtpConfig.timeout.example = "30"

[en]

# --- email_helper ------------------------------------------------------------

gws.plugin.email_helper.Config.label = Email helper
gws.plugin.email_helper.Config.purpose = Configures SMTP sending. Provides a reusable helper that actions can use to send mails (notifications, print results as attachment, password resets).
gws.plugin.email_helper.Config.whenToUse = Required for any installation that should send mail — e.g. job notifications, exported data delivery, password resets.
gws.plugin.email_helper.Config.complexity = basic
gws.plugin.email_helper.Config.useCases = Notification mails to operators, delivering print results by mail, password reset in the file auth provider.

gws.plugin.email_helper.Config.smtp.label = SMTP server
gws.plugin.email_helper.Config.smtp.purpose = Configuration of the SMTP server in use.

gws.plugin.email_helper.Config.mailFrom.label = From address
gws.plugin.email_helper.Config.mailFrom.purpose = Default sender ('From' address) used when the individual message does not set its own.

# --- SmtpConfig --------------------------------------------------------------

gws.plugin.email_helper.SmtpConfig.label = SMTP configuration
gws.plugin.email_helper.SmtpConfig.purpose = Connection parameters for the SMTP server: host, port, connection mode and optional credentials.
gws.plugin.email_helper.SmtpConfig.complexity = basic

gws.plugin.email_helper.SmtpConfig.host.label = SMTP host
gws.plugin.email_helper.SmtpConfig.host.purpose = Hostname or IP address of the SMTP server.
gws.plugin.email_helper.SmtpConfig.host.complexity = basic

gws.plugin.email_helper.SmtpConfig.port.label = SMTP port
gws.plugin.email_helper.SmtpConfig.port.purpose = Port of the SMTP server. Default by mode: plain=25, ssl=465, tls=587.
gws.plugin.email_helper.SmtpConfig.port.complexity = basic

gws.plugin.email_helper.SmtpConfig.mode.label = Connection mode
gws.plugin.email_helper.SmtpConfig.mode.purpose = Encryption mode of the connection: plain (unencrypted), ssl (SMTPS), tls (STARTTLS). Defaults to ssl.

gws.plugin.email_helper.SmtpConfig.login.label = Login
gws.plugin.email_helper.SmtpConfig.login.purpose = Username for SMTP authentication. Leave empty if the server does not require authentication.

gws.plugin.email_helper.SmtpConfig.password.label = Password
gws.plugin.email_helper.SmtpConfig.password.purpose = Password for SMTP authentication.
gws.plugin.email_helper.SmtpConfig.password.complexity = basic

gws.plugin.email_helper.SmtpConfig.timeout.label = Timeout
gws.plugin.email_helper.SmtpConfig.timeout.purpose = SMTP connection timeout as a duration value. Defaults to 30 seconds.
gws.plugin.email_helper.SmtpConfig.timeout.complexity = advanced
