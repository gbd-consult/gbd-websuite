# UX-Strings for the model-widget plugins.
#
# Eine ux.ini deckt alle Widget-Typen.
# Hier werden die Top-Level-Configs poliert; Object/Props bleiben mit
# bootstrap-Defaults.

[de]

# --- input -----------------------------------------------------------------

gws.plugin.model_widget.input.Config.label = Texteingabe
gws.plugin.model_widget.input.Config.purpose = Generisches Eingabe-Widget für einzeilige Texte. Standard für Text- und ID-Felder.
gws.plugin.model_widget.input.Config.complexity = basic
gws.plugin.model_widget.input.Config.useCases = Namen, Bezeichnungen, freie Eingaben.

gws.plugin.model_widget.input.Config.placeholder.label = Platzhalter
gws.plugin.model_widget.input.Config.placeholder.purpose = Hinweistext im leeren Eingabefeld.
gws.plugin.model_widget.input.Config.placeholder.example = "Bitte Namen eingeben"

# --- textarea --------------------------------------------------------------

gws.plugin.model_widget.textarea.Config.label = Mehrzeiliger Text
gws.plugin.model_widget.textarea.Config.purpose = Eingabe-Widget für mehrzeilige Texte. Geeignet für längere Beschreibungen oder Notizen.
gws.plugin.model_widget.textarea.Config.complexity = basic

gws.plugin.model_widget.textarea.Config.height.label = Höhe
gws.plugin.model_widget.textarea.Config.height.purpose = Höhe der Textarea in Pixeln.
gws.plugin.model_widget.textarea.Config.height.example = 120

gws.plugin.model_widget.textarea.Config.placeholder.label = Platzhalter
gws.plugin.model_widget.textarea.Config.placeholder.purpose = Hinweistext im leeren Eingabefeld.

# --- password --------------------------------------------------------------

gws.plugin.model_widget.password.Config.label = Passwort-Eingabe
gws.plugin.model_widget.password.Config.purpose = Eingabe-Widget für Passwörter. Maskiert die Eingabe und bietet optional einen „Passwort anzeigen"-Schalter.
gws.plugin.model_widget.password.Config.complexity = basic
gws.plugin.model_widget.password.Config.useCases = Login-Formulare, Passwort-Änderung in Benutzer-Modellen.

gws.plugin.model_widget.password.Config.placeholder.label = Platzhalter
gws.plugin.model_widget.password.Config.placeholder.purpose = Hinweistext im leeren Eingabefeld.

gws.plugin.model_widget.password.Config.withShow.label = Anzeige-Button
gws.plugin.model_widget.password.Config.withShow.purpose = Blendet einen „Passwort anzeigen"-Button ein.

# --- hidden ----------------------------------------------------------------

gws.plugin.model_widget.hidden.Config.label = Verstecktes Feld
gws.plugin.model_widget.hidden.Config.purpose = Versteckt das Feld im Editierformular, hält den Wert aber im Datensatz. Praktisch für interne IDs oder vorab gesetzte Werte.
gws.plugin.model_widget.hidden.Config.complexity = basic

# --- integer ---------------------------------------------------------------

gws.plugin.model_widget.integer.Config.label = Ganzzahl-Eingabe
gws.plugin.model_widget.integer.Config.purpose = Spezialisiertes Eingabe-Widget für ganze Zahlen mit optionalen Schrittweiten.
gws.plugin.model_widget.integer.Config.complexity = basic

gws.plugin.model_widget.integer.Config.placeholder.label = Platzhalter
gws.plugin.model_widget.integer.Config.placeholder.purpose = Hinweistext im leeren Eingabefeld.

gws.plugin.model_widget.integer.Config.step.label = Schrittweite
gws.plugin.model_widget.integer.Config.step.purpose = Schrittweite der Plus-/Minus-Buttons.
gws.plugin.model_widget.integer.Config.step.example = 1

# --- float -----------------------------------------------------------------

gws.plugin.model_widget.float.Config.label = Dezimalzahl-Eingabe
gws.plugin.model_widget.float.Config.purpose = Spezialisiertes Eingabe-Widget für Fließkommazahlen.
gws.plugin.model_widget.float.Config.complexity = basic

gws.plugin.model_widget.float.Config.placeholder.label = Platzhalter
gws.plugin.model_widget.float.Config.placeholder.purpose = Hinweistext im leeren Eingabefeld.

gws.plugin.model_widget.float.Config.step.label = Schrittweite
gws.plugin.model_widget.float.Config.step.purpose = Schrittweite der Plus-/Minus-Buttons.
gws.plugin.model_widget.float.Config.step.example = 0.1

# --- toggle ----------------------------------------------------------------

gws.plugin.model_widget.toggle.Config.label = Schalter
gws.plugin.model_widget.toggle.Config.purpose = Boolean-Widget als Checkbox oder Radio-Schalter. Standard-Editor für Wahrheitswert-Felder.
gws.plugin.model_widget.toggle.Config.complexity = basic

gws.plugin.model_widget.toggle.Config.kind.label = Darstellungsart
gws.plugin.model_widget.toggle.Config.kind.purpose = Visuelle Form: `checkbox` oder `radio`.
gws.plugin.model_widget.toggle.Config.kind.example = "checkbox"

# --- date ------------------------------------------------------------------

gws.plugin.model_widget.date.Config.label = Datums-Picker
gws.plugin.model_widget.date.Config.purpose = Kalender-Widget zur Auswahl eines Datums. Standard-Editor für Datums-, Datetime- und Zeit-Felder.
gws.plugin.model_widget.date.Config.complexity = basic

# --- select ----------------------------------------------------------------

gws.plugin.model_widget.select.Config.label = Auswahl-Liste
gws.plugin.model_widget.select.Config.purpose = Dropdown-Widget mit fester Werteliste. Erlaubt optional ein Suchfeld bei langen Listen.
gws.plugin.model_widget.select.Config.complexity = basic
gws.plugin.model_widget.select.Config.useCases = Statuswerte (offen/geschlossen), Kategorien, Aufzählungen.

gws.plugin.model_widget.select.Config.items.label = Auswahleinträge
gws.plugin.model_widget.select.Config.items.purpose = Liste der wählbaren Einträge.

gws.plugin.model_widget.select.Config.withSearch.label = Mit Suche
gws.plugin.model_widget.select.Config.withSearch.purpose = Blendet ein Suchfeld über der Liste ein. Hilfreich bei mehr als ca. 10 Einträgen.

gws.plugin.model_widget.select.ListItemConfig.label = Listeneintrag
gws.plugin.model_widget.select.ListItemConfig.purpose = Konfiguration eines einzelnen Eintrags in der Auswahl-Liste.

gws.plugin.model_widget.select.ListItemConfig.value.label = Wert
gws.plugin.model_widget.select.ListItemConfig.value.purpose = Wert, der beim Speichern in das Modellfeld geschrieben wird.
gws.plugin.model_widget.select.ListItemConfig.value.complexity = basic

gws.plugin.model_widget.select.ListItemConfig.text.label = Anzeigetext
gws.plugin.model_widget.select.ListItemConfig.text.purpose = Sichtbarer Text in der Liste.
gws.plugin.model_widget.select.ListItemConfig.text.complexity = basic

gws.plugin.model_widget.select.ListItemConfig.extraText.label = Zusatztext
gws.plugin.model_widget.select.ListItemConfig.extraText.purpose = Optionaler Zusatztext, z. B. eine Beschreibung oder ein Code.

gws.plugin.model_widget.select.ListItemConfig.level.label = Hierarchie-Ebene
gws.plugin.model_widget.select.ListItemConfig.level.purpose = Optionale Einrückungs-Ebene für hierarchische Listen.
gws.plugin.model_widget.select.ListItemConfig.level.complexity = advanced

gws.plugin.model_widget.select.ListItem.label = Listeneintrag (Laufzeit)
gws.plugin.model_widget.select.ListItem.purpose = Aufgelöster Listeneintrag, wie er an den Client gesendet wird.

gws.plugin.model_widget.select.ListItem.value.label = Wert
gws.plugin.model_widget.select.ListItem.text.label = Anzeigetext
gws.plugin.model_widget.select.ListItem.extraText.label = Zusatztext
gws.plugin.model_widget.select.ListItem.level.label = Hierarchie-Ebene

# --- file ------------------------------------------------------------------

gws.plugin.model_widget.file.Config.label = Datei-Upload
gws.plugin.model_widget.file.Config.purpose = Upload-Widget für Datei-Felder. Erlaubt Hochladen, Vorschau und Download einer einzelnen Datei.
gws.plugin.model_widget.file.Config.complexity = intermediate
gws.plugin.model_widget.file.Config.seeAlso = gws.plugin.model_field.file.Config

# --- file_list ------------------------------------------------------------

gws.plugin.model_widget.file_list.Config.label = Datei-Liste
gws.plugin.model_widget.file_list.Config.purpose = Listen-Widget für mehrere Dateianhänge an einem Datensatz. Verbindet das Hauptmodell mit einer 1:N-Relation auf ein Dateimodell.
gws.plugin.model_widget.file_list.Config.complexity = advanced
gws.plugin.model_widget.file_list.Config.useCases = Mehrere Fotos pro Inspektionsobjekt, Aktenanhänge zu einem Vorgang.

gws.plugin.model_widget.file_list.Config.toFileField.label = Dateifeld im Zielmodell
gws.plugin.model_widget.file_list.Config.toFileField.purpose = Name des `file`-Felds im verknüpften Zielmodell, das die hochgeladene Datei aufnimmt.
gws.plugin.model_widget.file_list.Config.toFileField.complexity = advanced

# --- feature_list (Editor für 1:N / M:N-Listen) ---------------------------

gws.plugin.model_widget.feature_list.Config.label = Feature-Liste
gws.plugin.model_widget.feature_list.Config.purpose = Listen-Editor für verknüpfte Datensätze (1:N oder M:N). Stellt Buttons für Anlegen, Bearbeiten, Löschen sowie Verknüpfen/Lösen zur Verfügung.
gws.plugin.model_widget.feature_list.Config.complexity = intermediate
gws.plugin.model_widget.feature_list.Config.useCases = Editor für `related_feature_list`- oder `related_linked_feature_list`-Felder.

gws.plugin.model_widget.feature_list.Config.withNewButton.label = Anlegen-Button
gws.plugin.model_widget.feature_list.Config.withNewButton.purpose = Zeigt einen Button zum Anlegen eines neuen verknüpften Datensatzes.
gws.plugin.model_widget.feature_list.Config.withNewButton.complexity = basic

gws.plugin.model_widget.feature_list.Config.withEditButton.label = Bearbeiten-Button
gws.plugin.model_widget.feature_list.Config.withEditButton.purpose = Zeigt einen Button zum Bearbeiten eines verknüpften Datensatzes.
gws.plugin.model_widget.feature_list.Config.withEditButton.complexity = basic

gws.plugin.model_widget.feature_list.Config.withDeleteButton.label = Löschen-Button
gws.plugin.model_widget.feature_list.Config.withDeleteButton.purpose = Zeigt einen Button, der den verknüpften Datensatz dauerhaft löscht.
gws.plugin.model_widget.feature_list.Config.withDeleteButton.complexity = basic

gws.plugin.model_widget.feature_list.Config.withLinkButton.label = Verknüpfen-Button
gws.plugin.model_widget.feature_list.Config.withLinkButton.purpose = Zeigt einen Button zum Verknüpfen eines bestehenden Datensatzes.

gws.plugin.model_widget.feature_list.Config.withUnlinkButton.label = Lösen-Button
gws.plugin.model_widget.feature_list.Config.withUnlinkButton.purpose = Zeigt einen Button zum Lösen einer Verknüpfung, ohne den Zieldatensatz zu löschen.

# --- feature_select --------------------------------------------------------

gws.plugin.model_widget.feature_select.Config.label = Feature-Auswahl
gws.plugin.model_widget.feature_select.Config.purpose = Dropdown-Editor für Einzel-Beziehungs-Felder. Lädt die Auswahl-Optionen aus dem Zielmodell.
gws.plugin.model_widget.feature_select.Config.complexity = intermediate
gws.plugin.model_widget.feature_select.Config.useCases = Editor für `related_feature`-Felder mit kleiner bis mittlerer Auswahlmenge.

gws.plugin.model_widget.feature_select.Config.withSearch.label = Mit Suche
gws.plugin.model_widget.feature_select.Config.withSearch.purpose = Blendet ein Suchfeld über der Liste ein.

# --- feature_suggest -------------------------------------------------------

gws.plugin.model_widget.feature_suggest.Config.label = Feature-Vorschlag
gws.plugin.model_widget.feature_suggest.Config.purpose = Autocomplete-Editor für Beziehungs-Felder. Lädt Vorschläge nach Tipp-Eingabe — geeignet für große Zielmengen.
gws.plugin.model_widget.feature_suggest.Config.complexity = advanced
gws.plugin.model_widget.feature_suggest.Config.useCases = Editor für `related_feature` mit Tausenden von Zielobjekten (z. B. Adress-Auswahl).

# --- geometry --------------------------------------------------------------

gws.plugin.model_widget.geometry.Config.label = Geometrie-Editor
gws.plugin.model_widget.geometry.Config.purpose = Editor-Widget für Geometrie-Felder. Erlaubt das Zeichnen, Verschieben und Bearbeiten von Geometrien direkt im Karten-Client.
gws.plugin.model_widget.geometry.Config.complexity = intermediate

gws.plugin.model_widget.geometry.Config.isInline.label = Inline darstellen
gws.plugin.model_widget.geometry.Config.isInline.purpose = Bettet den Geometrie-Editor direkt im Editierformular ein, statt einen Vollbild-Modus zu öffnen.

gws.plugin.model_widget.geometry.Config.withText.label = Mit Texteditor
gws.plugin.model_widget.geometry.Config.withText.purpose = Blendet zusätzlich einen Texteditor für WKT-/GeoJSON-Eingabe ein.
gws.plugin.model_widget.geometry.Config.withText.complexity = advanced


