[en]

# === WMS client =============================================================

gws.plugin.ows_client.wms.provider.Config.label = WMS provider
gws.plugin.ows_client.wms.provider.Config.purpose = Connection to an external WMS service. Loads the capabilities and exposes source layers for map and search layers.
gws.plugin.ows_client.wms.provider.Config.whenToUse = When map layers from a third-party WMS (e.g. portals, SDI) should be embedded.
gws.plugin.ows_client.wms.provider.Config.complexity = basic
gws.plugin.ows_client.wms.provider.Config.useCases = Embedding WMS services from other agencies, SDI background maps, open-data layers.
gws.plugin.ows_client.wms.provider.Config.example = "https://example.org/wms?service=WMS"

gws.plugin.ows_client.wms.provider.Config.bottomFirst.label = Reverse layer order
gws.plugin.ows_client.wms.provider.Config.bottomFirst.purpose = Enable when the WMS lists its layers from bottom to top in the capabilities (against the WMS convention).
gws.plugin.ows_client.wms.provider.Config.bottomFirst.complexity = advanced

gws.plugin.ows_client.wms.layer.Config.label = WMS tree layer
gws.plugin.ows_client.wms.layer.Config.purpose = Embeds a WMS as a layer tree. The capabilities-layer hierarchy is preserved.
gws.plugin.ows_client.wms.layer.Config.whenToUse = When the layer structure of the WMS service should be mirrored in the WebSuite.
gws.plugin.ows_client.wms.layer.Config.complexity = basic

gws.plugin.ows_client.wms.layer.Config.provider.label = WMS provider
gws.plugin.ows_client.wms.layer.Config.provider.purpose = Inline configuration or reference to a WMS provider.

gws.plugin.ows_client.wms.flatlayer.Config.label = Flat WMS layer
gws.plugin.ows_client.wms.flatlayer.Config.purpose = Embeds selected WMS source layers as a single flat layer.
gws.plugin.ows_client.wms.flatlayer.Config.whenToUse = When only specific layers of a WMS are needed and the hierarchy is irrelevant.
gws.plugin.ows_client.wms.flatlayer.Config.complexity = basic

gws.plugin.ows_client.wms.flatlayer.Config.provider.label = WMS provider
gws.plugin.ows_client.wms.flatlayer.Config.provider.purpose = Inline configuration or reference to a WMS provider.

gws.plugin.ows_client.wms.flatlayer.Config.sourceLayers.label = Source-layer filter
gws.plugin.ows_client.wms.flatlayer.Config.sourceLayers.purpose = List or filter of source layers to use from the WMS capabilities.

gws.plugin.ows_client.wms.finder.Config.label = WMS search
gws.plugin.ows_client.wms.finder.Config.purpose = Search adapter that issues GetFeatureInfo requests against a WMS.
gws.plugin.ows_client.wms.finder.Config.whenToUse = When click-based attribute queries via WMS GetFeatureInfo should be available.
gws.plugin.ows_client.wms.finder.Config.complexity = intermediate

gws.plugin.ows_client.wms.finder.Config.provider.label = WMS provider
gws.plugin.ows_client.wms.finder.Config.provider.purpose = Inline configuration or reference to a WMS provider.

gws.plugin.ows_client.wms.finder.Config.sourceLayers.label = Source layers
gws.plugin.ows_client.wms.finder.Config.sourceLayers.purpose = List of source layers GetFeatureInfo is issued against.

gws.plugin.ows_client.wms.model.Config.label = WMS data model
gws.plugin.ows_client.wms.model.Config.purpose = Data-model configuration for WMS GetFeatureInfo responses.
gws.plugin.ows_client.wms.model.Config.complexity = intermediate

gws.plugin.ows_client.wms.model.Config.provider.label = WMS provider
gws.plugin.ows_client.wms.model.Config.provider.purpose = Inline configuration or reference to a WMS provider.

gws.plugin.ows_client.wms.model.Config.sourceLayers.label = Source layers
gws.plugin.ows_client.wms.model.Config.sourceLayers.purpose = List of source layers whose GetFeatureInfo responses are modelled.

# === WMTS client ============================================================

gws.plugin.ows_client.wmts.provider.Config.label = WMTS provider
gws.plugin.ows_client.wmts.provider.Config.purpose = Connection to an external WMTS tile service. Reads the capabilities and exposes TileMatrixSets.
gws.plugin.ows_client.wmts.provider.Config.whenToUse = When background or thematic maps should be embedded as WMTS tiles.
gws.plugin.ows_client.wmts.provider.Config.complexity = basic

gws.plugin.ows_client.wmts.provider.Config.grid.label = Source grid
gws.plugin.ows_client.wmts.provider.Config.grid.purpose = Tile grid of the source service (TileMatrixSet selection).
gws.plugin.ows_client.wmts.provider.Config.grid.complexity = advanced

gws.plugin.ows_client.wmts.layer.Config.label = WMTS layer
gws.plugin.ows_client.wmts.layer.Config.purpose = Embeds a WMTS layer into a map.
gws.plugin.ows_client.wmts.layer.Config.complexity = basic

gws.plugin.ows_client.wmts.layer.Config.provider.label = WMTS provider
gws.plugin.ows_client.wmts.layer.Config.provider.purpose = Inline configuration or reference to a WMTS provider.

gws.plugin.ows_client.wmts.layer.Config.display.label = Display mode
gws.plugin.ows_client.wmts.layer.Config.display.purpose = Layer display mode (e.g. tile, client).

gws.plugin.ows_client.wmts.layer.Config.sourceLayers.label = Source-layer filter
gws.plugin.ows_client.wmts.layer.Config.sourceLayers.purpose = Filter for the source layers to use from the WMTS capabilities.

gws.plugin.ows_client.wmts.layer.Config.style.label = Style name
gws.plugin.ows_client.wmts.layer.Config.style.purpose = Name of the style offered by the WMTS.
gws.plugin.ows_client.wmts.layer.Config.style.example = "default"

