# UX-Strings für Web-Server, Sites und SSL.
#
# Behandelt alle gws.base.web.*-Klassen:
#   - manager.Config: Wrapper über die Site-Liste
#   - site.Config:    Virtueller Host (Hostname, Doc-Roots, Rewrites)
#   - site.SSLConfig: TLS-Zertifikat
#   - site.WebDirConfig: einzelnes Web-Verzeichnis-Mapping
#   - site.CorsConfig: CORS-Header pro Site
#   - site.RewriteRuleConfig: URL-Rewriting
#   - action.*: Web-Asset/File-Action

[de]

gws.base.web.manager.Config.label = Web-Server
gws.base.web.manager.Config.purpose = Konfiguration des HTTP-Servers — Liste der Sites (virtuelle Hosts) und globale TLS-Einstellungen.
gws.base.web.manager.Config.complexity = intermediate
gws.base.web.manager.Config.sites.label = Sites
gws.base.web.manager.Config.sites.purpose = Liste der virtuellen Hosts. Jede Site definiert einen Hostname, Doc-Roots und ggf. SSL.
gws.base.web.manager.Config.ssl.label = TLS / SSL
gws.base.web.manager.Config.ssl.purpose = Zertifikate für HTTPS-Verbindungen, falls die WebSuite direkt mit TLS antwortet.
gws.base.web.manager.Config.ssl.complexity = advanced

gws.base.web.site.Config.label = Site
gws.base.web.site.Config.purpose = Virtueller Host — bündelt Hostname, statische Verzeichnisse, Rewriting-Regeln und CORS-Einstellungen.
gws.base.web.site.Config.whenToUse = Pro öffentlich erreichbarem Hostname eine Site. Für lokale Entwicklung reicht meist ein „*"-Host.
gws.base.web.site.Config.complexity = intermediate
gws.base.web.site.Config.assets.label = Assets-Verzeichnis
gws.base.web.site.Config.assets.purpose = Wurzel-Verzeichnis für hochgeladene oder mitgelieferte Assets (Bilder, PDFs, …).
gws.base.web.site.Config.assets.example = "/data/assets"
gws.base.web.site.Config.canonicalHost.label = Kanonischer Hostname
gws.base.web.site.Config.canonicalHost.purpose = Hostname, der für reverse URL-Rewrites verwendet wird (wichtig hinter Reverse-Proxies).
gws.base.web.site.Config.canonicalHost.example = "gws.example.com"
gws.base.web.site.Config.contentSecurityPolicy.label = Content-Security-Policy
gws.base.web.site.Config.contentSecurityPolicy.purpose = HTTP-Header zur Begrenzung erlaubter Skript-/Asset-Quellen.
gws.base.web.site.Config.contentSecurityPolicy.complexity = advanced
gws.base.web.site.Config.cors.label = CORS-Einstellungen
gws.base.web.site.Config.cors.purpose = Cross-Origin-Resource-Sharing-Header für API-Zugriff aus fremden Domains.
gws.base.web.site.Config.cors.complexity = advanced
gws.base.web.site.Config.errorPage.label = Fehlerseite
gws.base.web.site.Config.errorPage.purpose = Template, das für HTTP-Fehler (404, 500, …) gerendert wird.
gws.base.web.site.Config.host.label = Hostname
gws.base.web.site.Config.host.purpose = Hostname, auf den diese Site reagiert. „*" akzeptiert alle Hosts.
gws.base.web.site.Config.host.example = "gws.example.com"
gws.base.web.site.Config.host.complexity = basic
gws.base.web.site.Config.permissionsPolicy.label = Permissions-Policy
gws.base.web.site.Config.permissionsPolicy.purpose = HTTP-Header, der Browser-Features (Camera, Geolocation, …) erlaubt oder sperrt.
gws.base.web.site.Config.permissionsPolicy.complexity = advanced
gws.base.web.site.Config.rewrite.label = Rewrite-Regeln
gws.base.web.site.Config.rewrite.purpose = URL-Rewriting für saubere Pfade oder API-Routen.
gws.base.web.site.Config.rewrite.complexity = advanced
gws.base.web.site.Config.root.label = Doc-Root
gws.base.web.site.Config.root.purpose = Wurzel-Verzeichnis für statische Dateien dieser Site.
gws.base.web.site.Config.root.example = "/data/web/site1"
gws.base.web.site.Config.useForwardedHost.label = X-Forwarded-Host beachten
gws.base.web.site.Config.useForwardedHost.purpose = Wenn aktiv, wird der Hostname aus dem X-Forwarded-Host-Header gelesen — wichtig hinter Reverse-Proxies.
gws.base.web.site.Config.useForwardedHost.complexity = intermediate

gws.base.web.site.SSLConfig.label = SSL-Zertifikat
gws.base.web.site.SSLConfig.purpose = TLS-Zertifikat und Schlüssel für HTTPS-Verbindungen. Pflicht, wenn die Site direkt HTTPS bedient (statt hinter einem Reverse-Proxy zu hängen).
gws.base.web.site.SSLConfig.complexity = advanced
gws.base.web.site.SSLConfig.crt.label = Zertifikat-Datei
gws.base.web.site.SSLConfig.crt.purpose = Pfad zur Zertifikat-Datei (PEM, ggf. mit Bundle).
gws.base.web.site.SSLConfig.crt.example = "/data/ssl/server.crt"
gws.base.web.site.SSLConfig.hsts.label = HSTS Max-Age
gws.base.web.site.SSLConfig.hsts.purpose = Strict-Transport-Security-Header — wie lange Browser auf HTTPS bestehen sollen (in Sekunden).
gws.base.web.site.SSLConfig.hsts.example = 31536000
gws.base.web.site.SSLConfig.key.label = Schlüssel-Datei
gws.base.web.site.SSLConfig.key.purpose = Pfad zur privaten Schlüssel-Datei.
gws.base.web.site.SSLConfig.key.example = "/data/ssl/server.key"

gws.base.web.site.WebDirConfig.label = Web-Verzeichnis
gws.base.web.site.WebDirConfig.purpose = Einzelnes statisches Verzeichnis, das unter einer URL freigegeben wird.
gws.base.web.site.WebDirConfig.allowMime.label = Erlaubte MIME-Typen
gws.base.web.site.WebDirConfig.allowMime.purpose = Whitelist von Content-Types, die ausgeliefert werden.
gws.base.web.site.WebDirConfig.allowMime.example = ["image/png", "image/jpeg"]
gws.base.web.site.WebDirConfig.denyMime.label = Gesperrte MIME-Typen
gws.base.web.site.WebDirConfig.denyMime.purpose = Zusätzliche Sperrliste oberhalb der Standard-Sperrliste.
gws.base.web.site.WebDirConfig.dir.label = Verzeichnis-Pfad
gws.base.web.site.WebDirConfig.dir.purpose = Pfad zum freigegebenen Verzeichnis.
gws.base.web.site.WebDirConfig.dir.example = "/data/uploads"

gws.base.web.site.CorsConfig.label = CORS-Einstellungen
gws.base.web.site.CorsConfig.purpose = Cross-Origin-Header pro Site, damit JavaScript aus fremden Domains die API ansprechen darf.
gws.base.web.site.CorsConfig.complexity = advanced
gws.base.web.site.CorsConfig.allowCredentials.label = Credentials erlauben
gws.base.web.site.CorsConfig.allowCredentials.purpose = Setzt den Header Access-Control-Allow-Credentials. Pflicht für Cookie-basierten Login über Cross-Origin.
gws.base.web.site.CorsConfig.allowHeaders.label = Erlaubte Header
gws.base.web.site.CorsConfig.allowHeaders.purpose = Liste der erlaubten Request-Header.
gws.base.web.site.CorsConfig.allowMethods.label = Erlaubte Methoden
gws.base.web.site.CorsConfig.allowMethods.purpose = HTTP-Methoden, die im Cross-Origin-Kontext erlaubt sind.
gws.base.web.site.CorsConfig.allowMethods.example = ["GET", "POST"]
gws.base.web.site.CorsConfig.allowOrigin.label = Erlaubte Herkunft
gws.base.web.site.CorsConfig.allowOrigin.purpose = Wert für Access-Control-Allow-Origin. „*" akzeptiert alle, alternativ konkrete Domain.
gws.base.web.site.CorsConfig.maxAge.label = Cache-Dauer
gws.base.web.site.CorsConfig.maxAge.purpose = Wert für Access-Control-Max-Age (Sekunden), wie lange Preflight-Antworten gecacht werden.

gws.base.web.site.RewriteRuleConfig.label = Rewrite-Regel
gws.base.web.site.RewriteRuleConfig.purpose = Eine einzelne URL-Rewrite-Regel. Hilfreich für saubere API-Pfade oder Legacy-URL-Erhalt.
gws.base.web.site.RewriteRuleConfig.complexity = advanced
gws.base.web.site.RewriteRuleConfig.options.label = Optionen
gws.base.web.site.RewriteRuleConfig.options.purpose = Zusätzliche Optionen wie HTTP-Status-Code für Redirects.
gws.base.web.site.RewriteRuleConfig.pattern.label = Pattern
gws.base.web.site.RewriteRuleConfig.pattern.purpose = Regulärer Ausdruck, gegen den die URL geprüft wird.
gws.base.web.site.RewriteRuleConfig.pattern.example = "^/api/v1/(.*)"
gws.base.web.site.RewriteRuleConfig.reversed.label = Reverse-Modus
gws.base.web.site.RewriteRuleConfig.reversed.purpose = Wenn aktiv: die Regel wird auch beim URL-Generieren angewendet (Round-Trip).
gws.base.web.site.RewriteRuleConfig.target.label = Ziel
gws.base.web.site.RewriteRuleConfig.target.purpose = Ziel-URL mit Platzhaltern aus dem Pattern.
gws.base.web.site.RewriteRuleConfig.target.example = "/_/$1"

gws.base.web.action.Config.label = Web-Asset-Aktion
gws.base.web.action.Config.purpose = Server-Aktion, die Asset- und File-Downloads ausliefert (typisch unter /_/webAsset).
gws.base.web.action.Config.complexity = intermediate

# --- action Request schemas ----------------------------------------------

gws.base.web.action.AssetRequest.path.label = Asset-Pfad
gws.base.web.action.AssetRequest.path.purpose = Pfad des angeforderten Assets relativ zum Asset-Wurzelverzeichnis.

gws.base.web.action.FileRequest.featureUid.label = Feature-UID
gws.base.web.action.FileRequest.featureUid.purpose = UID des Features, von dem die Datei stammt.

gws.base.web.action.FileRequest.fieldName.label = Feldname
gws.base.web.action.FileRequest.fieldName.purpose = Name des Modellfeldes, das die Datei enthält.

gws.base.web.action.FileRequest.modelUid.label = Modell-UID
gws.base.web.action.FileRequest.modelUid.purpose = UID des Datenmodells.

gws.base.web.action.FileRequest.preview.label = Vorschau
gws.base.web.action.FileRequest.preview.purpose = Wenn aktiv, wird eine kleine Vorschau anstelle der Originaldatei geliefert.

[en]

gws.base.web.manager.Config.label = Web server
gws.base.web.manager.Config.purpose = HTTP server configuration — list of sites (virtual hosts) and global TLS settings.
gws.base.web.manager.Config.complexity = intermediate
gws.base.web.manager.Config.sites.label = Sites
gws.base.web.manager.Config.sites.purpose = List of virtual hosts. Each site defines a hostname, doc roots and optional SSL.
gws.base.web.manager.Config.ssl.label = TLS / SSL
gws.base.web.manager.Config.ssl.purpose = Certificates for HTTPS connections when the WebSuite serves TLS directly.
gws.base.web.manager.Config.ssl.complexity = advanced

gws.base.web.site.Config.label = Site
gws.base.web.site.Config.purpose = Virtual host — bundles hostname, static directories, rewriting rules and CORS settings.
gws.base.web.site.Config.whenToUse = One site per publicly reachable hostname. Local development typically uses a single "*" host.
gws.base.web.site.Config.complexity = intermediate
gws.base.web.site.Config.assets.label = Assets directory
gws.base.web.site.Config.assets.purpose = Root directory for uploaded or shipped assets (images, PDFs, …).
gws.base.web.site.Config.assets.example = "/data/assets"
gws.base.web.site.Config.canonicalHost.label = Canonical host
gws.base.web.site.Config.canonicalHost.purpose = Hostname used for reverse URL rewrites (relevant behind reverse proxies).
gws.base.web.site.Config.canonicalHost.example = "gws.example.com"
gws.base.web.site.Config.contentSecurityPolicy.label = Content Security Policy
gws.base.web.site.Config.contentSecurityPolicy.purpose = HTTP header restricting allowed script/asset origins.
gws.base.web.site.Config.contentSecurityPolicy.complexity = advanced
gws.base.web.site.Config.cors.label = CORS settings
gws.base.web.site.Config.cors.purpose = Cross-origin headers for API access from foreign domains.
gws.base.web.site.Config.cors.complexity = advanced
gws.base.web.site.Config.errorPage.label = Error page
gws.base.web.site.Config.errorPage.purpose = Template rendered for HTTP errors (404, 500, …).
gws.base.web.site.Config.host.label = Hostname
gws.base.web.site.Config.host.purpose = Hostname this site responds to. "*" accepts any host.
gws.base.web.site.Config.host.example = "gws.example.com"
gws.base.web.site.Config.host.complexity = basic
gws.base.web.site.Config.permissionsPolicy.label = Permissions Policy
gws.base.web.site.Config.permissionsPolicy.purpose = HTTP header allowing or blocking browser features (camera, geolocation, …).
gws.base.web.site.Config.permissionsPolicy.complexity = advanced
gws.base.web.site.Config.rewrite.label = Rewrite rules
gws.base.web.site.Config.rewrite.purpose = URL rewriting for clean paths or API routes.
gws.base.web.site.Config.rewrite.complexity = advanced
gws.base.web.site.Config.root.label = Doc root
gws.base.web.site.Config.root.purpose = Root directory for static files of this site.
gws.base.web.site.Config.root.example = "/data/web/site1"
gws.base.web.site.Config.useForwardedHost.label = Honor X-Forwarded-Host
gws.base.web.site.Config.useForwardedHost.purpose = When set, the hostname is read from X-Forwarded-Host — relevant behind reverse proxies.
gws.base.web.site.Config.useForwardedHost.complexity = intermediate

gws.base.web.site.SSLConfig.label = SSL certificate
gws.base.web.site.SSLConfig.purpose = TLS certificate and key for HTTPS connections. Required when the site terminates TLS directly (rather than running behind a reverse proxy).
gws.base.web.site.SSLConfig.complexity = advanced
gws.base.web.site.SSLConfig.crt.label = Certificate file
gws.base.web.site.SSLConfig.crt.purpose = Path to the certificate file (PEM, optionally with bundle).
gws.base.web.site.SSLConfig.crt.example = "/data/ssl/server.crt"
gws.base.web.site.SSLConfig.hsts.label = HSTS max age
gws.base.web.site.SSLConfig.hsts.purpose = Strict-Transport-Security max-age (seconds) — how long browsers should insist on HTTPS.
gws.base.web.site.SSLConfig.hsts.example = 31536000
gws.base.web.site.SSLConfig.key.label = Private key file
gws.base.web.site.SSLConfig.key.purpose = Path to the private key file.
gws.base.web.site.SSLConfig.key.example = "/data/ssl/server.key"

gws.base.web.site.WebDirConfig.label = Web directory
gws.base.web.site.WebDirConfig.purpose = Single static directory exposed under a URL.
gws.base.web.site.WebDirConfig.allowMime.label = Allowed MIME types
gws.base.web.site.WebDirConfig.allowMime.purpose = Allow-list of content types that may be served.
gws.base.web.site.WebDirConfig.allowMime.example = ["image/png", "image/jpeg"]
gws.base.web.site.WebDirConfig.denyMime.label = Denied MIME types
gws.base.web.site.WebDirConfig.denyMime.purpose = Additional deny-list on top of the standard deny list.
gws.base.web.site.WebDirConfig.dir.label = Directory path
gws.base.web.site.WebDirConfig.dir.purpose = Path to the served directory.
gws.base.web.site.WebDirConfig.dir.example = "/data/uploads"

gws.base.web.site.CorsConfig.label = CORS settings
gws.base.web.site.CorsConfig.purpose = Cross-origin headers per site so JavaScript from foreign domains may call the API.
gws.base.web.site.CorsConfig.complexity = advanced
gws.base.web.site.CorsConfig.allowCredentials.label = Allow credentials
gws.base.web.site.CorsConfig.allowCredentials.purpose = Sets the Access-Control-Allow-Credentials header. Required for cookie-based login across origins.
gws.base.web.site.CorsConfig.allowHeaders.label = Allowed headers
gws.base.web.site.CorsConfig.allowHeaders.purpose = List of allowed request headers.
gws.base.web.site.CorsConfig.allowMethods.label = Allowed methods
gws.base.web.site.CorsConfig.allowMethods.purpose = HTTP methods allowed in the cross-origin context.
gws.base.web.site.CorsConfig.allowMethods.example = ["GET", "POST"]
gws.base.web.site.CorsConfig.allowOrigin.label = Allowed origin
gws.base.web.site.CorsConfig.allowOrigin.purpose = Value of Access-Control-Allow-Origin. "*" accepts any, otherwise a concrete domain.
gws.base.web.site.CorsConfig.maxAge.label = Cache duration
gws.base.web.site.CorsConfig.maxAge.purpose = Access-Control-Max-Age (seconds) — how long preflight responses are cached.

gws.base.web.site.RewriteRuleConfig.label = Rewrite rule
gws.base.web.site.RewriteRuleConfig.purpose = Single URL rewrite rule. Helpful for clean API paths or legacy URL preservation.
gws.base.web.site.RewriteRuleConfig.complexity = advanced
gws.base.web.site.RewriteRuleConfig.options.label = Options
gws.base.web.site.RewriteRuleConfig.options.purpose = Extra options like HTTP status code for redirects.
gws.base.web.site.RewriteRuleConfig.pattern.label = Pattern
gws.base.web.site.RewriteRuleConfig.pattern.purpose = Regular expression matched against the URL.
gws.base.web.site.RewriteRuleConfig.pattern.example = "^/api/v1/(.*)"
gws.base.web.site.RewriteRuleConfig.reversed.label = Reverse mode
gws.base.web.site.RewriteRuleConfig.reversed.purpose = When set: the rule is also applied during URL generation (round-trip).
gws.base.web.site.RewriteRuleConfig.target.label = Target
gws.base.web.site.RewriteRuleConfig.target.purpose = Target URL with placeholders from the pattern.
gws.base.web.site.RewriteRuleConfig.target.example = "/_/$1"

gws.base.web.action.Config.label = Web asset action
gws.base.web.action.Config.purpose = Server action serving asset and file downloads (typically under /_/webAsset).
gws.base.web.action.Config.complexity = intermediate

# --- action Request schemas ----------------------------------------------

gws.base.web.action.AssetRequest.path.label = Asset path
gws.base.web.action.FileRequest.featureUid.label = Feature UID
gws.base.web.action.FileRequest.fieldName.label = Field name
gws.base.web.action.FileRequest.modelUid.label = Model UID
gws.base.web.action.FileRequest.preview.label = Preview
