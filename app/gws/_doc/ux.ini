# UX-Strings für die zentralen gws.*-Klassen.
#
# Diese Klassen sind in app/gws/__init__.pyinc und seinen .pyinc-Includes
# definiert und werden quer durch das Projekt geerbt. Eine Property hier
# zu pflegen wirkt sich auf alle Subklassen aus, die das Feld erben —
# der Konfigurator-Resolver löst über die Property-UID auf, die in der
# Spec einmalig pro Definition existiert.

[de]

# --- Berechtigungen --------------------------------------------------

gws.PermissionsConfig.label = Berechtigungen
gws.PermissionsConfig.purpose = Rollenbasierte Zugriffsrechte für ein Konfigurations-Objekt. Pro Operation kann eine Liste von Rollen oder ein boolescher Wert gesetzt werden.
gws.PermissionsConfig.whenToUse = Sobald differenzierte Rechte pro Layer, Aktion, Modell oder Projekt nötig sind, die über das einfache `access`-Feld hinausgehen.
gws.PermissionsConfig.complexity = advanced

gws.PermissionsConfig.read.label = Lesen
gws.PermissionsConfig.read.purpose = Recht, das Objekt zu lesen (Layer anzeigen, Suchergebnisse abrufen, Konfiguration einsehen).

gws.PermissionsConfig.write.label = Schreiben
gws.PermissionsConfig.write.purpose = Recht, das Objekt zu ändern (Editieren bestehender Features, Konfigurations-Änderungen).

gws.PermissionsConfig.create.label = Anlegen
gws.PermissionsConfig.create.purpose = Recht, neue Objekte anzulegen (z. B. Features in einem editierbaren Layer).

gws.PermissionsConfig.delete.label = Löschen
gws.PermissionsConfig.delete.purpose = Recht, Objekte zu löschen.

gws.PermissionsConfig.edit.label = Bearbeiten (Kombination)
gws.PermissionsConfig.edit.purpose = Kombiniertes Editier-Recht — entspricht write + create + delete in einem Eintrag.

gws.PermissionsConfig.all.label = Vollzugriff
gws.PermissionsConfig.all.purpose = Setzt alle anderen Rechte (read, write, create, delete) auf den hier angegebenen Wert. Praktisch für „Admins haben alle Rechte"-Setups.

# --- Zugriffsregeln (vereinfachte Form) ------------------------------

gws.AccessConfig.label = Zugriffsregeln
gws.AccessConfig.purpose = Vereinfachte Form von Zugriffsrechten als Liste „Rolle: erlauben/verweigern" — passt für die meisten Konfigurations-Klassen.
gws.AccessConfig.complexity = intermediate

# --- Standard-Felder von Config-Klassen ------------------------------

gws.Config.label = Konfiguration
gws.Config.purpose = Basis-Klasse jeder Konfigurations-Struktur. Trägt eine UID und ggf. einen Sub-Type-Discriminator.

gws.Config.uid.label = UID
gws.Config.uid.purpose = Eindeutiger Bezeichner. Wird in Querverweisen verwendet (z. B. dbUid). Wird automatisch vergeben, wenn nicht gesetzt.

gws.ConfigWithAccess.label = Konfiguration mit Zugriffsrechten
gws.ConfigWithAccess.purpose = Erweitert die Basis-Konfiguration um `access` und `permissions`. Wird von fast allen Top-Level-Klassen geerbt.

gws.ConfigWithAccess.access.label = Zugriff
gws.ConfigWithAccess.access.purpose = Einfache Zugriffsregeln (siehe AccessConfig). Definiert, welche Rollen dieses Objekt sehen oder benutzen dürfen.

gws.ConfigWithAccess.permissions.label = Erweiterte Berechtigungen
gws.ConfigWithAccess.permissions.purpose = Detaillierte rollenbasierte Berechtigungen pro Operation (siehe PermissionsConfig). Überschreibt das einfache `access`, wenn beide gesetzt sind.
gws.ConfigWithAccess.permissions.complexity = advanced

[en]

gws.PermissionsConfig.label = Permissions
gws.PermissionsConfig.purpose = Role-based access rights for a configuration object. A list of roles or a boolean value can be set per operation.
gws.PermissionsConfig.whenToUse = When per-layer, per-action, per-model or per-project rights are needed beyond the simple `access` field.
gws.PermissionsConfig.complexity = advanced

gws.PermissionsConfig.read.label = Read
gws.PermissionsConfig.read.purpose = Right to read the object (display the layer, fetch search results, inspect the config).

gws.PermissionsConfig.write.label = Write
gws.PermissionsConfig.write.purpose = Right to modify the object (edit existing features, change configuration).

gws.PermissionsConfig.create.label = Create
gws.PermissionsConfig.create.purpose = Right to create new objects (e.g. features in an editable layer).

gws.PermissionsConfig.delete.label = Delete
gws.PermissionsConfig.delete.purpose = Right to delete objects.

gws.PermissionsConfig.edit.label = Edit (combined)
gws.PermissionsConfig.edit.purpose = Combined edit right — equivalent to write + create + delete in one entry.

gws.PermissionsConfig.all.label = All
gws.PermissionsConfig.all.purpose = Sets all other rights (read, write, create, delete) to the value given here. Convenient for "admins get everything" setups.

gws.AccessConfig.label = Access rules
gws.AccessConfig.purpose = Simplified form of access rights as a "role: allow/deny" list — fits most configuration classes.
gws.AccessConfig.complexity = intermediate

gws.Config.label = Configuration
gws.Config.purpose = Base class of every configuration struct. Carries a UID and optionally a sub-type discriminator.

gws.Config.uid.label = UID
gws.Config.uid.purpose = Unique identifier. Used in cross references (e.g. dbUid). Auto-assigned if not set.

gws.ConfigWithAccess.label = Configuration with access
gws.ConfigWithAccess.purpose = Extends the base configuration with `access` and `permissions`. Inherited by almost every top-level class.

gws.ConfigWithAccess.access.label = Access
gws.ConfigWithAccess.access.purpose = Simple access rules (see AccessConfig). Defines which roles may see or use this object.

gws.ConfigWithAccess.permissions.label = Advanced permissions
gws.ConfigWithAccess.permissions.purpose = Detailed role-based permissions per operation (see PermissionsConfig). Overrides simple `access` when both are set.
gws.ConfigWithAccess.permissions.complexity = advanced
