# UX-Strings für den CSV-Helper (plugin/csv_helper).
#
# Schlüsselformat: gws.plugin.csv_helper.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.

[de]

# --- csv_helper --------------------------------------------------------------

gws.plugin.csv_helper.Config.label = CSV-Helper
gws.plugin.csv_helper.Config.purpose = Stellt einen wiederverwendbaren CSV-Schreiber bereit. Andere Plugins (z. B. Such-Aktionen, Exporter) holen sich den Helper, um CSV-Dateien mit konsistenter Trennzeichen-, Anführungs- und Zeichensatz-Konfiguration zu erzeugen.
gws.plugin.csv_helper.Config.whenToUse = Empfohlen für jede Installation, in der CSV-Ausgaben (Suchergebnisse, Daten-Exporte, Reports) erzeugt werden sollen.
gws.plugin.csv_helper.Config.complexity = basic
gws.plugin.csv_helper.Config.useCases = Suchergebnisse als CSV exportieren, Layer-Attribute als CSV anbieten, Daten für Excel vorbereiten.

gws.plugin.csv_helper.Config.format.label = CSV-Format
gws.plugin.csv_helper.Config.format.purpose = Format-Einstellungen für den CSV-Output (Trennzeichen, Zeichensatz, Anführungszeichen, Zeilenende).

gws.plugin.csv_helper.FormatConfig.label = CSV-Format-Optionen
gws.plugin.csv_helper.FormatConfig.purpose = Detail-Einstellungen für den CSV-Output. Defaults entsprechen Standard-CSV (Komma, Anführungszeichen, UTF-8, LF).
gws.plugin.csv_helper.FormatConfig.complexity = intermediate

gws.plugin.csv_helper.FormatConfig.delimiter.label = Spaltentrennzeichen
gws.plugin.csv_helper.FormatConfig.delimiter.purpose = Trennzeichen zwischen den Feldern. Default ist ein Komma; in deutschen Excel-Umgebungen wird oft ein Semikolon verwendet.
gws.plugin.csv_helper.FormatConfig.delimiter.example = ";"

gws.plugin.csv_helper.FormatConfig.encoding.label = Zeichensatz
gws.plugin.csv_helper.FormatConfig.encoding.purpose = Zeichensatz der CSV-Ausgabe. Default ist utf8; für Excel auf Windows wird häufig cp1252 oder utf-8-sig benötigt.
gws.plugin.csv_helper.FormatConfig.encoding.example = "utf8"

gws.plugin.csv_helper.FormatConfig.quote.label = Anführungszeichen
gws.plugin.csv_helper.FormatConfig.quote.purpose = Zeichen, mit dem Felder eingeschlossen werden. Default ist das doppelte Anführungszeichen.

gws.plugin.csv_helper.FormatConfig.quoteAll.label = Alle Felder anführen
gws.plugin.csv_helper.FormatConfig.quoteAll.purpose = Wenn aktiviert, werden alle Felder in Anführungszeichen gesetzt — auch Zahlen.
gws.plugin.csv_helper.FormatConfig.quoteAll.complexity = intermediate

gws.plugin.csv_helper.FormatConfig.rowDelimiter.label = Zeilenende
gws.plugin.csv_helper.FormatConfig.rowDelimiter.purpose = Zeilenende-Sequenz. Erlaubt sind LF, CR, CRLF (oder die entsprechenden Kombinationen).
gws.plugin.csv_helper.FormatConfig.rowDelimiter.example = "CRLF"

gws.plugin.csv_helper.FormatConfig.formulaHack.label = Formel-Schutz
gws.plugin.csv_helper.FormatConfig.formulaHack.purpose = Stellt rein numerische Strings ein Gleichheitszeichen voran, damit Excel sie nicht als Formel interpretiert. Standardmäßig aktiv.
gws.plugin.csv_helper.FormatConfig.formulaHack.complexity = advanced

[en]

# --- csv_helper --------------------------------------------------------------

gws.plugin.csv_helper.Config.label = CSV helper
gws.plugin.csv_helper.Config.purpose = Provides a reusable CSV writer. Other plugins (search actions, exporters) pick up the helper to produce CSV files with consistent delimiter, quoting and encoding settings.
gws.plugin.csv_helper.Config.whenToUse = Recommended for any installation that emits CSV output (search results, data exports, reports).
gws.plugin.csv_helper.Config.complexity = basic
gws.plugin.csv_helper.Config.useCases = Export search results as CSV, expose layer attributes as CSV, prepare data for Excel.

gws.plugin.csv_helper.Config.format.label = CSV format
gws.plugin.csv_helper.Config.format.purpose = Format settings for the CSV output (delimiter, encoding, quoting, line terminator).

gws.plugin.csv_helper.FormatConfig.label = CSV format options
gws.plugin.csv_helper.FormatConfig.purpose = Detailed settings for the CSV output. Defaults match standard CSV (comma, quote, UTF-8, LF).
gws.plugin.csv_helper.FormatConfig.complexity = intermediate

gws.plugin.csv_helper.FormatConfig.delimiter.label = Field delimiter
gws.plugin.csv_helper.FormatConfig.delimiter.purpose = Delimiter between fields. Defaults to comma; semicolon is common in German Excel environments.

gws.plugin.csv_helper.FormatConfig.encoding.label = Encoding
gws.plugin.csv_helper.FormatConfig.encoding.purpose = Encoding of the CSV output. Defaults to utf8; Excel on Windows often needs cp1252 or utf-8-sig.

gws.plugin.csv_helper.FormatConfig.quote.label = Quote character
gws.plugin.csv_helper.FormatConfig.quote.purpose = Character used to wrap fields. Defaults to the double quote.

gws.plugin.csv_helper.FormatConfig.quoteAll.label = Quote all fields
gws.plugin.csv_helper.FormatConfig.quoteAll.purpose = When enabled, every field — including numbers — is enclosed in quotes.
gws.plugin.csv_helper.FormatConfig.quoteAll.complexity = intermediate

gws.plugin.csv_helper.FormatConfig.rowDelimiter.label = Row delimiter
gws.plugin.csv_helper.FormatConfig.rowDelimiter.purpose = Row terminator. LF, CR, CRLF (or matching combinations) are accepted.

gws.plugin.csv_helper.FormatConfig.formulaHack.label = Formula guard
gws.plugin.csv_helper.FormatConfig.formulaHack.purpose = Prepends purely numeric strings with an equals sign so Excel does not interpret them as formulas. Enabled by default.
gws.plugin.csv_helper.FormatConfig.formulaHack.complexity = advanced
