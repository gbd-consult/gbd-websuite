# UX-Strings für das GekoS-Plugin (Welle C).
#
# GekoS-Bau ist ein Fachverfahren für Bauantrags- und Bürgerservice-Prozesse.
# Das Plugin verbindet die WebSuite mit gek-online-Endpunkten und stellt
# Marker- und XY-Lookup-Endpunkte für die GekoS-Client-Software bereit.

[de]

# --- action ---------------------------------------------------------------

gws.plugin.gekos.action.Config.label = GekoS
gws.plugin.gekos.action.Config.purpose = Aktiviert die GekoS-Action. Stellt die Callback-URLs bereit, die GekoS-Bau zur Standortermittlung (XY aus Flurstück oder Adresse) und zum Anzeigen von Markern auf der Karte verwendet.
gws.plugin.gekos.action.Config.whenToUse = Pflicht für Behörden-Setups, die GekoS-Bau mit der WebSuite koppeln.
gws.plugin.gekos.action.Config.complexity = advanced
gws.plugin.gekos.action.Config.useCases = Bauantragsverfahren mit Karten-Anzeige der Vorgänge, Klick aus GekoS in die Karte, Marker-Liste offener Vorgänge.

gws.plugin.gekos.action.Config.index.label = GekoS-Index-Konfiguration
gws.plugin.gekos.action.Config.index.purpose = Konfiguration des Index, der Vorgangsdaten aus den gek-online-Quellen periodisch in eine Datenbank-Tabelle einliest. Wird über `gws gekos createIndex` aufgebaut.

gws.plugin.gekos.action.Config.templates.label = Feature-Templates
gws.plugin.gekos.action.Config.templates.purpose = Anzeige-Templates für GekoS-Vorgänge in Such-Treffer und Marker-Detail.

# --- core.IndexConfig -----------------------------------------------------

gws.plugin.gekos.core.IndexConfig.label = GekoS-Index
gws.plugin.gekos.core.IndexConfig.purpose = Definiert eine oder mehrere gek-online-Quellen, in welche Tabelle der Index geschrieben wird und in welchem Koordinatensystem die Daten vorliegen.
gws.plugin.gekos.core.IndexConfig.complexity = advanced

gws.plugin.gekos.core.IndexConfig.crs.label = Koordinatensystem
gws.plugin.gekos.core.IndexConfig.crs.purpose = CRS, in dem GekoS-Vorgänge gespeichert sind (z. B. EPSG:25832).
gws.plugin.gekos.core.IndexConfig.crs.example = "EPSG:25832"

gws.plugin.gekos.core.IndexConfig.dbUid.label = Datenbank-Provider
gws.plugin.gekos.core.IndexConfig.dbUid.purpose = UID des PostgreSQL-Providers, in den der Index geschrieben wird.

gws.plugin.gekos.core.IndexConfig.position.label = Punkt-Korrektur
gws.plugin.gekos.core.IndexConfig.position.purpose = Optionale Verschiebung/Repulsion von Punkten, damit mehrere Vorgänge an derselben Adresse nicht überlappen.

gws.plugin.gekos.core.IndexConfig.sources.label = gek-online-Quellen
gws.plugin.gekos.core.IndexConfig.sources.purpose = Liste der gek-online-Instanzen, aus denen Vorgangsdaten gelesen werden.

gws.plugin.gekos.core.IndexConfig.tableName.label = Index-Tabelle
gws.plugin.gekos.core.IndexConfig.tableName.purpose = Name der SQL-Tabelle, in der der GekoS-Index abgelegt wird.
gws.plugin.gekos.core.IndexConfig.tableName.example = "gekos_index"

# --- core.PositionConfig --------------------------------------------------

gws.plugin.gekos.core.PositionConfig.label = Punkt-Korrektur
gws.plugin.gekos.core.PositionConfig.purpose = Verschiebt und vereinzelt Vorgangs-Punkte, die andernfalls deckungsgleich auf einer Adresse lägen.
gws.plugin.gekos.core.PositionConfig.complexity = advanced

gws.plugin.gekos.core.PositionConfig.angle.label = Verteilungs-Winkel
gws.plugin.gekos.core.PositionConfig.angle.purpose = Winkel (Grad) für die Punkt-Vereinzelung um eine gemeinsame Position.
gws.plugin.gekos.core.PositionConfig.angle.example = 30

gws.plugin.gekos.core.PositionConfig.distance.label = Verteilungs-Radius
gws.plugin.gekos.core.PositionConfig.distance.purpose = Radius (Karteneinheiten) für die Punkt-Vereinzelung.
gws.plugin.gekos.core.PositionConfig.distance.example = 5

gws.plugin.gekos.core.PositionConfig.offsetX.label = X-Versatz
gws.plugin.gekos.core.PositionConfig.offsetX.purpose = Globaler X-Offset, der auf alle Punkte angewendet wird.

gws.plugin.gekos.core.PositionConfig.offsetY.label = Y-Versatz
gws.plugin.gekos.core.PositionConfig.offsetY.purpose = Globaler Y-Offset, der auf alle Punkte angewendet wird.

# --- core.SourceConfig ----------------------------------------------------

gws.plugin.gekos.core.SourceConfig.label = gek-online-Quelle
gws.plugin.gekos.core.SourceConfig.purpose = Eine einzelne gek-online-Instanz, aus der Vorgangsdaten in den Index gelesen werden.
gws.plugin.gekos.core.SourceConfig.complexity = advanced

gws.plugin.gekos.core.SourceConfig.instance.label = Instanz-Name
gws.plugin.gekos.core.SourceConfig.instance.purpose = Logischer Name der Quelle. Wird für die Bildung eindeutiger UIDs verwendet, falls mehrere gek-online-Instanzen parallel laufen.
gws.plugin.gekos.core.SourceConfig.instance.example = "gekos_main"

gws.plugin.gekos.core.SourceConfig.params.label = Aufruf-Parameter
gws.plugin.gekos.core.SourceConfig.params.purpose = Zusätzliche Query-Parameter, die an gek-online übergeben werden (z. B. Vorgangs-Filter).

gws.plugin.gekos.core.SourceConfig.url.label = Basis-URL
gws.plugin.gekos.core.SourceConfig.url.purpose = Basis-URL der gek-online-Instanz, auf die zugegriffen wird.
gws.plugin.gekos.core.SourceConfig.url.example = "https://gekos.example.de/gek-online/"
gws.plugin.gekos.core.SourceConfig.url.complexity = basic

# --- cli ------------------------------------------------------------------

gws.plugin.gekos.cli.CreateIndexParams.label = CLI: Index erzeugen
gws.plugin.gekos.cli.CreateIndexParams.purpose = Parameter für `gws gekos createIndex`. Liest die konfigurierten gek-online-Quellen aus und befüllt die Index-Tabelle neu.

gws.plugin.gekos.cli.CreateIndexParams.projectUid.label = Projekt-UID
gws.plugin.gekos.cli.CreateIndexParams.projectUid.purpose = UID des Projekts, dessen GekoS-Konfiguration verwendet wird.

[en]

# --- action ---------------------------------------------------------------

gws.plugin.gekos.action.Config.label = GekoS
gws.plugin.gekos.action.Config.purpose = Enables the GekoS action. Provides the callback URLs that GekoS-Bau uses for location lookup (XY from parcel or address) and for placing markers on the map.
gws.plugin.gekos.action.Config.whenToUse = Required for government setups that integrate GekoS-Bau with the WebSuite.
gws.plugin.gekos.action.Config.complexity = advanced
gws.plugin.gekos.action.Config.useCases = Building permit workflows with map view of cases, click-from-GekoS into the map, marker list of open cases.

gws.plugin.gekos.action.Config.index.label = GekoS index configuration
gws.plugin.gekos.action.Config.index.purpose = Configuration of the index that periodically pulls case data from gek-online sources into a database table. Built via `gws gekos createIndex`.

gws.plugin.gekos.action.Config.templates.label = Feature templates
gws.plugin.gekos.action.Config.templates.purpose = Display templates for GekoS cases in search results and marker detail.

# --- core.IndexConfig -----------------------------------------------------

gws.plugin.gekos.core.IndexConfig.label = GekoS index
gws.plugin.gekos.core.IndexConfig.purpose = Defines one or more gek-online sources, the table the index is written to, and the CRS of the data.
gws.plugin.gekos.core.IndexConfig.complexity = advanced

gws.plugin.gekos.core.IndexConfig.crs.label = Coordinate reference system
gws.plugin.gekos.core.IndexConfig.crs.purpose = CRS in which GekoS cases are stored (e.g. EPSG:25832).
gws.plugin.gekos.core.IndexConfig.crs.example = "EPSG:25832"

gws.plugin.gekos.core.IndexConfig.dbUid.label = Database provider
gws.plugin.gekos.core.IndexConfig.dbUid.purpose = UID of the PostgreSQL provider the index is written to.

gws.plugin.gekos.core.IndexConfig.position.label = Point correction
gws.plugin.gekos.core.IndexConfig.position.purpose = Optional displacement/repulsion of points so that multiple cases at the same address do not overlap.

gws.plugin.gekos.core.IndexConfig.sources.label = gek-online sources
gws.plugin.gekos.core.IndexConfig.sources.purpose = List of gek-online instances from which case data is fetched.

gws.plugin.gekos.core.IndexConfig.tableName.label = Index table
gws.plugin.gekos.core.IndexConfig.tableName.purpose = Name of the SQL table that stores the GekoS index.
gws.plugin.gekos.core.IndexConfig.tableName.example = "gekos_index"

# --- core.PositionConfig --------------------------------------------------

gws.plugin.gekos.core.PositionConfig.label = Point correction
gws.plugin.gekos.core.PositionConfig.purpose = Displaces and disambiguates case points that would otherwise share an address coordinate.
gws.plugin.gekos.core.PositionConfig.complexity = advanced

gws.plugin.gekos.core.PositionConfig.angle.label = Repulsion angle
gws.plugin.gekos.core.PositionConfig.angle.purpose = Angle (degrees) used for distributing points around a shared position.
gws.plugin.gekos.core.PositionConfig.angle.example = 30

gws.plugin.gekos.core.PositionConfig.distance.label = Repulsion radius
gws.plugin.gekos.core.PositionConfig.distance.purpose = Radius (map units) used for distributing points around a shared position.
gws.plugin.gekos.core.PositionConfig.distance.example = 5

gws.plugin.gekos.core.PositionConfig.offsetX.label = X offset
gws.plugin.gekos.core.PositionConfig.offsetX.purpose = Global X offset applied to all points.

gws.plugin.gekos.core.PositionConfig.offsetY.label = Y offset
gws.plugin.gekos.core.PositionConfig.offsetY.purpose = Global Y offset applied to all points.

# --- core.SourceConfig ----------------------------------------------------

gws.plugin.gekos.core.SourceConfig.label = gek-online source
gws.plugin.gekos.core.SourceConfig.purpose = A single gek-online instance from which case data is read into the index.
gws.plugin.gekos.core.SourceConfig.complexity = advanced

gws.plugin.gekos.core.SourceConfig.instance.label = Instance name
gws.plugin.gekos.core.SourceConfig.instance.purpose = Logical name of the source. Used to build unique UIDs when multiple gek-online instances run in parallel.
gws.plugin.gekos.core.SourceConfig.instance.example = "gekos_main"

gws.plugin.gekos.core.SourceConfig.params.label = Call parameters
gws.plugin.gekos.core.SourceConfig.params.purpose = Additional query parameters passed to gek-online (e.g. case filters).

gws.plugin.gekos.core.SourceConfig.url.label = Base URL
gws.plugin.gekos.core.SourceConfig.url.purpose = Base URL of the gek-online instance.
gws.plugin.gekos.core.SourceConfig.url.example = "https://gekos.example.de/gek-online/"
gws.plugin.gekos.core.SourceConfig.url.complexity = basic

# --- cli ------------------------------------------------------------------

gws.plugin.gekos.cli.CreateIndexParams.label = CLI: create index
gws.plugin.gekos.cli.CreateIndexParams.purpose = Parameters for `gws gekos createIndex`. Reads from the configured gek-online sources and rebuilds the index table.

gws.plugin.gekos.cli.CreateIndexParams.projectUid.label = Project UID
gws.plugin.gekos.cli.CreateIndexParams.projectUid.purpose = UID of the project whose GekoS configuration is used.
