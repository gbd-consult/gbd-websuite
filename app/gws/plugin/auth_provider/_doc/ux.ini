# UX-Strings für die Plugins gws.plugin.auth_provider.file und
# gws.plugin.auth_provider.ldap.
#
# Schlüsselformat: gws.plugin.auth_provider.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Inhalte konservativ aus _doc/strings.ini und den Klassen-Docstrings
# abgeleitet — keine Phantasie-Texte.

[de]

# --- file ------------------------------------------------------------------

gws.plugin.auth_provider.file.Config.label = Datei-basierter Auth-Provider
gws.plugin.auth_provider.file.Config.purpose = Authentifiziert Benutzer gegen eine lokale JSON-Datei mit einer Liste von Benutzer-Datensätzen. Jeder Datensatz enthält mindestens die Felder ``login`` und ``password`` (Hash gemäß ``gws.lib.password.encode``); weitere Felder werden auf ``gws.User``-Properties gemappt.
gws.plugin.auth_provider.file.Config.whenToUse = Für kleine Installationen, lokale Tests und Entwicklungs-Setups, in denen Benutzerkonten ohne Datenbank- oder Verzeichnisdienst verwaltet werden sollen.
gws.plugin.auth_provider.file.Config.complexity = basic
gws.plugin.auth_provider.file.Config.useCases = Demo-Server, Single-Admin-Setups, isolierte On-Premise-Installationen.
gws.plugin.auth_provider.file.Config.seeAlso = gws.plugin.auth_provider.ldap.Config, gws.plugin.postgres.auth_provider.Config, gws.plugin.account.auth_provider.Config

gws.plugin.auth_provider.file.Config.path.label = Pfad zur Benutzerdatei
gws.plugin.auth_provider.file.Config.path.purpose = Absoluter Pfad zur JSON-Datei mit den Benutzer-Datensätzen.
gws.plugin.auth_provider.file.Config.path.example = "/data/users.json"

# --- ldap ------------------------------------------------------------------

gws.plugin.auth_provider.ldap.Config.label = LDAP-Auth-Provider
gws.plugin.auth_provider.ldap.Config.purpose = Authentifiziert Benutzer gegen einen LDAP- oder ActiveDirectory-Verzeichnisdienst. Akzeptiert eine LDAP-URL der Form ``ldap://host:port/baseDN?searchAttribute`` (Teilmenge von RFC 2255). Bei jedem Login wird der DN über das Such-Attribut aufgelöst und ein Bind mit den eingegebenen Credentials versucht; Rollen werden anhand der ``users``-Regeln zugewiesen.
gws.plugin.auth_provider.ldap.Config.whenToUse = Wenn Benutzerverwaltung zentral in einem Unternehmens-Verzeichnis (Active Directory, OpenLDAP, FreeIPA …) erfolgt und WebSuite-Konten daran angebunden werden sollen.
gws.plugin.auth_provider.ldap.Config.complexity = advanced
gws.plugin.auth_provider.ldap.Config.useCases = Active-Directory-Anbindung in Behörden- und Unternehmensumgebungen, Single-Sign-On gegen einen bestehenden LDAP-Server, Rollen-Mapping über LDAP-Gruppen.
gws.plugin.auth_provider.ldap.Config.seeAlso = gws.plugin.auth_provider.file.Config, gws.plugin.postgres.auth_provider.Config, gws.plugin.account.auth_provider.Config

gws.plugin.auth_provider.ldap.Config.url.label = LDAP-Server-URL
gws.plugin.auth_provider.ldap.Config.url.purpose = LDAP-URL nach RFC 2255 mit Host, Port, Such-Basis-DN und Such-Attribut.
gws.plugin.auth_provider.ldap.Config.url.example = "ldap://ldap.example.com:389/ou=users,dc=example,dc=com?uid"

gws.plugin.auth_provider.ldap.Config.activeDirectory.label = ActiveDirectory-Modus
gws.plugin.auth_provider.ldap.Config.activeDirectory.purpose = Wenn aktiv, wird der Server als ActiveDirectory behandelt (Referrals werden ausgeschaltet, Konto-Status-Flags werden geprüft). Default ist ``true``.

gws.plugin.auth_provider.ldap.Config.bindDN.label = Bind-DN
gws.plugin.auth_provider.ldap.Config.bindDN.purpose = Distinguished Name eines technischen Benutzers mit Suchberechtigung im Verzeichnis. Wird benötigt, um Benutzer-Datensätze vor der Authentifizierung zu finden.
gws.plugin.auth_provider.ldap.Config.bindDN.example = "cn=gws-bind,ou=service,dc=example,dc=com"
gws.plugin.auth_provider.ldap.Config.bindDN.complexity = advanced

gws.plugin.auth_provider.ldap.Config.bindPassword.label = Bind-Passwort
gws.plugin.auth_provider.ldap.Config.bindPassword.purpose = Passwort des Bind-DN-Benutzers.
gws.plugin.auth_provider.ldap.Config.bindPassword.complexity = advanced

gws.plugin.auth_provider.ldap.Config.displayNameFormat.label = Format für Anzeigename
gws.plugin.auth_provider.ldap.Config.displayNameFormat.purpose = Vorlage für den im UI angezeigten Benutzernamen. Platzhalter beziehen sich auf LDAP-Attribute des Datensatzes.
gws.plugin.auth_provider.ldap.Config.displayNameFormat.example = "{givenName} {sn}"

gws.plugin.auth_provider.ldap.Config.timeout.label = Server-Timeout
gws.plugin.auth_provider.ldap.Config.timeout.purpose = Verbindungs-Timeout zum LDAP-Server in Sekunden. Default ist 30.
gws.plugin.auth_provider.ldap.Config.timeout.complexity = advanced

gws.plugin.auth_provider.ldap.Config.users.label = Rollen-Zuordnung
gws.plugin.auth_provider.ldap.Config.users.purpose = Liste von Regeln, die LDAP-Filter und Gruppenmitgliedschaften auf WebSuite-Rollen abbilden.

gws.plugin.auth_provider.ldap.Config.ssl.label = SSL/TLS-Konfiguration
gws.plugin.auth_provider.ldap.Config.ssl.purpose = TLS-Parameter für ``ldaps``-Verbindungen. Wenn gesetzt, verbindet sich der Provider per LDAPS statt LDAP.
gws.plugin.auth_provider.ldap.Config.ssl.complexity = advanced

# UserSpec — Rollenzuweisung pro Benutzer/Gruppe

gws.plugin.auth_provider.ldap.UserSpec.label = LDAP-Rollen-Regel
gws.plugin.auth_provider.ldap.UserSpec.purpose = Bildet einen LDAP-Filter oder eine Gruppenmitgliedschaft auf eine Liste von WebSuite-Rollen ab. Treffen ``matches`` oder ``memberOf`` zu, erhält der Benutzer die unter ``roles`` genannten Rollen.

gws.plugin.auth_provider.ldap.UserSpec.roles.label = WebSuite-Rollen
gws.plugin.auth_provider.ldap.UserSpec.roles.purpose = Liste von Rollen, die der Benutzer bei einem Treffer zugewiesen bekommt.
gws.plugin.auth_provider.ldap.UserSpec.roles.example = ["editor", "user"]

gws.plugin.auth_provider.ldap.UserSpec.matches.label = LDAP-Filter
gws.plugin.auth_provider.ldap.UserSpec.matches.purpose = LDAP-Filter, der auf den Benutzer-Datensatz zutreffen muss.
gws.plugin.auth_provider.ldap.UserSpec.matches.example = "(uid>=1000)"
gws.plugin.auth_provider.ldap.UserSpec.matches.complexity = advanced

gws.plugin.auth_provider.ldap.UserSpec.memberOf.label = Gruppen-DN
gws.plugin.auth_provider.ldap.UserSpec.memberOf.purpose = LDAP-Filter, der eine Gruppe beschreibt, in der der Benutzer Mitglied sein muss.
gws.plugin.auth_provider.ldap.UserSpec.memberOf.example = "(cn=gws-editors)"
gws.plugin.auth_provider.ldap.UserSpec.memberOf.complexity = advanced

# SSLConfig — TLS-Parameter

gws.plugin.auth_provider.ldap.SSLConfig.label = LDAPS-TLS-Konfiguration
gws.plugin.auth_provider.ldap.SSLConfig.purpose = TLS-Parameter für eine LDAPS-Verbindung: optionales CA-Zertifikat sowie Client-Zertifikat und Schlüssel für gegenseitige Authentifizierung.
gws.plugin.auth_provider.ldap.SSLConfig.complexity = advanced

gws.plugin.auth_provider.ldap.SSLConfig.ca.label = CA-Zertifikat
gws.plugin.auth_provider.ldap.SSLConfig.ca.purpose = Pfad zum CA-Zertifikat des LDAP-Servers (PEM).
gws.plugin.auth_provider.ldap.SSLConfig.ca.example = "/etc/ssl/certs/ldap-ca.pem"

gws.plugin.auth_provider.ldap.SSLConfig.crt.label = Client-Zertifikat
gws.plugin.auth_provider.ldap.SSLConfig.crt.purpose = Pfad zum Client-Zertifikat für mTLS-Authentifizierung gegenüber dem LDAP-Server (PEM).

gws.plugin.auth_provider.ldap.SSLConfig.key.label = Client-Schlüssel
gws.plugin.auth_provider.ldap.SSLConfig.key.purpose = Pfad zum privaten Schlüssel für das Client-Zertifikat.


[en]

# --- file ------------------------------------------------------------------

gws.plugin.auth_provider.file.Config.label = File-based auth provider
gws.plugin.auth_provider.file.Config.purpose = Authenticates users against a local JSON file containing a list of user records. Each record must contain ``login`` and ``password`` (hashed via ``gws.lib.password.encode``); other fields are mapped to ``gws.User`` properties.
gws.plugin.auth_provider.file.Config.whenToUse = For small installations, local tests and development setups where user accounts are managed without a database or directory service.
gws.plugin.auth_provider.file.Config.complexity = basic
gws.plugin.auth_provider.file.Config.useCases = Demo servers, single-admin setups, isolated on-premise installations.
gws.plugin.auth_provider.file.Config.seeAlso = gws.plugin.auth_provider.ldap.Config, gws.plugin.postgres.auth_provider.Config, gws.plugin.account.auth_provider.Config

gws.plugin.auth_provider.file.Config.path.label = Path to users file
gws.plugin.auth_provider.file.Config.path.purpose = Absolute path to the JSON file containing user records.
gws.plugin.auth_provider.file.Config.path.example = "/data/users.json"

# --- ldap ------------------------------------------------------------------

gws.plugin.auth_provider.ldap.Config.label = LDAP auth provider
gws.plugin.auth_provider.ldap.Config.purpose = Authenticates users against an LDAP or ActiveDirectory directory service. Accepts an LDAP URL of the form ``ldap://host:port/baseDN?searchAttribute`` (subset of RFC 2255). For each login the DN is resolved via the search attribute and a bind with the supplied credentials is attempted; roles are assigned through the ``users`` rules.
gws.plugin.auth_provider.ldap.Config.whenToUse = When user management is centralized in a corporate directory (Active Directory, OpenLDAP, FreeIPA …) and WebSuite accounts must be linked to it.
gws.plugin.auth_provider.ldap.Config.complexity = advanced
gws.plugin.auth_provider.ldap.Config.useCases = Active Directory integration in government and enterprise environments, single sign-on against an existing LDAP server, role mapping via LDAP groups.
gws.plugin.auth_provider.ldap.Config.seeAlso = gws.plugin.auth_provider.file.Config, gws.plugin.postgres.auth_provider.Config, gws.plugin.account.auth_provider.Config

gws.plugin.auth_provider.ldap.Config.url.label = LDAP server URL
gws.plugin.auth_provider.ldap.Config.url.purpose = LDAP URL per RFC 2255 with host, port, search base DN and search attribute.
gws.plugin.auth_provider.ldap.Config.url.example = "ldap://ldap.example.com:389/ou=users,dc=example,dc=com?uid"

gws.plugin.auth_provider.ldap.Config.activeDirectory.label = ActiveDirectory mode
gws.plugin.auth_provider.ldap.Config.activeDirectory.purpose = If true, the server is treated as ActiveDirectory (referrals disabled, account-status flags checked). Defaults to ``true``.

gws.plugin.auth_provider.ldap.Config.bindDN.label = Bind DN
gws.plugin.auth_provider.ldap.Config.bindDN.purpose = Distinguished Name of a technical user with search permissions on the directory. Required to look up user records before authentication.
gws.plugin.auth_provider.ldap.Config.bindDN.example = "cn=gws-bind,ou=service,dc=example,dc=com"
gws.plugin.auth_provider.ldap.Config.bindDN.complexity = advanced

gws.plugin.auth_provider.ldap.Config.bindPassword.label = Bind password
gws.plugin.auth_provider.ldap.Config.bindPassword.purpose = Password of the bind DN user.
gws.plugin.auth_provider.ldap.Config.bindPassword.complexity = advanced

gws.plugin.auth_provider.ldap.Config.displayNameFormat.label = Display-name format
gws.plugin.auth_provider.ldap.Config.displayNameFormat.purpose = Template for the user name shown in the UI. Placeholders refer to LDAP attributes of the record.
gws.plugin.auth_provider.ldap.Config.displayNameFormat.example = "{givenName} {sn}"

gws.plugin.auth_provider.ldap.Config.timeout.label = Server timeout
gws.plugin.auth_provider.ldap.Config.timeout.purpose = LDAP connection timeout in seconds. Defaults to 30.
gws.plugin.auth_provider.ldap.Config.timeout.complexity = advanced

gws.plugin.auth_provider.ldap.Config.users.label = Role mapping
gws.plugin.auth_provider.ldap.Config.users.purpose = List of rules mapping LDAP filters and group memberships to WebSuite roles.

gws.plugin.auth_provider.ldap.Config.ssl.label = SSL/TLS configuration
gws.plugin.auth_provider.ldap.Config.ssl.purpose = TLS parameters for ``ldaps`` connections. When set, the provider connects via LDAPS instead of LDAP.
gws.plugin.auth_provider.ldap.Config.ssl.complexity = advanced

# UserSpec

gws.plugin.auth_provider.ldap.UserSpec.label = LDAP role rule
gws.plugin.auth_provider.ldap.UserSpec.purpose = Maps an LDAP filter or group membership to a list of WebSuite roles. If ``matches`` or ``memberOf`` apply, the user is granted the listed ``roles``.

gws.plugin.auth_provider.ldap.UserSpec.roles.label = WebSuite roles
gws.plugin.auth_provider.ldap.UserSpec.roles.purpose = Roles granted to a user on a match.
gws.plugin.auth_provider.ldap.UserSpec.roles.example = ["editor", "user"]

gws.plugin.auth_provider.ldap.UserSpec.matches.label = LDAP filter
gws.plugin.auth_provider.ldap.UserSpec.matches.purpose = LDAP filter that must match the user record.
gws.plugin.auth_provider.ldap.UserSpec.matches.example = "(uid>=1000)"
gws.plugin.auth_provider.ldap.UserSpec.matches.complexity = advanced

gws.plugin.auth_provider.ldap.UserSpec.memberOf.label = Group filter
gws.plugin.auth_provider.ldap.UserSpec.memberOf.purpose = LDAP filter describing a group of which the user must be a member.
gws.plugin.auth_provider.ldap.UserSpec.memberOf.example = "(cn=gws-editors)"
gws.plugin.auth_provider.ldap.UserSpec.memberOf.complexity = advanced

# SSLConfig

gws.plugin.auth_provider.ldap.SSLConfig.label = LDAPS TLS configuration
gws.plugin.auth_provider.ldap.SSLConfig.purpose = TLS parameters for an LDAPS connection: optional CA certificate, plus client certificate and key for mutual authentication.
gws.plugin.auth_provider.ldap.SSLConfig.complexity = advanced

gws.plugin.auth_provider.ldap.SSLConfig.ca.label = CA certificate
gws.plugin.auth_provider.ldap.SSLConfig.ca.purpose = Path to the LDAP server CA certificate (PEM).
gws.plugin.auth_provider.ldap.SSLConfig.ca.example = "/etc/ssl/certs/ldap-ca.pem"

gws.plugin.auth_provider.ldap.SSLConfig.crt.label = Client certificate
gws.plugin.auth_provider.ldap.SSLConfig.crt.purpose = Path to the client certificate for mutual TLS authentication against the LDAP server (PEM).

gws.plugin.auth_provider.ldap.SSLConfig.key.label = Client key
gws.plugin.auth_provider.ldap.SSLConfig.key.purpose = Path to the private key for the client certificate.
