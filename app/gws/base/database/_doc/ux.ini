# UX-Strings für den Database-Manager und die abstrakten Datenbank-Klassen.
# Konkrete Provider (PostgreSQL/PostGIS) werden in den jeweiligen
# Plugin-Verzeichnissen gepflegt (siehe app/gws/plugin/postgres/_doc/).

[de]

gws.base.database.manager.Config.label = Datenbank-Verwaltung
gws.base.database.manager.Config.purpose = Wrapper über die Liste der Datenbank-Anbieter. Layer, Modelle und Authentifizierung referenzieren Provider über deren UID.
gws.base.database.manager.Config.whenToUse = Pflicht, sobald irgendeine Komponente eine Datenbank nutzt (Vektor-Layer, editierbare Modelle, DB-Auth).
gws.base.database.manager.Config.complexity = intermediate

gws.base.database.manager.Config.providers.label = Provider-Liste
gws.base.database.manager.Config.providers.purpose = Liste der verfügbaren Datenbank-Verbindungen (z. B. PostgreSQL/PostGIS).

gws.base.database.provider.Config.label = Datenbank-Provider (Basis)
gws.base.database.provider.Config.purpose = Basis-Klasse aller Datenbank-Provider. Konkrete Provider (Postgres) erweitern diese um Verbindungsparameter.
gws.base.database.provider.Config.complexity = intermediate

gws.base.database.provider.Config.pool.label = Verbindungspool-Optionen
gws.base.database.provider.Config.pool.purpose = Detail-Optionen für das Connection-Pooling (Pool-Größe, Recycle-Intervall).
gws.base.database.provider.Config.pool.complexity = advanced

gws.base.database.provider.Config.schemaCacheLifeTime.label = Schema-Cache-Lebensdauer
gws.base.database.provider.Config.schemaCacheLifeTime.purpose = Wie lange Schema-Informationen (Tabellen, Spalten) im Speicher gehalten werden, bevor sie neu eingelesen werden. In Sekunden.
gws.base.database.provider.Config.schemaCacheLifeTime.example = 3600
gws.base.database.provider.Config.schemaCacheLifeTime.complexity = advanced

gws.base.database.provider.Config.withPool.label = Connection-Pooling aktiv
gws.base.database.provider.Config.withPool.purpose = Aktiviert oder deaktiviert das SQL-Connection-Pooling für diesen Provider.
gws.base.database.provider.Config.withPool.complexity = advanced

gws.base.database.layer.Config.label = Datenbank-Layer (Basis)
gws.base.database.layer.Config.purpose = Basis-Klasse für Layer, deren Geometrien und Attribute aus einer Datenbanktabelle gelesen werden.
gws.base.database.layer.Config.complexity = intermediate

gws.base.database.layer.Config.dbUid.label = Datenbank-Provider
gws.base.database.layer.Config.dbUid.purpose = UID des konfigurierten Datenbank-Providers, gegen den der Layer arbeitet.

gws.base.database.layer.Config.tableName.label = Tabellenname
gws.base.database.layer.Config.tableName.purpose = Vollqualifizierter Name der Tabelle (z. B. `schema.table`), die den Layer speist.
gws.base.database.layer.Config.tableName.example = "public.flurstuecke"

gws.base.database.model.Config.label = Datenbank-Modell (Basis)
gws.base.database.model.Config.purpose = Basis-Klasse für Datenmodelle auf einer Datenbanktabelle. Die konkrete Implementierung (Postgres) erweitert sie um Provider-spezifische Optionen.
gws.base.database.model.Config.complexity = intermediate

gws.base.database.model.Config.dbUid.label = Datenbank-Provider
gws.base.database.model.Config.dbUid.purpose = UID des Datenbank-Providers, der das Modell speichert.

gws.base.database.model.Config.sqlFilter.label = SQL-Filter
gws.base.database.model.Config.sqlFilter.purpose = Zusätzlicher SQL-Ausdruck, der an die WHERE-Klausel angehängt wird (z. B. für mandantenspezifische Sichten).
gws.base.database.model.Config.sqlFilter.example = "is_active = TRUE"
gws.base.database.model.Config.sqlFilter.complexity = advanced

gws.base.database.model.Config.tableName.label = Tabellenname
gws.base.database.model.Config.tableName.purpose = Tabellenname für das Modell. Schema-Präfix optional.

[en]

gws.base.database.manager.Config.label = Database manager
gws.base.database.manager.Config.purpose = Wrapper around the list of database providers. Layers, models and auth reference providers by UID.
gws.base.database.manager.Config.whenToUse = Required as soon as any component uses a database (vector layers, editable models, DB-backed auth).
gws.base.database.manager.Config.complexity = intermediate

gws.base.database.manager.Config.providers.label = Providers list
gws.base.database.manager.Config.providers.purpose = List of available database connections (typically PostgreSQL/PostGIS).

gws.base.database.provider.Config.label = Database provider (base)
gws.base.database.provider.Config.purpose = Base class of all database providers. Concrete providers (Postgres) extend this with connection parameters.
gws.base.database.provider.Config.complexity = intermediate

gws.base.database.provider.Config.pool.label = Connection pool options
gws.base.database.provider.Config.pool.purpose = Detail options for connection pooling (pool size, recycle interval).
gws.base.database.provider.Config.pool.complexity = advanced

gws.base.database.provider.Config.schemaCacheLifeTime.label = Schema cache lifetime
gws.base.database.provider.Config.schemaCacheLifeTime.purpose = How long schema info (tables, columns) is held in memory before re-reading. Seconds.
gws.base.database.provider.Config.schemaCacheLifeTime.example = 3600
gws.base.database.provider.Config.schemaCacheLifeTime.complexity = advanced

gws.base.database.provider.Config.withPool.label = Connection pooling
gws.base.database.provider.Config.withPool.purpose = Enables or disables SQL connection pooling for this provider.
gws.base.database.provider.Config.withPool.complexity = advanced

gws.base.database.layer.Config.label = Database layer (base)
gws.base.database.layer.Config.purpose = Base class for layers whose geometries and attributes come from a database table.
gws.base.database.layer.Config.complexity = intermediate

gws.base.database.layer.Config.dbUid.label = Database provider
gws.base.database.layer.Config.dbUid.purpose = UID of the configured database provider the layer queries.

gws.base.database.layer.Config.tableName.label = Table name
gws.base.database.layer.Config.tableName.purpose = Fully qualified table name (e.g. `schema.table`) backing the layer.
gws.base.database.layer.Config.tableName.example = "public.flurstuecke"

gws.base.database.model.Config.label = Database model (base)
gws.base.database.model.Config.purpose = Base class for data models on a database table. Concrete implementations (Postgres) extend this with provider-specific options.
gws.base.database.model.Config.complexity = intermediate

gws.base.database.model.Config.dbUid.label = Database provider
gws.base.database.model.Config.dbUid.purpose = UID of the database provider that stores the model.

gws.base.database.model.Config.sqlFilter.label = SQL filter
gws.base.database.model.Config.sqlFilter.purpose = Additional SQL expression appended to the WHERE clause (e.g. for tenant-specific views).
gws.base.database.model.Config.sqlFilter.example = "is_active = TRUE"
gws.base.database.model.Config.sqlFilter.complexity = advanced

gws.base.database.model.Config.tableName.label = Table name
gws.base.database.model.Config.tableName.purpose = Table name for the model. Schema prefix optional.
