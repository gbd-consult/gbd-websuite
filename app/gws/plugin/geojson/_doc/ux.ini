# UX-Strings für das geojson-Plugin.
#
# Schlüsselformat: gws.plugin.geojson.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.

[de]

# --- provider ---------------------------------------------------------------

gws.plugin.geojson.provider.Config.label = GeoJSON-Provider
gws.plugin.geojson.provider.Config.purpose = Liest Vektordaten aus einer GeoJSON-Datei in den Speicher. Liefert die Features für Layer, Suche und Datenmodell.
gws.plugin.geojson.provider.Config.whenToUse = Für statische Datensätze, Demo-Konfigurationen oder kleine Datenmengen ohne Datenbank-Anbindung.
gws.plugin.geojson.provider.Config.complexity = basic
gws.plugin.geojson.provider.Config.useCases = Demo-Karten, Punkte-of-Interest, statische Verwaltungsgrenzen, schnelle Prototypen.

gws.plugin.geojson.provider.Config.path.label = Dateipfad
gws.plugin.geojson.provider.Config.path.purpose = Pfad zur GeoJSON-Datei im Server-Dateisystem.
gws.plugin.geojson.provider.Config.path.example = "/data/poi.geojson"

# --- layer ------------------------------------------------------------------

gws.plugin.geojson.layer.Config.label = GeoJSON-Layer
gws.plugin.geojson.layer.Config.purpose = Vektor-Layer auf Basis einer GeoJSON-Datei. Stellt die enthaltenen Features als Karten-Layer dar.
gws.plugin.geojson.layer.Config.whenToUse = Schnellster Weg, statische Vektordaten in eine Karte zu bringen, ohne Datenbank.
gws.plugin.geojson.layer.Config.complexity = basic
gws.plugin.geojson.layer.Config.useCases = Standorte als Layer, statische Themenkarten, kleine Sachdatensätze.
gws.plugin.geojson.layer.Config.seeAlso = gws.plugin.geojson.provider.Config

gws.plugin.geojson.layer.Config.provider.label = GeoJSON-Provider
gws.plugin.geojson.layer.Config.provider.purpose = Inline-Konfiguration oder UID-Referenz auf den GeoJSON-Provider, aus dem die Features stammen.

# --- finder -----------------------------------------------------------------

gws.plugin.geojson.finder.Config.label = GeoJSON-Suche
gws.plugin.geojson.finder.Config.purpose = Such-Provider, der Volltext- und Geometriesuche auf den Features einer GeoJSON-Datei ausführt.
gws.plugin.geojson.finder.Config.whenToUse = Wenn Suchergebnisse aus einer GeoJSON-Datei kommen sollen, ohne dass eine Datenbank im Spiel ist.
gws.plugin.geojson.finder.Config.complexity = basic

gws.plugin.geojson.finder.Config.provider.label = GeoJSON-Provider
gws.plugin.geojson.finder.Config.provider.purpose = Inline-Konfiguration oder UID-Referenz auf den GeoJSON-Provider, gegen den gesucht wird.

# --- model ------------------------------------------------------------------

gws.plugin.geojson.model.Config.label = GeoJSON-Datenmodell
gws.plugin.geojson.model.Config.purpose = Datenmodell für die Properties der Features einer GeoJSON-Datei. Definiert Feldnamen und Typen für Anzeige und Suche.
gws.plugin.geojson.model.Config.whenToUse = Wenn die Properties strukturiert in Suche oder Sachdatenanzeige genutzt werden sollen.
gws.plugin.geojson.model.Config.complexity = basic

gws.plugin.geojson.model.Config.provider.label = GeoJSON-Provider
gws.plugin.geojson.model.Config.provider.purpose = Inline-Konfiguration oder UID-Referenz auf den GeoJSON-Provider.

[en]

# --- provider ---------------------------------------------------------------

gws.plugin.geojson.provider.Config.label = GeoJSON provider
gws.plugin.geojson.provider.Config.purpose = Reads vector data from a GeoJSON file into memory. Supplies features to layers, search and data models.
gws.plugin.geojson.provider.Config.whenToUse = For static datasets, demo configurations or small datasets without a database backend.
gws.plugin.geojson.provider.Config.complexity = basic
gws.plugin.geojson.provider.Config.useCases = Demo maps, points of interest, static administrative boundaries, quick prototypes.

gws.plugin.geojson.provider.Config.path.label = File path
gws.plugin.geojson.provider.Config.path.purpose = Path to the GeoJSON file on the server file system.
gws.plugin.geojson.provider.Config.path.example = "/data/poi.geojson"

# --- layer ------------------------------------------------------------------

gws.plugin.geojson.layer.Config.label = GeoJSON layer
gws.plugin.geojson.layer.Config.purpose = Vector layer backed by a GeoJSON file. Renders the contained features as a map layer.
gws.plugin.geojson.layer.Config.whenToUse = Fastest way to bring static vector data into a map without a database.
gws.plugin.geojson.layer.Config.complexity = basic
gws.plugin.geojson.layer.Config.useCases = POI layers, static thematic maps, small attribute datasets.
gws.plugin.geojson.layer.Config.seeAlso = gws.plugin.geojson.provider.Config

gws.plugin.geojson.layer.Config.provider.label = GeoJSON provider
gws.plugin.geojson.layer.Config.provider.purpose = Inline configuration or UID reference to the GeoJSON provider supplying the features.

# --- finder -----------------------------------------------------------------

gws.plugin.geojson.finder.Config.label = GeoJSON search
gws.plugin.geojson.finder.Config.purpose = Search provider running full-text and geometry queries against the features of a GeoJSON file.
gws.plugin.geojson.finder.Config.whenToUse = When search results should come from a GeoJSON file without involving a database.
gws.plugin.geojson.finder.Config.complexity = basic

gws.plugin.geojson.finder.Config.provider.label = GeoJSON provider
gws.plugin.geojson.finder.Config.provider.purpose = Inline configuration or UID reference to the GeoJSON provider being searched.

# --- model ------------------------------------------------------------------

gws.plugin.geojson.model.Config.label = GeoJSON data model
gws.plugin.geojson.model.Config.purpose = Data model for the properties of GeoJSON features. Defines field names and types for display and search.
gws.plugin.geojson.model.Config.whenToUse = When properties should be used in a structured way for search or attribute display.
gws.plugin.geojson.model.Config.complexity = basic

gws.plugin.geojson.model.Config.provider.label = GeoJSON provider
gws.plugin.geojson.model.Config.provider.purpose = Inline configuration or UID reference to the GeoJSON provider.
