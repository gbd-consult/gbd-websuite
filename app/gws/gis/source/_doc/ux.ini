# UX-Strings für den Source-Layer-Filter (OWS / QGIS).

[de]

gws.gis.source.LayerFilter.label = Source-Layer-Filter
gws.gis.source.LayerFilter.purpose = Filterregel zur Auswahl von Source-Layern aus einem WMS, WMTS, WFS oder QGIS-Projekt anhand von Titel, Name, Pfad und Eigenschaften.
gws.gis.source.LayerFilter.whenToUse = Wann immer nur eine Teilmenge der Layer aus einer Quelle übernommen werden soll.

gws.gis.source.LayerFilter.level.label = Tiefe
gws.gis.source.LayerFilter.level.purpose = Nur Layer auf dieser Schachtelungs-Tiefe im Layer-Baum übernehmen.
gws.gis.source.LayerFilter.level.example = 1

gws.gis.source.LayerFilter.names.label = Layer-Namen
gws.gis.source.LayerFilter.names.purpose = Liste exakter Layer-Namen, die übernommen werden. Reihenfolge ist relevant (oben nach unten).

gws.gis.source.LayerFilter.titles.label = Layer-Titel
gws.gis.source.LayerFilter.titles.purpose = Liste exakter Layer-Titel, die übernommen werden.

gws.gis.source.LayerFilter.pattern.label = Pfad-Muster
gws.gis.source.LayerFilter.pattern.purpose = Regulärer Ausdruck, der gegen den vollständigen Pfad eines Layers im Quell-Layer-Baum geprüft wird.
gws.gis.source.LayerFilter.pattern.complexity = advanced

gws.gis.source.LayerFilter.isGroup.label = Nur Gruppen
gws.gis.source.LayerFilter.isGroup.purpose = Wenn aktiv, werden nur Gruppen-Layer übernommen.

gws.gis.source.LayerFilter.isImage.label = Nur Bild-Layer
gws.gis.source.LayerFilter.isImage.purpose = Wenn aktiv, werden nur Bild-/Raster-Layer übernommen.

gws.gis.source.LayerFilter.isQueryable.label = Nur abfragbare Layer
gws.gis.source.LayerFilter.isQueryable.purpose = Wenn aktiv, werden nur Layer mit unterstützter Feature-Info-Abfrage übernommen.

gws.gis.source.LayerFilter.isVisible.label = Nur sichtbare Layer
gws.gis.source.LayerFilter.isVisible.purpose = Wenn aktiv, werden nur in der Quelle sichtbar markierte Layer übernommen.

[en]

gws.gis.source.LayerFilter.label = Source layer filter
gws.gis.source.LayerFilter.purpose = Filter rule for selecting source layers from a WMS, WMTS, WFS or QGIS project by title, name, path and properties.
gws.gis.source.LayerFilter.whenToUse = Whenever only a subset of layers from a source should be taken over.

gws.gis.source.LayerFilter.level.label = Depth
gws.gis.source.LayerFilter.level.purpose = Match only layers at this nesting depth in the layer tree.
gws.gis.source.LayerFilter.level.example = 1

gws.gis.source.LayerFilter.names.label = Layer names
gws.gis.source.LayerFilter.names.purpose = List of exact layer names to match. Order matters (top to bottom).

gws.gis.source.LayerFilter.titles.label = Layer titles
gws.gis.source.LayerFilter.titles.purpose = List of exact layer titles to match.

gws.gis.source.LayerFilter.pattern.label = Path pattern
gws.gis.source.LayerFilter.pattern.purpose = Regular expression matched against a layer's full path in the source layer tree.
gws.gis.source.LayerFilter.pattern.complexity = advanced

gws.gis.source.LayerFilter.isGroup.label = Groups only
gws.gis.source.LayerFilter.isGroup.purpose = When set, only group layers are matched.

gws.gis.source.LayerFilter.isImage.label = Image layers only
gws.gis.source.LayerFilter.isImage.purpose = When set, only image/raster layers are matched.

gws.gis.source.LayerFilter.isQueryable.label = Queryable layers only
gws.gis.source.LayerFilter.isQueryable.purpose = When set, only layers supporting feature-info queries are matched.

gws.gis.source.LayerFilter.isVisible.label = Visible layers only
gws.gis.source.LayerFilter.isVisible.purpose = When set, only layers marked visible in the source are matched.
