# UX-Strings für die Storage-Konfiguration.
#
# Behandelt:
#   - core.Config: Storage-Schnittstelle pro Action/Modul
#   - core.Props/Request/State: interne Schemas für Speicher-Operationen
#   - manager.Config: Liste registrierter Storage-Provider

[de]

# --- core.Config ----------------------------------------------------------

gws.base.storage.core.Config.categoryName.label = Kategorie
gws.base.storage.core.Config.categoryName.purpose = Thematische Kategorie für strukturierte Datenorganisation und logische Gruppierung.

gws.base.storage.core.Config.providerUid.label = Storage-Provider
gws.base.storage.core.Config.providerUid.purpose = UID des Storage-Providers, der für die Persistierung genutzt wird.

# --- core.Props -----------------------------------------------------------

gws.base.storage.core.Props.state.label = Status
gws.base.storage.core.Props.state.purpose = Aktuelle Berechtigungen und Eintragsliste für die Storage-Schnittstelle.

# --- core.Request ---------------------------------------------------------

gws.base.storage.core.Request.entryData.label = Eintragsdaten
gws.base.storage.core.Request.entryData.purpose = Inhalt des zu speichernden Eintrags.

gws.base.storage.core.Request.entryName.label = Eintragsname
gws.base.storage.core.Request.entryName.purpose = Name des betroffenen Storage-Eintrags.

gws.base.storage.core.Request.verb.label = Operation
gws.base.storage.core.Request.verb.purpose = Auszuführende Storage-Operation (read, write, delete ...).

# --- core.State -----------------------------------------------------------

gws.base.storage.core.State.canCreate.label = Kann anlegen
gws.base.storage.core.State.canCreate.purpose = Aktueller Benutzer darf neue Einträge anlegen.

gws.base.storage.core.State.canDelete.label = Kann löschen
gws.base.storage.core.State.canDelete.purpose = Aktueller Benutzer darf Einträge löschen.

gws.base.storage.core.State.canRead.label = Kann lesen
gws.base.storage.core.State.canRead.purpose = Aktueller Benutzer darf Einträge lesen.

gws.base.storage.core.State.canWrite.label = Kann schreiben
gws.base.storage.core.State.canWrite.purpose = Aktueller Benutzer darf bestehende Einträge ändern.

gws.base.storage.core.State.names.label = Eintragsnamen
gws.base.storage.core.State.names.purpose = Liste der dem Benutzer zugänglichen Eintragsnamen.

# --- manager.Config -------------------------------------------------------

gws.base.storage.manager.Config.providers.label = Storage-Provider
gws.base.storage.manager.Config.providers.purpose = Liste konfigurierter Storage-Provider (Dateisystem, Datenbank ...).
gws.base.storage.manager.Config.providers.complexity = advanced

