# UX-Strings for the model-validator plugins.
#
# Eine ux.ini deckt alle Validator-Typen.
# Hier werden die Top-Level-Configs poliert; Object bleibt mit
# bootstrap-Defaults.

[de]

# --- not_empty -------------------------------------------------------------

gws.plugin.model_validator.not_empty.Config.label = Pflichtwert-Validator
gws.plugin.model_validator.not_empty.Config.purpose = Stellt sicher, dass das Feld einen nicht-leeren Wert enthält. Wirkt zusätzlich zum `isRequired`-Flag und liefert eine eigene Fehlermeldung.
gws.plugin.model_validator.not_empty.Config.whenToUse = Pflichtfelder, bei denen leere Strings, Null-Werte oder leere Listen abgewiesen werden sollen.
gws.plugin.model_validator.not_empty.Config.complexity = basic

# --- regex -----------------------------------------------------------------

gws.plugin.model_validator.regex.Config.label = Regex-Validator
gws.plugin.model_validator.regex.Config.purpose = Prüft den Feldwert gegen einen regulären Ausdruck. Erlaubt formatgetreue Eingaben (Postleitzahlen, Aktenzeichen, IDs).
gws.plugin.model_validator.regex.Config.complexity = basic
gws.plugin.model_validator.regex.Config.useCases = Postleitzahlen, Aktenzeichen, Telefonnummern, alphanumerische Codes.

gws.plugin.model_validator.regex.Config.regex.label = Regulärer Ausdruck
gws.plugin.model_validator.regex.Config.regex.purpose = Python-Regex, gegen den der Feldwert gematcht wird.
gws.plugin.model_validator.regex.Config.regex.complexity = basic
gws.plugin.model_validator.regex.Config.regex.example = "^[0-9]{5}$"

# --- format ----------------------------------------------------------------

gws.plugin.model_validator.format.Config.label = Format-Validator
gws.plugin.model_validator.format.Config.purpose = Prüft, ob der Eingabewert dem erwarteten Datentyp-Format entspricht (z. B. ob ein Datum syntaktisch parsebar ist). Wird intern als Default-Validator vor dem eigentlichen Speichern eingesetzt.
gws.plugin.model_validator.format.Config.complexity = intermediate

# --- number_range ----------------------------------------------------------

gws.plugin.model_validator.number_range.Config.label = Zahlen-Bereich
gws.plugin.model_validator.number_range.Config.purpose = Prüft, ob ein numerischer Wert innerhalb eines Min/Max-Bereichs liegt.
gws.plugin.model_validator.number_range.Config.complexity = basic
gws.plugin.model_validator.number_range.Config.useCases = Plausibilitätsprüfung von Mengen, Höhen, Prozentwerten.

gws.plugin.model_validator.number_range.Config.min.label = Untergrenze
gws.plugin.model_validator.number_range.Config.min.purpose = Kleinster zulässiger Wert (inklusive).
gws.plugin.model_validator.number_range.Config.min.example = 0

gws.plugin.model_validator.number_range.Config.max.label = Obergrenze
gws.plugin.model_validator.number_range.Config.max.purpose = Größter zulässiger Wert (inklusive).
gws.plugin.model_validator.number_range.Config.max.example = 100

# --- date_range ------------------------------------------------------------

gws.plugin.model_validator.date_range.Config.label = Datums-Bereich
gws.plugin.model_validator.date_range.Config.purpose = Prüft, ob ein Datums- oder Datetime-Wert innerhalb eines Min/Max-Bereichs liegt.
gws.plugin.model_validator.date_range.Config.complexity = intermediate
gws.plugin.model_validator.date_range.Config.useCases = Plausibilität von Geburtstagen, Erfassungsdaten, Stichtagen.

gws.plugin.model_validator.date_range.Config.min.label = Frühestes Datum
gws.plugin.model_validator.date_range.Config.min.purpose = Frühestes zulässiges Datum (ISO-Format).
gws.plugin.model_validator.date_range.Config.min.example = "2000-01-01"

gws.plugin.model_validator.date_range.Config.max.label = Spätestes Datum
gws.plugin.model_validator.date_range.Config.max.purpose = Spätestes zulässiges Datum (ISO-Format).
gws.plugin.model_validator.date_range.Config.max.example = "2099-12-31"


[en]

# --- not_empty -------------------------------------------------------------

gws.plugin.model_validator.not_empty.Config.label = Required-value validator
gws.plugin.model_validator.not_empty.Config.purpose = Ensures the field holds a non-empty value. Complements the `isRequired` flag and emits its own error message.
gws.plugin.model_validator.not_empty.Config.whenToUse = Required fields where empty strings, null values, or empty lists must be rejected.
gws.plugin.model_validator.not_empty.Config.complexity = basic

# --- regex -----------------------------------------------------------------

gws.plugin.model_validator.regex.Config.label = Regex validator
gws.plugin.model_validator.regex.Config.purpose = Validates the field value against a regular expression. Enforces format-bound input (postcodes, file numbers, IDs).
gws.plugin.model_validator.regex.Config.complexity = basic
gws.plugin.model_validator.regex.Config.useCases = Postcodes, file numbers, phone numbers, alphanumeric codes.

gws.plugin.model_validator.regex.Config.regex.label = Regular expression
gws.plugin.model_validator.regex.Config.regex.purpose = Python regex matched against the field value.
gws.plugin.model_validator.regex.Config.regex.complexity = basic
gws.plugin.model_validator.regex.Config.regex.example = "^[0-9]{5}$"

# --- format ----------------------------------------------------------------

gws.plugin.model_validator.format.Config.label = Format validator
gws.plugin.model_validator.format.Config.purpose = Checks whether the input matches the expected data-type format (e.g. whether a date string is parsable). Used internally as a default validator before save.
gws.plugin.model_validator.format.Config.complexity = intermediate

# --- number_range ----------------------------------------------------------

gws.plugin.model_validator.number_range.Config.label = Number range
gws.plugin.model_validator.number_range.Config.purpose = Checks whether a numeric value lies within a min/max range.
gws.plugin.model_validator.number_range.Config.complexity = basic
gws.plugin.model_validator.number_range.Config.useCases = Plausibility checks for quantities, heights, percentages.

gws.plugin.model_validator.number_range.Config.min.label = Minimum
gws.plugin.model_validator.number_range.Config.min.purpose = Smallest allowed value (inclusive).
gws.plugin.model_validator.number_range.Config.min.example = 0

gws.plugin.model_validator.number_range.Config.max.label = Maximum
gws.plugin.model_validator.number_range.Config.max.purpose = Largest allowed value (inclusive).
gws.plugin.model_validator.number_range.Config.max.example = 100

# --- date_range ------------------------------------------------------------

gws.plugin.model_validator.date_range.Config.label = Date range
gws.plugin.model_validator.date_range.Config.purpose = Checks whether a date or datetime value lies within a min/max range.
gws.plugin.model_validator.date_range.Config.complexity = intermediate
gws.plugin.model_validator.date_range.Config.useCases = Plausibility of birthdays, capture dates, deadlines.

gws.plugin.model_validator.date_range.Config.min.label = Earliest date
gws.plugin.model_validator.date_range.Config.min.purpose = Earliest allowed date (ISO format).
gws.plugin.model_validator.date_range.Config.min.example = "2000-01-01"

gws.plugin.model_validator.date_range.Config.max.label = Latest date
gws.plugin.model_validator.date_range.Config.max.purpose = Latest allowed date (ISO format).
gws.plugin.model_validator.date_range.Config.max.example = "2099-12-31"
