# UX-Strings für den Nominatim-Geocoder (Welle C).

[de]

# --- finder ---------------------------------------------------------------

gws.plugin.nominatim.finder.Config.label = Nominatim-Geocoder
gws.plugin.nominatim.finder.Config.purpose = Adress-/Ortssuche über die Nominatim-API von OpenStreetMap. Standardmäßig wird der öffentliche Endpunkt nominatim.openstreetmap.org genutzt; für höheres Lastvolumen sollte ein eigener Server betrieben werden.
gws.plugin.nominatim.finder.Config.whenToUse = Wenn Anwender Adressen, Orte oder POI über eine Volltext-Suche auf der Karte finden sollen.
gws.plugin.nominatim.finder.Config.complexity = intermediate
gws.plugin.nominatim.finder.Config.useCases = Adresseingabe in einer Karten-Anwendung, Geocoder für mobile Außendienst-Apps, Such-Schlitz für POI-Recherche.
gws.plugin.nominatim.finder.Config.docsLink = https://nominatim.org/release-docs/develop/api/Search/

gws.plugin.nominatim.finder.Config.country.label = Länder-Filter
gws.plugin.nominatim.finder.Config.country.purpose = ISO-3166-1-alpha-2-Ländercode, auf den die Suche eingeschränkt wird (z. B. "de" für Deutschland). Leer = weltweit.
gws.plugin.nominatim.finder.Config.country.example = "de"

gws.plugin.nominatim.finder.Config.language.label = Antwort-Sprache
gws.plugin.nominatim.finder.Config.language.purpose = Sprachcode für die Treffer-Texte (z. B. "de", "en"). Wirkt auf Ortsnamen und Beschreibungen, soweit Nominatim sie liefert.
gws.plugin.nominatim.finder.Config.language.example = "de"

# --- model ----------------------------------------------------------------

gws.plugin.nominatim.model.Config.label = Nominatim-Datenmodell
gws.plugin.nominatim.model.Config.purpose = Datenmodell für Nominatim-Treffer. Mappt die Nominatim-Antwort auf typisierte Felder (Name, Adresse, OSM-Klasse).
gws.plugin.nominatim.model.Config.whenToUse = Wird durch den Nominatim-Finder automatisch erzeugt; manuelle Konfiguration nur bei Sonderwünschen.
gws.plugin.nominatim.model.Config.complexity = advanced

gws.plugin.nominatim.model.Config.country.label = Länder-Filter
gws.plugin.nominatim.model.Config.country.purpose = Länder-Einschränkung (siehe finder.Config.country).
gws.plugin.nominatim.model.Config.country.example = "de"

gws.plugin.nominatim.model.Config.language.label = Antwort-Sprache
gws.plugin.nominatim.model.Config.language.purpose = Sprache der Antwort (siehe finder.Config.language).
gws.plugin.nominatim.model.Config.language.example = "de"

[en]

# --- finder ---------------------------------------------------------------

gws.plugin.nominatim.finder.Config.label = Nominatim geocoder
gws.plugin.nominatim.finder.Config.purpose = Address and place search via the Nominatim API from OpenStreetMap. The default endpoint is the public nominatim.openstreetmap.org server; for higher traffic operate your own instance.
gws.plugin.nominatim.finder.Config.whenToUse = When users need to find addresses, places or POIs on the map via full-text search.
gws.plugin.nominatim.finder.Config.complexity = intermediate
gws.plugin.nominatim.finder.Config.useCases = Address input in map applications, geocoder for mobile field apps, POI search slot.
gws.plugin.nominatim.finder.Config.docsLink = https://nominatim.org/release-docs/develop/api/Search/

gws.plugin.nominatim.finder.Config.country.label = Country filter
gws.plugin.nominatim.finder.Config.country.purpose = ISO-3166-1 alpha-2 country code that limits the search (e.g. "de" for Germany). Empty = worldwide.
gws.plugin.nominatim.finder.Config.country.example = "de"

gws.plugin.nominatim.finder.Config.language.label = Response language
gws.plugin.nominatim.finder.Config.language.purpose = Language code for the result texts (e.g. "de", "en"). Affects place names and descriptions where available.
gws.plugin.nominatim.finder.Config.language.example = "de"

# --- model ----------------------------------------------------------------

gws.plugin.nominatim.model.Config.label = Nominatim data model
gws.plugin.nominatim.model.Config.purpose = Data model for Nominatim hits. Maps the Nominatim response onto typed fields (name, address, OSM class).
gws.plugin.nominatim.model.Config.whenToUse = Created automatically by the Nominatim finder; configure manually only for special requirements.
gws.plugin.nominatim.model.Config.complexity = advanced

gws.plugin.nominatim.model.Config.country.label = Country filter
gws.plugin.nominatim.model.Config.country.purpose = Country restriction (see finder.Config.country).
gws.plugin.nominatim.model.Config.country.example = "de"

gws.plugin.nominatim.model.Config.language.label = Response language
gws.plugin.nominatim.model.Config.language.purpose = Response language (see finder.Config.language).
gws.plugin.nominatim.model.Config.language.example = "de"
