# UX-Strings für Exporter-Plugins (plugin/exporter).
#
# Schlüsselformat: gws.plugin.exporter.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.

[de]

# --- shapefile ---------------------------------------------------------------

gws.plugin.exporter.shapefile.Config.label = Shapefile-Export
gws.plugin.exporter.shapefile.Config.purpose = Exportiert Vektor-Features als ESRI-Shapefile. Mehrere Modelle werden in einer ZIP-Datei mit jeweils einem Shapefile pro Modell gebündelt.
gws.plugin.exporter.shapefile.Config.whenToUse = Standard-Auswahl, wenn Anwender ausgewählte Features als Datei herunterladen sollen und ein weit verbreitetes GIS-Format gebraucht wird.
gws.plugin.exporter.shapefile.Config.complexity = intermediate
gws.plugin.exporter.shapefile.Config.useCases = Download von Auswahl-Features, Datenübergabe an Sachbearbeiter, Austausch mit Fachverfahren ohne PostGIS-Zugriff.
gws.plugin.exporter.shapefile.Config.seeAlso = gws.base.exporter.core.Config

[en]

# --- shapefile ---------------------------------------------------------------

gws.plugin.exporter.shapefile.Config.label = Shapefile export
gws.plugin.exporter.shapefile.Config.purpose = Exports vector features as ESRI Shapefile. Multiple models are bundled into a ZIP archive with one shapefile per model.
gws.plugin.exporter.shapefile.Config.whenToUse = Default choice when users should download selected features as a file in a widely supported GIS format.
gws.plugin.exporter.shapefile.Config.complexity = intermediate
gws.plugin.exporter.shapefile.Config.useCases = Download of selected features, data hand-off to operators, exchange with non-PostGIS systems.
gws.plugin.exporter.shapefile.Config.seeAlso = gws.base.exporter.core.Config
