gws.plugin.alkis.action.ExportFlurstueckRequest.findRequest.label = Parcel search request
gws.plugin.alkis.action.ExportFlurstueckRequest.findRequest.purpose = Embedded parcel search request that selects the parcels to export.

gws.plugin.alkis.action.ExportFlurstueckRequest.exporterUid.label = Exporter UID
gws.plugin.alkis.action.ExportFlurstueckRequest.exporterUid.purpose = UID of the export profile to use.

gws.plugin.alkis.action.ExportFlurstueckRequest.eigentuemerControlInput.label = Justification
gws.plugin.alkis.action.ExportFlurstueckRequest.eigentuemerControlInput.purpose = Justification for an export that includes owner data (see controlRules).
