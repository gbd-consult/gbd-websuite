# UX-Strings für das Template-Subsystem (base/template).
#
# Schlüsselformat: gws.base.template.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Inhalte konservativ aus Klassen-Docstrings und admin-de.doc.md
# abgeleitet — keine Phantasietexte.

[de]

# --- core --------------------------------------------------------------------

gws.base.template.core.Config.label = Vorlage
gws.base.template.core.Config.purpose = Gemeinsame Basis-Konfiguration für alle Vorlagentypen (HTML, Karte, Text, Python, XML). Definiert Format, Seitengröße, Kartengröße und das Subjekt der Vorlage.
gws.base.template.core.Config.whenToUse = Wird über Subklassen verwendet — direkt benötigt man die konkreten Vorlagentypen unter gws.plugin.template.* oder gws.plugin.qgis.template.
gws.base.template.core.Config.complexity = intermediate
gws.base.template.core.Config.useCases = Druckvorlagen, Feature-Infoboxen, Layer-Infoboxen, OWS-XML-Templates, Projekt-Beschreibungen.
gws.base.template.core.Config.docsLink = /admin-de/config/template

gws.base.template.core.Config.title.label = Titel
gws.base.template.core.Config.title.purpose = Anzeigetitel der Vorlage. Wird bei Druckern als Default-Druckertitel verwendet.
gws.base.template.core.Config.title.complexity = basic
gws.base.template.core.Config.title.example = "Übersichtsplan"

gws.base.template.core.Config.subject.label = Subjekt
gws.base.template.core.Config.subject.purpose = Verwendungszweck der Vorlage, z. B. feature.title, feature.description, layer.description, ows.GetFeatureInfo. Bestimmt, in welchem Kontext die Vorlage gefunden und gerendert wird.
gws.base.template.core.Config.subject.example = "feature.title"

gws.base.template.core.Config.mimeTypes.label = Erzeugte MIME-Typen
gws.base.template.core.Config.mimeTypes.purpose = MIME-Typen, die die Vorlage erzeugen kann. Die Render-Pipeline wählt eine passende Vorlage anhand des angeforderten MIME-Typs aus.
gws.base.template.core.Config.mimeTypes.complexity = intermediate
gws.base.template.core.Config.mimeTypes.example = ["text/html"]

gws.base.template.core.Config.pageSize.label = Seitengröße
gws.base.template.core.Config.pageSize.purpose = Seitengröße der Druckausgabe als Tripel (Breite, Höhe, Einheit). Default ist DIN A4 hoch.
gws.base.template.core.Config.pageSize.complexity = intermediate
gws.base.template.core.Config.pageSize.example = [210, 297, "mm"]

gws.base.template.core.Config.pageMargin.label = Seitenränder
gws.base.template.core.Config.pageMargin.purpose = Seitenränder als 4-Tupel (top, right, bottom, left, Einheit).
gws.base.template.core.Config.pageMargin.complexity = intermediate

gws.base.template.core.Config.mapSize.label = Kartengröße
gws.base.template.core.Config.mapSize.purpose = Größe der eingebetteten Karte in der Vorlage. Default ist 50x50 mm.
gws.base.template.core.Config.mapSize.complexity = intermediate
gws.base.template.core.Config.mapSize.example = [150, 150, "mm"]

[en]

# --- core --------------------------------------------------------------------

gws.base.template.core.Config.label = Template
gws.base.template.core.Config.purpose = Common base configuration for all template types (HTML, map, text, Python, XML). Defines format, page size, map size and the template subject.
gws.base.template.core.Config.whenToUse = Used through its subclasses — direct configuration uses the concrete template types under gws.plugin.template.* or gws.plugin.qgis.template.
gws.base.template.core.Config.complexity = intermediate
gws.base.template.core.Config.useCases = Print templates, feature infoboxes, layer infoboxes, OWS XML templates, project descriptions.
gws.base.template.core.Config.docsLink = /admin-de/config/template

gws.base.template.core.Config.title.label = Title
gws.base.template.core.Config.title.purpose = Display title of the template. Used as default printer title when attached to a printer.
gws.base.template.core.Config.title.complexity = basic

gws.base.template.core.Config.subject.label = Subject
gws.base.template.core.Config.subject.purpose = Purpose of the template, e.g. feature.title, feature.description, layer.description, ows.GetFeatureInfo. Determines in which context the template is selected and rendered.
gws.base.template.core.Config.subject.example = "feature.title"

gws.base.template.core.Config.mimeTypes.label = Produced MIME types
gws.base.template.core.Config.mimeTypes.purpose = MIME types this template can produce. The render pipeline picks a matching template based on the requested MIME type.
gws.base.template.core.Config.mimeTypes.complexity = intermediate

gws.base.template.core.Config.pageSize.label = Page size
gws.base.template.core.Config.pageSize.purpose = Page size of the print output as (width, height, unit). Defaults to A4 portrait.
gws.base.template.core.Config.pageSize.complexity = intermediate

gws.base.template.core.Config.pageMargin.label = Page margin
gws.base.template.core.Config.pageMargin.purpose = Page margins as (top, right, bottom, left, unit) tuple.
gws.base.template.core.Config.pageMargin.complexity = intermediate

gws.base.template.core.Config.mapSize.label = Map size
gws.base.template.core.Config.mapSize.purpose = Size of the map embedded in the template. Defaults to 50x50 mm.
gws.base.template.core.Config.mapSize.complexity = intermediate
