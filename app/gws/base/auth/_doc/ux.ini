# UX-Strings für den Auth-Kern.
#
# Schlüsselformat: gws.base.auth.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Inhalte konservativ aus _doc/strings.ini und den Klassen-Docstrings
# abgeleitet — keine Phantasie-Texte. Plugin-spezifische Auth-Methoden,
# MFA-Adapter, Auth-Provider und Account-Logik werden separat in den
# jeweiligen Plugin-Verzeichnissen gepflegt.

[de]

# --- cli --------------------------------------------------------------------

gws.base.auth.cli.Object.label = Auth-CLI
gws.base.auth.cli.Object.purpose = Kommandozeilen-Werkzeuge für die Authentifizierung. Stellt die Befehle "auth sessions" (aktive Sessions anzeigen) und "auth sessrem" (Sessions löschen) bereit.
gws.base.auth.cli.Object.complexity = advanced

gws.base.auth.cli.RemoveParams.label = Session-Löschparameter
gws.base.auth.cli.RemoveParams.purpose = Parameter für den CLI-Befehl "auth sessrem" zum gezielten oder vollständigen Entfernen aktiver Sessions.
gws.base.auth.cli.RemoveParams.complexity = advanced

gws.base.auth.cli.RemoveParams.all.label = Alle löschen
gws.base.auth.cli.RemoveParams.all.purpose = Entfernt alle aktiven Sessions ohne weitere Filterung.

gws.base.auth.cli.RemoveParams.older.label = Alter in Sekunden
gws.base.auth.cli.RemoveParams.older.purpose = Entfernt nur Sessions, die seit mehr als N Sekunden nicht mehr aktualisiert wurden.
gws.base.auth.cli.RemoveParams.older.example = 86400

gws.base.auth.cli.RemoveParams.uid.label = Session-UIDs
gws.base.auth.cli.RemoveParams.uid.purpose = Liste von Session-UIDs, die gezielt entfernt werden sollen.

# --- manager ----------------------------------------------------------------

gws.base.auth.manager.Config.label = Authentifizierungs-Kern
gws.base.auth.manager.Config.purpose = Zentrale Konfiguration für Authentifizierung und Autorisierung. Hier werden die verfügbaren Anmeldemethoden, Identitätsanbieter, Multi-Faktor-Adapter und der Session-Manager zusammengeführt.
gws.base.auth.manager.Config.whenToUse = Pflicht in jeder Anwendung, die mehr als reinen Gast-Zugriff benötigt. Für reine Gast-Setups wird automatisch ein Default-Web-Method angelegt.
gws.base.auth.manager.Config.complexity = intermediate
gws.base.auth.manager.Config.useCases = Web-Login mit Cookie-Sessions, kombinierte Authentifizierung gegen LDAP und lokale Datei, Multi-Faktor-Authentifizierung über E-Mail-OTP.

gws.base.auth.manager.Config.methods.label = Anmeldemethoden
gws.base.auth.manager.Config.methods.purpose = Liste der aktiven Authentifizierungsmethoden, etwa Web-Form-Login, HTTP-Basic oder Token-Verfahren. Die Methoden werden in der angegebenen Reihenfolge probiert.

gws.base.auth.manager.Config.providers.label = Identitätsanbieter
gws.base.auth.manager.Config.providers.purpose = Liste der konfigurierten Auth-Provider, gegen die Anmeldedaten geprüft werden (z. B. Datei, LDAP, SQL). Ein interner System-Provider für die Nutzer "guest" und "system" wird automatisch ergänzt.

gws.base.auth.manager.Config.mfa.label = MFA-Adapter
gws.base.auth.manager.Config.mfa.purpose = Liste der konfigurierten Multi-Faktor-Adapter, auf die Benutzer per "mfaUid"-Attribut verweisen können.
gws.base.auth.manager.Config.mfa.complexity = advanced

gws.base.auth.manager.Config.session.label = Session-Manager
gws.base.auth.manager.Config.session.purpose = Konfiguration des Session-Managers. Fehlt der Eintrag, wird ein SQLite-basierter Session-Manager mit Defaults verwendet.

# --- method (Basis-Config aller Auth-Methoden) ------------------------------

gws.base.auth.method.Config.label = Anmeldemethode (Basis)
gws.base.auth.method.Config.purpose = Gemeinsame Basis-Konfiguration für alle Authentifizierungsmethoden. Konkrete Methoden (Web, Basic, Token, OAuth, …) werden über das Plugin auth_method konfiguriert und erben diese Felder.
gws.base.auth.method.Config.complexity = intermediate

gws.base.auth.method.Config.secure.label = Nur über HTTPS
gws.base.auth.method.Config.secure.purpose = Wenn aktiv, akzeptiert die Methode Anmeldedaten ausschliesslich über verschlüsselte Verbindungen. Default ist true und sollte in produktiven Umgebungen nicht deaktiviert werden.
gws.base.auth.method.Config.secure.example = true

gws.base.auth.method.Config.allowInsecureFrom.label = Unverschlüsselt erlaubt von
gws.base.auth.method.Config.allowInsecureFrom.purpose = Whitelist von IP-Adressen, denen Anmeldungen auch ohne HTTPS erlaubt werden. Nur für isolierte Testumgebungen oder vertrauenswürdige Reverse-Proxy-Setups.
gws.base.auth.method.Config.allowInsecureFrom.complexity = advanced

# --- mfa (Basis-Config aller MFA-Adapter) -----------------------------------

gws.base.auth.mfa.Config.label = MFA-Adapter (Basis)
gws.base.auth.mfa.Config.purpose = Gemeinsame Basis-Konfiguration für Multi-Faktor-Authentifizierungs-Adapter. Konkrete Adapter (E-Mail-OTP, TOTP, …) werden über das Plugin auth_mfa konfiguriert.
gws.base.auth.mfa.Config.complexity = advanced

gws.base.auth.mfa.Config.message.label = Anweisungstext
gws.base.auth.mfa.Config.message.purpose = Im Client angezeigte Aufforderung an den Benutzer, z. B. "Bitte geben Sie den per E-Mail erhaltenen Code ein."

gws.base.auth.mfa.Config.lifeTime.label = Maximale Wartezeit
gws.base.auth.mfa.Config.lifeTime.purpose = Zeitraum (in Sekunden), innerhalb dessen die MFA-Verifizierung abgeschlossen sein muss. Default 120.
gws.base.auth.mfa.Config.lifeTime.example = 120

gws.base.auth.mfa.Config.maxVerifyAttempts.label = Maximale Verifizierungsversuche
gws.base.auth.mfa.Config.maxVerifyAttempts.purpose = Anzahl erlaubter Falscheingaben, bevor die Transaktion endgültig fehlschlägt. Default 3.
gws.base.auth.mfa.Config.maxVerifyAttempts.example = 3

gws.base.auth.mfa.Config.maxRestarts.label = Maximale Neustarts
gws.base.auth.mfa.Config.maxRestarts.purpose = Anzahl, wie oft der Benutzer einen neuen Code anfordern darf (z. B. erneuter E-Mail-Versand). Default 0 (keine Neustarts).
gws.base.auth.mfa.Config.maxRestarts.example = 0

gws.base.auth.mfa.Config.otp.label = OTP-Optionen
gws.base.auth.mfa.Config.otp.purpose = Detaileinstellungen für die OTP-Erzeugung (Algorithmus, Länge, Zeitfenster).
gws.base.auth.mfa.Config.otp.complexity = advanced

gws.base.auth.mfa.OtpConfig.label = OTP-Erzeugungsoptionen
gws.base.auth.mfa.OtpConfig.purpose = Parameter für die Erzeugung und Verifikation zeitbasierter Einmalpasswörter (TOTP).
gws.base.auth.mfa.OtpConfig.complexity = advanced

gws.base.auth.mfa.OtpConfig.algo.label = Hash-Algorithmus
gws.base.auth.mfa.OtpConfig.algo.purpose = Kryptografischer Hash-Algorithmus für die OTP-Berechnung, üblich sind SHA1, SHA256 oder SHA512.
gws.base.auth.mfa.OtpConfig.algo.example = "sha1"

gws.base.auth.mfa.OtpConfig.length.label = Code-Länge
gws.base.auth.mfa.OtpConfig.length.purpose = Anzahl der Stellen des erzeugten Einmalpassworts.
gws.base.auth.mfa.OtpConfig.length.example = 6

gws.base.auth.mfa.OtpConfig.start.label = Startzeitpunkt
gws.base.auth.mfa.OtpConfig.start.purpose = Unix-Timestamp als Referenzzeitpunkt für die TOTP-Berechnung. Üblich ist 0.

gws.base.auth.mfa.OtpConfig.step.label = Zeitfenster
gws.base.auth.mfa.OtpConfig.step.purpose = Gültigkeitsdauer eines TOTP-Codes in Sekunden, klassisch 30.
gws.base.auth.mfa.OtpConfig.step.example = 30

gws.base.auth.mfa.OtpConfig.tolerance.label = Akzeptierte Vorgängerfenster
gws.base.auth.mfa.OtpConfig.tolerance.purpose = Anzahl zusätzlicher TOTP-Zeitfenster, die zur Kompensation von Uhrenabweichungen akzeptiert werden.

# --- provider (Basis-Config aller Auth-Provider) ----------------------------

gws.base.auth.provider.Config.label = Identitätsanbieter (Basis)
gws.base.auth.provider.Config.purpose = Gemeinsame Basis-Konfiguration für alle Authentifizierungs-Provider. Konkrete Provider (Datei, LDAP, SQL, PostgreSQL, …) werden über das Plugin auth_provider konfiguriert und erben diese Felder.
gws.base.auth.provider.Config.complexity = intermediate

gws.base.auth.provider.Config.allowedMethods.label = Erlaubte Anmeldemethoden
gws.base.auth.provider.Config.allowedMethods.purpose = Whitelist von Methoden-Typen, mit denen sich Benutzer dieses Providers anmelden dürfen (z. B. nur "web" oder "basic"). Leer = alle erlaubt.
gws.base.auth.provider.Config.allowedMethods.complexity = intermediate

# --- session_manager -------------------------------------------------------

gws.base.auth.session_manager.Config.label = Session-Manager (Basis)
gws.base.auth.session_manager.Config.purpose = Gemeinsame Basis-Konfiguration für Session-Manager. Konkrete Implementierungen (z. B. SQLite) liegen im Plugin auth_session_manager und erben diese Felder.
gws.base.auth.session_manager.Config.complexity = intermediate

gws.base.auth.session_manager.Config.lifeTime.label = Session-Lebensdauer
gws.base.auth.session_manager.Config.lifeTime.purpose = Inaktivitäts-Timeout in Sekunden, nach dem eine Session als abgelaufen betrachtet und beim nächsten Cleanup gelöscht wird. Default 1200 (20 Minuten).
gws.base.auth.session_manager.Config.lifeTime.example = 1200

# --- sql_provider (Basis SQL-Auth-Provider) --------------------------------

gws.base.auth.sql_provider.Config.label = SQL-Identitätsanbieter
gws.base.auth.sql_provider.Config.purpose = Authentifizierung gegen einen relationalen Datenbank-Provider über zwei konfigurierbare SELECT-Statements: eine Autorisierungsabfrage zum Login und eine Get-User-Abfrage zum Auflösen einer User-UID.
gws.base.auth.sql_provider.Config.whenToUse = Wenn Benutzerstamm und Passwort-Hashes in einer eigenen Datenbank-Tabelle gepflegt werden, statt in einer Datei oder im LDAP.
gws.base.auth.sql_provider.Config.complexity = advanced
gws.base.auth.sql_provider.Config.useCases = Eigenes Benutzerschema mit pgcrypto-Passworthashes, Anbindung an bestehende Fachverfahrens-Benutzertabellen.

gws.base.auth.sql_provider.Config.dbUid.label = Datenbank-Provider
gws.base.auth.sql_provider.Config.dbUid.purpose = UID des Datenbank-Providers, gegen den die SQL-Statements ausgeführt werden. Wenn leer, wird der einzige konfigurierte SQL-Provider verwendet.

gws.base.auth.sql_provider.Config.authorizationSql.label = Autorisierungs-SQL
gws.base.auth.sql_provider.Config.authorizationSql.purpose = SQL-Statement für den Login. Erhält die Platzhalter {username}, {password} und {token} und muss eine Zeile mit den Spalten validuser, validpassword, uid und optional roles zurückgeben.
gws.base.auth.sql_provider.Config.authorizationSql.complexity = advanced

gws.base.auth.sql_provider.Config.getUserSql.label = Benutzerdaten-SQL
gws.base.auth.sql_provider.Config.getUserSql.purpose = SQL-Statement zum Auflösen einer User-UID auf den vollständigen Benutzersatz. Erhält den Platzhalter {uid}.
gws.base.auth.sql_provider.Config.getUserSql.complexity = advanced


[en]

# --- cli --------------------------------------------------------------------

gws.base.auth.cli.Object.label = Auth CLI
gws.base.auth.cli.Object.purpose = Command-line tools for authentication. Provides "auth sessions" (list active sessions) and "auth sessrem" (remove sessions).
gws.base.auth.cli.Object.complexity = advanced

gws.base.auth.cli.RemoveParams.label = Session removal parameters
gws.base.auth.cli.RemoveParams.purpose = Parameters for the "auth sessrem" CLI command to selectively or fully remove active sessions.
gws.base.auth.cli.RemoveParams.complexity = advanced

gws.base.auth.cli.RemoveParams.all.label = Remove all
gws.base.auth.cli.RemoveParams.all.purpose = Remove every active session without further filtering.

gws.base.auth.cli.RemoveParams.older.label = Age in seconds
gws.base.auth.cli.RemoveParams.older.purpose = Remove only sessions inactive for more than N seconds.
gws.base.auth.cli.RemoveParams.older.example = 86400

gws.base.auth.cli.RemoveParams.uid.label = Session UIDs
gws.base.auth.cli.RemoveParams.uid.purpose = List of specific session UIDs to remove.

# --- manager ----------------------------------------------------------------

gws.base.auth.manager.Config.label = Authentication core
gws.base.auth.manager.Config.purpose = Central authentication and authorization configuration. Combines the available login methods, identity providers, multi-factor adapters and the session manager.
gws.base.auth.manager.Config.whenToUse = Required for any application beyond pure guest access. For pure guest setups a default web method is created automatically.
gws.base.auth.manager.Config.complexity = intermediate
gws.base.auth.manager.Config.useCases = Cookie-based web login, combined LDAP and file authentication, e-mail OTP multi-factor.

gws.base.auth.manager.Config.methods.label = Login methods
gws.base.auth.manager.Config.methods.purpose = List of active authentication methods, e.g. web form, HTTP basic or token. Methods are tried in the configured order.

gws.base.auth.manager.Config.providers.label = Identity providers
gws.base.auth.manager.Config.providers.purpose = List of configured auth providers credentials are checked against (file, LDAP, SQL, …). An internal system provider for the "guest" and "system" users is added automatically.

gws.base.auth.manager.Config.mfa.label = MFA adapters
gws.base.auth.manager.Config.mfa.purpose = List of configured multi-factor adapters; users can reference them via the "mfaUid" attribute.
gws.base.auth.manager.Config.mfa.complexity = advanced

gws.base.auth.manager.Config.session.label = Session manager
gws.base.auth.manager.Config.session.purpose = Session manager configuration. If absent, a SQLite-backed session manager with defaults is used.

# --- method (base config for all auth methods) ------------------------------

gws.base.auth.method.Config.label = Auth method (base)
gws.base.auth.method.Config.purpose = Common base configuration for every authentication method. Concrete methods (web, basic, token, OAuth, …) are configured via the auth_method plugin and inherit these fields.
gws.base.auth.method.Config.complexity = intermediate

gws.base.auth.method.Config.secure.label = HTTPS only
gws.base.auth.method.Config.secure.purpose = If true, the method only accepts credentials over encrypted connections. Default true; do not disable in production.
gws.base.auth.method.Config.secure.example = true

gws.base.auth.method.Config.allowInsecureFrom.label = Allow insecure from
gws.base.auth.method.Config.allowInsecureFrom.purpose = IP allowlist for non-HTTPS logins. Only meant for isolated test environments or trusted reverse-proxy setups.
gws.base.auth.method.Config.allowInsecureFrom.complexity = advanced

# --- mfa (base config for all MFA adapters) ---------------------------------

gws.base.auth.mfa.Config.label = MFA adapter (base)
gws.base.auth.mfa.Config.purpose = Common base configuration for multi-factor authentication adapters. Concrete adapters (e-mail OTP, TOTP, …) are configured via the auth_mfa plugin.
gws.base.auth.mfa.Config.complexity = advanced

gws.base.auth.mfa.Config.message.label = Prompt text
gws.base.auth.mfa.Config.message.purpose = Message shown to the user, e.g. "Please enter the code from the e-mail."

gws.base.auth.mfa.Config.lifeTime.label = Maximum wait time
gws.base.auth.mfa.Config.lifeTime.purpose = Time window (seconds) in which the MFA verification has to be completed. Default 120.
gws.base.auth.mfa.Config.lifeTime.example = 120

gws.base.auth.mfa.Config.maxVerifyAttempts.label = Max verify attempts
gws.base.auth.mfa.Config.maxVerifyAttempts.purpose = Number of allowed failed inputs before the transaction fails permanently. Default 3.
gws.base.auth.mfa.Config.maxVerifyAttempts.example = 3

gws.base.auth.mfa.Config.maxRestarts.label = Max restarts
gws.base.auth.mfa.Config.maxRestarts.purpose = How often the user may request a fresh code (e.g. resend e-mail). Default 0 (no restarts).
gws.base.auth.mfa.Config.maxRestarts.example = 0

gws.base.auth.mfa.Config.otp.label = OTP options
gws.base.auth.mfa.Config.otp.purpose = Detail settings for OTP generation (algorithm, length, time window).
gws.base.auth.mfa.Config.otp.complexity = advanced

gws.base.auth.mfa.OtpConfig.label = OTP generation options
gws.base.auth.mfa.OtpConfig.purpose = Parameters for generation and verification of time-based one-time passwords (TOTP).
gws.base.auth.mfa.OtpConfig.complexity = advanced

gws.base.auth.mfa.OtpConfig.algo.label = Hash algorithm
gws.base.auth.mfa.OtpConfig.algo.purpose = Cryptographic hash algorithm for OTP computation; common choices are SHA1, SHA256, SHA512.
gws.base.auth.mfa.OtpConfig.algo.example = "sha1"

gws.base.auth.mfa.OtpConfig.length.label = Code length
gws.base.auth.mfa.OtpConfig.length.purpose = Number of digits of the generated one-time password.
gws.base.auth.mfa.OtpConfig.length.example = 6

gws.base.auth.mfa.OtpConfig.start.label = Start timestamp
gws.base.auth.mfa.OtpConfig.start.purpose = Unix timestamp used as the TOTP reference time. Typically 0.

gws.base.auth.mfa.OtpConfig.step.label = Time window
gws.base.auth.mfa.OtpConfig.step.purpose = Validity period of one TOTP code in seconds, classically 30.
gws.base.auth.mfa.OtpConfig.step.example = 30

gws.base.auth.mfa.OtpConfig.tolerance.label = Backward tolerance
gws.base.auth.mfa.OtpConfig.tolerance.purpose = Number of additional past TOTP windows accepted to compensate for clock drift.

# --- provider (base config for all auth providers) --------------------------

gws.base.auth.provider.Config.label = Identity provider (base)
gws.base.auth.provider.Config.purpose = Common base configuration for every authentication provider. Concrete providers (file, LDAP, SQL, PostgreSQL, …) are configured via the auth_provider plugin and inherit these fields.
gws.base.auth.provider.Config.complexity = intermediate

gws.base.auth.provider.Config.allowedMethods.label = Allowed login methods
gws.base.auth.provider.Config.allowedMethods.purpose = Allowlist of method types whose users may authenticate against this provider (e.g. only "web" or "basic"). Empty = all allowed.
gws.base.auth.provider.Config.allowedMethods.complexity = intermediate

# --- session_manager -------------------------------------------------------

gws.base.auth.session_manager.Config.label = Session manager (base)
gws.base.auth.session_manager.Config.purpose = Common base configuration for session managers. Concrete implementations (e.g. SQLite) live in the auth_session_manager plugin and inherit these fields.
gws.base.auth.session_manager.Config.complexity = intermediate

gws.base.auth.session_manager.Config.lifeTime.label = Session lifetime
gws.base.auth.session_manager.Config.lifeTime.purpose = Inactivity timeout in seconds; sessions older than this are considered expired and dropped during the next cleanup. Default 1200 (20 minutes).
gws.base.auth.session_manager.Config.lifeTime.example = 1200

# --- sql_provider (base SQL auth provider) ---------------------------------

gws.base.auth.sql_provider.Config.label = SQL identity provider
gws.base.auth.sql_provider.Config.purpose = Authentication against a relational database provider via two configurable SELECT statements: an authorization query for login and a get-user query to resolve a user UID.
gws.base.auth.sql_provider.Config.whenToUse = When user accounts and password hashes live in your own database table rather than in a file or in LDAP.
gws.base.auth.sql_provider.Config.complexity = advanced
gws.base.auth.sql_provider.Config.useCases = Custom user schema with pgcrypto password hashes, integration with existing domain user tables.

gws.base.auth.sql_provider.Config.dbUid.label = Database provider
gws.base.auth.sql_provider.Config.dbUid.purpose = UID of the database provider that runs the SQL statements. If empty, the only configured SQL provider is used.

gws.base.auth.sql_provider.Config.authorizationSql.label = Authorization SQL
gws.base.auth.sql_provider.Config.authorizationSql.purpose = SQL statement for login. Receives placeholders {username}, {password} and {token}; must return a single row with columns validuser, validpassword, uid and optional roles.
gws.base.auth.sql_provider.Config.authorizationSql.complexity = advanced

gws.base.auth.sql_provider.Config.getUserSql.label = Get-user SQL
gws.base.auth.sql_provider.Config.getUserSql.purpose = SQL statement that resolves a user UID to the full user record. Receives placeholder {uid}.
gws.base.auth.sql_provider.Config.getUserSql.complexity = advanced
