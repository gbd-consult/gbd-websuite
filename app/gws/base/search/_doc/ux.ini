# UX-Strings für die Suche-Konfiguration (Welle C).
#
# Schlüsselformat: gws.base.search.<modul>.<class>[.<property>].<feldname>

[de]

# --- action ---------------------------------------------------------------

gws.base.search.action.Config.label = Suche
gws.base.search.action.Config.purpose = Aktiviert die zentrale Such-API. Das Frontend nutzt sie für räumliche Anfragen (Klick, Polygon) und Volltextsuchen über alle konfigurierten Finder.
gws.base.search.action.Config.whenToUse = In jeder Anwendung, in der Anwender suchen oder per Karten-Klick Objekte identifizieren können sollen.
gws.base.search.action.Config.complexity = basic
gws.base.search.action.Config.useCases = Volltextsuche über Layer hinweg, Klick-Identifizierung von Objekten, Polygon-Suche.

gws.base.search.action.Config.categories.label = Such-Kategorien
gws.base.search.action.Config.categories.purpose = Liste erlaubter Such-Kategorien. Filtert, welche Finder über diese Action erreichbar sind.

gws.base.search.action.Config.limit.label = Maximale Trefferzahl
gws.base.search.action.Config.limit.purpose = Globale Obergrenze für Suchergebnisse pro Anfrage (Default 1000).
gws.base.search.action.Config.limit.example = 1000

gws.base.search.action.Config.tolerance.label = Standard-Klick-Toleranz
gws.base.search.action.Config.tolerance.purpose = Default-Toleranzradius um den Klickpunkt für räumliche Suchen (Wert mit Einheit, z. B. Pixel).
gws.base.search.action.Config.tolerance.example = "10px"

# --- finder ---------------------------------------------------------------

gws.base.search.finder.Config.label = Finder-Basis-Konfiguration
gws.base.search.finder.Config.purpose = Gemeinsame Konfiguration für alle Finder-Implementierungen (Postgres, Nominatim, GBD-Geoservices, …). Legt fest, welche Suchmodi ein Finder anbietet, welche Datenmodelle und Templates verwendet werden.
gws.base.search.finder.Config.whenToUse = Wird über die konkreten Finder-Plugins eingebunden, nicht direkt instanziert.
gws.base.search.finder.Config.complexity = intermediate

gws.base.search.finder.Config.category.label = Kategorie
gws.base.search.finder.Config.category.purpose = Such-Kategorie, mit der dieser Finder angesprochen werden kann (z. B. zur Trennung in mehrere Suchschlitze).

gws.base.search.finder.Config.models.label = Datenmodelle
gws.base.search.finder.Config.models.purpose = Datenmodelle, die die Treffer-Features zurückliefern. Definieren Felder und Validierung.

gws.base.search.finder.Config.spatialContext.label = Räumlicher Kontext
gws.base.search.finder.Config.spatialContext.purpose = Begrenzung der Stichwort-Suche auf einen Ausschnitt: `map` (Karten-Extent) oder `view` (sichtbarer Ausschnitt im Client).
gws.base.search.finder.Config.spatialContext.example = "map"

gws.base.search.finder.Config.templates.label = Anzeige-Templates
gws.base.search.finder.Config.templates.purpose = Templates für die Formatierung der Treffer (Titel, Teaser, Detail-Beschreibung).

gws.base.search.finder.Config.title.label = Anzeige-Titel
gws.base.search.finder.Config.title.purpose = Lesbarer Titel des Finders, wie er im UI erscheint.
gws.base.search.finder.Config.title.complexity = basic

gws.base.search.finder.Config.withFilter.label = Filter-Suche aktiv
gws.base.search.finder.Config.withFilter.purpose = Wenn aktiv, akzeptiert der Finder strukturierte Filter-Ausdrücke (Default: aktiv).

gws.base.search.finder.Config.withGeometry.label = Geometrie-Suche aktiv
gws.base.search.finder.Config.withGeometry.purpose = Wenn aktiv, kann der Finder mit Klick- oder Polygon-Geometrien angesprochen werden (Default: aktiv).

gws.base.search.finder.Config.withKeyword.label = Stichwort-Suche aktiv
gws.base.search.finder.Config.withKeyword.purpose = Wenn aktiv, beantwortet der Finder Volltext-/Stichwort-Anfragen (Default: aktiv).

[en]

# --- action ---------------------------------------------------------------

gws.base.search.action.Config.label = Search
gws.base.search.action.Config.purpose = Enables the central search API. The frontend uses it for spatial queries (click, polygon) and full-text searches across all configured finders.
gws.base.search.action.Config.whenToUse = In any application where users need to search or identify features by clicking the map.
gws.base.search.action.Config.complexity = basic
gws.base.search.action.Config.useCases = Full-text search across layers, click-identify of features, polygon-based search.

gws.base.search.action.Config.categories.label = Search categories
gws.base.search.action.Config.categories.purpose = List of permitted search categories. Filters which finders are reachable via this action.

gws.base.search.action.Config.limit.label = Result limit
gws.base.search.action.Config.limit.purpose = Global upper limit on search results per request (default 1000).
gws.base.search.action.Config.limit.example = 1000

gws.base.search.action.Config.tolerance.label = Default click tolerance
gws.base.search.action.Config.tolerance.purpose = Default tolerance radius around the click point for spatial searches (value with unit, e.g. pixels).
gws.base.search.action.Config.tolerance.example = "10px"

# --- finder ---------------------------------------------------------------

gws.base.search.finder.Config.label = Finder base configuration
gws.base.search.finder.Config.purpose = Shared configuration for all finder implementations (Postgres, Nominatim, GBD geoservices, …). Defines which search modes a finder offers and which data models and templates it uses.
gws.base.search.finder.Config.whenToUse = Used through concrete finder plugins; not instantiated directly.
gws.base.search.finder.Config.complexity = intermediate

gws.base.search.finder.Config.category.label = Category
gws.base.search.finder.Config.category.purpose = Search category under which this finder is addressable (e.g. to split a UI into multiple search slots).

gws.base.search.finder.Config.models.label = Data models
gws.base.search.finder.Config.models.purpose = Data models that return the result features. Define fields and validation.

gws.base.search.finder.Config.spatialContext.label = Spatial context
gws.base.search.finder.Config.spatialContext.purpose = Restricts keyword search to a region: `map` (full map extent) or `view` (visible client extent).
gws.base.search.finder.Config.spatialContext.example = "map"

gws.base.search.finder.Config.templates.label = Display templates
gws.base.search.finder.Config.templates.purpose = Templates that format result features (title, teaser, detail description).

gws.base.search.finder.Config.title.label = Display title
gws.base.search.finder.Config.title.purpose = Human-readable title of the finder as shown in the UI.
gws.base.search.finder.Config.title.complexity = basic

gws.base.search.finder.Config.withFilter.label = Filter search enabled
gws.base.search.finder.Config.withFilter.purpose = If enabled, the finder accepts structured filter expressions (default: enabled).

gws.base.search.finder.Config.withGeometry.label = Geometry search enabled
gws.base.search.finder.Config.withGeometry.purpose = If enabled, the finder can be queried with click or polygon geometries (default: enabled).

gws.base.search.finder.Config.withKeyword.label = Keyword search enabled
gws.base.search.finder.Config.withKeyword.purpose = If enabled, the finder answers full-text/keyword requests (default: enabled).
