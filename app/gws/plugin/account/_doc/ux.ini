# UX-Strings für das Plugin gws.plugin.account.
#
# Schlüsselformat: gws.plugin.account.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Inhalte konservativ aus _doc/strings.ini, dem Klassen-Docstring von
# __init__.py und den Modul-Klassen abgeleitet — keine Phantasie-Texte.

[de]

# --- helper (globaler account-Helper) --------------------------------------

gws.plugin.account.helper.Config.label = Benutzerkonten-Helper
gws.plugin.account.helper.Config.purpose = Globaler Helper für das Account-Plugin. Verwaltet Benutzerkonten in einer Datenbanktabelle und stellt Datenmodelle, Passwort-Logik, Onboarding-Workflow und MFA-Optionen bereit. Wird von den ``account``-Actions, der ``accountadmin``-Action und dem ``account``-Auth-Provider gemeinsam genutzt.
gws.plugin.account.helper.Config.whenToUse = Pflicht-Helper, sobald Benutzerkonten in einer Datenbank gepflegt und vom Endanwender editiert werden sollen — Alternative zum reinen ``sql``-Auth-Provider, der nur authentifiziert.
gws.plugin.account.helper.Config.complexity = intermediate
gws.plugin.account.helper.Config.useCases = Self-Service-Onboarding per E-Mail, MFA-fähige Benutzerkonten, von Administratoren gepflegte Konten-Tabelle.
gws.plugin.account.helper.Config.seeAlso = gws.plugin.account.auth_provider.Config, gws.plugin.account.account_action.Config, gws.plugin.account.admin_action.Config

gws.plugin.account.helper.Config.adminModel.label = Admin-Datenmodell
gws.plugin.account.helper.Config.adminModel.purpose = Bearbeitungsmodell für die Konten-Tabelle aus Administrator-Sicht. Bestimmt, welche Felder Admins sehen und ändern dürfen.

gws.plugin.account.helper.Config.userModel.label = Endbenutzer-Datenmodell
gws.plugin.account.helper.Config.userModel.purpose = Bearbeitungsmodell für das Selbst-Verwaltungs-Dialog des Endbenutzers. Optional — wenn nicht gesetzt, können Endbenutzer ihre Daten nicht ändern.

gws.plugin.account.helper.Config.usernameColumn.label = Login-Spalte
gws.plugin.account.helper.Config.usernameColumn.purpose = Spalte der Konten-Tabelle, die als Login verwendet wird. Default ist ``email``.
gws.plugin.account.helper.Config.usernameColumn.example = "email"

gws.plugin.account.helper.Config.passwordCreateSql.label = Passwort-Hash-SQL
gws.plugin.account.helper.Config.passwordCreateSql.purpose = SQL-Ausdruck zur Berechnung von Passwort-Hashes. Default verwendet ``crypt(.., gen_salt('bf'))`` (PostgreSQL pgcrypto).
gws.plugin.account.helper.Config.passwordCreateSql.complexity = advanced
gws.plugin.account.helper.Config.passwordCreateSql.example = "crypt({password}, gen_salt('bf'))"

gws.plugin.account.helper.Config.passwordVerifySql.label = Passwort-Verifikations-SQL
gws.plugin.account.helper.Config.passwordVerifySql.purpose = SQL-Ausdruck zur Überprüfung eines Passworts gegen den gespeicherten Hash.
gws.plugin.account.helper.Config.passwordVerifySql.complexity = advanced
gws.plugin.account.helper.Config.passwordVerifySql.example = "crypt({password}, {passwordColumn})"

gws.plugin.account.helper.Config.tcLifeTime.label = Lebensdauer Temp-Codes
gws.plugin.account.helper.Config.tcLifeTime.purpose = Lebensdauer für temporäre Codes (Onboarding, Passwort-Reset). Default ist 3600 Sekunden.
gws.plugin.account.helper.Config.tcLifeTime.example = "1h"

gws.plugin.account.helper.Config.mfa.label = MFA-Methoden
gws.plugin.account.helper.Config.mfa.purpose = Liste der mehrstufigen Authentifizierungsmethoden, aus denen der Benutzer beim Onboarding wählen kann.
gws.plugin.account.helper.Config.mfa.complexity = advanced

gws.plugin.account.helper.Config.mfaIssuer.label = MFA-Aussteller
gws.plugin.account.helper.Config.mfaIssuer.purpose = Aussteller-Name in MFA-Schlüssel-URIs (TOTP-QR-Codes). Erscheint in der Authenticator-App des Benutzers.
gws.plugin.account.helper.Config.mfaIssuer.complexity = advanced
gws.plugin.account.helper.Config.mfaIssuer.example = "GBD WebSuite"

gws.plugin.account.helper.Config.onboardingUrl.label = Onboarding-URL
gws.plugin.account.helper.Config.onboardingUrl.purpose = Basis-URL für das E-Mail-Onboarding. Wird in Einladungs-Mails verwendet, um Benutzer auf die Passwort-Setzen-Seite zu schicken.
gws.plugin.account.helper.Config.onboardingUrl.example = "https://gws.example.com/onboarding"

gws.plugin.account.helper.Config.onboardingCompletionUrl.label = Onboarding-Abschluss-URL
gws.plugin.account.helper.Config.onboardingCompletionUrl.purpose = URL, auf die der Benutzer nach erfolgreichem Onboarding weitergeleitet wird.
gws.plugin.account.helper.Config.onboardingCompletionUrl.example = "https://gws.example.com/login"

gws.plugin.account.helper.Config.templates.label = Vorlagen
gws.plugin.account.helper.Config.templates.purpose = Vorlagen für Mails und sonstige Texte rund um Onboarding und Account-Verwaltung.

# --- helper.MfaConfig (Eintrag in helper.mfa) ------------------------------

gws.plugin.account.helper.MfaConfig.label = MFA-Methoden-Eintrag
gws.plugin.account.helper.MfaConfig.purpose = Konfiguration einer einzelnen mehrstufigen Authentifizierungsmethode, die dem Benutzer beim Onboarding angeboten wird.
gws.plugin.account.helper.MfaConfig.complexity = advanced

gws.plugin.account.helper.MfaConfig.mfaUid.label = MFA-Adapter-UID
gws.plugin.account.helper.MfaConfig.mfaUid.purpose = UID eines konfigurierten ``authMfa``-Adapters (z.B. TOTP).

gws.plugin.account.helper.MfaConfig.title.label = Titel
gws.plugin.account.helper.MfaConfig.title.purpose = Bezeichnung der Methode in der Auswahl-Oberfläche.
gws.plugin.account.helper.MfaConfig.title.example = "Authenticator-App"

# --- account_action (Endbenutzer-Account-Aktion) ---------------------------

gws.plugin.account.account_action.Config.label = Endbenutzer-Account-Aktion
gws.plugin.account.account_action.Config.purpose = Endbenutzer-Action für Self-Service: Onboarding-Workflow (Passwort setzen, MFA einrichten) und das Konto-Verwaltungs-Dialog. Liefert die Schnittstelle für die Client-Komponente ``Dialog.Account``.
gws.plugin.account.account_action.Config.whenToUse = In Projekten, in denen Endbenutzer ihre eigenen Konten verwalten oder über E-Mail-Einladungen onboarden sollen.
gws.plugin.account.account_action.Config.complexity = intermediate
gws.plugin.account.account_action.Config.seeAlso = gws.plugin.account.helper.Config, gws.plugin.account.admin_action.Config

# --- admin_action (Administrator-Aktion) -----------------------------------

gws.plugin.account.admin_action.Config.label = Account-Admin-Aktion
gws.plugin.account.admin_action.Config.purpose = Administrator-Action zur Verwaltung der Konten-Tabelle: Anlegen, Bearbeiten, Löschen und Zurücksetzen von Konten. Liefert die Schnittstelle für die Client-Komponente ``Sidebar.AccountAdmin``.
gws.plugin.account.admin_action.Config.whenToUse = In Admin-Projekten zum Pflegen der Benutzerkonten — typischerweise mit Lese-Berechtigung nur für die Admin-Rolle.
gws.plugin.account.admin_action.Config.complexity = intermediate
gws.plugin.account.admin_action.Config.seeAlso = gws.plugin.account.helper.Config, gws.plugin.account.account_action.Config

gws.plugin.account.admin_action.Config.models.label = Konten-Datenmodelle
gws.plugin.account.admin_action.Config.models.purpose = Optionale zusätzliche Datenmodelle für die Konten-Tabelle. Wenn nicht gesetzt, wird das ``adminModel`` aus dem Account-Helper verwendet.

# --- account_action: Onboarding-Requests ----------------------------------

gws.plugin.account.account_action.OnboardingStartRequest.tc.label = Onboarding-Token
gws.plugin.account.account_action.OnboardingStartRequest.tc.purpose = Vom Server signierter Einmal-Token aus der Onboarding-E-Mail. Identifiziert das Konto und sichert den Workflow gegen Manipulation ab.

gws.plugin.account.account_action.OnboardingSavePasswordRequest.tc.label = Onboarding-Token
gws.plugin.account.account_action.OnboardingSavePasswordRequest.tc.purpose = Onboarding-Token aus dem vorherigen Schritt; bindet die Passwort-Änderung an den eingeleiteten Workflow.

gws.plugin.account.account_action.OnboardingSavePasswordRequest.email.label = E-Mail
gws.plugin.account.account_action.OnboardingSavePasswordRequest.email.purpose = E-Mail-Adresse, die der Anwender zur Bestätigung erneut eingibt.

gws.plugin.account.account_action.OnboardingSavePasswordRequest.password1.label = Neues Passwort
gws.plugin.account.account_action.OnboardingSavePasswordRequest.password1.purpose = Neues Passwort des Anwenders.
gws.plugin.account.account_action.OnboardingSavePasswordRequest.password1.complexity = advanced

gws.plugin.account.account_action.OnboardingSavePasswordRequest.password2.label = Passwort-Bestätigung
gws.plugin.account.account_action.OnboardingSavePasswordRequest.password2.purpose = Wiederholung des neuen Passworts. Muss mit ``password1`` übereinstimmen.
gws.plugin.account.account_action.OnboardingSavePasswordRequest.password2.complexity = advanced

gws.plugin.account.account_action.OnboardingSaveMfaRequest.tc.label = Onboarding-Token
gws.plugin.account.account_action.OnboardingSaveMfaRequest.tc.purpose = Onboarding-Token aus dem vorherigen Schritt; bindet die MFA-Einrichtung an den eingeleiteten Workflow.

gws.plugin.account.account_action.OnboardingSaveMfaRequest.mfaIndex.label = MFA-Variante
gws.plugin.account.account_action.OnboardingSaveMfaRequest.mfaIndex.purpose = Index der ausgewählten MFA-Variante (0-basiert) aus der Liste der konfigurierten MFA-Optionen.

# --- admin_action: Reset ---------------------------------------------------

gws.plugin.account.admin_action.ResetRequest.featureUid.label = Konto-UID
gws.plugin.account.admin_action.ResetRequest.featureUid.purpose = UID (Primary Key) des Kontos, das zurückgesetzt werden soll — Passwort und ggf. MFA werden ungültig, das Konto erhält einen neuen Onboarding-Token.

# --- cli: AccountResetParams ----------------------------------------------

gws.plugin.account.cli.AccountResetParams.uid.label = Konto-UIDs
gws.plugin.account.cli.AccountResetParams.uid.purpose = Liste der zurückzusetzenden Konto-UIDs.

# --- auth_provider --------------------------------------------------------

gws.plugin.account.auth_provider.Config.label = Konten-Auth-Provider
gws.plugin.account.auth_provider.Config.purpose = Authentifiziert Benutzer gegen die vom Account-Helper verwaltete Konten-Tabelle. Validiert Login und Passwort über die im Helper konfigurierten SQL-Ausdrücke und prüft, dass das Konto im Status ``active`` ist.
gws.plugin.account.auth_provider.Config.whenToUse = Wenn Benutzerkonten vom Account-Plugin gepflegt werden und sich Endanwender an der WebSuite anmelden sollen.
gws.plugin.account.auth_provider.Config.complexity = intermediate
gws.plugin.account.auth_provider.Config.seeAlso = gws.plugin.auth_provider.file.Config, gws.plugin.auth_provider.ldap.Config, gws.plugin.postgres.auth_provider.Config, gws.plugin.account.helper.Config


[en]

# --- helper ---------------------------------------------------------------

gws.plugin.account.helper.Config.label = Account helper
gws.plugin.account.helper.Config.purpose = Global helper for the account plugin. Manages user accounts in a database table and provides data models, password logic, the onboarding workflow and MFA options. Shared by the ``account`` action, the ``accountadmin`` action and the ``account`` auth provider.
gws.plugin.account.helper.Config.whenToUse = Required helper whenever user accounts are kept in a database and edited by end users — alternative to the plain ``sql`` auth provider, which only authenticates.
gws.plugin.account.helper.Config.complexity = intermediate
gws.plugin.account.helper.Config.useCases = Self-service onboarding via email, MFA-enabled accounts, an administrator-managed accounts table.
gws.plugin.account.helper.Config.seeAlso = gws.plugin.account.auth_provider.Config, gws.plugin.account.account_action.Config, gws.plugin.account.admin_action.Config

gws.plugin.account.helper.Config.adminModel.label = Admin data model
gws.plugin.account.helper.Config.adminModel.purpose = Edit model for the accounts table from an administrator's point of view. Defines which fields admins may see and change.

gws.plugin.account.helper.Config.userModel.label = End-user data model
gws.plugin.account.helper.Config.userModel.purpose = Edit model for the end-user self-service dialog. Optional — if unset, end users cannot edit their own data.

gws.plugin.account.helper.Config.usernameColumn.label = Login column
gws.plugin.account.helper.Config.usernameColumn.purpose = Column of the accounts table used as the login. Defaults to ``email``.
gws.plugin.account.helper.Config.usernameColumn.example = "email"

gws.plugin.account.helper.Config.passwordCreateSql.label = Password hash SQL
gws.plugin.account.helper.Config.passwordCreateSql.purpose = SQL expression for computing password hashes. Default uses ``crypt(.., gen_salt('bf'))`` (PostgreSQL pgcrypto).
gws.plugin.account.helper.Config.passwordCreateSql.complexity = advanced
gws.plugin.account.helper.Config.passwordCreateSql.example = "crypt({password}, gen_salt('bf'))"

gws.plugin.account.helper.Config.passwordVerifySql.label = Password verify SQL
gws.plugin.account.helper.Config.passwordVerifySql.purpose = SQL expression for verifying a password against the stored hash.
gws.plugin.account.helper.Config.passwordVerifySql.complexity = advanced
gws.plugin.account.helper.Config.passwordVerifySql.example = "crypt({password}, {passwordColumn})"

gws.plugin.account.helper.Config.tcLifeTime.label = Temp code lifetime
gws.plugin.account.helper.Config.tcLifeTime.purpose = Lifetime of temporary codes (onboarding, password reset). Defaults to 3600 seconds.
gws.plugin.account.helper.Config.tcLifeTime.example = "1h"

gws.plugin.account.helper.Config.mfa.label = MFA methods
gws.plugin.account.helper.Config.mfa.purpose = List of multi-factor authentication methods the user can choose from during onboarding.
gws.plugin.account.helper.Config.mfa.complexity = advanced

gws.plugin.account.helper.Config.mfaIssuer.label = MFA issuer
gws.plugin.account.helper.Config.mfaIssuer.purpose = Issuer name in MFA key URIs (TOTP QR codes). Shown in the user's authenticator app.
gws.plugin.account.helper.Config.mfaIssuer.complexity = advanced
gws.plugin.account.helper.Config.mfaIssuer.example = "GBD WebSuite"

gws.plugin.account.helper.Config.onboardingUrl.label = Onboarding URL
gws.plugin.account.helper.Config.onboardingUrl.purpose = Base URL for email onboarding. Used in invitation mails to direct the user to the password-set page.
gws.plugin.account.helper.Config.onboardingUrl.example = "https://gws.example.com/onboarding"

gws.plugin.account.helper.Config.onboardingCompletionUrl.label = Onboarding completion URL
gws.plugin.account.helper.Config.onboardingCompletionUrl.purpose = URL the user is redirected to after a successful onboarding.
gws.plugin.account.helper.Config.onboardingCompletionUrl.example = "https://gws.example.com/login"

gws.plugin.account.helper.Config.templates.label = Templates
gws.plugin.account.helper.Config.templates.purpose = Templates for mails and other text snippets around onboarding and account management.

# --- helper.MfaConfig -----------------------------------------------------

gws.plugin.account.helper.MfaConfig.label = MFA method entry
gws.plugin.account.helper.MfaConfig.purpose = Configuration for a single multi-factor authentication method offered to the user during onboarding.
gws.plugin.account.helper.MfaConfig.complexity = advanced

gws.plugin.account.helper.MfaConfig.mfaUid.label = MFA adapter UID
gws.plugin.account.helper.MfaConfig.mfaUid.purpose = UID of a configured ``authMfa`` adapter (e.g. TOTP).

gws.plugin.account.helper.MfaConfig.title.label = Title
gws.plugin.account.helper.MfaConfig.title.purpose = Label for the method in the selection UI.
gws.plugin.account.helper.MfaConfig.title.example = "Authenticator app"

# --- account_action ------------------------------------------------------

gws.plugin.account.account_action.Config.label = End-user account action
gws.plugin.account.account_action.Config.purpose = End-user action for self-service: onboarding workflow (set password, configure MFA) and the account management dialog. Backs the ``Dialog.Account`` client component.
gws.plugin.account.account_action.Config.whenToUse = In projects where end users manage their own accounts or are onboarded via email invitations.
gws.plugin.account.account_action.Config.complexity = intermediate
gws.plugin.account.account_action.Config.seeAlso = gws.plugin.account.helper.Config, gws.plugin.account.admin_action.Config

# --- admin_action --------------------------------------------------------

gws.plugin.account.admin_action.Config.label = Account admin action
gws.plugin.account.admin_action.Config.purpose = Administrator action for managing the accounts table: create, edit, delete and reset accounts. Backs the ``Sidebar.AccountAdmin`` client component.
gws.plugin.account.admin_action.Config.whenToUse = In admin projects to maintain user accounts — typically with read permission limited to the admin role.
gws.plugin.account.admin_action.Config.complexity = intermediate
gws.plugin.account.admin_action.Config.seeAlso = gws.plugin.account.helper.Config, gws.plugin.account.account_action.Config

gws.plugin.account.admin_action.Config.models.label = Account data models
gws.plugin.account.admin_action.Config.models.purpose = Optional additional data models for the accounts table. If unset, the ``adminModel`` from the account helper is used.

# --- account_action: onboarding requests ---------------------------------

gws.plugin.account.account_action.OnboardingStartRequest.tc.label = Onboarding token
gws.plugin.account.account_action.OnboardingStartRequest.tc.purpose = Server-signed one-time token from the onboarding email. Identifies the account and protects the workflow from tampering.

gws.plugin.account.account_action.OnboardingSavePasswordRequest.tc.label = Onboarding token
gws.plugin.account.account_action.OnboardingSavePasswordRequest.tc.purpose = Onboarding token from the previous step; binds the password change to the initiated workflow.

gws.plugin.account.account_action.OnboardingSavePasswordRequest.email.label = Email
gws.plugin.account.account_action.OnboardingSavePasswordRequest.email.purpose = Email address re-entered by the user as a confirmation step.

gws.plugin.account.account_action.OnboardingSavePasswordRequest.password1.label = New password
gws.plugin.account.account_action.OnboardingSavePasswordRequest.password1.purpose = New user password.
gws.plugin.account.account_action.OnboardingSavePasswordRequest.password1.complexity = advanced

gws.plugin.account.account_action.OnboardingSavePasswordRequest.password2.label = Password confirmation
gws.plugin.account.account_action.OnboardingSavePasswordRequest.password2.purpose = Repetition of the new password. Must equal ``password1``.
gws.plugin.account.account_action.OnboardingSavePasswordRequest.password2.complexity = advanced

gws.plugin.account.account_action.OnboardingSaveMfaRequest.tc.label = Onboarding token
gws.plugin.account.account_action.OnboardingSaveMfaRequest.tc.purpose = Onboarding token from the previous step; binds the MFA setup to the initiated workflow.

gws.plugin.account.account_action.OnboardingSaveMfaRequest.mfaIndex.label = MFA option
gws.plugin.account.account_action.OnboardingSaveMfaRequest.mfaIndex.purpose = Zero-based index into the configured list of MFA options.

# --- admin_action: reset --------------------------------------------------

gws.plugin.account.admin_action.ResetRequest.featureUid.label = Account UID
gws.plugin.account.admin_action.ResetRequest.featureUid.purpose = UID (primary key) of the account to reset — password and any MFA state are invalidated and a new onboarding token is issued.

# --- cli: AccountResetParams ---------------------------------------------

gws.plugin.account.cli.AccountResetParams.uid.label = Account UIDs
gws.plugin.account.cli.AccountResetParams.uid.purpose = List of account UIDs to reset.

# --- auth_provider -------------------------------------------------------

gws.plugin.account.auth_provider.Config.label = Account auth provider
gws.plugin.account.auth_provider.Config.purpose = Authenticates users against the accounts table managed by the account helper. Validates login and password through the SQL expressions configured in the helper and ensures the account is in status ``active``.
gws.plugin.account.auth_provider.Config.whenToUse = When user accounts are managed by the account plugin and end users sign in to WebSuite.
gws.plugin.account.auth_provider.Config.complexity = intermediate
gws.plugin.account.auth_provider.Config.seeAlso = gws.plugin.auth_provider.file.Config, gws.plugin.auth_provider.ldap.Config, gws.plugin.postgres.auth_provider.Config, gws.plugin.account.helper.Config
