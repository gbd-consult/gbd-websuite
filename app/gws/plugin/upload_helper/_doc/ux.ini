# UX-Strings für den Upload-Helper (plugin/upload_helper).
#
# Schlüsselformat: gws.plugin.upload_helper.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Hinweis: Der Helper hat keine eigene Config-Klasse — er wird einfach
# als Helper „upload" geladen und von anderen Aktionen über
# self.root.app.helper('upload') benutzt.

[de]

gws.plugin.upload_helper.Object.label = Upload-Helper
gws.plugin.upload_helper.Object.purpose = Verwaltet Chunked-Uploads. Aktionen registrieren einen API-Endpunkt mit ChunkRequest, leiten die Chunks an handle_chunk_request weiter und holen die fertige Datei am Ende mit get_upload ab.
gws.plugin.upload_helper.Object.whenToUse = Wird gebraucht, sobald Datei-Uploads vom Client zum Server unterstützt werden — typischerweise im Edit-Plugin oder in eigenen Importer-Aktionen.
gws.plugin.upload_helper.Object.complexity = intermediate
gws.plugin.upload_helper.Object.useCases = Datei-Anhänge an Features, Import von Shapefiles oder GeoPackages, Hochladen von Bildern für Feature-Galerien.

[en]

gws.plugin.upload_helper.Object.label = Upload helper
gws.plugin.upload_helper.Object.purpose = Manages chunked uploads. Actions declare an API endpoint with ChunkRequest, forward chunks to handle_chunk_request, and pick up the finalized file via get_upload.
gws.plugin.upload_helper.Object.whenToUse = Needed whenever client-to-server file uploads are required — typically in the edit plugin or custom importer actions.
gws.plugin.upload_helper.Object.complexity = intermediate
gws.plugin.upload_helper.Object.useCases = File attachments on features, shapefile/GeoPackage import, image uploads for feature galleries.
