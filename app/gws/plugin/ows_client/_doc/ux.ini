# UX-Strings für das OWS-Client-Plugin (WMS/WMTS/WFS).
#
# Schlüsselformat: gws.plugin.ows_client.<protokoll>.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.

[de]

# === WMS-Client =============================================================

gws.plugin.ows_client.wms.provider.Config.label = WMS-Provider
gws.plugin.ows_client.wms.provider.Config.purpose = Verbindung zu einem externen WMS-Dienst. Lädt die Capabilities und stellt die Quell-Layer für Karten- und Such-Layer zur Verfügung.
gws.plugin.ows_client.wms.provider.Config.whenToUse = Wenn Karten-Layer von einem fremden WMS (z.B. Geoportale, GDI) eingebunden werden sollen.
gws.plugin.ows_client.wms.provider.Config.complexity = basic
gws.plugin.ows_client.wms.provider.Config.useCases = Einbinden von WMS-Diensten anderer Behörden, GDI-Hintergrundkarten, Open-Data-Layer.
gws.plugin.ows_client.wms.provider.Config.example = "https://example.org/wms?service=WMS"

gws.plugin.ows_client.wms.provider.Config.bottomFirst.label = Layer-Reihenfolge umkehren
gws.plugin.ows_client.wms.provider.Config.bottomFirst.purpose = Aktivieren, wenn der WMS seine Layer in den Capabilities von unten nach oben auflistet (entgegen der WMS-Konvention).
gws.plugin.ows_client.wms.provider.Config.bottomFirst.complexity = advanced

gws.plugin.ows_client.wms.layer.Config.label = WMS-Baum-Layer
gws.plugin.ows_client.wms.layer.Config.purpose = Bindet einen WMS als Layer-Baum ein. Die Hierarchie der Capabilities-Layer wird übernommen.
gws.plugin.ows_client.wms.layer.Config.whenToUse = Wenn die Layer-Struktur des WMS-Dienstes in der WebSuite gespiegelt werden soll.
gws.plugin.ows_client.wms.layer.Config.complexity = basic

gws.plugin.ows_client.wms.layer.Config.provider.label = WMS-Provider
gws.plugin.ows_client.wms.layer.Config.provider.purpose = Inline-Konfiguration oder Referenz auf einen WMS-Provider.

gws.plugin.ows_client.wms.flatlayer.Config.label = WMS-Flach-Layer
gws.plugin.ows_client.wms.flatlayer.Config.purpose = Bindet ausgewählte WMS-Quell-Layer als einen einzelnen flachen Layer ein.
gws.plugin.ows_client.wms.flatlayer.Config.whenToUse = Wenn nur bestimmte Layer eines WMS gebraucht werden und die Hierarchie irrelevant ist.
gws.plugin.ows_client.wms.flatlayer.Config.complexity = basic

gws.plugin.ows_client.wms.flatlayer.Config.provider.label = WMS-Provider
gws.plugin.ows_client.wms.flatlayer.Config.provider.purpose = Inline-Konfiguration oder Referenz auf einen WMS-Provider.

gws.plugin.ows_client.wms.flatlayer.Config.sourceLayers.label = Quell-Layer-Filter
gws.plugin.ows_client.wms.flatlayer.Config.sourceLayers.purpose = Liste oder Filter der zu nutzenden Quell-Layer aus den WMS-Capabilities.

gws.plugin.ows_client.wms.finder.Config.label = WMS-Suche
gws.plugin.ows_client.wms.finder.Config.purpose = Suchadapter, der GetFeatureInfo-Anfragen an einen WMS schickt.
gws.plugin.ows_client.wms.finder.Config.whenToUse = Wenn klickbasierte Sachdatenabfragen über WMS GetFeatureInfo verfügbar sein sollen.
gws.plugin.ows_client.wms.finder.Config.complexity = intermediate

gws.plugin.ows_client.wms.finder.Config.provider.label = WMS-Provider
gws.plugin.ows_client.wms.finder.Config.provider.purpose = Inline-Konfiguration oder Referenz auf einen WMS-Provider.

gws.plugin.ows_client.wms.finder.Config.sourceLayers.label = Quell-Layer
gws.plugin.ows_client.wms.finder.Config.sourceLayers.purpose = Liste der Quell-Layer, gegen die GetFeatureInfo abgesetzt wird.

gws.plugin.ows_client.wms.model.Config.label = WMS-Datenmodell
gws.plugin.ows_client.wms.model.Config.purpose = Datenmodell-Konfiguration für WMS-GetFeatureInfo-Antworten.
gws.plugin.ows_client.wms.model.Config.complexity = intermediate

gws.plugin.ows_client.wms.model.Config.provider.label = WMS-Provider
gws.plugin.ows_client.wms.model.Config.provider.purpose = Inline-Konfiguration oder Referenz auf einen WMS-Provider.

gws.plugin.ows_client.wms.model.Config.sourceLayers.label = Quell-Layer
gws.plugin.ows_client.wms.model.Config.sourceLayers.purpose = Liste der Quell-Layer, deren GetFeatureInfo-Antwort modelliert wird.

# === WMTS-Client ============================================================

gws.plugin.ows_client.wmts.provider.Config.label = WMTS-Provider
gws.plugin.ows_client.wmts.provider.Config.purpose = Verbindung zu einem externen WMTS-Kacheldienst. Liest die Capabilities und stellt TileMatrixSets bereit.
gws.plugin.ows_client.wmts.provider.Config.whenToUse = Wenn Hintergrund- oder Themenkarten als WMTS-Kacheln eingebunden werden sollen.
gws.plugin.ows_client.wmts.provider.Config.complexity = basic

gws.plugin.ows_client.wmts.provider.Config.grid.label = Quell-Raster
gws.plugin.ows_client.wmts.provider.Config.grid.purpose = Tile-Grid des Quell-Dienstes (TileMatrixSet-Auswahl).
gws.plugin.ows_client.wmts.provider.Config.grid.complexity = advanced

gws.plugin.ows_client.wmts.layer.Config.label = WMTS-Layer
gws.plugin.ows_client.wmts.layer.Config.purpose = Bindet einen WMTS-Layer in eine Karte ein.
gws.plugin.ows_client.wmts.layer.Config.complexity = basic

gws.plugin.ows_client.wmts.layer.Config.provider.label = WMTS-Provider
gws.plugin.ows_client.wmts.layer.Config.provider.purpose = Inline-Konfiguration oder Referenz auf einen WMTS-Provider.

gws.plugin.ows_client.wmts.layer.Config.display.label = Anzeigemodus
gws.plugin.ows_client.wmts.layer.Config.display.purpose = Anzeige-Modus des Layers (z.B. tile, client).

gws.plugin.ows_client.wmts.layer.Config.sourceLayers.label = Quell-Layer-Filter
gws.plugin.ows_client.wmts.layer.Config.sourceLayers.purpose = Filter für die zu verwendenden Quell-Layer aus den WMTS-Capabilities.

gws.plugin.ows_client.wmts.layer.Config.style.label = Stilname
gws.plugin.ows_client.wmts.layer.Config.style.purpose = Name des im WMTS angebotenen Stils (Style).
gws.plugin.ows_client.wmts.layer.Config.style.example = "default"

# === WFS-Client =============================================================

gws.plugin.ows_client.wfs.provider.Config.label = WFS-Provider
gws.plugin.ows_client.wfs.provider.Config.purpose = Verbindung zu einem externen WFS-Dienst. Lädt die Capabilities und stellt FeatureTypes für Layer- und Suche-Konfiguration bereit.
gws.plugin.ows_client.wfs.provider.Config.whenToUse = Wenn Vektordaten von einem fremden WFS in der WebSuite genutzt werden sollen.
gws.plugin.ows_client.wfs.provider.Config.complexity = intermediate

gws.plugin.ows_client.wfs.provider.Config.withBboxCrs.label = BBOX mit CRS-Suffix
gws.plugin.ows_client.wfs.provider.Config.withBboxCrs.purpose = Hängt das CRS an den BBOX-Anfrageparameter (kompatibel zu strikten WFS-2.0-Servern).
gws.plugin.ows_client.wfs.provider.Config.withBboxCrs.complexity = advanced

gws.plugin.ows_client.wfs.layer.Config.label = WFS-Baum-Layer
gws.plugin.ows_client.wfs.layer.Config.purpose = Bindet einen WFS als Layer-Baum ein.
gws.plugin.ows_client.wfs.layer.Config.complexity = intermediate

gws.plugin.ows_client.wfs.layer.Config.provider.label = WFS-Provider
gws.plugin.ows_client.wfs.layer.Config.provider.purpose = Inline-Konfiguration oder Referenz auf einen WFS-Provider.

gws.plugin.ows_client.wfs.flatlayer.Config.label = WFS-Flach-Layer
gws.plugin.ows_client.wfs.flatlayer.Config.purpose = Bindet ausgewählte WFS-FeatureTypes als einen einzelnen flachen Layer ein.
gws.plugin.ows_client.wfs.flatlayer.Config.complexity = intermediate

gws.plugin.ows_client.wfs.flatlayer.Config.provider.label = WFS-Provider
gws.plugin.ows_client.wfs.flatlayer.Config.provider.purpose = Inline-Konfiguration oder Referenz auf einen WFS-Provider.

gws.plugin.ows_client.wfs.flatlayer.Config.sourceLayers.label = Quell-Layer-Filter
gws.plugin.ows_client.wfs.flatlayer.Config.sourceLayers.purpose = Filter für die zu verwendenden FeatureTypes aus den WFS-Capabilities.

gws.plugin.ows_client.wfs.finder.Config.label = WFS-Suche
gws.plugin.ows_client.wfs.finder.Config.purpose = Suchadapter, der GetFeature-Anfragen an einen WFS schickt.
gws.plugin.ows_client.wfs.finder.Config.complexity = intermediate

gws.plugin.ows_client.wfs.finder.Config.provider.label = WFS-Provider
gws.plugin.ows_client.wfs.finder.Config.provider.purpose = Inline-Konfiguration oder Referenz auf einen WFS-Provider.

gws.plugin.ows_client.wfs.finder.Config.sourceLayers.label = Quell-Layer
gws.plugin.ows_client.wfs.finder.Config.sourceLayers.purpose = Liste der FeatureTypes, gegen die gesucht wird.

gws.plugin.ows_client.wfs.model.Config.label = WFS-Datenmodell
gws.plugin.ows_client.wfs.model.Config.purpose = Datenmodell-Konfiguration für WFS-Antworten.
gws.plugin.ows_client.wfs.model.Config.complexity = intermediate

gws.plugin.ows_client.wfs.model.Config.provider.label = WFS-Provider
gws.plugin.ows_client.wfs.model.Config.provider.purpose = Inline-Konfiguration oder Referenz auf einen WFS-Provider.

gws.plugin.ows_client.wfs.model.Config.sourceLayers.label = Quell-Layer
gws.plugin.ows_client.wfs.model.Config.sourceLayers.purpose = Liste der FeatureTypes, deren Antworten modelliert werden.

