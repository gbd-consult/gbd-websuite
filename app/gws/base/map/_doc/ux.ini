gws.base.map.action.GetBoxRequest.purpose = Anfrage für ein gerendertes Kartenbild innerhalb einer Bounding Box.
gws.base.map.action.GetBoxRequest.complexity = advanced
gws.base.map.action.GetBoxRequest.bbox.label = Bounding Box
gws.base.map.action.GetBoxRequest.bbox.purpose = Ausschnitt als [minX, minY, maxX, maxY] im angegebenen CRS.
gws.base.map.action.GetBoxRequest.compositeLayerUids.label = Composite-Layer-UIDs
gws.base.map.action.GetBoxRequest.crs.label = CRS
gws.base.map.action.GetBoxRequest.dpi.label = DPI
gws.base.map.action.GetBoxRequest.height.label = Höhe (Pixel)
gws.base.map.action.GetBoxRequest.layerUid.label = Layer-UID
gws.base.map.action.GetBoxRequest.width.label = Breite (Pixel)

gws.base.map.action.GetXyzRequest.label = XYZ-Tile-Anfrage
gws.base.map.action.GetXyzRequest.purpose = Anfrage für eine einzelne XYZ-Kachel eines Layers.
gws.base.map.action.GetXyzRequest.complexity = advanced
gws.base.map.action.GetXyzRequest.layerUid.label = Layer-UID
gws.base.map.action.GetXyzRequest.x.label = X
gws.base.map.action.GetXyzRequest.y.label = Y
gws.base.map.action.GetXyzRequest.z.label = Z (Zoomstufe)

gws.base.map.action.GetLegendRequest.label = Legenden-Anfrage
gws.base.map.action.GetLegendRequest.purpose = Anfrage für die Legende eines Layers.
gws.base.map.action.GetLegendRequest.complexity = advanced
gws.base.map.action.GetLegendRequest.layerUid.label = Layer-UID

gws.base.map.action.DescribeLayerRequest.label = Layer-Beschreibung
gws.base.map.action.DescribeLayerRequest.purpose = Anfrage für eine gerenderte Layer-Beschreibung (Template "layer.description").
gws.base.map.action.DescribeLayerRequest.complexity = advanced
gws.base.map.action.DescribeLayerRequest.layerUid.label = Layer-UID

gws.base.map.action.GetFeaturesRequest.label = Feature-Abfrage
gws.base.map.action.GetFeaturesRequest.purpose = Anfrage für Feature-Daten eines Layers in einem Ausschnitt.
gws.base.map.action.GetFeaturesRequest.complexity = advanced
gws.base.map.action.GetFeaturesRequest.bbox.label = Bounding Box
gws.base.map.action.GetFeaturesRequest.crs.label = CRS
gws.base.map.action.GetFeaturesRequest.layerUid.label = Layer-UID
gws.base.map.action.GetFeaturesRequest.limit.label = Maximale Trefferzahl
gws.base.map.action.GetFeaturesRequest.modelUid.label = Datenmodell-UID
gws.base.map.action.GetFeaturesRequest.resolution.label = Auflösung
gws.base.map.action.GetFeaturesRequest.views.label = Views


[en]

# --- core.Config ----------------------------------------------------

gws.base.map.core.Config.label = Map
gws.base.map.core.Config.purpose = Map configuration: CRS, extent, zoom levels and layer stack. Used as the main or overview map of a project.
gws.base.map.core.Config.whenToUse = Required for any project with a graphical map view.
gws.base.map.core.Config.complexity = intermediate

gws.base.map.core.Config.crs.label = Coordinate reference system (CRS)
gws.base.map.core.Config.crs.purpose = EPSG code of the map CRS. Defaults to EPSG:3857 (web mercator).
gws.base.map.core.Config.crs.complexity = basic
gws.base.map.core.Config.crs.example = "EPSG:25832"

gws.base.map.core.Config.title.label = Title
gws.base.map.core.Config.title.purpose = Display title of the map. Overridden by the project title when provided.
gws.base.map.core.Config.title.complexity = basic

gws.base.map.core.Config.extent.label = Extent
gws.base.map.core.Config.extent.purpose = Bounding box of the map as [minX, minY, maxX, maxY] in the map CRS. Falls back to the full CRS extent.
gws.base.map.core.Config.extent.complexity = intermediate

gws.base.map.core.Config.extentBuffer.label = Extent buffer
gws.base.map.core.Config.extentBuffer.purpose = Extra margin around the extent in map units (typically metres).
gws.base.map.core.Config.extentBuffer.complexity = advanced

gws.base.map.core.Config.center.label = Centre
gws.base.map.core.Config.center.purpose = Initial map centre [x, y]. Defaults to the centre of the extent.
gws.base.map.core.Config.center.complexity = intermediate

gws.base.map.core.Config.zoom.label = Zoom levels
gws.base.map.core.Config.zoom.purpose = Map scales or resolutions. Falls back to standard OSM resolutions.
gws.base.map.core.Config.zoom.complexity = intermediate

gws.base.map.core.Config.layers.label = Layers
gws.base.map.core.Config.layers.purpose = Layer stack (top to bottom) of the map. All configured layer types are allowed.
gws.base.map.core.Config.layers.complexity = basic

gws.base.map.core.Config.coordinatePrecision.label = Coordinate precision
gws.base.map.core.Config.coordinatePrecision.purpose = Number of decimals used when coordinates are sent to the client.
gws.base.map.core.Config.coordinatePrecision.complexity = advanced

gws.base.map.core.Config.wrapX.label = Wrap world horizontally
gws.base.map.core.Config.wrapX.purpose = If enabled, the map repeats horizontally (useful for global web-mercator maps).
gws.base.map.core.Config.wrapX.complexity = advanced

# --- core.Object / core.Props ---------------------------------------

gws.base.map.core.Object.label = Map
gws.base.map.core.Object.purpose = Runtime map object built from a map Config; carries bounds, resolutions and the root layer.
gws.base.map.core.Object.complexity = advanced

gws.base.map.core.Props.label = Map props
gws.base.map.core.Props.purpose = Client view of the map (CRS, extent, resolutions, root layer tree).
gws.base.map.core.Props.complexity = advanced

# --- action.Config / .Object / .Props -------------------------------

gws.base.map.action.Config.label = Map action
gws.base.map.action.Config.purpose = Action that delivers map images, XYZ tiles, legends and feature data to the client.
gws.base.map.action.Config.complexity = advanced

gws.base.map.action.Object.label = Map action
gws.base.map.action.Object.purpose = Runtime object of the map action.
gws.base.map.action.Object.complexity = advanced

gws.base.map.action.Props.label = Map action
gws.base.map.action.Props.complexity = advanced

# --- action-Requests ------------------------------------------------

gws.base.map.action.GetBoxRequest.label = Map box request
gws.base.map.action.GetBoxRequest.purpose = Request for a rendered map image inside a bounding box.
gws.base.map.action.GetBoxRequest.complexity = advanced

gws.base.map.action.GetXyzRequest.label = XYZ tile request
gws.base.map.action.GetXyzRequest.purpose = Request for a single XYZ tile of a layer.
gws.base.map.action.GetXyzRequest.complexity = advanced

gws.base.map.action.GetLegendRequest.label = Legend request
gws.base.map.action.GetLegendRequest.purpose = Request for the legend of a layer.
gws.base.map.action.GetLegendRequest.complexity = advanced

gws.base.map.action.DescribeLayerRequest.label = Layer description
gws.base.map.action.DescribeLayerRequest.purpose = Request for a rendered layer description (template "layer.description").
gws.base.map.action.DescribeLayerRequest.complexity = advanced

gws.base.map.action.GetFeaturesRequest.label = Get features request
gws.base.map.action.GetFeaturesRequest.purpose = Request for feature data of a layer within a viewport.
gws.base.map.action.GetFeaturesRequest.complexity = advanced
