# UX-Strings für das XML-Helper-Plugin.
#
# Schlüsselformat: gws.plugin.xml_helper.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.

[de]

# --- xml_helper.Config ------------------------------------------------------

gws.plugin.xml_helper.Config.label = XML-Helper
gws.plugin.xml_helper.Config.purpose = Hilfsplugin für die XML-Erzeugung. Registriert benutzerdefinierte XML-Namespaces, die anschließend von OWS-Diensten und Capabilities-Templates verwendet werden können.
gws.plugin.xml_helper.Config.whenToUse = Wenn eigene XML-Namespaces (z.B. Fachschema-Erweiterungen, INSPIRE-konforme GML-Profile) in OWS-Antworten erscheinen sollen.
gws.plugin.xml_helper.Config.complexity = advanced
gws.plugin.xml_helper.Config.useCases = INSPIRE-Schema-Erweiterungen, eigene GML-Application-Schemas, kundenspezifische XML-Profile in WFS/CSW-Antworten.

gws.plugin.xml_helper.Config.namespaces.label = Namespaces
gws.plugin.xml_helper.Config.namespaces.purpose = Liste benutzerdefinierter XML-Namespaces, die für die XML-Generierung registriert werden.

# --- xml_helper.NamespaceConfig ---------------------------------------------

gws.plugin.xml_helper.NamespaceConfig.label = XML-Namespace
gws.plugin.xml_helper.NamespaceConfig.purpose = Definition eines einzelnen XML-Namespace mit Präfix, URI und optionalem Schema-Speicherort.
gws.plugin.xml_helper.NamespaceConfig.complexity = advanced

gws.plugin.xml_helper.NamespaceConfig.xmlns.label = Präfix
gws.plugin.xml_helper.NamespaceConfig.xmlns.purpose = Standardpräfix dieses Namespace (z.B. "gml", "wfs").
gws.plugin.xml_helper.NamespaceConfig.xmlns.example = "myns"

gws.plugin.xml_helper.NamespaceConfig.uri.label = URI
gws.plugin.xml_helper.NamespaceConfig.uri.purpose = Namespace-URI (Identifikator).
gws.plugin.xml_helper.NamespaceConfig.uri.example = "http://example.org/myns"

gws.plugin.xml_helper.NamespaceConfig.schemaLocation.label = Schema-Speicherort
gws.plugin.xml_helper.NamespaceConfig.schemaLocation.purpose = URL des XML-Schemas (XSD), das den Namespace definiert.
gws.plugin.xml_helper.NamespaceConfig.schemaLocation.example = "http://example.org/myns/schema.xsd"

gws.plugin.xml_helper.NamespaceConfig.version.label = Version
gws.plugin.xml_helper.NamespaceConfig.version.purpose = Namespace-/Schema-Version.
gws.plugin.xml_helper.NamespaceConfig.version.example = "1.0"

gws.plugin.xml_helper.NamespaceConfig.extendsGml.label = Erweitert GML3
gws.plugin.xml_helper.NamespaceConfig.extendsGml.purpose = Namespace-Schema erweitert das GML3-Schema (relevant für WFS/INSPIRE).

# --- xml_helper.Object ------------------------------------------------------

gws.plugin.xml_helper.Object.label = XML-Helper (Runtime)
gws.plugin.xml_helper.Object.purpose = Laufzeit-Objekt; registriert die konfigurierten Namespaces in der globalen XML-Namespace-Tabelle.


[en]

# --- xml_helper.Config ------------------------------------------------------

gws.plugin.xml_helper.Config.label = XML helper
gws.plugin.xml_helper.Config.purpose = Helper plugin for XML generation. Registers custom XML namespaces that can then be used by OWS services and capability templates.
gws.plugin.xml_helper.Config.whenToUse = When custom XML namespaces (e.g. domain-schema extensions, INSPIRE-compliant GML profiles) should appear in OWS responses.
gws.plugin.xml_helper.Config.complexity = advanced
gws.plugin.xml_helper.Config.useCases = INSPIRE schema extensions, custom GML application schemas, customer-specific XML profiles in WFS/CSW responses.

gws.plugin.xml_helper.Config.namespaces.label = Namespaces
gws.plugin.xml_helper.Config.namespaces.purpose = List of custom XML namespaces registered for XML generation.

# --- xml_helper.NamespaceConfig ---------------------------------------------

gws.plugin.xml_helper.NamespaceConfig.label = XML namespace
gws.plugin.xml_helper.NamespaceConfig.purpose = Definition of a single XML namespace with prefix, URI and optional schema location.
gws.plugin.xml_helper.NamespaceConfig.complexity = advanced

gws.plugin.xml_helper.NamespaceConfig.xmlns.label = Prefix
gws.plugin.xml_helper.NamespaceConfig.xmlns.purpose = Default prefix for this namespace (e.g. "gml", "wfs").
gws.plugin.xml_helper.NamespaceConfig.xmlns.example = "myns"

gws.plugin.xml_helper.NamespaceConfig.uri.label = URI
gws.plugin.xml_helper.NamespaceConfig.uri.purpose = Namespace URI (identifier).
gws.plugin.xml_helper.NamespaceConfig.uri.example = "http://example.org/myns"

gws.plugin.xml_helper.NamespaceConfig.schemaLocation.label = Schema location
gws.plugin.xml_helper.NamespaceConfig.schemaLocation.purpose = URL of the XML schema (XSD) defining the namespace.
gws.plugin.xml_helper.NamespaceConfig.schemaLocation.example = "http://example.org/myns/schema.xsd"

gws.plugin.xml_helper.NamespaceConfig.version.label = Version
gws.plugin.xml_helper.NamespaceConfig.version.purpose = Namespace/schema version.
gws.plugin.xml_helper.NamespaceConfig.version.example = "1.0"

gws.plugin.xml_helper.NamespaceConfig.extendsGml.label = Extends GML3
gws.plugin.xml_helper.NamespaceConfig.extendsGml.purpose = Namespace schema extends the GML3 schema (relevant for WFS/INSPIRE).

# --- xml_helper.Object ------------------------------------------------------

gws.plugin.xml_helper.Object.label = XML helper (runtime)
gws.plugin.xml_helper.Object.purpose = Runtime object; registers the configured namespaces in the global XML-namespace table.
