[en]

gws.PermissionsConfig.label = Permissions
gws.PermissionsConfig.purpose = Role-based access rights for a configuration object. A list of roles or a boolean value can be set per operation.
gws.PermissionsConfig.whenToUse = When per-layer, per-action, per-model or per-project rights are needed beyond the simple `access` field.
gws.PermissionsConfig.complexity = advanced

gws.PermissionsConfig.read.label = Read
gws.PermissionsConfig.read.purpose = Right to read the object (display the layer, fetch search results, inspect the config).

gws.PermissionsConfig.write.label = Write
gws.PermissionsConfig.write.purpose = Right to modify the object (edit existing features, change configuration).

gws.PermissionsConfig.create.label = Create
gws.PermissionsConfig.create.purpose = Right to create new objects (e.g. features in an editable layer).

gws.PermissionsConfig.delete.label = Delete
gws.PermissionsConfig.delete.purpose = Right to delete objects.

gws.PermissionsConfig.edit.label = Edit (combined)
gws.PermissionsConfig.edit.purpose = Combined edit right — equivalent to write + create + delete in one entry.

gws.PermissionsConfig.all.label = All
gws.PermissionsConfig.all.purpose = Sets all other rights (read, write, create, delete) to the value given here. Convenient for "admins get everything" setups.

gws.AccessConfig.label = Access rules
gws.AccessConfig.purpose = Simplified form of access rights as a "role: allow/deny" list — fits most configuration classes.
gws.AccessConfig.complexity = intermediate

gws.Config.label = Configuration
gws.Config.purpose = Base class of every configuration struct. Carries a UID and optionally a sub-type discriminator.

gws.Config.uid.label = UID
gws.Config.uid.purpose = Unique identifier. Used in cross references (e.g. dbUid). Auto-assigned if not set.

gws.ConfigWithAccess.label = Configuration with access
gws.ConfigWithAccess.purpose = Extends the base configuration with `access` and `permissions`. Inherited by almost every top-level class.

gws.ConfigWithAccess.access.label = Access
gws.ConfigWithAccess.access.purpose = Simple access rules (see AccessConfig). Defines which roles may see or use this object.

gws.ConfigWithAccess.permissions.label = Advanced permissions
gws.ConfigWithAccess.permissions.purpose = Detailed role-based permissions per operation (see PermissionsConfig). Overrides simple `access` when both are set.
gws.ConfigWithAccess.permissions.complexity = advanced

