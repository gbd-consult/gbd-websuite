# UX-Strings für das auth_mfa-Plugin.
#
# Deckt die Sub-Module email und totp ab. Beide Adapter erweitern den
# generischen MFA-Mechanismus aus gws.base.auth.mfa und werden vom
# Web-Login (gws.plugin.auth_method.web) angesteuert, sobald ein
# Benutzer eine ``mfaUid`` zugewiesen bekommt.
#
# Schlüsselformat: gws.plugin.auth_mfa.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.

[de]

# --- email ------------------------------------------------------------------

gws.plugin.auth_mfa.email.Config.label = MFA per E-Mail
gws.plugin.auth_mfa.email.Config.purpose = Zweiter Faktor per E-Mail-OTP. Bei jedem Login wird ein zeitbasiertes Einmalpasswort generiert und an die E-Mail-Adresse des Benutzers gesendet; der Benutzer trägt den Code im Login-Dialog ein. Ein neues Geheimnis wird je Versuch erzeugt — kein dauerhaftes Secret beim Benutzer nötig.
gws.plugin.auth_mfa.email.Config.whenToUse = Wenn alle Benutzer eine gepflegte E-Mail-Adresse haben und kein Authenticator-App-Setup zumutbar ist. Setzt einen konfigurierten ``email``-Helper voraus.
gws.plugin.auth_mfa.email.Config.complexity = intermediate
gws.plugin.auth_mfa.email.Config.useCases = Zweiter Faktor für Endanwender ohne Smartphone-Authenticator, gelegentliche externe Mitarbeiter, Self-Service-Portale.
gws.plugin.auth_mfa.email.Config.seeAlso = gws.plugin.email_helper.Config

gws.plugin.auth_mfa.email.Config.templates.label = E-Mail-Vorlagen
gws.plugin.auth_mfa.email.Config.templates.purpose = Templates für Betreff (``email.subject``) und Nachrichtentext (``email.body``, Plain und HTML). Im Template stehen die Variablen ``user`` und ``otp`` zur Verfügung.

# --- totp -------------------------------------------------------------------

gws.plugin.auth_mfa.totp.Config.label = MFA per Authenticator-App (TOTP)
gws.plugin.auth_mfa.totp.Config.purpose = Zweiter Faktor per zeitbasiertem Einmalpasswort aus einer Authenticator-App (z.B. Google Authenticator, FreeOTP, 1Password). Setzt voraus, dass beim Benutzer ein ``mfaSecret`` gepflegt ist; der Wert wird vorab über ein Provisionierungs-Tool oder QR-Code an den Benutzer übermittelt.
gws.plugin.auth_mfa.totp.Config.whenToUse = Standardlösung für Admin- und Power-User-Konten. Funktioniert offline, ist phishing-resistenter als E-Mail-OTP.
gws.plugin.auth_mfa.totp.Config.complexity = advanced
gws.plugin.auth_mfa.totp.Config.useCases = Pflicht-MFA für Administratoren, Schutz besonders sensibler Projekte, Compliance-Vorgaben.

[en]

# --- email ------------------------------------------------------------------

gws.plugin.auth_mfa.email.Config.label = Email MFA
gws.plugin.auth_mfa.email.Config.purpose = Second factor delivered as a one-time password by email. On every login a fresh time-based OTP is generated and sent to the user's email address; the user enters the code in the login dialog. A new secret is generated per attempt, so users do not need a stored secret.
gws.plugin.auth_mfa.email.Config.whenToUse = When every user has a maintained email address and authenticator-app onboarding is not feasible. Requires a configured ``email`` helper.
gws.plugin.auth_mfa.email.Config.complexity = intermediate

gws.plugin.auth_mfa.email.Config.templates.label = Email templates
gws.plugin.auth_mfa.email.Config.templates.purpose = Templates for subject (``email.subject``) and body (``email.body``, plain and HTML). The variables ``user`` and ``otp`` are available inside the template.

# --- totp -------------------------------------------------------------------

gws.plugin.auth_mfa.totp.Config.label = Authenticator-app MFA (TOTP)
gws.plugin.auth_mfa.totp.Config.purpose = Second factor delivered as a time-based one-time password from an authenticator app (e.g. Google Authenticator, FreeOTP, 1Password). Requires the user to have an ``mfaSecret`` attribute, provisioned out of band via QR code or admin tool.
gws.plugin.auth_mfa.totp.Config.whenToUse = Default choice for admin and power-user accounts. Works offline and is more phishing-resistant than email OTP.
gws.plugin.auth_mfa.totp.Config.complexity = advanced
