# --- PrintFlurstueckRequest -------------------------------------------------

gws.plugin.alkis.action.PrintFlurstueckRequest.findRequest.label = Parcel search request
gws.plugin.alkis.action.PrintFlurstueckRequest.findRequest.purpose = Embedded parcel search request that selects the parcels to print.

gws.plugin.alkis.action.PrintFlurstueckRequest.printRequest.label = Print request
gws.plugin.alkis.action.PrintFlurstueckRequest.printRequest.purpose = Standard print request (template, scale, map extent).

gws.plugin.alkis.action.PrintFlurstueckRequest.featureStyle.label = Parcel style
gws.plugin.alkis.action.PrintFlurstueckRequest.featureStyle.purpose = Style definition (fill, stroke) for the highlighted parcels in the print output.

