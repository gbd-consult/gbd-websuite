# UX-Strings für die Application-Wurzel der WebSuite.
#
# gws.base.application.core.Config ist die oberste Konfigurations-
# Ebene und wird vom Konfigurator als Haupt-Drawer gerendert. Alle
# anderen Konfigurations-Bereiche hängen unter dieser Klasse.

[de]

gws.base.application.core.Config.label = Anwendung
gws.base.application.core.Config.purpose = Wurzel-Konfiguration des WebSuite-Servers. Hier werden Authentifizierung, Datenbanken, Karten-Projekte, Server-Optionen, Druck, Suche und alle anderen globalen Bausteine zusammengeführt.
gws.base.application.core.Config.whenToUse = Pflicht-Top-Level — jede WebSuite-Installation hat genau eine Application-Konfiguration.
gws.base.application.core.Config.complexity = basic

gws.base.application.core.Config.actions.label = Server-Aktionen
gws.base.application.core.Config.actions.purpose = Liste der server-seitig aktivierten Aktionen (Suche, Druck, Edit, Identify usw.). Aktionen, die hier nicht eingetragen sind, sind im Client nicht aufrufbar.

gws.base.application.core.Config.auth.label = Authentifizierung
gws.base.application.core.Config.auth.purpose = Methoden, Provider und Sitzungsverwaltung für die Anmeldung von Benutzern.

gws.base.application.core.Config.cache.label = Cache
gws.base.application.core.Config.cache.purpose = Globale Cache-Einstellungen für Karten-Tiles und Render-Ergebnisse.
gws.base.application.core.Config.cache.complexity = advanced

gws.base.application.core.Config.client.label = Client
gws.base.application.core.Config.client.purpose = Konfiguration der Browser-Oberfläche (Layout, Sprachen, aktive Werkzeuge).

gws.base.application.core.Config.database.label = Datenbank-Anbieter
gws.base.application.core.Config.database.purpose = Liste der Datenbank-Verbindungen (typisch PostgreSQL/PostGIS), die von Layern, Modellen und Authentifizierung genutzt werden.

gws.base.application.core.Config.developer.label = Entwickler-Optionen
gws.base.application.core.Config.developer.purpose = Schalter für Entwicklungsumgebungen — verbose-Logging, Hot-Reload, interne Debug-Endpunkte.
gws.base.application.core.Config.developer.complexity = advanced

gws.base.application.core.Config.exporters.label = Export-Module
gws.base.application.core.Config.exporters.purpose = Globale Exporter (z. B. Shapefile), die Aktionen und Modellen zur Verfügung stehen.

gws.base.application.core.Config.finders.label = Globale Suchen
gws.base.application.core.Config.finders.purpose = Such-Provider, die unabhängig von einzelnen Projekten verfügbar sind.

gws.base.application.core.Config.fonts.label = Schriftarten
gws.base.application.core.Config.fonts.purpose = Pfade zu zusätzlichen Schriftarten für Druck-Templates und Karten-Beschriftungen.

gws.base.application.core.Config.helpers.label = Helper-Module
gws.base.application.core.Config.helpers.purpose = Querschnitts-Komponenten wie CSV-Helper, E-Mail-Versand, XML-Hilfen — werden von anderen Plugins genutzt.

gws.base.application.core.Config.locales.label = Standard-Sprachen
gws.base.application.core.Config.locales.purpose = Default-Sprachen, die für alle Projekte gelten, sofern dort nicht überschrieben.
gws.base.application.core.Config.locales.example = ["de_DE", "en_US"]

gws.base.application.core.Config.metadata.label = Metadaten
gws.base.application.core.Config.metadata.purpose = Übergreifende Metadaten der Installation (Titel, Kontakt, Lizenz). Werden in OWS-Capabilities und Dokumentationen verwendet.

gws.base.application.core.Config.models.label = Globale Datenmodelle
gws.base.application.core.Config.models.purpose = Datenmodelle, die unabhängig von einem Projekt definiert und referenziert werden.

gws.base.application.core.Config.owsServices.label = OWS-Dienste
gws.base.application.core.Config.owsServices.purpose = WMS-, WMTS-, WFS- und CSW-Dienste, die der Server für externe Clients bereitstellt.

gws.base.application.core.Config.plugins.label = Plugins
gws.base.application.core.Config.plugins.purpose = Aktivierte Plugins (typisch via Manifest gesteuert). Plugins erweitern den Funktionsumfang um eigene Aktionen, Provider, Werkzeuge.
gws.base.application.core.Config.plugins.complexity = advanced

gws.base.application.core.Config.printers.label = Drucker-Konfigurationen
gws.base.application.core.Config.printers.purpose = Globale Druck-Templates und Druck-Workflows.

gws.base.application.core.Config.projectDirs.label = Projekt-Verzeichnisse
gws.base.application.core.Config.projectDirs.purpose = Verzeichnisse, in denen die WebSuite zusätzliche Projekt-Konfigurationen sucht.
gws.base.application.core.Config.projectDirs.example = ["/data/projects"]

gws.base.application.core.Config.projectPaths.label = Projekt-Pfade
gws.base.application.core.Config.projectPaths.purpose = Pfade einzelner Projekt-Konfigurationen, die explizit eingebunden werden.

gws.base.application.core.Config.projects.label = Projekte
gws.base.application.core.Config.projects.purpose = Inline definierte Karten-Projekte (alternativ zu projectDirs/projectPaths).

gws.base.application.core.Config.server.label = Server-Optionen
gws.base.application.core.Config.server.purpose = uWSGI-Worker-Anzahl, Timeouts, Log-Level und weitere Laufzeit-Optionen.
gws.base.application.core.Config.server.complexity = advanced

gws.base.application.core.Config.storage.label = Speicher-Anbieter
gws.base.application.core.Config.storage.purpose = Backend für persistierte Konfigurations-Snapshots und Annotationen (typisch SQLite).

gws.base.application.core.Config.templates.label = Standard-Templates
gws.base.application.core.Config.templates.purpose = Default-Templates für Druck, Suche-Treffer, Tooltips. Werden auf Projekt-/Layer-Ebene überschreibbar.

gws.base.application.core.Config.vars.label = Variablen
gws.base.application.core.Config.vars.purpose = Frei definierte Variablen, die in Templates und anderen Konfigurations-Bereichen referenziert werden können.
gws.base.application.core.Config.vars.complexity = advanced

gws.base.application.core.Config.access.label = Berechtigungen
gws.base.application.core.Config.access.purpose = Zugriffsrechte auf Application-Ebene (geerbt von ConfigWithAccess).

gws.base.application.core.Config.permissions.label = Erweiterte Berechtigungen
gws.base.application.core.Config.permissions.purpose = Erweiterte, rollenbasierte Zugriffsrechte (geerbt von ConfigWithAccess).
gws.base.application.core.Config.permissions.complexity = advanced

gws.base.application.core.Config.uid.label = UID
gws.base.application.core.Config.uid.purpose = Eindeutiger Bezeichner der Konfiguration. Wird automatisch vergeben, wenn nicht explizit gesetzt.

[en]

gws.base.application.core.Config.label = Application
gws.base.application.core.Config.purpose = Root configuration of the WebSuite server. All other configuration sections — auth, databases, projects, server options, print, search — sit beneath this class.
gws.base.application.core.Config.whenToUse = Required top level — every WebSuite installation has exactly one application configuration.
gws.base.application.core.Config.complexity = basic

gws.base.application.core.Config.actions.label = Server actions
gws.base.application.core.Config.actions.purpose = List of server-side actions enabled for the installation (search, print, edit, identify, …). Actions not listed here are not callable from the client.

gws.base.application.core.Config.auth.label = Authentication
gws.base.application.core.Config.auth.purpose = Methods, providers and session manager for user sign-in.

gws.base.application.core.Config.cache.label = Cache
gws.base.application.core.Config.cache.purpose = Global cache settings for map tiles and render artefacts.
gws.base.application.core.Config.cache.complexity = advanced

gws.base.application.core.Config.client.label = Client
gws.base.application.core.Config.client.purpose = Browser UI configuration (layout, languages, active tools).

gws.base.application.core.Config.database.label = Database providers
gws.base.application.core.Config.database.purpose = List of database connections (typically PostgreSQL/PostGIS) used by layers, models and authentication.

gws.base.application.core.Config.developer.label = Developer options
gws.base.application.core.Config.developer.purpose = Switches for development environments — verbose logging, hot reload, internal debug endpoints.
gws.base.application.core.Config.developer.complexity = advanced

gws.base.application.core.Config.exporters.label = Exporters
gws.base.application.core.Config.exporters.purpose = Global exporters (e.g. Shapefile) available to actions and models.

gws.base.application.core.Config.finders.label = Global search providers
gws.base.application.core.Config.finders.purpose = Search providers available independently of individual projects.

gws.base.application.core.Config.fonts.label = Fonts
gws.base.application.core.Config.fonts.purpose = Paths to extra fonts for print templates and map labels.

gws.base.application.core.Config.helpers.label = Helper modules
gws.base.application.core.Config.helpers.purpose = Cross-cutting components (CSV helper, e-mail, XML helpers) used by other plugins.

gws.base.application.core.Config.locales.label = Default locales
gws.base.application.core.Config.locales.purpose = Default languages applied to every project unless overridden.
gws.base.application.core.Config.locales.example = ["de_DE", "en_US"]

gws.base.application.core.Config.metadata.label = Metadata
gws.base.application.core.Config.metadata.purpose = Cross-cutting installation metadata (title, contact, licence). Used in OWS capabilities and documentation.

gws.base.application.core.Config.models.label = Global data models
gws.base.application.core.Config.models.purpose = Data models defined and referenced independently of a project.

gws.base.application.core.Config.owsServices.label = OWS services
gws.base.application.core.Config.owsServices.purpose = WMS, WMTS, WFS and CSW services published by the server for external clients.

gws.base.application.core.Config.plugins.label = Plugins
gws.base.application.core.Config.plugins.purpose = Activated plugins (typically driven by the manifest). Plugins extend the feature set with own actions, providers and tools.
gws.base.application.core.Config.plugins.complexity = advanced

gws.base.application.core.Config.printers.label = Printer configurations
gws.base.application.core.Config.printers.purpose = Global print templates and print workflows.

gws.base.application.core.Config.projectDirs.label = Project directories
gws.base.application.core.Config.projectDirs.purpose = Directories scanned for additional project configurations.
gws.base.application.core.Config.projectDirs.example = ["/data/projects"]

gws.base.application.core.Config.projectPaths.label = Project paths
gws.base.application.core.Config.projectPaths.purpose = Paths of single project configurations explicitly included.

gws.base.application.core.Config.projects.label = Projects
gws.base.application.core.Config.projects.purpose = Inline-defined map projects (alternative to projectDirs/projectPaths).

gws.base.application.core.Config.server.label = Server options
gws.base.application.core.Config.server.purpose = uWSGI worker count, timeouts, log level and other runtime options.
gws.base.application.core.Config.server.complexity = advanced

gws.base.application.core.Config.storage.label = Storage provider
gws.base.application.core.Config.storage.purpose = Backend for persisted configuration snapshots and annotations (typically SQLite).

gws.base.application.core.Config.templates.label = Default templates
gws.base.application.core.Config.templates.purpose = Default templates for print, search results and tooltips. Override at project/layer level.

gws.base.application.core.Config.vars.label = Variables
gws.base.application.core.Config.vars.purpose = Free-form variables referenceable in templates and other config sections.
gws.base.application.core.Config.vars.complexity = advanced

gws.base.application.core.Config.access.label = Access
gws.base.application.core.Config.access.purpose = Access permissions on application level (inherited from ConfigWithAccess).

gws.base.application.core.Config.permissions.label = Advanced permissions
gws.base.application.core.Config.permissions.purpose = Extended role-based permissions (inherited from ConfigWithAccess).
gws.base.application.core.Config.permissions.complexity = advanced

gws.base.application.core.Config.uid.label = UID
gws.base.application.core.Config.uid.purpose = Unique identifier of the configuration. Auto-assigned if not set explicitly.
