# UX-Strings für die Editieren-Konfiguration (Welle C).
#
# Edit ist ein dünner Action-Wrapper um die Daten-Modelle: die eigentliche
# Editierfähigkeit kommt aus den Modellen (z. B. postgres.model). Diese
# Datei beschreibt nur die Action-Klasse; die zugehörigen Request-Typen
# (DeleteFeatureRequest, GetFeatureRequest, …) sind interne API-Schemas
# und für Konfigurations-UIs nicht relevant.

[de]

# --- action ---------------------------------------------------------------

gws.base.edit.action.Config.label = Editieren
gws.base.edit.action.Config.purpose = Aktiviert die Edit-API. Stellt die JSON-RPC-Endpunkte bereit, mit denen das Frontend Features lesen, anlegen, ändern und löschen kann. Welche Modelle/Layer editierbar sind, regeln die jeweiligen Daten-Modelle.
gws.base.edit.action.Config.whenToUse = Pflicht-Action für jede Anwendung, in der Anwender Vektordaten in der Karte bearbeiten sollen.
gws.base.edit.action.Config.complexity = intermediate
gws.base.edit.action.Config.useCases = Editieren von PostGIS-Layern, Bürger-Beteiligung mit eigener Datenebene, Pflege von Fachdaten-Layern durch Sachbearbeiter.

# --- api Request types ----------------------------------------------------
# Properties der internen JSON-RPC-Anfrage-Schemas. Werden vom Konfigurator
# nicht direkt editiert, brauchen aber Labels für Doku-/Listenanzeige.

gws.base.edit.api.DeleteFeatureRequest.feature.label = Feature
gws.base.edit.api.DeleteFeatureRequest.feature.purpose = Zu löschendes Feature.
gws.base.edit.api.DeleteFeatureRequest.modelUid.label = Modell-UID
gws.base.edit.api.DeleteFeatureRequest.modelUid.purpose = UID des Datenmodells, in dem das Feature liegt.

gws.base.edit.api.GetFeatureRequest.featureUid.label = Feature-UID
gws.base.edit.api.GetFeatureRequest.featureUid.purpose = UID des abzurufenden Features.
gws.base.edit.api.GetFeatureRequest.modelUid.label = Modell-UID
gws.base.edit.api.GetFeatureRequest.modelUid.purpose = UID des Datenmodells.

gws.base.edit.api.GetFeaturesRequest.crs.label = CRS
gws.base.edit.api.GetFeaturesRequest.crs.purpose = CRS, in dem die Geometrien geliefert werden.
gws.base.edit.api.GetFeaturesRequest.extent.label = Ausdehnung
gws.base.edit.api.GetFeaturesRequest.extent.purpose = Räumlicher Filter für die Abfrage.
gws.base.edit.api.GetFeaturesRequest.featureUids.label = Feature-UIDs
gws.base.edit.api.GetFeaturesRequest.featureUids.purpose = Liste konkreter Feature-UIDs für die Abfrage.
gws.base.edit.api.GetFeaturesRequest.keyword.label = Stichwort
gws.base.edit.api.GetFeaturesRequest.keyword.purpose = Volltext-Filter für die Abfrage.
gws.base.edit.api.GetFeaturesRequest.modelUids.label = Modell-UIDs
gws.base.edit.api.GetFeaturesRequest.modelUids.purpose = Liste der zu durchsuchenden Modelle.
gws.base.edit.api.GetFeaturesRequest.resolution.label = Auflösung
gws.base.edit.api.GetFeaturesRequest.resolution.purpose = Map-Resolution (Karteneinheiten pro Pixel) für die Abfrage.
gws.base.edit.api.GetFeaturesRequest.shapes.label = Geometrien
gws.base.edit.api.GetFeaturesRequest.shapes.purpose = Räumliche Filtergeometrien.
gws.base.edit.api.GetFeaturesRequest.tolerance.label = Toleranz
gws.base.edit.api.GetFeaturesRequest.tolerance.purpose = Räumliche Toleranz für die Geometrieabfrage.

gws.base.edit.api.GetRelatableFeaturesRequest.extent.label = Ausdehnung
gws.base.edit.api.GetRelatableFeaturesRequest.extent.purpose = Räumlicher Filter beim Suchen verknüpfbarer Features.
gws.base.edit.api.GetRelatableFeaturesRequest.fieldName.label = Feldname
gws.base.edit.api.GetRelatableFeaturesRequest.fieldName.purpose = Name des Beziehungsfeldes, für das verknüpfbare Features gesucht werden.
gws.base.edit.api.GetRelatableFeaturesRequest.keyword.label = Stichwort
gws.base.edit.api.GetRelatableFeaturesRequest.keyword.purpose = Volltext-Filter für verknüpfbare Features.
gws.base.edit.api.GetRelatableFeaturesRequest.modelUid.label = Modell-UID
gws.base.edit.api.GetRelatableFeaturesRequest.modelUid.purpose = UID des Quell-Modells, von dem die Beziehung ausgeht.

gws.base.edit.api.InitFeatureRequest.feature.label = Feature
gws.base.edit.api.InitFeatureRequest.feature.purpose = Initialwerte des neu anzulegenden Features.
gws.base.edit.api.InitFeatureRequest.modelUid.label = Modell-UID
gws.base.edit.api.InitFeatureRequest.modelUid.purpose = UID des Datenmodells, in dem das Feature angelegt wird.

gws.base.edit.api.WriteFeatureRequest.feature.label = Feature
gws.base.edit.api.WriteFeatureRequest.feature.purpose = Zu schreibendes Feature inklusive geänderter Felder.
gws.base.edit.api.WriteFeatureRequest.modelUid.label = Modell-UID
gws.base.edit.api.WriteFeatureRequest.modelUid.purpose = UID des Datenmodells.

[en]

# --- action ---------------------------------------------------------------

gws.base.edit.action.Config.label = Edit
gws.base.edit.action.Config.purpose = Enables the edit API. Provides the JSON-RPC endpoints used by the frontend to read, create, update and delete features. Which models/layers are editable is decided by the data models themselves.
gws.base.edit.action.Config.whenToUse = Required action for any application where users edit vector data on the map.
gws.base.edit.action.Config.complexity = intermediate
gws.base.edit.action.Config.useCases = Editing PostGIS layers, citizen-participation with a custom data layer, domain-data maintenance by clerks.

