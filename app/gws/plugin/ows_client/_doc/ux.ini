gws.plugin.ows_client.wfs.flatlayer.Config.sourceLayers.label = Source-layer filter
gws.plugin.ows_client.wfs.flatlayer.Config.sourceLayers.purpose = Filter for the FeatureTypes to use from the WFS capabilities.

gws.plugin.ows_client.wfs.finder.Config.label = WFS search
gws.plugin.ows_client.wfs.finder.Config.purpose = Search adapter that issues GetFeature requests against a WFS.
gws.plugin.ows_client.wfs.finder.Config.complexity = intermediate

gws.plugin.ows_client.wfs.finder.Config.provider.label = WFS provider
gws.plugin.ows_client.wfs.finder.Config.provider.purpose = Inline configuration or reference to a WFS provider.

gws.plugin.ows_client.wfs.finder.Config.sourceLayers.label = Source layers
gws.plugin.ows_client.wfs.finder.Config.sourceLayers.purpose = List of FeatureTypes to search against.

gws.plugin.ows_client.wfs.model.Config.label = WFS data model
gws.plugin.ows_client.wfs.model.Config.purpose = Data-model configuration for WFS responses.
gws.plugin.ows_client.wfs.model.Config.complexity = intermediate

gws.plugin.ows_client.wfs.model.Config.provider.label = WFS provider
gws.plugin.ows_client.wfs.model.Config.provider.purpose = Inline configuration or reference to a WFS provider.

gws.plugin.ows_client.wfs.model.Config.sourceLayers.label = Source layers
gws.plugin.ows_client.wfs.model.Config.sourceLayers.purpose = List of FeatureTypes whose responses are modelled.

