# UX-Strings für die Zoom-Konfiguration (Karten-Zoomstufen, Maßstäbe, Auflösungen).

[de]

gws.gis.zoom.Config.label = Zoomstufen
gws.gis.zoom.Config.purpose = Zoomstufen-Definition über Maßstäbe (`scales`) oder Auflösungen (`resolutions`). Lege fest, in welchen Stufen die Karte gezoomt werden kann und welche Stufe initial aktiv ist.
gws.gis.zoom.Config.whenToUse = Pro Karte oder Layer, sobald die voreingestellten Zoomstufen angepasst werden sollen (eingeschränkter Bereich, OSM-Stufen, projektspezifische Maßstabsleiter).
gws.gis.zoom.Config.complexity = intermediate

gws.gis.zoom.Config.resolutions.label = Auflösungen
gws.gis.zoom.Config.resolutions.purpose = Liste der erlaubten Map-Auflösungen (Karten-Einheit pro Pixel).
gws.gis.zoom.Config.resolutions.complexity = advanced

gws.gis.zoom.Config.scales.label = Maßstäbe
gws.gis.zoom.Config.scales.purpose = Liste der erlaubten Karten-Maßstäbe (Nenner). Alternative zu `resolutions`.
gws.gis.zoom.Config.scales.example = [10000, 5000, 2500, 1000]

gws.gis.zoom.Config.initResolution.label = Anfangs-Auflösung
gws.gis.zoom.Config.initResolution.purpose = Auflösung, mit der die Karte beim Öffnen angezeigt wird.

gws.gis.zoom.Config.initScale.label = Anfangs-Maßstab
gws.gis.zoom.Config.initScale.purpose = Maßstab, mit dem die Karte beim Öffnen angezeigt wird.
gws.gis.zoom.Config.initScale.example = 5000

gws.gis.zoom.Config.minResolution.label = Min. Auflösung
gws.gis.zoom.Config.minResolution.purpose = Untere Schranke für die Karten-Auflösung (entspricht der höchsten Detailstufe).

gws.gis.zoom.Config.maxResolution.label = Max. Auflösung
gws.gis.zoom.Config.maxResolution.purpose = Obere Schranke für die Karten-Auflösung (entspricht der niedrigsten Detailstufe).

gws.gis.zoom.Config.minScale.label = Min. Maßstab
gws.gis.zoom.Config.minScale.purpose = Untere Schranke für den Karten-Maßstab.

gws.gis.zoom.Config.maxScale.label = Max. Maßstab
gws.gis.zoom.Config.maxScale.purpose = Obere Schranke für den Karten-Maßstab.

[en]

gws.gis.zoom.Config.label = Zoom levels
gws.gis.zoom.Config.purpose = Zoom-level definition using scales (`scales`) or resolutions (`resolutions`). Defines the discrete zoom steps and the initially active step.
gws.gis.zoom.Config.whenToUse = Per map or layer, whenever the default zoom levels need to be adjusted (restricted range, OSM levels, project-specific scale ladder).
gws.gis.zoom.Config.complexity = intermediate

gws.gis.zoom.Config.resolutions.label = Resolutions
gws.gis.zoom.Config.resolutions.purpose = List of allowed map resolutions (map units per pixel).
gws.gis.zoom.Config.resolutions.complexity = advanced

gws.gis.zoom.Config.scales.label = Scales
gws.gis.zoom.Config.scales.purpose = List of allowed map scales (denominators). Alternative to `resolutions`.
gws.gis.zoom.Config.scales.example = [10000, 5000, 2500, 1000]

gws.gis.zoom.Config.initResolution.label = Initial resolution
gws.gis.zoom.Config.initResolution.purpose = Resolution at which the map is shown when opened.

gws.gis.zoom.Config.initScale.label = Initial scale
gws.gis.zoom.Config.initScale.purpose = Scale at which the map is shown when opened.
gws.gis.zoom.Config.initScale.example = 5000

gws.gis.zoom.Config.minResolution.label = Min resolution
gws.gis.zoom.Config.minResolution.purpose = Lower bound of the map resolution (corresponds to the highest detail level).

gws.gis.zoom.Config.maxResolution.label = Max resolution
gws.gis.zoom.Config.maxResolution.purpose = Upper bound of the map resolution (corresponds to the lowest detail level).

gws.gis.zoom.Config.minScale.label = Min scale
gws.gis.zoom.Config.minScale.purpose = Lower bound of the map scale.

gws.gis.zoom.Config.maxScale.label = Max scale
gws.gis.zoom.Config.maxScale.purpose = Upper bound of the map scale.
