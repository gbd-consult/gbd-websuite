# UX-Strings für GBD-Geoservices (Welle C).

[de]

# --- finder ---------------------------------------------------------------

gws.plugin.gbd_geoservices.finder.Config.label = GBD-Geoservices
gws.plugin.gbd_geoservices.finder.Config.purpose = Adress-, Reverse-Geocoding- und POI-Suche über die kommerziellen GBD-Geoservices. Liefert zuverlässige deutsche Adress-Daten ohne Limit der freien OSM-Quellen.
gws.plugin.gbd_geoservices.finder.Config.whenToUse = Wenn die Anwendung verlässliche, kommerziell nutzbare Adress-/POI-Daten benötigt, insbesondere für Behörden- und Fachverfahren.
gws.plugin.gbd_geoservices.finder.Config.complexity = intermediate
gws.plugin.gbd_geoservices.finder.Config.useCases = Adresseingabe in Bürger-Portalen, Geocoding für Fachverfahren, Reverse-Geocoding für Außendienst-Apps.

gws.plugin.gbd_geoservices.finder.Config.apiKey.label = API-Schlüssel
gws.plugin.gbd_geoservices.finder.Config.apiKey.purpose = Pflichtangabe. API-Schlüssel der GBD-Geoservices, der den Zugang zur Such-API freischaltet.
gws.plugin.gbd_geoservices.finder.Config.apiKey.example = "your-gbd-api-key"
gws.plugin.gbd_geoservices.finder.Config.apiKey.complexity = advanced

# --- model ----------------------------------------------------------------

gws.plugin.gbd_geoservices.model.Config.label = GBD-Geoservices-Datenmodell
gws.plugin.gbd_geoservices.model.Config.purpose = Datenmodell für GBD-Geoservices-Treffer. Wird durch den Finder automatisch erzeugt.
gws.plugin.gbd_geoservices.model.Config.whenToUse = Manuelle Konfiguration nur bei Sonderwünschen an Felder oder Templates.
gws.plugin.gbd_geoservices.model.Config.complexity = advanced

gws.plugin.gbd_geoservices.model.Config.apiKey.label = API-Schlüssel
gws.plugin.gbd_geoservices.model.Config.apiKey.purpose = API-Schlüssel der GBD-Geoservices (siehe finder.Config.apiKey).
gws.plugin.gbd_geoservices.model.Config.apiKey.complexity = advanced

[en]

# --- finder ---------------------------------------------------------------

gws.plugin.gbd_geoservices.finder.Config.label = GBD geoservices
gws.plugin.gbd_geoservices.finder.Config.purpose = Address, reverse-geocoding and POI search via the commercial GBD geoservices. Provides reliable German address data without the limits of free OSM sources.
gws.plugin.gbd_geoservices.finder.Config.whenToUse = When the application requires reliable, commercially licensable address/POI data, especially for government and domain workflows.
gws.plugin.gbd_geoservices.finder.Config.complexity = intermediate
gws.plugin.gbd_geoservices.finder.Config.useCases = Address input in citizen portals, geocoding for domain plugins, reverse-geocoding for field apps.

gws.plugin.gbd_geoservices.finder.Config.apiKey.label = API key
gws.plugin.gbd_geoservices.finder.Config.apiKey.purpose = Required. API key for GBD geoservices that unlocks the search API.
gws.plugin.gbd_geoservices.finder.Config.apiKey.example = "your-gbd-api-key"
gws.plugin.gbd_geoservices.finder.Config.apiKey.complexity = advanced

# --- model ----------------------------------------------------------------

gws.plugin.gbd_geoservices.model.Config.label = GBD geoservices data model
gws.plugin.gbd_geoservices.model.Config.purpose = Data model for GBD geoservices hits. Created automatically by the finder.
gws.plugin.gbd_geoservices.model.Config.whenToUse = Configure manually only for special field/template requirements.
gws.plugin.gbd_geoservices.model.Config.complexity = advanced

gws.plugin.gbd_geoservices.model.Config.apiKey.label = API key
gws.plugin.gbd_geoservices.model.Config.apiKey.purpose = GBD geoservices API key (see finder.Config.apiKey).
gws.plugin.gbd_geoservices.model.Config.apiKey.complexity = advanced
