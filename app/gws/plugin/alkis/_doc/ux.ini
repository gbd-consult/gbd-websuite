# UX-Strings für das alkis-Plugin.
#
# Schlüsselformat: gws.plugin.alkis.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Inhalte abgeleitet aus _doc/strings.ini, den Klassen-Docstrings und
# admin-de.doc.md. Das ALKIS-Plugin bindet das Amtliche
# Liegenschaftskataster-Informationssystem (ALKIS) an: Flurstücks-,
# Adress- und Eigentümersuche gegen eine PostgreSQL-Datenbank, die aus
# NAS-Daten gefüllt wurde (z.B. via norBIT alkisimport).
#
# Bewusste Lücken: einzelne Felder von Request-/Props-Klassen sowie
# CLI-Parameter ohne fachlich abweichende Semantik wurden nicht
# zusätzlich erklärt — sie ergeben sich unmittelbar aus dem ALKIS-
# Datenmodell und sind in admin-de.doc.md zusammenhängend beschrieben.

[de]

# --- action.Config ----------------------------------------------------------

gws.plugin.alkis.action.Config.label = ALKIS-Aktion
gws.plugin.alkis.action.Config.purpose = Backend-Aktion für die Flurstückssuche, Adresssuche und den Flurstücks-Export. Bindet eine ALKIS-Datenbank an, baut interne Indexe auf und liefert die Daten an die Sidebar-UI sowie an Druck- und Export-Funktionen.
gws.plugin.alkis.action.Config.whenToUse = Pflichtkonfiguration, sobald ALKIS-Daten in der WebSuite recherchierbar sein sollen.
gws.plugin.alkis.action.Config.complexity = advanced
gws.plugin.alkis.action.Config.useCases = Flurstückssuche im Sidebar, Eigentümer- und Buchungsauskunft mit Zugriffskontrolle, CSV-/GeoJSON-Export von Flurstücken, druckfähige Flurstücks-Auszüge.
gws.plugin.alkis.action.Config.docsLink = /admin-de/plugin/alkis

gws.plugin.alkis.action.Config.dbUid.label = Datenbank-Provider
gws.plugin.alkis.action.Config.dbUid.purpose = UID des PostgreSQL/PostGIS-Providers, in dem die ALKIS-Daten liegen.

gws.plugin.alkis.action.Config.crs.label = ALKIS-Koordinatensystem
gws.plugin.alkis.action.Config.crs.purpose = Koordinatensystem (KBS), in dem die ALKIS-Geometrien vorliegen. In Deutschland typischerweise UTM 32 oder 33.
gws.plugin.alkis.action.Config.crs.example = "EPSG:25832"

gws.plugin.alkis.action.Config.dataSchema.label = ALKIS-Schema
gws.plugin.alkis.action.Config.dataSchema.purpose = PostgreSQL-Schema, in dem die ALKIS-Quelltabellen (NAS-Import) liegen. Das Plugin liest hier nur, schreibt nie hinein.
gws.plugin.alkis.action.Config.dataSchema.example = "public"

gws.plugin.alkis.action.Config.indexSchema.label = Index-Schema
gws.plugin.alkis.action.Config.indexSchema.purpose = PostgreSQL-Schema, in dem die GWS-internen ALKIS-Indexe (Flurstücke, Adressen, Eigentümer) angelegt und aktualisiert werden.
gws.plugin.alkis.action.Config.indexSchema.example = "gws8"

gws.plugin.alkis.action.Config.excludeGemarkung.label = Ausgeschlossene Gemarkungen
gws.plugin.alkis.action.Config.excludeGemarkung.purpose = Liste von Gemarkungs-Codes, die beim Indexieren übersprungen werden sollen.
gws.plugin.alkis.action.Config.excludeGemarkung.complexity = advanced

gws.plugin.alkis.action.Config.gemarkungFilter.label = Gemarkungs-Filter
gws.plugin.alkis.action.Config.gemarkungFilter.purpose = Liste von Gemarkungs-Codes, auf die die Suche eingeschränkt werden soll.
gws.plugin.alkis.action.Config.gemarkungFilter.complexity = advanced

gws.plugin.alkis.action.Config.eigentuemer.label = Eigentümer-Konfiguration
gws.plugin.alkis.action.Config.eigentuemer.purpose = Zugriffsregeln und Datenschutz-Konfiguration für die Eigentümerauskunft.
gws.plugin.alkis.action.Config.eigentuemer.complexity = advanced

gws.plugin.alkis.action.Config.buchung.label = Buchungs-Konfiguration
gws.plugin.alkis.action.Config.buchung.purpose = Zugriffsregeln für die Buchungs-/Grundbuchauskunft (Buchungsblätter, Buchungsstellen).
gws.plugin.alkis.action.Config.buchung.complexity = advanced

gws.plugin.alkis.action.Config.limit.label = Trefferlimit
gws.plugin.alkis.action.Config.limit.purpose = Maximale Zahl der Treffer, die eine Flurstückssuche zurückliefert.
gws.plugin.alkis.action.Config.limit.example = 100

gws.plugin.alkis.action.Config.templates.label = Vorlagen
gws.plugin.alkis.action.Config.templates.purpose = HTML-Vorlagen für Flurstücks- und Adressdarstellung (Titel, Teaser, Beschreibung, Label).
gws.plugin.alkis.action.Config.templates.complexity = advanced

gws.plugin.alkis.action.Config.printers.label = Druck-Konfigurationen
gws.plugin.alkis.action.Config.printers.purpose = Druckvorlagen, die für ALKIS-Auszüge zur Verfügung stehen.
gws.plugin.alkis.action.Config.printers.complexity = advanced

gws.plugin.alkis.action.Config.ui.label = UI-Optionen
gws.plugin.alkis.action.Config.ui.purpose = Steuerung der Sidebar-Oberfläche (Listenmodi, aktivierte Funktionen wie Export, Auswahl, Verlauf).

gws.plugin.alkis.action.Config.strasseSearchOptions.label = Such-Optionen Straßennamen
gws.plugin.alkis.action.Config.strasseSearchOptions.purpose = Textsuche-Verhalten für Straßennamen (z.B. exakte Treffer, Anfangs- oder Teilstring-Suche).

gws.plugin.alkis.action.Config.nameSearchOptions.label = Such-Optionen Personennamen
gws.plugin.alkis.action.Config.nameSearchOptions.purpose = Textsuche-Verhalten für Eigentümer-Namen.
gws.plugin.alkis.action.Config.nameSearchOptions.complexity = advanced

gws.plugin.alkis.action.Config.buchungsblattSearchOptions.label = Such-Optionen Buchungsblätter
gws.plugin.alkis.action.Config.buchungsblattSearchOptions.purpose = Textsuche-Verhalten für Buchungsblattnummern.
gws.plugin.alkis.action.Config.buchungsblattSearchOptions.complexity = advanced

gws.plugin.alkis.action.Config.storage.label = Speicher
gws.plugin.alkis.action.Config.storage.purpose = Storage-Konfiguration für gespeicherte Auswahllisten (Flurstücks-Sammlungen).
gws.plugin.alkis.action.Config.storage.complexity = advanced

gws.plugin.alkis.action.Config.exporters.label = Exporter
gws.plugin.alkis.action.Config.exporters.purpose = Liste der Exportprofile (CSV, GeoJSON), die in der UI als Export-Optionen angeboten werden.
gws.plugin.alkis.action.Config.exporters.complexity = advanced

# --- action.EigentuemerConfig -----------------------------------------------

gws.plugin.alkis.action.EigentuemerConfig.label = Eigentümer-Auskunft
gws.plugin.alkis.action.EigentuemerConfig.purpose = Zugriffsregeln und Datenschutz-Kontrollen für die Anzeige von Eigentümerdaten. Eigentümerdaten unterliegen dem Datenschutz; ohne entsprechende Berechtigung dürfen sie nicht angezeigt werden.
gws.plugin.alkis.action.EigentuemerConfig.whenToUse = Wenn berechtigte Nutzer Eigentümerinformationen aus dem ALKIS recherchieren dürfen sollen.
gws.plugin.alkis.action.EigentuemerConfig.complexity = advanced

gws.plugin.alkis.action.EigentuemerConfig.controlMode.label = Kontrollmodus
gws.plugin.alkis.action.EigentuemerConfig.controlMode.purpose = Wenn aktiv, muss bei jeder Eigentümer-Anfrage ein Abrufgrund (Aktenzeichen o.ä.) angegeben werden, der gegen die controlRules geprüft und in der logTable protokolliert wird.

gws.plugin.alkis.action.EigentuemerConfig.controlRules.label = Kontrollregeln
gws.plugin.alkis.action.EigentuemerConfig.controlRules.purpose = Liste regulärer Ausdrücke, gegen die der eingegebene Abrufgrund auf Plausibilität geprüft wird. Mindestens ein Treffer ist erforderlich.
gws.plugin.alkis.action.EigentuemerConfig.controlRules.example = ["^[A-Z][A-Z]/[0-9][0-9]$"]

gws.plugin.alkis.action.EigentuemerConfig.logTable.label = Protokolltabelle
gws.plugin.alkis.action.EigentuemerConfig.logTable.purpose = Name einer PostgreSQL-Tabelle, in der jeder Eigentümerzugriff (Nutzer, IP, Abrufgrund, Trefferzahl) protokolliert wird.
gws.plugin.alkis.action.EigentuemerConfig.logTable.example = "eigen_log"

# --- action.BuchungConfig ---------------------------------------------------

gws.plugin.alkis.action.BuchungConfig.label = Buchungs-Auskunft
gws.plugin.alkis.action.BuchungConfig.purpose = Zugriffsregeln für die Anzeige von Buchungsdaten (Buchungsblätter, Buchungsstellen, Namensnummern). Buchungsdaten enthalten Eigentumsverhältnisse und sind entsprechend zugriffsbeschränkt.
gws.plugin.alkis.action.BuchungConfig.whenToUse = Wenn berechtigte Nutzer auf Buchungsinformationen aus dem Grundbuch-Bezug des ALKIS zugreifen dürfen sollen.
gws.plugin.alkis.action.BuchungConfig.complexity = advanced

# --- action.Ui --------------------------------------------------------------

gws.plugin.alkis.action.Ui.label = ALKIS-UI-Optionen
gws.plugin.alkis.action.Ui.purpose = Konfiguration der Sidebar-Oberfläche der Flurstückssuche.

gws.plugin.alkis.action.Ui.useExport.label = Export aktivieren
gws.plugin.alkis.action.Ui.useExport.purpose = Schaltet die Export-Funktion (CSV/GeoJSON) in der Sidebar frei.

gws.plugin.alkis.action.Ui.useSelect.label = Auswahlmodus
gws.plugin.alkis.action.Ui.useSelect.purpose = Aktiviert das Selektieren mehrerer Flurstücke und die Auswahl-Ablage.

gws.plugin.alkis.action.Ui.usePick.label = Direktauswahl
gws.plugin.alkis.action.Ui.usePick.purpose = Aktiviert die Funktion „Flurstück direkt auswählen" durch Klick in die Karte.

gws.plugin.alkis.action.Ui.useHistory.label = Historie
gws.plugin.alkis.action.Ui.useHistory.purpose = Schaltet die Steuerung für historische Flurstücke (untergegangene Stände) frei.
gws.plugin.alkis.action.Ui.useHistory.complexity = advanced

gws.plugin.alkis.action.Ui.searchSelection.label = Suche in Auswahl
gws.plugin.alkis.action.Ui.searchSelection.purpose = Aktiviert die Funktion „In aktueller Auswahl suchen".

gws.plugin.alkis.action.Ui.searchSpatial.label = Räumliche Suche
gws.plugin.alkis.action.Ui.searchSpatial.purpose = Aktiviert die räumliche Suche (Auswahl per Polygon, Bounding Box).

gws.plugin.alkis.action.Ui.gemarkungListMode.label = Gemarkungslisten-Modus
gws.plugin.alkis.action.Ui.gemarkungListMode.purpose = Darstellung der Gemarkungsliste im Suchformular: nur Gemarkung, „Gemarkung (Gemeinde)", Baumansicht oder ausgeblendet.

gws.plugin.alkis.action.Ui.strasseListMode.label = Straßenlisten-Format
gws.plugin.alkis.action.Ui.strasseListMode.purpose = Darstellung von Straßennamen in der Auswahlliste, mit oder ohne Gemarkung/Gemeinde-Zusatz.

gws.plugin.alkis.action.Ui.autoSpatialSearch.label = Automatische räumliche Suche
gws.plugin.alkis.action.Ui.autoSpatialSearch.purpose = Wenn aktiv, wird beim Absenden des Suchformulars automatisch eine räumliche Eingrenzung erwartet.
gws.plugin.alkis.action.Ui.autoSpatialSearch.complexity = advanced

# --- action.Object ----------------------------------------------------------

gws.plugin.alkis.action.Object.label = ALKIS-Aktion (Laufzeit)

# --- action.Props -----------------------------------------------------------

gws.plugin.alkis.action.Props.label = ALKIS-Aktion (Client-Properties)
gws.plugin.alkis.action.Props.purpose = An den Client übermittelte Eigenschaften der ALKIS-Aktion. Werden vom Sidebar-Modul ausgewertet.

# --- action.FindFlurstueckRequest -------------------------------------------

gws.plugin.alkis.action.FindFlurstueckRequest.label = Flurstückssuche-Anfrage
gws.plugin.alkis.action.FindFlurstueckRequest.purpose = Parameter der Flurstückssuche-API. Felder können einzeln oder kombiniert gesetzt werden; leere Felder werden ignoriert. Strukturmerkmale entsprechen dem ALKIS-Datenmodell (Land, Regierungsbezirk, Kreis, Gemeinde, Gemarkung, Flur, Zähler/Nenner, Flurstücksfolge).

# --- action.FindAdresseRequest ----------------------------------------------

gws.plugin.alkis.action.FindAdresseRequest.label = Adresssuche-Anfrage
gws.plugin.alkis.action.FindAdresseRequest.purpose = Parameter der ALKIS-Adresssuche. Adressen werden über das ALKIS-Adressregister recherchiert, nicht über externe Geocoder.

# --- action.GetToponymsRequest ----------------------------------------------

gws.plugin.alkis.action.GetToponymsRequest.label = Toponym-Anfrage
gws.plugin.alkis.action.GetToponymsRequest.purpose = Liefert die Listen aller Gemeinden, Gemarkungen und Straßen aus dem ALKIS-Index — wird vom Client zum Befüllen der Auswahlfelder genutzt.

# --- action.PrintFlurstueckRequest ------------------------------------------

gws.plugin.alkis.action.PrintFlurstueckRequest.label = Flurstücks-Druckanfrage
gws.plugin.alkis.action.PrintFlurstueckRequest.purpose = Parameter für den Druck eines Flurstücks-Auszugs. Kombiniert Flurstücks-Suchparameter mit einer Druckanfrage.

# --- action.ExportFlurstueckRequest -----------------------------------------

gws.plugin.alkis.action.ExportFlurstueckRequest.label = Flurstücks-Exportanfrage
gws.plugin.alkis.action.ExportFlurstueckRequest.purpose = Parameter für den Flurstücks-Export. Wählt einen Exporter (CSV oder GeoJSON) und übergibt eine Flurstücks-Suchanfrage.

# --- data.exporter.Config ---------------------------------------------------

gws.plugin.alkis.data.exporter.Config.label = ALKIS-Export-Profil
gws.plugin.alkis.data.exporter.Config.purpose = Definiert ein Exportprofil für Flurstücksdaten (CSV oder GeoJSON), inklusive Auswahl der zu exportierenden Felder.
gws.plugin.alkis.data.exporter.Config.whenToUse = Wenn Anwender Suchergebnisse als Datei (z.B. für Excel oder QGIS) herunterladen können sollen.
gws.plugin.alkis.data.exporter.Config.complexity = advanced

gws.plugin.alkis.data.exporter.Config.type.label = Exportformat
gws.plugin.alkis.data.exporter.Config.type.purpose = Datenformat des Exports — derzeit „csv" oder „geojson".
gws.plugin.alkis.data.exporter.Config.type.example = "csv"

gws.plugin.alkis.data.exporter.Config.title.label = Anzeigename
gws.plugin.alkis.data.exporter.Config.title.purpose = Bezeichnung, unter der das Exportprofil in der Oberfläche angeboten wird.

gws.plugin.alkis.data.exporter.Config.model.label = Export-Datenmodell
gws.plugin.alkis.data.exporter.Config.model.purpose = Datenmodell mit der Auswahl der zu exportierenden Felder. Wird kein Modell konfiguriert, kommt eine Standardauswahl mit Flurstückskennzeichen, Gemeinde/Gemarkung, Flur/Zähler/Nenner, Fläche und Lagepunkt zum Einsatz.
gws.plugin.alkis.data.exporter.Config.model.complexity = advanced

# --- cli.Object -------------------------------------------------------------

gws.plugin.alkis.cli.Object.label = ALKIS-CLI
gws.plugin.alkis.cli.Object.purpose = Kommandozeilen-Werkzeuge zum Aufbauen, Prüfen und Exportieren des ALKIS-Index.

# --- cli.CreateIndexParams --------------------------------------------------

gws.plugin.alkis.cli.CreateIndexParams.label = Index-Aufbau-Parameter
gws.plugin.alkis.cli.CreateIndexParams.purpose = Parameter für `gws alkis index` — baut die GWS-internen ALKIS-Indexe aus dem NAS-Datenbestand auf.

gws.plugin.alkis.cli.CreateIndexParams.projectUid.label = Projekt-UID
gws.plugin.alkis.cli.CreateIndexParams.projectUid.purpose = Projekt-UID, falls die ALKIS-Aktion projektspezifisch konfiguriert ist.

gws.plugin.alkis.cli.CreateIndexParams.force.label = Erzwingen
gws.plugin.alkis.cli.CreateIndexParams.force.purpose = Setzt den Index neu auf, auch wenn er bereits vollständig vorliegt.

gws.plugin.alkis.cli.CreateIndexParams.cache.label = Objekt-Cache
gws.plugin.alkis.cli.CreateIndexParams.cache.purpose = Verwendet einen Objekt-Cache während des Index-Aufbaus (beschleunigt wiederholte Läufe gegen denselben Datenstand).
gws.plugin.alkis.cli.CreateIndexParams.cache.complexity = advanced

# --- cli.StatusParams -------------------------------------------------------

gws.plugin.alkis.cli.StatusParams.label = Index-Status-Parameter
gws.plugin.alkis.cli.StatusParams.purpose = Parameter für `gws alkis status` — meldet, ob der ALKIS-Index vollständig, teilweise (z.B. nur Basisdaten ohne Eigentümer/Buchung) oder nicht vorhanden ist.

gws.plugin.alkis.cli.StatusParams.projectUid.label = Projekt-UID
gws.plugin.alkis.cli.StatusParams.projectUid.purpose = Projekt-UID, falls projektspezifisch konfiguriert.

# --- cli.ExportParams -------------------------------------------------------

gws.plugin.alkis.cli.ExportParams.label = Export-Parameter
gws.plugin.alkis.cli.ExportParams.purpose = Parameter für `gws alkis export` — exportiert den vollständigen Flurstücksbestand inklusive Eigentümer/Buchung in eine Datei (Batch-Lauf, läuft als System-Nutzer).
gws.plugin.alkis.cli.ExportParams.complexity = advanced

gws.plugin.alkis.cli.ExportParams.projectUid.label = Projekt-UID
gws.plugin.alkis.cli.ExportParams.projectUid.purpose = Projekt-UID, falls projektspezifisch konfiguriert.

gws.plugin.alkis.cli.ExportParams.exporterUid.label = Exporter-UID
gws.plugin.alkis.cli.ExportParams.exporterUid.purpose = UID eines konfigurierten Export-Profils. Ohne Angabe wird das erste verfügbare Profil verwendet.

gws.plugin.alkis.cli.ExportParams.path.label = Zielpfad
gws.plugin.alkis.cli.ExportParams.path.purpose = Pfad der Ausgabedatei.

# --- cli.DumpParams ---------------------------------------------------------

gws.plugin.alkis.cli.DumpParams.label = Dump-Parameter
gws.plugin.alkis.cli.DumpParams.purpose = Parameter für `gws alkis dump` — schreibt die interne JSON-Darstellung einzelner Flurstücke in eine Datei. Diagnose-/Debug-Hilfsmittel.
gws.plugin.alkis.cli.DumpParams.complexity = advanced

gws.plugin.alkis.cli.DumpParams.projectUid.label = Projekt-UID
gws.plugin.alkis.cli.DumpParams.projectUid.purpose = Projekt-UID, falls projektspezifisch konfiguriert.

gws.plugin.alkis.cli.DumpParams.fs.label = Flurstücks-UIDs
gws.plugin.alkis.cli.DumpParams.fs.purpose = Komma- oder Leerzeichen-getrennte Liste von Flurstücks-UIDs (z.B. ALKIS-Kennzeichen oder GML-IDs).

gws.plugin.alkis.cli.DumpParams.path.label = Zielpfad
gws.plugin.alkis.cli.DumpParams.path.purpose = Pfad der Ausgabedatei.

# --- action.Props (Client-Properties) ---------------------------------------

gws.plugin.alkis.action.Props.exporters.label = Exporter
gws.plugin.alkis.action.Props.exporters.purpose = An den Client übergebene Liste der verfügbaren Export-Profile (UID und Anzeigename).

gws.plugin.alkis.action.Props.limit.label = Trefferlimit
gws.plugin.alkis.action.Props.limit.purpose = An den Client übergebenes Trefferlimit für die Flurstückssuche.

gws.plugin.alkis.action.Props.printer.label = Drucker
gws.plugin.alkis.action.Props.printer.purpose = An den Client übergebene Druck-Konfiguration für Flurstücks-Auszüge.

gws.plugin.alkis.action.Props.ui.label = UI-Optionen
gws.plugin.alkis.action.Props.ui.purpose = An den Client übergebene UI-Optionen der ALKIS-Sidebar.

gws.plugin.alkis.action.Props.storage.label = Speicher
gws.plugin.alkis.action.Props.storage.purpose = An den Client übergebene Storage-Eigenschaften für gespeicherte Flurstücks-Auswahllisten.

gws.plugin.alkis.action.Props.strasseSearchOptions.label = Such-Optionen Straßennamen
gws.plugin.alkis.action.Props.strasseSearchOptions.purpose = An den Client gemeldete Such-Optionen für Straßennamen.

gws.plugin.alkis.action.Props.nameSearchOptions.label = Such-Optionen Personennamen
gws.plugin.alkis.action.Props.nameSearchOptions.purpose = An den Client gemeldete Such-Optionen für Eigentümer-Namen.

gws.plugin.alkis.action.Props.buchungsblattSearchOptions.label = Such-Optionen Buchungsblätter
gws.plugin.alkis.action.Props.buchungsblattSearchOptions.purpose = An den Client gemeldete Such-Optionen für Buchungsblattnummern.

gws.plugin.alkis.action.Props.withBuchung.label = Buchungsdaten verfügbar
gws.plugin.alkis.action.Props.withBuchung.purpose = Zeigt dem Client an, dass die Buchungs-Auskunft aktiviert ist.

gws.plugin.alkis.action.Props.withEigentuemer.label = Eigentümerdaten verfügbar
gws.plugin.alkis.action.Props.withEigentuemer.purpose = Zeigt dem Client an, dass die Eigentümer-Auskunft aktiviert ist.

gws.plugin.alkis.action.Props.withEigentuemerControl.label = Abrufgrund-Pflicht
gws.plugin.alkis.action.Props.withEigentuemerControl.purpose = Zeigt dem Client an, dass für die Eigentümer-Anzeige ein Abrufgrund eingegeben werden muss.

gws.plugin.alkis.action.Props.withFlurnummer.label = Flurnummer-Eingabe
gws.plugin.alkis.action.Props.withFlurnummer.purpose = Zeigt dem Client an, dass das Eingabefeld für Flurnummern aktiviert ist.

# --- FindFlurstueckRequest --------------------------------------------------

gws.plugin.alkis.action.FindFlurstueckRequest.land.label = Land
gws.plugin.alkis.action.FindFlurstueckRequest.land.purpose = Bezeichnung des Bundeslandes (oberste Ebene des ALKIS-Verwaltungsschlüssels).

gws.plugin.alkis.action.FindFlurstueckRequest.landCode.label = Land-Schlüssel
gws.plugin.alkis.action.FindFlurstueckRequest.landCode.purpose = Bundesland-Schlüssel (zwei Ziffern) gemäß ALKIS-Verwaltungsschlüssel.

gws.plugin.alkis.action.FindFlurstueckRequest.regierungsbezirk.label = Regierungsbezirk
gws.plugin.alkis.action.FindFlurstueckRequest.regierungsbezirk.purpose = Bezeichnung des Regierungsbezirks.

gws.plugin.alkis.action.FindFlurstueckRequest.regierungsbezirkCode.label = Regierungsbezirks-Schlüssel
gws.plugin.alkis.action.FindFlurstueckRequest.regierungsbezirkCode.purpose = Schlüssel des Regierungsbezirks gemäß ALKIS-Verwaltungsschlüssel.

gws.plugin.alkis.action.FindFlurstueckRequest.kreis.label = Kreis
gws.plugin.alkis.action.FindFlurstueckRequest.kreis.purpose = Bezeichnung des Kreises (Landkreis oder kreisfreie Stadt).

gws.plugin.alkis.action.FindFlurstueckRequest.kreisCode.label = Kreis-Schlüssel
gws.plugin.alkis.action.FindFlurstueckRequest.kreisCode.purpose = Kreis-Schlüssel gemäß ALKIS-Verwaltungsschlüssel.

gws.plugin.alkis.action.FindFlurstueckRequest.gemeinde.label = Gemeinde
gws.plugin.alkis.action.FindFlurstueckRequest.gemeinde.purpose = Bezeichnung der Gemeinde.

gws.plugin.alkis.action.FindFlurstueckRequest.gemeindeCode.label = Gemeinde-Schlüssel
gws.plugin.alkis.action.FindFlurstueckRequest.gemeindeCode.purpose = Gemeinde-Schlüssel gemäß ALKIS-Verwaltungsschlüssel.

gws.plugin.alkis.action.FindFlurstueckRequest.gemarkung.label = Gemarkung
gws.plugin.alkis.action.FindFlurstueckRequest.gemarkung.purpose = Bezeichnung der Gemarkung (kataster-rechtliche Gebietseinheit unterhalb der Gemeinde).

gws.plugin.alkis.action.FindFlurstueckRequest.gemarkungCode.label = Gemarkungs-Schlüssel
gws.plugin.alkis.action.FindFlurstueckRequest.gemarkungCode.purpose = Gemarkungs-Schlüssel gemäß ALKIS.

gws.plugin.alkis.action.FindFlurstueckRequest.flurnummer.label = Flurnummer
gws.plugin.alkis.action.FindFlurstueckRequest.flurnummer.purpose = Nummer der Flur innerhalb der Gemarkung.

gws.plugin.alkis.action.FindFlurstueckRequest.zaehler.label = Zähler
gws.plugin.alkis.action.FindFlurstueckRequest.zaehler.purpose = Zähler der Flurstücksnummer (Bruchzahl Zähler/Nenner).

gws.plugin.alkis.action.FindFlurstueckRequest.nenner.label = Nenner
gws.plugin.alkis.action.FindFlurstueckRequest.nenner.purpose = Nenner der Flurstücksnummer (Bruchzahl Zähler/Nenner). Leer, wenn das Flurstück keinen Nenner hat.

gws.plugin.alkis.action.FindFlurstueckRequest.flurstuecksfolge.label = Flurstücksfolge
gws.plugin.alkis.action.FindFlurstueckRequest.flurstuecksfolge.purpose = Folge-Kennzeichen des Flurstücks (ALKIS-spezifischer Zusatz zur Flurstücksnummer).

gws.plugin.alkis.action.FindFlurstueckRequest.fsnummer.label = Flurstücks-Komplettnummer
gws.plugin.alkis.action.FindFlurstueckRequest.fsnummer.purpose = Vollständige Flurstücks-Bezeichnung (Flur, Zähler/Nenner, ggf. Folge) als ein String.

gws.plugin.alkis.action.FindFlurstueckRequest.flaecheVon.label = Mindestfläche (m²)
gws.plugin.alkis.action.FindFlurstueckRequest.flaecheVon.purpose = Untere Grenze des Filters für die amtliche Flurstücksfläche.

gws.plugin.alkis.action.FindFlurstueckRequest.flaecheBis.label = Maximalfläche (m²)
gws.plugin.alkis.action.FindFlurstueckRequest.flaecheBis.purpose = Obere Grenze des Filters für die amtliche Flurstücksfläche.

gws.plugin.alkis.action.FindFlurstueckRequest.strasse.label = Straße
gws.plugin.alkis.action.FindFlurstueckRequest.strasse.purpose = Straßenname für die kombinierte Adress-/Flurstückssuche.

gws.plugin.alkis.action.FindFlurstueckRequest.hausnummer.label = Hausnummer
gws.plugin.alkis.action.FindFlurstueckRequest.hausnummer.purpose = Hausnummer für die kombinierte Adress-/Flurstückssuche.

gws.plugin.alkis.action.FindFlurstueckRequest.bblatt.label = Buchungsblattnummer
gws.plugin.alkis.action.FindFlurstueckRequest.bblatt.purpose = Buchungsblattnummer (Grundbuchblatt-Bezug). Filtert nach Flurstücken eines Buchungsblatts.

gws.plugin.alkis.action.FindFlurstueckRequest.personName.label = Eigentümer-Nachname
gws.plugin.alkis.action.FindFlurstueckRequest.personName.purpose = Nachname des Eigentümers (nur mit Eigentümer-Berechtigung wirksam).
gws.plugin.alkis.action.FindFlurstueckRequest.personName.complexity = advanced

gws.plugin.alkis.action.FindFlurstueckRequest.personVorname.label = Eigentümer-Vorname
gws.plugin.alkis.action.FindFlurstueckRequest.personVorname.purpose = Vorname des Eigentümers (nur mit Eigentümer-Berechtigung wirksam).
gws.plugin.alkis.action.FindFlurstueckRequest.personVorname.complexity = advanced

gws.plugin.alkis.action.FindFlurstueckRequest.combinedFlurstueckCode.label = Kombinierter Flurstücks-Code
gws.plugin.alkis.action.FindFlurstueckRequest.combinedFlurstueckCode.purpose = Vollständiger ALKIS-Flurstückskennzeichen-String (Land/Gemarkung/Flur/Zähler/Nenner) als ein Wert.

gws.plugin.alkis.action.FindFlurstueckRequest.shapes.label = Such-Geometrien
gws.plugin.alkis.action.FindFlurstueckRequest.shapes.purpose = Geometrien für die räumliche Eingrenzung — Flurstücke, die diese Geometrien schneiden, werden gesucht.

gws.plugin.alkis.action.FindFlurstueckRequest.uids.label = Flurstücks-UIDs
gws.plugin.alkis.action.FindFlurstueckRequest.uids.purpose = Liste expliziter Flurstücks-UIDs (z.B. ALKIS-Kennzeichen oder GML-IDs), nach denen gesucht wird.

gws.plugin.alkis.action.FindFlurstueckRequest.crs.label = Ergebnis-CRS
gws.plugin.alkis.action.FindFlurstueckRequest.crs.purpose = Koordinatensystem, in dem die Geometrien der Treffer geliefert werden sollen.

gws.plugin.alkis.action.FindFlurstueckRequest.eigentuemerControlInput.label = Abrufgrund
gws.plugin.alkis.action.FindFlurstueckRequest.eigentuemerControlInput.purpose = Vom Anwender eingegebene Begründung für den Eigentümer-Abruf (Aktenzeichen o.ä.). Wird gegen die controlRules geprüft und protokolliert.
gws.plugin.alkis.action.FindFlurstueckRequest.eigentuemerControlInput.complexity = advanced

gws.plugin.alkis.action.FindFlurstueckRequest.limit.label = Trefferlimit
gws.plugin.alkis.action.FindFlurstueckRequest.limit.purpose = Maximale Trefferzahl für diese Anfrage; überschreibt das in der Konfiguration gesetzte Limit nicht nach oben.

gws.plugin.alkis.action.FindFlurstueckRequest.wantEigentuemer.label = Eigentümer mitliefern
gws.plugin.alkis.action.FindFlurstueckRequest.wantEigentuemer.purpose = Wenn aktiv, werden die Eigentümerdaten der Treffer-Flurstücke ausgegeben (nur mit Berechtigung).
gws.plugin.alkis.action.FindFlurstueckRequest.wantEigentuemer.complexity = advanced

gws.plugin.alkis.action.FindFlurstueckRequest.wantHistorySearch.label = Historisch suchen
gws.plugin.alkis.action.FindFlurstueckRequest.wantHistorySearch.purpose = Wenn aktiv, werden auch historische (untergegangene) Flurstücke in die Suche einbezogen.
gws.plugin.alkis.action.FindFlurstueckRequest.wantHistorySearch.complexity = advanced

gws.plugin.alkis.action.FindFlurstueckRequest.wantHistoryDisplay.label = Historie anzeigen
gws.plugin.alkis.action.FindFlurstueckRequest.wantHistoryDisplay.purpose = Wenn aktiv, werden zu den Treffern Vor- und Nachfolger aus der ALKIS-Historie mitgeliefert.
gws.plugin.alkis.action.FindFlurstueckRequest.wantHistoryDisplay.complexity = advanced

gws.plugin.alkis.action.FindFlurstueckRequest.displayThemes.label = Anzeige-Themen
gws.plugin.alkis.action.FindFlurstueckRequest.displayThemes.purpose = Auswahl der Themen, die in der Trefferdarstellung angezeigt werden (Lage, Buchung, Eigentümer, Nutzung).

