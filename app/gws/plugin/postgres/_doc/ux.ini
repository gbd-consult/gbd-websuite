# UX-Strings for the postgres plugin (pilot of the new ux-strings format).
#
# Schlüsselformat: gws.plugin.postgres.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Inhalte konservativ aus _doc/strings.ini und den Klassen-Docstrings
# abgeleitet — keine Phantasie-Texte.

[de]

# --- provider ---------------------------------------------------------------

gws.plugin.postgres.provider.Config.label = PostgreSQL/PostGIS-Verbindung
gws.plugin.postgres.provider.Config.purpose = Verbindungsparameter zu einem PostgreSQL-Server. Pro Server wird eine Provider-Konfiguration angelegt; mehrere Datenbanken auf demselben Server teilen sich üblicherweise einen Provider.
gws.plugin.postgres.provider.Config.whenToUse = Pflicht für jede Installation, die eigene Daten aus PostgreSQL liest — typischerweise PostGIS für Geodaten.
gws.plugin.postgres.provider.Config.complexity = intermediate
gws.plugin.postgres.provider.Config.useCases = Eigene Vektordaten als Layer einbinden, Editierung über Datenmodelle, Anbindung an Fachverfahren wie ALKIS.

gws.plugin.postgres.provider.Config.host.label = Host
gws.plugin.postgres.provider.Config.host.purpose = Hostname oder IP-Adresse des PostgreSQL-Servers.
gws.plugin.postgres.provider.Config.host.example = "db.example.com"

gws.plugin.postgres.provider.Config.port.label = Port
gws.plugin.postgres.provider.Config.port.purpose = TCP-Port des PostgreSQL-Servers. Default ist 5432.
gws.plugin.postgres.provider.Config.port.example = 5432

gws.plugin.postgres.provider.Config.database.label = Datenbankname
gws.plugin.postgres.provider.Config.database.purpose = Name der Datenbank, mit der sich der Provider verbindet.

gws.plugin.postgres.provider.Config.username.label = Benutzername
gws.plugin.postgres.provider.Config.username.purpose = Login-Name für die Datenbank-Authentifizierung.

gws.plugin.postgres.provider.Config.password.label = Passwort
gws.plugin.postgres.provider.Config.password.purpose = Passwort des angegebenen Datenbankbenutzers.
gws.plugin.postgres.provider.Config.password.complexity = advanced

gws.plugin.postgres.provider.Config.serviceName.label = pg_service-Eintrag
gws.plugin.postgres.provider.Config.serviceName.purpose = Name eines Service-Eintrags aus der pg_services-Datei. Alternative zur expliziten Angabe von host/port/username/password.
gws.plugin.postgres.provider.Config.serviceName.complexity = advanced

gws.plugin.postgres.provider.Config.options.label = libpq-Verbindungsoptionen
gws.plugin.postgres.provider.Config.options.purpose = Zusätzliche libpq-Verbindungsparameter als Schlüssel-Wert-Paare.
gws.plugin.postgres.provider.Config.options.complexity = advanced

# --- finder -----------------------------------------------------------------

gws.plugin.postgres.finder.Config.label = PostgreSQL-Suche
gws.plugin.postgres.finder.Config.purpose = Datenbankbasierte Volltext- oder Attributsuche über eine PostgreSQL-Tabelle.
gws.plugin.postgres.finder.Config.whenToUse = Wenn Suchergebnisse direkt aus einer Datenbanktabelle kommen sollen.
gws.plugin.postgres.finder.Config.complexity = intermediate

gws.plugin.postgres.finder.Config.dbUid.label = Datenbank-Provider
gws.plugin.postgres.finder.Config.dbUid.purpose = UID des konfigurierten Datenbank-Providers, gegen den gesucht wird.

gws.plugin.postgres.finder.Config.tableName.label = Tabellenname
gws.plugin.postgres.finder.Config.tableName.purpose = Vollqualifizierter Name der durchsuchten Datenbanktabelle.

gws.plugin.postgres.finder.Config.sqlFilter.label = SQL-Filter
gws.plugin.postgres.finder.Config.sqlFilter.purpose = Zusätzlicher SQL-Ausdruck, der an die WHERE-Klausel angehängt wird.
gws.plugin.postgres.finder.Config.sqlFilter.complexity = advanced

# --- layer ------------------------------------------------------------------

gws.plugin.postgres.layer.Config.label = PostgreSQL-Layer
gws.plugin.postgres.layer.Config.purpose = Vektor-Layer, dessen Geometrien und Attribute aus einer PostgreSQL-Tabelle gelesen werden.
gws.plugin.postgres.layer.Config.whenToUse = Wenn eigene Geodaten aus PostGIS als Karten-Layer angezeigt oder editiert werden sollen.
gws.plugin.postgres.layer.Config.complexity = intermediate
gws.plugin.postgres.layer.Config.useCases = Editierbare Fachdaten, dynamisch gefilterte Layer, Layer mit komplexer Symbolisierung über Datenmodelle.

# --- model ------------------------------------------------------------------

gws.plugin.postgres.model.Config.label = PostgreSQL-Datenmodell
gws.plugin.postgres.model.Config.purpose = Konfiguration eines Datenmodells auf Basis einer PostgreSQL-Tabelle. Definiert Felder, Validatoren und Editier-Widgets.
gws.plugin.postgres.model.Config.whenToUse = Pflicht für editierbare Layer und für strukturierte Suche/Anzeige.
gws.plugin.postgres.model.Config.complexity = intermediate

# --- auth_provider ----------------------------------------------------------

gws.plugin.postgres.auth_provider.Config.label = PostgreSQL-Autorisierungsanbieter
gws.plugin.postgres.auth_provider.Config.purpose = Authentifizierung gegen Benutzer- und Rollen-Tabellen in PostgreSQL.
gws.plugin.postgres.auth_provider.Config.whenToUse = Wenn Benutzerdaten in einer eigenen Datenbank gepflegt werden, statt in einer Datei oder einem LDAP.
gws.plugin.postgres.auth_provider.Config.complexity = intermediate

[en]

# --- provider ---------------------------------------------------------------

gws.plugin.postgres.provider.Config.label = PostgreSQL/PostGIS connection
gws.plugin.postgres.provider.Config.purpose = Connection parameters for a PostgreSQL server. One provider per server; multiple databases on the same server typically share a single provider.
gws.plugin.postgres.provider.Config.whenToUse = Required for any installation that reads its own data from PostgreSQL — typically PostGIS for spatial data.
gws.plugin.postgres.provider.Config.complexity = intermediate
gws.plugin.postgres.provider.Config.useCases = Vector data as map layers, editing through data models, integration with domain plugins like ALKIS.

gws.plugin.postgres.provider.Config.host.label = Host
gws.plugin.postgres.provider.Config.host.purpose = Hostname or IP address of the PostgreSQL server.
gws.plugin.postgres.provider.Config.host.example = "db.example.com"

gws.plugin.postgres.provider.Config.port.label = Port
gws.plugin.postgres.provider.Config.port.purpose = TCP port of the PostgreSQL server. Defaults to 5432.
gws.plugin.postgres.provider.Config.port.example = 5432

gws.plugin.postgres.provider.Config.database.label = Database name
gws.plugin.postgres.provider.Config.database.purpose = Name of the database the provider connects to.

gws.plugin.postgres.provider.Config.username.label = Username
gws.plugin.postgres.provider.Config.username.purpose = Login name for database authentication.

gws.plugin.postgres.provider.Config.password.label = Password
gws.plugin.postgres.provider.Config.password.purpose = Password of the configured database user.
gws.plugin.postgres.provider.Config.password.complexity = advanced

gws.plugin.postgres.provider.Config.serviceName.label = pg_service entry
gws.plugin.postgres.provider.Config.serviceName.purpose = Name of an entry in the pg_services file. Alternative to specifying host/port/username/password explicitly.
gws.plugin.postgres.provider.Config.serviceName.complexity = advanced

gws.plugin.postgres.provider.Config.options.label = libpq connection options
gws.plugin.postgres.provider.Config.options.purpose = Additional libpq connection parameters as key/value pairs.
gws.plugin.postgres.provider.Config.options.complexity = advanced

# --- finder -----------------------------------------------------------------

gws.plugin.postgres.finder.Config.label = PostgreSQL search
gws.plugin.postgres.finder.Config.purpose = Database-backed full-text or attribute search against a PostgreSQL table.
gws.plugin.postgres.finder.Config.whenToUse = When search results should come directly from a database table.
gws.plugin.postgres.finder.Config.complexity = intermediate

gws.plugin.postgres.finder.Config.dbUid.label = Database provider
gws.plugin.postgres.finder.Config.dbUid.purpose = UID of the configured database provider to query against.

gws.plugin.postgres.finder.Config.tableName.label = Table name
gws.plugin.postgres.finder.Config.tableName.purpose = Fully-qualified name of the database table being searched.

gws.plugin.postgres.finder.Config.sqlFilter.label = SQL filter
gws.plugin.postgres.finder.Config.sqlFilter.purpose = Additional SQL expression appended to the WHERE clause.
gws.plugin.postgres.finder.Config.sqlFilter.complexity = advanced

# --- layer ------------------------------------------------------------------

gws.plugin.postgres.layer.Config.label = PostgreSQL layer
gws.plugin.postgres.layer.Config.purpose = Vector layer whose geometries and attributes come from a PostgreSQL table.
gws.plugin.postgres.layer.Config.whenToUse = When own spatial data from PostGIS should be displayed or edited as a map layer.
gws.plugin.postgres.layer.Config.complexity = intermediate
gws.plugin.postgres.layer.Config.useCases = Editable domain data, dynamically filtered layers, layers with complex symbology via data models.

# --- model ------------------------------------------------------------------

gws.plugin.postgres.model.Config.label = PostgreSQL data model
gws.plugin.postgres.model.Config.purpose = Configuration of a data model based on a PostgreSQL table. Defines fields, validators and edit widgets.
gws.plugin.postgres.model.Config.whenToUse = Required for editable layers and for structured search/display.
gws.plugin.postgres.model.Config.complexity = intermediate

# --- auth_provider ----------------------------------------------------------

gws.plugin.postgres.auth_provider.Config.label = PostgreSQL auth provider
gws.plugin.postgres.auth_provider.Config.purpose = Authentication against user and role tables in PostgreSQL.
gws.plugin.postgres.auth_provider.Config.whenToUse = When user accounts are kept in an own database rather than in a file or LDAP.
gws.plugin.postgres.auth_provider.Config.complexity = intermediate
