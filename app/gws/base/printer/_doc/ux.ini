# UX-Strings für das Druck-Subsystem (base/printer).
#
# Schlüsselformat: gws.base.printer.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Inhalte konservativ aus Klassen-Docstrings und admin-de.doc.md
# abgeleitet — keine Phantasietexte.

[de]

# --- core --------------------------------------------------------------------

gws.base.printer.core.Config.label = Druck-Konfiguration
gws.base.printer.core.Config.purpose = Definiert einen Drucker für ein Projekt: die zu verwendende Druckvorlage, optionale Datenmodelle für Druck-Attribute und die unterstützten Qualitätsstufen.
gws.base.printer.core.Config.whenToUse = Pflicht für jedes Projekt, in dem Karten oder Berichte gedruckt werden sollen. Mehrere Drucker pro Projekt sind möglich; im Client erscheint dann ein Auswahlmenü.
gws.base.printer.core.Config.complexity = intermediate
gws.base.printer.core.Config.useCases = PDF-Karten mit Kopf- und Fußzeile, mehrere Vorlagen pro Projekt (A3 quer, A4 hoch), interaktive Druck-Felder über ein Datenmodell.
gws.base.printer.core.Config.docsLink = /admin-de/themen/printer

gws.base.printer.core.Config.template.label = Druckvorlage
gws.base.printer.core.Config.template.purpose = Verweist auf die Vorlage, die das Layout des Ausdrucks beschreibt (HTML- oder QGIS-Vorlage).
gws.base.printer.core.Config.template.seeAlso = gws.plugin.template.html.Config, gws.plugin.qgis.template.Config

gws.base.printer.core.Config.title.label = Druckertitel
gws.base.printer.core.Config.title.purpose = Anzeigename des Druckers im Auswahlmenü des Clients. Fehlt der Wert, wird der Titel der Vorlage verwendet.
gws.base.printer.core.Config.title.complexity = basic
gws.base.printer.core.Config.title.example = "A4 Übersicht"

gws.base.printer.core.Config.models.label = Datenmodelle
gws.base.printer.core.Config.models.purpose = Optionale Datenmodelle, die im Druckdialog als Eingabefelder angezeigt werden. Die eingegebenen Werte stehen in der Vorlage als Variablen zur Verfügung.
gws.base.printer.core.Config.models.complexity = advanced
gws.base.printer.core.Config.models.useCases = Vom Nutzer einzugebende Felder wie Überschrift, Bearbeiter, Auftragsnummer.

gws.base.printer.core.Config.qualityLevels.label = Qualitätsstufen
gws.base.printer.core.Config.qualityLevels.purpose = Liste der wählbaren DPI-Stufen mit lesbarem Namen. DPI 0 bedeutet Bitmap-Screenshot (schnell, geringe Qualität); DPI > 0 druckt Vektoren in voller Auflösung.
gws.base.printer.core.Config.qualityLevels.complexity = intermediate
gws.base.printer.core.Config.qualityLevels.docsLink = /admin-de/themen/printer#qualitatsstufen

# --- action ------------------------------------------------------------------

gws.base.printer.action.Config.label = Druck-Aktion
gws.base.printer.action.Config.purpose = Aktiviert die Druck-API (printerStart, printerStatus, printerCancel, printerOutput) für das Projekt.
gws.base.printer.action.Config.whenToUse = In den Projekt-Aktionen aktivieren, sobald ein Drucker konfiguriert ist und der Client einen Druckbutton anzeigen soll.
gws.base.printer.action.Config.complexity = basic

gws.base.printer.action.CliParams.label = CLI-Parameter Drucken
gws.base.printer.action.CliParams.purpose = Parameter für den Kommandozeilen-Druck (gws printer print). Liest eine zuvor gespeicherte Print-Anfrage aus einer JSON-Datei und schreibt das Ergebnis an einen Pfad.
gws.base.printer.action.CliParams.complexity = advanced

gws.base.printer.action.CliParams.project.label = Projekt-UID
gws.base.printer.action.CliParams.project.purpose = UID des Projekts, in dessen Kontext der Druck ausgeführt wird.

gws.base.printer.action.CliParams.request.label = Anfrage-Datei
gws.base.printer.action.CliParams.request.purpose = Pfad zur JSON-Datei mit der serialisierten Print-Anfrage.
gws.base.printer.action.CliParams.request.example = "/data/print-request.json"

gws.base.printer.action.CliParams.output.label = Ausgabepfad
gws.base.printer.action.CliParams.output.purpose = Pfad, an den die erzeugte PDF- oder Bilddatei geschrieben wird.
gws.base.printer.action.CliParams.output.example = "/tmp/print.pdf"

[en]

# --- core --------------------------------------------------------------------

gws.base.printer.core.Config.label = Printer configuration
gws.base.printer.core.Config.purpose = Defines a printer for a project: the print template, optional data models for print-time attributes, and the supported quality levels.
gws.base.printer.core.Config.whenToUse = Required for any project that should print maps or reports. Multiple printers per project are allowed; the client then shows a selection menu.
gws.base.printer.core.Config.complexity = intermediate
gws.base.printer.core.Config.useCases = PDF maps with header/footer, multiple templates per project (A3 landscape, A4 portrait), interactive print fields via a data model.
gws.base.printer.core.Config.docsLink = /admin-de/themen/printer

gws.base.printer.core.Config.template.label = Print template
gws.base.printer.core.Config.template.purpose = Reference to the template that describes the layout of the printout (HTML or QGIS template).
gws.base.printer.core.Config.template.seeAlso = gws.plugin.template.html.Config, gws.plugin.qgis.template.Config

gws.base.printer.core.Config.title.label = Printer title
gws.base.printer.core.Config.title.purpose = Display name of the printer in the client's selection menu. If empty, the template title is used.
gws.base.printer.core.Config.title.complexity = basic
gws.base.printer.core.Config.title.example = "A4 overview"

gws.base.printer.core.Config.models.label = Data models
gws.base.printer.core.Config.models.purpose = Optional data models displayed as input fields in the print dialog. Entered values become variables in the template.
gws.base.printer.core.Config.models.complexity = advanced
gws.base.printer.core.Config.models.useCases = User-entered fields like title, operator name, job number.

gws.base.printer.core.Config.qualityLevels.label = Quality levels
gws.base.printer.core.Config.qualityLevels.purpose = List of selectable DPI levels with human-readable names. DPI 0 means bitmap screenshot (fast, low quality); DPI > 0 prints vectors at full resolution.
gws.base.printer.core.Config.qualityLevels.complexity = intermediate

# --- action ------------------------------------------------------------------

gws.base.printer.action.Config.label = Printer action
gws.base.printer.action.Config.purpose = Enables the printing API (printerStart, printerStatus, printerCancel, printerOutput) for the project.
gws.base.printer.action.Config.whenToUse = Enable in project actions once a printer is configured and the client should expose a print button.
gws.base.printer.action.Config.complexity = basic

gws.base.printer.action.CliParams.label = Print CLI parameters
gws.base.printer.action.CliParams.purpose = Parameters for the command-line print (gws printer print). Reads a serialized print request from a JSON file and writes the result to a path.
gws.base.printer.action.CliParams.complexity = advanced

gws.base.printer.action.CliParams.project.label = Project UID
gws.base.printer.action.CliParams.project.purpose = UID of the project the print runs against.

gws.base.printer.action.CliParams.request.label = Request file
gws.base.printer.action.CliParams.request.purpose = Path to the JSON file containing the serialized print request.
gws.base.printer.action.CliParams.request.example = "/data/print-request.json"

gws.base.printer.action.CliParams.output.label = Output path
gws.base.printer.action.CliParams.output.purpose = Path the generated PDF or image file is written to.
gws.base.printer.action.CliParams.output.example = "/tmp/print.pdf"
