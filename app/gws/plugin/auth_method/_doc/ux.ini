# UX-Strings für das auth_method-Plugin.
#
# Deckt die Sub-Module basic, token und web ab — Konvention: eine
# ux.ini pro Plugin-Wurzel, auch wenn Sub-Module eigene Klassen haben
# (siehe Pilot postgres).
#
# Schlüsselformat: gws.plugin.auth_method.<modul>[.<submodul>].<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.

[de]

# --- basic ------------------------------------------------------------------

gws.plugin.auth_method.basic.Config.label = Basic-Authentifizierung
gws.plugin.auth_method.basic.Config.purpose = Authentifizierung über den HTTP-Standard ``Authorization: Basic``-Header. Benutzername und Passwort werden bei jeder Anfrage Base64-kodiert mitgeschickt und gegen die konfigurierten Auth-Provider geprüft.
gws.plugin.auth_method.basic.Config.whenToUse = Für maschinelle Zugriffe und einfache Skript-Clients, die keine Cookie-Sessions führen können. Nur in Verbindung mit HTTPS einsetzen.
gws.plugin.auth_method.basic.Config.complexity = basic
gws.plugin.auth_method.basic.Config.useCases = curl-/wget-Aufrufe gegen die WebSuite, einfache OWS-Clients ohne Cookie-Unterstützung.

gws.plugin.auth_method.basic.Config.realm.label = Realm
gws.plugin.auth_method.basic.Config.realm.purpose = Frei wählbare Bezeichnung des geschützten Bereichs. Wird vom Browser im Login-Dialog angezeigt und im ``WWW-Authenticate``-Header zurückgegeben.
gws.plugin.auth_method.basic.Config.realm.example = "Restricted Area"

# --- token ------------------------------------------------------------------

gws.plugin.auth_method.token.Config.label = Token-Authentifizierung
gws.plugin.auth_method.token.Config.purpose = Authentifizierung über einen statischen Token, der in einem frei wählbaren HTTP-Header übergeben wird. Der Token wird unverändert an die Auth-Provider weitergereicht, die seine Gültigkeit prüfen.
gws.plugin.auth_method.token.Config.whenToUse = Für API-Integrationen, in denen ein langlebiger Token statt Benutzer/Passwort verwendet wird — typisch für Server-zu-Server-Aufrufe.
gws.plugin.auth_method.token.Config.complexity = intermediate
gws.plugin.auth_method.token.Config.useCases = Anbindung von Drittanwendungen an WebSuite-APIs, automatisierte Datenabrufe.

gws.plugin.auth_method.token.Config.header.label = HTTP-Header
gws.plugin.auth_method.token.Config.header.purpose = Name des HTTP-Headers, aus dem der Token gelesen wird.
gws.plugin.auth_method.token.Config.header.example = "X-Auth-Token"

gws.plugin.auth_method.token.Config.prefix.label = Token-Präfix
gws.plugin.auth_method.token.Config.prefix.purpose = Optionales Präfix vor dem eigentlichen Token-Wert. Wird der Header z.B. als ``Authorization: Bearer <token>`` übergeben, ist hier ``Bearer`` einzutragen. Leer lassen, wenn der Header nur den reinen Token-Wert enthält.
gws.plugin.auth_method.token.Config.prefix.example = "Bearer"

# --- web (action) -----------------------------------------------------------

gws.plugin.auth_method.web.action.Config.label = Web-Login-Aktion
gws.plugin.auth_method.web.action.Config.purpose = Stellt die API-Endpunkte für Login, Logout, MFA-Verifikation und Session-Check bereit. Wird vom Web-Client für den interaktiven Login-Dialog genutzt.
gws.plugin.auth_method.web.action.Config.whenToUse = Pflicht, wenn Benutzer sich über das WebSuite-UI anmelden sollen.
gws.plugin.auth_method.web.action.Config.complexity = basic
gws.plugin.auth_method.web.action.Config.seeAlso = gws.plugin.auth_method.web.core.Config

# --- web (core) -------------------------------------------------------------

gws.plugin.auth_method.web.core.Config.label = Web-Login (Cookie-Session)
gws.plugin.auth_method.web.core.Config.purpose = Klassische Browser-Anmeldung mit Benutzer/Passwort und Cookie-basierter Session. Nach erfolgreichem Login wird ein Session-Cookie gesetzt; alle weiteren Anfragen werden anhand dieses Cookies authentifiziert. Unterstützt optional Multi-Faktor-Authentifizierung.
gws.plugin.auth_method.web.core.Config.whenToUse = Standardmethode für interaktive Web-Clients. In den meisten Projekten als einzige Auth-Methode ausreichend.
gws.plugin.auth_method.web.core.Config.complexity = basic
gws.plugin.auth_method.web.core.Config.useCases = Login-Dialog im WebSuite-Client, geschützte Projekte mit benutzerspezifischen Rechten, MFA-Pflicht für Admin-Konten.

gws.plugin.auth_method.web.core.Config.cookieName.label = Cookie-Name
gws.plugin.auth_method.web.core.Config.cookieName.purpose = Name des Session-Cookies. Default ``auth``. Muss nur angepasst werden, wenn mehrere WebSuite-Instanzen unter derselben Domain laufen.
gws.plugin.auth_method.web.core.Config.cookieName.example = "auth"

gws.plugin.auth_method.web.core.Config.cookiePath.label = Cookie-Pfad
gws.plugin.auth_method.web.core.Config.cookiePath.purpose = Pfad-Scope des Session-Cookies. Default ``/``.
gws.plugin.auth_method.web.core.Config.cookiePath.example = "/"

gws.plugin.auth_method.web.core.Config.cookieSameSite.label = SameSite-Attribut
gws.plugin.auth_method.web.core.Config.cookieSameSite.purpose = Wert des SameSite-Cookie-Attributs (``Strict``, ``Lax`` oder ``None``). Default ``Lax``. ``None`` setzt zwingend HTTPS und ein gesetztes ``Secure``-Flag voraus.
gws.plugin.auth_method.web.core.Config.cookieSameSite.complexity = advanced
gws.plugin.auth_method.web.core.Config.cookieSameSite.example = "Lax"

gws.plugin.auth_method.web.core.Config.loginRedirect.label = Login-Redirect
gws.plugin.auth_method.web.core.Config.loginRedirect.purpose = Regel, die bei nicht authentifiziertem Zugriff auf bestimmte URLs auf eine Login-Seite weiterleitet, statt nur einen 401/403 zurückzugeben.
gws.plugin.auth_method.web.core.Config.loginRedirect.complexity = intermediate

gws.plugin.auth_method.web.core.LoginRedirectRule.label = Login-Redirect-Regel
gws.plugin.auth_method.web.core.LoginRedirectRule.purpose = Definiert, welche URLs auf welches Login-Ziel umgeleitet werden, wenn keine gültige Session vorliegt.

gws.plugin.auth_method.web.core.LoginRedirectRule.pattern.label = URL-Muster
gws.plugin.auth_method.web.core.LoginRedirectRule.pattern.purpose = Regulärer Ausdruck, der gegen die Request-URI geprüft wird. Trifft das Muster, wird umgeleitet. Leer lassen, um alle geschützten URLs umzuleiten.

gws.plugin.auth_method.web.core.LoginRedirectRule.target.label = Ziel-URL
gws.plugin.auth_method.web.core.LoginRedirectRule.target.purpose = URL der Login-Seite. Die ursprünglich angeforderte URL wird als Query-Parameter ``to`` angehängt.

# --- web (LoginRequest / MfaVerifyRequest) --------------------------------

gws.plugin.auth_method.web.core.LoginRequest.username.label = Benutzername
gws.plugin.auth_method.web.core.LoginRequest.username.purpose = Anmeldename des Benutzers, wird vom Login-Dialog des Web-Clients übermittelt.

gws.plugin.auth_method.web.core.LoginRequest.password.label = Passwort
gws.plugin.auth_method.web.core.LoginRequest.password.purpose = Passwort des Benutzers; wird im Klartext über HTTPS übertragen und nicht gespeichert.
gws.plugin.auth_method.web.core.LoginRequest.password.complexity = advanced

gws.plugin.auth_method.web.core.MfaVerifyRequest.payload.label = MFA-Verifikations-Daten
gws.plugin.auth_method.web.core.MfaVerifyRequest.payload.purpose = MFA-spezifische Eingabedaten (z.B. Einmalcode), die vom konfigurierten MFA-Adapter ausgewertet werden.

[en]

# --- basic ------------------------------------------------------------------

gws.plugin.auth_method.basic.Config.label = HTTP Basic authentication
gws.plugin.auth_method.basic.Config.purpose = Authentication via the standard HTTP ``Authorization: Basic`` header. Username and password are sent Base64-encoded with every request and validated against the configured auth providers.
gws.plugin.auth_method.basic.Config.whenToUse = For machine clients and simple scripts that cannot keep cookie sessions. Use only over HTTPS.
gws.plugin.auth_method.basic.Config.complexity = basic

gws.plugin.auth_method.basic.Config.realm.label = Realm
gws.plugin.auth_method.basic.Config.realm.purpose = Free-form name of the protected area. Shown by the browser in its login dialog and returned in the ``WWW-Authenticate`` header.
gws.plugin.auth_method.basic.Config.realm.example = "Restricted Area"

# --- token ------------------------------------------------------------------

gws.plugin.auth_method.token.Config.label = Token authentication
gws.plugin.auth_method.token.Config.purpose = Authentication via a static token passed in a configurable HTTP header. The token value is forwarded to the auth providers, which decide on its validity.
gws.plugin.auth_method.token.Config.whenToUse = For API integrations using a long-lived token instead of username/password, typically for server-to-server traffic.
gws.plugin.auth_method.token.Config.complexity = intermediate

gws.plugin.auth_method.token.Config.header.label = HTTP header
gws.plugin.auth_method.token.Config.header.purpose = Name of the HTTP header that carries the token.
gws.plugin.auth_method.token.Config.header.example = "X-Auth-Token"

gws.plugin.auth_method.token.Config.prefix.label = Token prefix
gws.plugin.auth_method.token.Config.prefix.purpose = Optional prefix in front of the token value. For an ``Authorization: Bearer <token>`` style header, set this to ``Bearer``. Leave empty if the header carries the bare token.
gws.plugin.auth_method.token.Config.prefix.example = "Bearer"

# --- web (action) -----------------------------------------------------------

gws.plugin.auth_method.web.action.Config.label = Web login action
gws.plugin.auth_method.web.action.Config.purpose = Provides the API endpoints for login, logout, MFA verification and session check used by the web client.
gws.plugin.auth_method.web.action.Config.whenToUse = Required when users sign in through the WebSuite UI.
gws.plugin.auth_method.web.action.Config.complexity = basic

# --- web (core) -------------------------------------------------------------

gws.plugin.auth_method.web.core.Config.label = Web login (cookie session)
gws.plugin.auth_method.web.core.Config.purpose = Classic browser sign-in with username/password and a cookie-based session. After a successful login a session cookie is set and used to authenticate subsequent requests. Optionally supports multi-factor authentication.
gws.plugin.auth_method.web.core.Config.whenToUse = Default method for interactive web clients. In most projects the only auth method needed.
gws.plugin.auth_method.web.core.Config.complexity = basic

gws.plugin.auth_method.web.core.Config.cookieName.label = Cookie name
gws.plugin.auth_method.web.core.Config.cookieName.purpose = Name of the session cookie. Defaults to ``auth``. Change only if multiple WebSuite instances share a domain.

gws.plugin.auth_method.web.core.Config.cookiePath.label = Cookie path
gws.plugin.auth_method.web.core.Config.cookiePath.purpose = Path scope of the session cookie. Defaults to ``/``.

gws.plugin.auth_method.web.core.Config.cookieSameSite.label = SameSite attribute
gws.plugin.auth_method.web.core.Config.cookieSameSite.purpose = Value of the SameSite cookie attribute (``Strict``, ``Lax`` or ``None``). Defaults to ``Lax``. ``None`` requires HTTPS and the ``Secure`` flag.
gws.plugin.auth_method.web.core.Config.cookieSameSite.complexity = advanced

gws.plugin.auth_method.web.core.Config.loginRedirect.label = Login redirect
gws.plugin.auth_method.web.core.Config.loginRedirect.purpose = Rule that redirects unauthenticated requests to a login page instead of returning a bare 401/403.
gws.plugin.auth_method.web.core.Config.loginRedirect.complexity = intermediate

gws.plugin.auth_method.web.core.LoginRedirectRule.label = Login redirect rule
gws.plugin.auth_method.web.core.LoginRedirectRule.purpose = Defines which URLs are redirected to which login target when no valid session is present.

gws.plugin.auth_method.web.core.LoginRedirectRule.pattern.label = URL pattern
gws.plugin.auth_method.web.core.LoginRedirectRule.pattern.purpose = Regular expression matched against the request URI. Empty means all protected URLs are redirected.

gws.plugin.auth_method.web.core.LoginRedirectRule.target.label = Target URL
gws.plugin.auth_method.web.core.LoginRedirectRule.target.purpose = URL of the login page. The originally requested URL is appended as ``to`` query parameter.

# --- web (LoginRequest / MfaVerifyRequest) --------------------------------

gws.plugin.auth_method.web.core.LoginRequest.username.label = Username
gws.plugin.auth_method.web.core.LoginRequest.username.purpose = Login name supplied by the web client's login dialog.

gws.plugin.auth_method.web.core.LoginRequest.password.label = Password
gws.plugin.auth_method.web.core.LoginRequest.password.purpose = User password; sent in clear over HTTPS and never persisted.
gws.plugin.auth_method.web.core.LoginRequest.password.complexity = advanced

gws.plugin.auth_method.web.core.MfaVerifyRequest.payload.label = MFA payload
gws.plugin.auth_method.web.core.MfaVerifyRequest.payload.purpose = MFA-specific input (e.g. one-time code) consumed by the configured MFA adapter.
