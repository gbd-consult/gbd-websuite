# UX-Strings für die QField-Cloud-Anbindung (Welle C).
#
# QField Cloud ist die Synchronisations-Plattform für QField-Mobile-Clients.
# Das Plugin verbindet WebSuite-Projekte mit QField-Cloud-Projekten und
# stellt Endpunkte für Paketierung, Upload und Sync bereit.

[de]

# --- action ---------------------------------------------------------------

gws.plugin.qfieldcloud.action.Config.label = QField-Cloud
gws.plugin.qfieldcloud.action.Config.purpose = Aktiviert die QField-Cloud-Action und stellt die HTTP-Endpunkte bereit, die QField-Mobile-Clients zur Synchronisation nutzen. Pro WebSuite-Action wird eine Liste von QField-Cloud-Projekten konfiguriert.
gws.plugin.qfieldcloud.action.Config.whenToUse = Wenn Außendienst-Mitarbeiter mit QField mobil Daten erfassen sollen, die nahtlos mit dem WebSuite-Projekt synchron bleiben.
gws.plugin.qfieldcloud.action.Config.complexity = advanced
gws.plugin.qfieldcloud.action.Config.useCases = Mobile Datenerfassung mit QField, asynchroner Daten-Upload aus dem Feld, Paketierung von QGIS-Projekten für Offline-Nutzung.

gws.plugin.qfieldcloud.action.Config.projects.label = QField-Cloud-Projekte
gws.plugin.qfieldcloud.action.Config.projects.purpose = Liste der QField-Cloud-Projekte, die mit dieser Action synchronisiert werden.

# --- core.ProjectConfig ---------------------------------------------------

gws.plugin.qfieldcloud.core.ProjectConfig.label = QField-Cloud-Projekt
gws.plugin.qfieldcloud.core.ProjectConfig.purpose = Konfiguration eines einzelnen QField-Cloud-Projekts: zugrunde liegender QGIS-Provider, Datenmodelle und Cache-Verhalten.
gws.plugin.qfieldcloud.core.ProjectConfig.complexity = advanced

gws.plugin.qfieldcloud.core.ProjectConfig.mapCacheLifeTime.label = Karten-Cache-Lebensdauer
gws.plugin.qfieldcloud.core.ProjectConfig.mapCacheLifeTime.purpose = Lebensdauer der zwischengespeicherten Hintergrundkarten (Duration, z. B. "1h", "1d"). 0 = kein Caching.
gws.plugin.qfieldcloud.core.ProjectConfig.mapCacheLifeTime.example = "1d"
gws.plugin.qfieldcloud.core.ProjectConfig.mapCacheLifeTime.complexity = advanced

gws.plugin.qfieldcloud.core.ProjectConfig.models.label = Datenmodelle
gws.plugin.qfieldcloud.core.ProjectConfig.models.purpose = Datenmodelle, deren Inhalte zwischen QField-Cloud und WebSuite synchronisiert werden.

gws.plugin.qfieldcloud.core.ProjectConfig.provider.label = QGIS-Provider
gws.plugin.qfieldcloud.core.ProjectConfig.provider.purpose = QGIS-Provider-Konfiguration für das zugrunde liegende QGIS-Projekt (siehe qgis-Plugin).

gws.plugin.qfieldcloud.core.ProjectConfig.title.label = Projekt-Titel
gws.plugin.qfieldcloud.core.ProjectConfig.title.purpose = Lesbarer Titel des QField-Cloud-Projekts. Default ist die UID.
gws.plugin.qfieldcloud.core.ProjectConfig.title.complexity = basic

# --- cli ------------------------------------------------------------------

gws.plugin.qfieldcloud.cli.PackageRequest.label = CLI: QField-Paket erzeugen
gws.plugin.qfieldcloud.cli.PackageRequest.purpose = Parameter für `gws qfieldcloud package`. Erzeugt ein QField-Paket aus einem WebSuite-Projekt für den Offline-Einsatz.

gws.plugin.qfieldcloud.cli.PackageRequest.actionName.label = Action-Name
gws.plugin.qfieldcloud.cli.PackageRequest.actionName.purpose = Name der QField-Cloud-Action, deren Konfiguration verwendet wird.

gws.plugin.qfieldcloud.cli.PackageRequest.dir.label = Ausgabe-Verzeichnis
gws.plugin.qfieldcloud.cli.PackageRequest.dir.purpose = Lokales Verzeichnis, in das das erzeugte Paket geschrieben wird.

gws.plugin.qfieldcloud.cli.PackageRequest.projectUid.label = Projekt-UID
gws.plugin.qfieldcloud.cli.PackageRequest.projectUid.purpose = UID des WebSuite-Projekts, das paketiert wird.

gws.plugin.qfieldcloud.cli.PackageRequest.qfcProjectUid.label = QFC-Projekt-UID
gws.plugin.qfieldcloud.cli.PackageRequest.qfcProjectUid.purpose = UID des Ziel-Projekts in der QField-Cloud.

[en]

# --- action ---------------------------------------------------------------

gws.plugin.qfieldcloud.action.Config.label = QField Cloud
gws.plugin.qfieldcloud.action.Config.purpose = Enables the QField Cloud action and exposes the HTTP endpoints used by QField mobile clients for synchronization. Each WebSuite action configures a list of QField Cloud projects.
gws.plugin.qfieldcloud.action.Config.whenToUse = When field workers collect data via QField that should stay in sync with a WebSuite project.
gws.plugin.qfieldcloud.action.Config.complexity = advanced
gws.plugin.qfieldcloud.action.Config.useCases = Mobile data collection with QField, async upload from the field, packaging QGIS projects for offline use.

gws.plugin.qfieldcloud.action.Config.projects.label = QField Cloud projects
gws.plugin.qfieldcloud.action.Config.projects.purpose = List of QField Cloud projects synchronized through this action.

# --- core.ProjectConfig ---------------------------------------------------

gws.plugin.qfieldcloud.core.ProjectConfig.label = QField Cloud project
gws.plugin.qfieldcloud.core.ProjectConfig.purpose = Configuration of a single QField Cloud project: underlying QGIS provider, data models and caching.
gws.plugin.qfieldcloud.core.ProjectConfig.complexity = advanced

gws.plugin.qfieldcloud.core.ProjectConfig.mapCacheLifeTime.label = Map cache life time
gws.plugin.qfieldcloud.core.ProjectConfig.mapCacheLifeTime.purpose = Lifetime of cached base map tiles (duration string, e.g. "1h", "1d"). 0 disables caching.
gws.plugin.qfieldcloud.core.ProjectConfig.mapCacheLifeTime.example = "1d"
gws.plugin.qfieldcloud.core.ProjectConfig.mapCacheLifeTime.complexity = advanced

gws.plugin.qfieldcloud.core.ProjectConfig.models.label = Data models
gws.plugin.qfieldcloud.core.ProjectConfig.models.purpose = Data models whose contents are synchronized between QField Cloud and the WebSuite.

gws.plugin.qfieldcloud.core.ProjectConfig.provider.label = QGIS provider
gws.plugin.qfieldcloud.core.ProjectConfig.provider.purpose = QGIS provider configuration for the underlying QGIS project (see the qgis plugin).

gws.plugin.qfieldcloud.core.ProjectConfig.title.label = Project title
gws.plugin.qfieldcloud.core.ProjectConfig.title.purpose = Human-readable title of the QField Cloud project. Defaults to the UID.
gws.plugin.qfieldcloud.core.ProjectConfig.title.complexity = basic

# --- cli ------------------------------------------------------------------

gws.plugin.qfieldcloud.cli.PackageRequest.label = CLI: build QField package
gws.plugin.qfieldcloud.cli.PackageRequest.purpose = Parameters for `gws qfieldcloud package`. Builds a QField package from a WebSuite project for offline use.

gws.plugin.qfieldcloud.cli.PackageRequest.actionName.label = Action name
gws.plugin.qfieldcloud.cli.PackageRequest.actionName.purpose = Name of the QField Cloud action whose configuration is used.

gws.plugin.qfieldcloud.cli.PackageRequest.dir.label = Output directory
gws.plugin.qfieldcloud.cli.PackageRequest.dir.purpose = Local directory where the generated package is written.

gws.plugin.qfieldcloud.cli.PackageRequest.projectUid.label = Project UID
gws.plugin.qfieldcloud.cli.PackageRequest.projectUid.purpose = UID of the WebSuite project being packaged.

gws.plugin.qfieldcloud.cli.PackageRequest.qfcProjectUid.label = QFC project UID
gws.plugin.qfieldcloud.cli.PackageRequest.qfcProjectUid.purpose = UID of the target project in QField Cloud.
