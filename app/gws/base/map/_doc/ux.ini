# UX-Strings für base/map (Welle B).
#
# Schlüsselformat: gws.base.map.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Inhalte aus Klassen-Docstrings und core.py abgeleitet — keine
# Phantasie-Texte. Lücken sind OK.

[de]

# --- core.Config ----------------------------------------------------
# Karten-Konfiguration: CRS, Ausdehnung, Zoom-Stufen, Layer.

gws.base.map.core.Config.label = Karte
gws.base.map.core.Config.purpose = Konfiguration einer Karte mit Koordinatensystem, Ausdehnung, Zoom-Stufen und Layern. Wird in einem Projekt als Haupt- oder Übersichtskarte verwendet.
gws.base.map.core.Config.whenToUse = In jedem Projekt mit grafischer Karten-Anzeige.
gws.base.map.core.Config.complexity = intermediate

gws.base.map.core.Config.crs.label = Koordinatenbezugssystem (CRS)
gws.base.map.core.Config.crs.purpose = EPSG-Code des Karten-CRS. Default ist EPSG:3857 (Web-Mercator).
gws.base.map.core.Config.crs.complexity = basic
gws.base.map.core.Config.crs.example = "EPSG:25832"

gws.base.map.core.Config.title.label = Titel
gws.base.map.core.Config.title.purpose = Anzeigename der Karte. Wird vom Projekt überschrieben, wenn dort ein Titel gesetzt ist.
gws.base.map.core.Config.title.complexity = basic

gws.base.map.core.Config.extent.label = Ausdehnung
gws.base.map.core.Config.extent.purpose = Bounding Box der Karte als [minX, minY, maxX, maxY] im Karten-CRS. Ohne Angabe wird die volle CRS-Ausdehnung verwendet.
gws.base.map.core.Config.extent.complexity = intermediate
gws.base.map.core.Config.extent.example = [280000, 5630000, 480000, 5830000]

gws.base.map.core.Config.extentBuffer.label = Ausdehnungs-Puffer
gws.base.map.core.Config.extentBuffer.purpose = Zusätzlicher Rand um die Ausdehnung in Karten-Einheiten (typisch Meter).
gws.base.map.core.Config.extentBuffer.complexity = advanced
gws.base.map.core.Config.extentBuffer.example = 100

gws.base.map.core.Config.center.label = Mittelpunkt
gws.base.map.core.Config.center.purpose = Initialer Mittelpunkt der Karte als [x, y]. Ohne Angabe wird der Mittelpunkt der Ausdehnung verwendet.
gws.base.map.core.Config.center.complexity = intermediate

gws.base.map.core.Config.zoom.label = Zoom-Stufen
gws.base.map.core.Config.zoom.purpose = Maßstabsleiter der Karte (Maßstäbe oder Auflösungen). Ohne Angabe werden die Standard-OSM-Auflösungen verwendet.
gws.base.map.core.Config.zoom.complexity = intermediate

gws.base.map.core.Config.layers.label = Layer
gws.base.map.core.Config.layers.purpose = Layer-Stapel der Karte (von oben nach unten). Erlaubt sind alle konfigurierten Layer-Typen.
gws.base.map.core.Config.layers.complexity = basic

gws.base.map.core.Config.coordinatePrecision.label = Koordinaten-Präzision
gws.base.map.core.Config.coordinatePrecision.purpose = Anzahl Nachkommastellen, mit der Koordinaten an den Client geliefert werden. Ohne Angabe nutzt die WebSuite die CRS-Default-Präzision.
gws.base.map.core.Config.coordinatePrecision.complexity = advanced

gws.base.map.core.Config.wrapX.label = Welt horizontal wiederholen
gws.base.map.core.Config.wrapX.purpose = Wenn aktiviert, wiederholt sich die Karte horizontal (sinnvoll bei globalen Web-Mercator-Karten).
gws.base.map.core.Config.wrapX.complexity = advanced

# --- core.Object / core.Props ---------------------------------------

gws.base.map.core.Object.label = Karte
gws.base.map.core.Object.purpose = Laufzeit-Objekt einer Karte; wird aus einer Map-Config aufgebaut und enthält Bounds, Resolutions und den Root-Layer.
gws.base.map.core.Object.complexity = advanced

gws.base.map.core.Props.label = Karten-Props
gws.base.map.core.Props.purpose = Sicht auf die Karte, die der Client erhält (CRS, Extent, Auflösungen, Root-Layer-Baum).
gws.base.map.core.Props.complexity = advanced
gws.base.map.core.Props.center.label = Mittelpunkt
gws.base.map.core.Props.coordinatePrecision.label = Koordinaten-Präzision
gws.base.map.core.Props.crs.label = CRS
gws.base.map.core.Props.crsDef.label = CRS-Definition
gws.base.map.core.Props.crsDef.purpose = Proj4-Definition des Karten-CRS.
gws.base.map.core.Props.extent.label = Ausdehnung
gws.base.map.core.Props.initResolution.label = Initiale Auflösung
gws.base.map.core.Props.resolutions.label = Auflösungen
gws.base.map.core.Props.rootLayer.label = Wurzel-Layer
gws.base.map.core.Props.title.label = Titel
gws.base.map.core.Props.title.complexity = basic
gws.base.map.core.Props.wrapX.label = Welt horizontal wiederholen

# --- action.Config / .Object / .Props -------------------------------
# Karten-Aktion (Tiles, Box-Render, Legenden, Feature-Abfragen).

gws.base.map.action.Config.label = Karten-Aktion
gws.base.map.action.Config.purpose = Aktion, die Kartenausschnitte, XYZ-Tiles, Legenden und Feature-Daten an den Client liefert.
gws.base.map.action.Config.complexity = advanced

gws.base.map.action.Object.label = Karten-Aktion
gws.base.map.action.Object.purpose = Laufzeit-Objekt der Karten-Aktion.
gws.base.map.action.Object.complexity = advanced

gws.base.map.action.Props.label = Karten-Aktion
gws.base.map.action.Props.complexity = advanced

# --- action-Requests (intern) ---------------------------------------
