# UX-Strings for the base model framework.
#
# Schlüsselformat: gws.base.model.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.

[de]

# --- core.Config (Basis-Datenmodell) ----------------------------------------

gws.base.model.core.Config.label = Datenmodell
gws.base.model.core.Config.purpose = Beschreibt die Felder, Validatoren und Widgets eines Datensatzes. Ein Datenmodell verbindet eine Datenquelle (Tabelle, Datei oder Layer) mit einer einheitlichen UI-Sicht für Anzeige, Suche und Editierung.
gws.base.model.core.Config.whenToUse = Pflicht, wenn Features (Geo-Objekte oder Sachdaten) strukturiert angezeigt, durchsucht oder editiert werden sollen.
gws.base.model.core.Config.complexity = intermediate
gws.base.model.core.Config.useCases = Editierbare PostGIS-Layer, ALKIS-Sachdatenanzeige, strukturierte Suche über Tabellen, generische Formulare im Web-Client.
gws.base.model.core.Config.seeAlso = gws.plugin.postgres.model.Config

gws.base.model.core.Config.fields.label = Felder
gws.base.model.core.Config.fields.purpose = Liste der Modellfelder. Jedes Feld definiert Datentyp, Validatoren und Widget für eine Spalte des Datensatzes.

gws.base.model.core.Config.title.label = Titel
gws.base.model.core.Config.title.purpose = Anzeigename des Modells im Client (Tab-Titel, Editierdialog).
gws.base.model.core.Config.title.complexity = basic
gws.base.model.core.Config.title.example = "Flurstücke"

gws.base.model.core.Config.isEditable.label = Editierbar
gws.base.model.core.Config.isEditable.purpose = Schaltet das Modell für Schreibzugriffe frei. Erfordert ein Primärschlüssel-Feld.
gws.base.model.core.Config.isEditable.complexity = basic

gws.base.model.core.Config.withAutoFields.label = Felder automatisch laden
gws.base.model.core.Config.withAutoFields.purpose = Liest Spaltennamen und -typen aus der Datenquelle und legt passende Felder automatisch an. Spart manuelle Konfiguration für Standardspalten.
gws.base.model.core.Config.withAutoFields.complexity = basic

gws.base.model.core.Config.excludeColumns.label = Spalten ausschließen
gws.base.model.core.Config.excludeColumns.purpose = Spaltennamen, die beim automatischen Laden übersprungen werden. Nur wirksam zusammen mit `withAutoFields`.
gws.base.model.core.Config.excludeColumns.example = ["created_at", "internal_id"]

gws.base.model.core.Config.withTableView.label = Tabellenansicht aktivieren
gws.base.model.core.Config.withTableView.purpose = Erlaubt dem Client, das Modell als Tabelle darzustellen.
gws.base.model.core.Config.withTableView.complexity = basic

gws.base.model.core.Config.tableViewColumns.label = Tabellenspalten
gws.base.model.core.Config.tableViewColumns.purpose = Auswahl und Reihenfolge der Felder in der Tabellenansicht. Ohne Angabe werden alle anzeigefähigen Felder verwendet.

gws.base.model.core.Config.loadingStrategy.label = Ladestrategie
gws.base.model.core.Config.loadingStrategy.purpose = Steuert, wann Features geladen werden — alle auf einmal, nach Bounding-Box oder nur lazily.
gws.base.model.core.Config.loadingStrategy.complexity = advanced

gws.base.model.core.Config.exportStrategy.label = Exportstrategie
gws.base.model.core.Config.exportStrategy.purpose = Bestimmt, wie das Modell beim Datenexport behandelt wird (mit-laden, separat oder ausschließen).
gws.base.model.core.Config.exportStrategy.complexity = advanced

gws.base.model.core.Config.sort.label = Standardsortierung
gws.base.model.core.Config.sort.purpose = Sortierreihenfolge für Suchergebnisse und Tabellenansicht. Ohne Angabe wird nach dem Primärschlüssel sortiert.

gws.base.model.core.Config.templates.label = Templates
gws.base.model.core.Config.templates.purpose = Feature-Templates für Anzeige (Label, Tooltip, Beschreibung) und Druckausgabe.

gws.base.model.core.Config.clientOptions.label = Client-Optionen
gws.base.model.core.Config.clientOptions.purpose = Verhalten der Editier-UI (z. B. Formular nach dem Speichern offen halten).
gws.base.model.core.Config.clientOptions.complexity = advanced

# --- core.ClientOptions -----------------------------------------------------

gws.base.model.core.ClientOptions.label = Client-Optionen
gws.base.model.core.ClientOptions.purpose = UI-Optionen, die das Editierverhalten im Client steuern.
gws.base.model.core.ClientOptions.complexity = advanced

gws.base.model.core.ClientOptions.keepFormOpen.label = Formular offen halten
gws.base.model.core.ClientOptions.keepFormOpen.purpose = Behält das Editierformular nach dem Speichern geöffnet, statt es zu schließen.

# --- core.TableViewColumn ---------------------------------------------------

gws.base.model.core.TableViewColumn.label = Tabellenspalte
gws.base.model.core.TableViewColumn.purpose = Konfiguration einer einzelnen Spalte in der Tabellenansicht.

gws.base.model.core.TableViewColumn.name.label = Feldname
gws.base.model.core.TableViewColumn.name.purpose = Name des anzuzeigenden Modellfelds.
gws.base.model.core.TableViewColumn.name.complexity = basic

gws.base.model.core.TableViewColumn.width.label = Spaltenbreite
gws.base.model.core.TableViewColumn.width.purpose = Spaltenbreite in Pixeln. Ohne Angabe automatisch.
gws.base.model.core.TableViewColumn.width.example = 120

# --- field.Config (Basis-Feldkonfiguration) ---------------------------------

gws.base.model.field.Config.label = Modellfeld
gws.base.model.field.Config.purpose = Basis-Konfiguration eines Modellfelds — gemeinsame Eigenschaften aller Feldtypen (Name, Titel, Flags, Validatoren, Widget).
gws.base.model.field.Config.complexity = intermediate

gws.base.model.field.Config.name.label = Spaltenname
gws.base.model.field.Config.name.purpose = Name der Spalte in der Datenquelle bzw. der Property im Datenmodell.
gws.base.model.field.Config.name.complexity = basic
gws.base.model.field.Config.name.example = "flurstueck_nr"

gws.base.model.field.Config.title.label = Anzeigetitel
gws.base.model.field.Config.title.purpose = Lesbarer Titel des Felds in der UI. Fällt auf den Spaltennamen zurück.
gws.base.model.field.Config.title.complexity = basic
gws.base.model.field.Config.title.example = "Flurstücksnummer"

gws.base.model.field.Config.isPrimaryKey.label = Primärschlüssel
gws.base.model.field.Config.isPrimaryKey.purpose = Markiert das Feld als eindeutigen Identifikator des Datensatzes. Pro Modell genau eines erforderlich, sobald `isEditable` aktiv ist.
gws.base.model.field.Config.isPrimaryKey.complexity = basic

gws.base.model.field.Config.isRequired.label = Pflichtfeld
gws.base.model.field.Config.isRequired.purpose = Erzwingt einen Wert beim Speichern. Wird automatisch aus NOT-NULL-Constraints der Datenquelle übernommen.
gws.base.model.field.Config.isRequired.complexity = basic

gws.base.model.field.Config.isUnique.label = Eindeutig
gws.base.model.field.Config.isUnique.purpose = Markiert das Feld als eindeutig. Wird durch das DB-Backend geprüft, nicht durch das Modell selbst.

gws.base.model.field.Config.isAuto.label = Automatisch befüllt
gws.base.model.field.Config.isAuto.purpose = Das Feld wird vom DB-Backend selbst gesetzt (z. B. SERIAL/IDENTITY) und erscheint im Editor schreibgeschützt.

gws.base.model.field.Config.isHidden.label = Im Client ausblenden
gws.base.model.field.Config.isHidden.purpose = Versteckt das Feld in den UI-Anzeigen, lädt es aber weiterhin aus der Datenquelle.

gws.base.model.field.Config.values.label = Wert-Provider
gws.base.model.field.Config.values.purpose = Liste von Value-Providern, die das Feld bei Lese-/Schreib-Operationen automatisch befüllen (z. B. aktueller Benutzer oder Zeitstempel).
gws.base.model.field.Config.values.complexity = advanced

gws.base.model.field.Config.validators.label = Validatoren
gws.base.model.field.Config.validators.purpose = Liste von Validatoren, die das Feld vor dem Speichern prüfen.
gws.base.model.field.Config.validators.complexity = intermediate

gws.base.model.field.Config.widget.label = Eingabe-Widget
gws.base.model.field.Config.widget.purpose = UI-Komponente für die Anzeige und Bearbeitung des Felds. Ohne Angabe wählt der Client einen passenden Default zum Datentyp.

# --- scalar_field.Config (skalare Felder) -----------------------------------

gws.base.model.scalar_field.Config.label = Skalares Feld
gws.base.model.scalar_field.Config.purpose = Basis-Konfiguration für skalare Modellfelder (Text, Zahl, Datum). Erweitert die generische Feld-Konfiguration um den Virtual-Flag.
gws.base.model.scalar_field.Config.complexity = intermediate

gws.base.model.scalar_field.Config.isVirtual.label = Virtuelles Feld
gws.base.model.scalar_field.Config.isVirtual.purpose = Das Feld wird nicht in der Datenbank gespeichert, sondern zur Laufzeit aus anderen Werten berechnet.
gws.base.model.scalar_field.Config.isVirtual.complexity = advanced

# --- validator.Config (Validator-Basis) -------------------------------------

gws.base.model.validator.Config.label = Validator
gws.base.model.validator.Config.purpose = Basis-Konfiguration eines Feld-Validators. Validatoren prüfen Werte vor dem Speichern und liefern Fehlermeldungen.
gws.base.model.validator.Config.complexity = intermediate

gws.base.model.validator.Config.forCreate.label = Beim Anlegen prüfen
gws.base.model.validator.Config.forCreate.purpose = Validator beim Erzeugen eines neuen Datensatzes anwenden.
gws.base.model.validator.Config.forCreate.complexity = basic

gws.base.model.validator.Config.forUpdate.label = Beim Ändern prüfen
gws.base.model.validator.Config.forUpdate.purpose = Validator beim Aktualisieren eines bestehenden Datensatzes anwenden.
gws.base.model.validator.Config.forUpdate.complexity = basic

gws.base.model.validator.Config.message.label = Fehlermeldung
gws.base.model.validator.Config.message.purpose = Anzeigetext, wenn die Validierung fehlschlägt.
gws.base.model.validator.Config.message.example = "Bitte eine gültige Nummer eingeben."

# --- value.Config (Value-Provider-Basis) ------------------------------------

gws.base.model.value.Config.label = Wert-Provider
gws.base.model.value.Config.purpose = Basis-Konfiguration eines Value-Providers. Befüllt ein Feld automatisch beim Lesen, Anlegen oder Aktualisieren.
gws.base.model.value.Config.complexity = intermediate

gws.base.model.value.Config.forCreate.label = Beim Anlegen anwenden
gws.base.model.value.Config.forCreate.purpose = Wert beim Erzeugen eines neuen Datensatzes setzen.
gws.base.model.value.Config.forCreate.complexity = basic

gws.base.model.value.Config.forUpdate.label = Beim Ändern anwenden
gws.base.model.value.Config.forUpdate.purpose = Wert beim Aktualisieren eines Datensatzes setzen (z. B. Änderungs-Zeitstempel).
gws.base.model.value.Config.forUpdate.complexity = basic

gws.base.model.value.Config.forRead.label = Beim Lesen anwenden
gws.base.model.value.Config.forRead.purpose = Wert beim Lesen eines Datensatzes berechnen — für virtuelle Felder.
gws.base.model.value.Config.forRead.complexity = advanced

gws.base.model.value.Config.isDefault.label = Default-Wert
gws.base.model.value.Config.isDefault.purpose = Markiert den Wert als UI-Default — der Client schlägt ihn beim Anlegen vor, der Anwender kann ihn überschreiben.

# --- widget.Config (Widget-Basis) -------------------------------------------

gws.base.model.widget.Config.label = Eingabe-Widget
gws.base.model.widget.Config.purpose = Basis-Konfiguration einer UI-Komponente für ein Modellfeld. Bestimmt Aussehen und Eingabeverhalten.
gws.base.model.widget.Config.complexity = basic

gws.base.model.widget.Config.readOnly.label = Schreibgeschützt
gws.base.model.widget.Config.readOnly.purpose = Zeigt das Feld nur an, erlaubt aber keine Änderung.
gws.base.model.widget.Config.readOnly.complexity = basic

# --- default_model.Config ---------------------------------------------------

gws.base.model.default_model.Config.label = Standard-Datenmodell
gws.base.model.default_model.Config.purpose = Generisches Datenmodell ohne eigene Datenquelle. Wird intern als Fallback genutzt, wenn ein Layer kein eigenes Modell mitbringt.
gws.base.model.default_model.Config.complexity = advanced


[en]

# --- core.Config ------------------------------------------------------------

gws.base.model.core.Config.label = Data model
gws.base.model.core.Config.purpose = Defines the fields, validators and widgets of a record. A data model connects a data source (table, file, or layer) to a unified UI view for display, search, and editing.
gws.base.model.core.Config.whenToUse = Required for displaying, searching, or editing structured features (geo objects or attribute records).
gws.base.model.core.Config.complexity = intermediate
gws.base.model.core.Config.useCases = Editable PostGIS layers, ALKIS attribute display, structured table search, generic web client forms.
gws.base.model.core.Config.seeAlso = gws.plugin.postgres.model.Config

gws.base.model.core.Config.fields.label = Fields
gws.base.model.core.Config.fields.purpose = List of model fields. Each field defines the data type, validators, and widget for a column of the record.

gws.base.model.core.Config.title.label = Title
gws.base.model.core.Config.title.purpose = Display name of the model in the client (tab title, edit dialog).
gws.base.model.core.Config.title.complexity = basic
gws.base.model.core.Config.title.example = "Parcels"

gws.base.model.core.Config.isEditable.label = Editable
gws.base.model.core.Config.isEditable.purpose = Allow write access to the model. Requires a primary-key field.
gws.base.model.core.Config.isEditable.complexity = basic

gws.base.model.core.Config.withAutoFields.label = Autoload fields
gws.base.model.core.Config.withAutoFields.purpose = Read column names and types from the data source and create matching fields automatically. Saves manual configuration for standard columns.
gws.base.model.core.Config.withAutoFields.complexity = basic

gws.base.model.core.Config.excludeColumns.label = Exclude columns
gws.base.model.core.Config.excludeColumns.purpose = Column names skipped during autoload. Only effective with `withAutoFields`.
gws.base.model.core.Config.excludeColumns.example = ["created_at", "internal_id"]

gws.base.model.core.Config.withTableView.label = Enable table view
gws.base.model.core.Config.withTableView.purpose = Allow the client to render the model as a table.
gws.base.model.core.Config.withTableView.complexity = basic

gws.base.model.core.Config.tableViewColumns.label = Table columns
gws.base.model.core.Config.tableViewColumns.purpose = Selection and order of fields in the table view. If omitted, all displayable fields are used.

gws.base.model.core.Config.loadingStrategy.label = Loading strategy
gws.base.model.core.Config.loadingStrategy.purpose = Controls when features are loaded — all at once, by bounding box, or lazy.
gws.base.model.core.Config.loadingStrategy.complexity = advanced

gws.base.model.core.Config.exportStrategy.label = Export strategy
gws.base.model.core.Config.exportStrategy.purpose = Determines how the model is treated during data export (load with parent, separate, or skip).
gws.base.model.core.Config.exportStrategy.complexity = advanced

gws.base.model.core.Config.sort.label = Default sort
gws.base.model.core.Config.sort.purpose = Sort order for search results and table view. Defaults to the primary key.

gws.base.model.core.Config.templates.label = Templates
gws.base.model.core.Config.templates.purpose = Feature templates for display (label, tooltip, description) and print output.

gws.base.model.core.Config.clientOptions.label = Client options
gws.base.model.core.Config.clientOptions.purpose = Behaviour of the editing UI (e.g. keep form open after save).
gws.base.model.core.Config.clientOptions.complexity = advanced

# --- core.ClientOptions -----------------------------------------------------

gws.base.model.core.ClientOptions.label = Client options
gws.base.model.core.ClientOptions.purpose = UI options controlling edit behaviour in the client.
gws.base.model.core.ClientOptions.complexity = advanced

gws.base.model.core.ClientOptions.keepFormOpen.label = Keep form open
gws.base.model.core.ClientOptions.keepFormOpen.purpose = Keep the edit form open after save instead of closing it.

# --- core.TableViewColumn ---------------------------------------------------

gws.base.model.core.TableViewColumn.label = Table column
gws.base.model.core.TableViewColumn.purpose = Configuration for a single column in the table view.

gws.base.model.core.TableViewColumn.name.label = Field name
gws.base.model.core.TableViewColumn.name.purpose = Name of the model field to display.
gws.base.model.core.TableViewColumn.name.complexity = basic

gws.base.model.core.TableViewColumn.width.label = Column width
gws.base.model.core.TableViewColumn.width.purpose = Column width in pixels. Auto if omitted.
gws.base.model.core.TableViewColumn.width.example = 120

# --- field.Config -----------------------------------------------------------

gws.base.model.field.Config.label = Model field
gws.base.model.field.Config.purpose = Base configuration for a model field — the properties shared by all field types (name, title, flags, validators, widget).
gws.base.model.field.Config.complexity = intermediate

gws.base.model.field.Config.name.label = Column name
gws.base.model.field.Config.name.purpose = Name of the column in the data source / property in the model.
gws.base.model.field.Config.name.complexity = basic
gws.base.model.field.Config.name.example = "parcel_nr"

gws.base.model.field.Config.title.label = Display title
gws.base.model.field.Config.title.purpose = Human-readable title in the UI. Falls back to the column name.
gws.base.model.field.Config.title.complexity = basic
gws.base.model.field.Config.title.example = "Parcel number"

gws.base.model.field.Config.isPrimaryKey.label = Primary key
gws.base.model.field.Config.isPrimaryKey.purpose = Marks the field as the unique record identifier. Exactly one required per model when `isEditable` is on.
gws.base.model.field.Config.isPrimaryKey.complexity = basic

gws.base.model.field.Config.isRequired.label = Required
gws.base.model.field.Config.isRequired.purpose = Enforces a value on save. Auto-derived from NOT-NULL constraints in the data source.
gws.base.model.field.Config.isRequired.complexity = basic

gws.base.model.field.Config.isUnique.label = Unique
gws.base.model.field.Config.isUnique.purpose = Marks the field as unique. Enforced by the database backend, not by the model itself.

gws.base.model.field.Config.isAuto.label = Auto-populated
gws.base.model.field.Config.isAuto.purpose = The DB backend sets this field itself (e.g. SERIAL/IDENTITY); shown read-only in the editor.

gws.base.model.field.Config.isHidden.label = Hide in client
gws.base.model.field.Config.isHidden.purpose = Hides the field in UI displays but keeps it loaded from the data source.

gws.base.model.field.Config.values.label = Value providers
gws.base.model.field.Config.values.purpose = List of value providers that auto-populate the field on read/write (e.g. current user, current timestamp).
gws.base.model.field.Config.values.complexity = advanced

gws.base.model.field.Config.validators.label = Validators
gws.base.model.field.Config.validators.purpose = List of validators that check the field before save.
gws.base.model.field.Config.validators.complexity = intermediate

gws.base.model.field.Config.widget.label = Input widget
gws.base.model.field.Config.widget.purpose = UI component for displaying and editing the field. If omitted the client picks a default for the data type.

# --- scalar_field.Config ----------------------------------------------------

gws.base.model.scalar_field.Config.label = Scalar field
gws.base.model.scalar_field.Config.purpose = Base configuration for scalar fields (text, number, date). Adds the virtual flag on top of the generic field configuration.
gws.base.model.scalar_field.Config.complexity = intermediate

gws.base.model.scalar_field.Config.isVirtual.label = Virtual field
gws.base.model.scalar_field.Config.isVirtual.purpose = The field is not stored in the database; it is computed at runtime from other values.
gws.base.model.scalar_field.Config.isVirtual.complexity = advanced

# --- validator.Config -------------------------------------------------------

gws.base.model.validator.Config.label = Validator
gws.base.model.validator.Config.purpose = Base configuration for a field validator. Validators check values before save and emit error messages.
gws.base.model.validator.Config.complexity = intermediate

gws.base.model.validator.Config.forCreate.label = Apply on create
gws.base.model.validator.Config.forCreate.purpose = Apply the validator when creating a new record.
gws.base.model.validator.Config.forCreate.complexity = basic

gws.base.model.validator.Config.forUpdate.label = Apply on update
gws.base.model.validator.Config.forUpdate.purpose = Apply the validator when updating an existing record.
gws.base.model.validator.Config.forUpdate.complexity = basic

gws.base.model.validator.Config.message.label = Error message
gws.base.model.validator.Config.message.purpose = Display text shown when validation fails.
gws.base.model.validator.Config.message.example = "Please enter a valid number."

# --- value.Config -----------------------------------------------------------

gws.base.model.value.Config.label = Value provider
gws.base.model.value.Config.purpose = Base configuration for a value provider. Auto-populates a field on read, create, or update.
gws.base.model.value.Config.complexity = intermediate

gws.base.model.value.Config.forCreate.label = Apply on create
gws.base.model.value.Config.forCreate.purpose = Set the value when creating a new record.
gws.base.model.value.Config.forCreate.complexity = basic

gws.base.model.value.Config.forUpdate.label = Apply on update
gws.base.model.value.Config.forUpdate.purpose = Set the value when updating a record (e.g. modification timestamp).
gws.base.model.value.Config.forUpdate.complexity = basic

gws.base.model.value.Config.forRead.label = Apply on read
gws.base.model.value.Config.forRead.purpose = Compute the value when reading a record — for virtual fields.
gws.base.model.value.Config.forRead.complexity = advanced

gws.base.model.value.Config.isDefault.label = UI default
gws.base.model.value.Config.isDefault.purpose = Marks the value as a UI default — the client offers it on create; the user may override.

# --- widget.Config ----------------------------------------------------------

gws.base.model.widget.Config.label = Input widget
gws.base.model.widget.Config.purpose = Base configuration for the UI component of a model field. Defines look and edit behaviour.
gws.base.model.widget.Config.complexity = basic

gws.base.model.widget.Config.readOnly.label = Read-only
gws.base.model.widget.Config.readOnly.purpose = Display the field but disallow changes.
gws.base.model.widget.Config.readOnly.complexity = basic

# --- default_model.Config ---------------------------------------------------

gws.base.model.default_model.Config.label = Default data model
gws.base.model.default_model.Config.purpose = Generic data model without its own data source. Used internally as a fallback when a layer ships no model.
gws.base.model.default_model.Config.complexity = advanced
