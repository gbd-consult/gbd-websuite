# UX-Strings für das qgis-Plugin.
#
# Schlüsselformat: gws.plugin.qgis.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Inhalte abgeleitet aus _doc/strings.ini, den Klassen-Docstrings und
# admin-de.doc.md. Submodule: provider, layer, flatlayer, finder,
# legend, model, template.

[de]

# --- provider ---------------------------------------------------------------

gws.plugin.qgis.provider.Config.label = QGIS-Provider
gws.plugin.qgis.provider.Config.purpose = Bindet ein QGIS-Projekt in die WebSuite ein. Liest die Projektdatei (.qgs/.qgz) direkt aus dem Dateisystem oder aus PostgreSQL und proxyt Render- und Such-Anfragen an einen QGIS-Server.
gws.plugin.qgis.provider.Config.whenToUse = Wenn die Karten- und Druck-Konfiguration in QGIS Desktop gepflegt wird und alle Layer, Symbolisierungen und Drucklayouts daraus übernommen werden sollen.
gws.plugin.qgis.provider.Config.complexity = intermediate
gws.plugin.qgis.provider.Config.useCases = Übernahme bestehender QGIS-Projekte als WebGIS-Karten, Wiederverwendung von Drucklayouts, dynamische Aktualisierung der Karte beim Speichern des QGIS-Projekts.
gws.plugin.qgis.provider.Config.seeAlso = gws.plugin.qgis.layer.Config, gws.plugin.qgis.template.Config

gws.plugin.qgis.provider.Config.path.label = Projektdatei
gws.plugin.qgis.provider.Config.path.purpose = Pfad zur QGIS-Projektdatei (.qgs oder .qgz). Alternative zu dbUid/schema/projectName.
gws.plugin.qgis.provider.Config.path.example = "/data/projects/staedt.qgs"

gws.plugin.qgis.provider.Config.dbUid.label = Projekt-Datenbank
gws.plugin.qgis.provider.Config.dbUid.purpose = UID eines konfigurierten PostgreSQL-Providers, in dem das QGIS-Projekt gespeichert ist (Projekt in PostgreSQL). Alternative zu path.
gws.plugin.qgis.provider.Config.dbUid.complexity = advanced

gws.plugin.qgis.provider.Config.schema.label = Datenbank-Schema
gws.plugin.qgis.provider.Config.schema.purpose = Schema in der Projekt-Datenbank, das die Projektdaten enthält. Pflicht, wenn dbUid gesetzt ist.
gws.plugin.qgis.provider.Config.schema.complexity = advanced
gws.plugin.qgis.provider.Config.schema.example = "public"

gws.plugin.qgis.provider.Config.projectName.label = Projektname
gws.plugin.qgis.provider.Config.projectName.purpose = Name des QGIS-Projekts in der Projekt-Datenbank. Pflicht, wenn dbUid gesetzt ist.
gws.plugin.qgis.provider.Config.projectName.complexity = advanced

gws.plugin.qgis.provider.Config.forceCrs.label = CRS erzwingen
gws.plugin.qgis.provider.Config.forceCrs.purpose = Koordinatensystem, das für Anfragen an den QGIS-Server verwendet wird, abweichend vom Projekt-CRS.
gws.plugin.qgis.provider.Config.forceCrs.complexity = advanced
gws.plugin.qgis.provider.Config.forceCrs.example = "EPSG:25832"

gws.plugin.qgis.provider.Config.extentBuffer.label = Ausdehnungspuffer
gws.plugin.qgis.provider.Config.extentBuffer.purpose = Puffer in Karteneinheiten, der bei automatisch berechneten Layer-Grenzen ergänzt wird.
gws.plugin.qgis.provider.Config.extentBuffer.complexity = advanced
gws.plugin.qgis.provider.Config.extentBuffer.example = 1000

gws.plugin.qgis.provider.Config.useCanvasExtent.label = Canvas-Ausdehnung verwenden
gws.plugin.qgis.provider.Config.useCanvasExtent.purpose = Wenn aktiv, wird die im QGIS-Projekt gespeicherte Canvas-Ausdehnung als Projektausdehnung übernommen.
gws.plugin.qgis.provider.Config.useCanvasExtent.complexity = advanced

gws.plugin.qgis.provider.Config.directRender.label = Direkt zu rendernde Provider
gws.plugin.qgis.provider.Config.directRender.purpose = Liste von QGIS-Datenanbietertypen, die direkt aus der Quelle gerendert werden sollen statt über QGIS-Server.
gws.plugin.qgis.provider.Config.directRender.complexity = advanced
gws.plugin.qgis.provider.Config.directRender.example = ["wms", "wmts"]

gws.plugin.qgis.provider.Config.directSearch.label = Direkt zu durchsuchende Provider
gws.plugin.qgis.provider.Config.directSearch.purpose = Liste von QGIS-Datenanbietertypen, deren Suche direkt an die Quelle weitergereicht wird statt über QGIS-Server.
gws.plugin.qgis.provider.Config.directSearch.complexity = advanced
gws.plugin.qgis.provider.Config.directSearch.example = ["postgres", "wfs"]

gws.plugin.qgis.provider.Config.defaultLegendOptions.label = Standard-Legendenoptionen
gws.plugin.qgis.provider.Config.defaultLegendOptions.purpose = Voreinstellungen für QGIS-Legendenrenderings (z.B. Schriftgröße, Symbolgröße), die für alle Layer dieses Providers gelten, sofern nicht überschrieben.
gws.plugin.qgis.provider.Config.defaultLegendOptions.complexity = advanced

gws.plugin.qgis.provider.Config.withWatch.label = Projekt-Monitoring
gws.plugin.qgis.provider.Config.withWatch.purpose = Wenn aktiv, überwacht der Server die QGIS-Projektdatei auf Änderungen und lädt sie automatisch neu.
gws.plugin.qgis.provider.Config.withWatch.complexity = advanced

gws.plugin.qgis.provider.Config.watchFrequency.label = Monitoring-Frequenz
gws.plugin.qgis.provider.Config.watchFrequency.purpose = Intervall für die Prüfung auf Projektänderungen, in Sekunden oder als Dauer-Ausdruck.
gws.plugin.qgis.provider.Config.watchFrequency.complexity = advanced
gws.plugin.qgis.provider.Config.watchFrequency.example = "30s"

# --- layer ------------------------------------------------------------------

gws.plugin.qgis.layer.Config.label = QGIS-Layer
gws.plugin.qgis.layer.Config.purpose = Bindet eine Layer-Gruppe oder einen einzelnen Layer aus einem QGIS-Projekt als Karten-Layer ein. Übernimmt Symbolisierung, Beschriftung, Sichtbarkeitsregeln und Reihenfolge aus dem QGIS-Projekt.
gws.plugin.qgis.layer.Config.whenToUse = Standard-Weg, um QGIS-Inhalte als Karten-Layer in der WebSuite anzuzeigen. Erhält die Baumstruktur aus QGIS.
gws.plugin.qgis.layer.Config.complexity = intermediate
gws.plugin.qgis.layer.Config.useCases = Themenbäume aus QGIS, Sichtbarkeit nach Maßstab, kombinierte Vektor- und Rasterlayer mit identischer Symbolisierung wie im Desktop.
gws.plugin.qgis.layer.Config.seeAlso = gws.plugin.qgis.provider.Config, gws.plugin.qgis.flatlayer.Config

gws.plugin.qgis.layer.Config.provider.label = QGIS-Provider
gws.plugin.qgis.layer.Config.provider.purpose = Konfiguration oder UID-Referenz auf den QGIS-Provider, aus dem die Layer geladen werden.

gws.plugin.qgis.layer.Config.compositeRender.label = Als ein Bild rendern
gws.plugin.qgis.layer.Config.compositeRender.purpose = Wenn aktiv, wird die Layergruppe als ein einzelnes Bild gerendert statt jedes Layers einzeln. Performanter, deaktiviert aber Layer-individuelle Sichtbarkeit im Client.
gws.plugin.qgis.layer.Config.compositeRender.complexity = advanced

gws.plugin.qgis.layer.Config.sqlFilters.label = Layer-SQL-Filter
gws.plugin.qgis.layer.Config.sqlFilters.purpose = Layer-spezifische SQL-Filterausdrücke, die als QGIS-FILTER-Parameter an den QGIS-Server gesendet werden.
gws.plugin.qgis.layer.Config.sqlFilters.complexity = advanced

# --- flatlayer --------------------------------------------------------------

gws.plugin.qgis.flatlayer.Config.label = Flacher QGIS-Layer
gws.plugin.qgis.flatlayer.Config.purpose = Stellt einen oder mehrere QGIS-Layer als einen einzigen flachen Karten-Layer ohne Baumstruktur dar. Die Auswahl der enthaltenen Quell-Layer wird explizit konfiguriert.
gws.plugin.qgis.flatlayer.Config.whenToUse = Wenn nur eine Auswahl bestimmter QGIS-Layer als ein einzelner Karten-Layer benötigt wird, ohne die QGIS-Layerbaum-Struktur abzubilden.
gws.plugin.qgis.flatlayer.Config.complexity = intermediate
gws.plugin.qgis.flatlayer.Config.seeAlso = gws.plugin.qgis.layer.Config

gws.plugin.qgis.flatlayer.Config.provider.label = QGIS-Provider
gws.plugin.qgis.flatlayer.Config.provider.purpose = Konfiguration oder UID-Referenz auf den QGIS-Provider.

gws.plugin.qgis.flatlayer.Config.sourceLayers.label = Quell-Layer-Auswahl
gws.plugin.qgis.flatlayer.Config.sourceLayers.purpose = Liste oder Pattern, das die zu verwendenden QGIS-Layer beschreibt (z.B. nach Name oder über Regex).

gws.plugin.qgis.flatlayer.Config.sqlFilters.label = Layer-SQL-Filter
gws.plugin.qgis.flatlayer.Config.sqlFilters.purpose = Layer-spezifische SQL-Filterausdrücke, die als QGIS-FILTER-Parameter an den QGIS-Server gesendet werden.
gws.plugin.qgis.flatlayer.Config.sqlFilters.complexity = advanced

# --- finder -----------------------------------------------------------------

gws.plugin.qgis.finder.Config.label = QGIS-Suche
gws.plugin.qgis.finder.Config.purpose = Such-Provider, der die QGIS-Server GetFeatureInfo-Schnittstelle nutzt. Liefert Sachdaten zu Klick- oder Volltextanfragen für die im Projekt definierten Layer.
gws.plugin.qgis.finder.Config.whenToUse = Wenn die Sachdatensuche in der Karte über QGIS-Server statt direkt auf der Datenbank laufen soll, etwa weil im QGIS-Projekt komplexe Aliase, Filter oder Joins definiert sind.
gws.plugin.qgis.finder.Config.complexity = intermediate

gws.plugin.qgis.finder.Config.provider.label = QGIS-Provider
gws.plugin.qgis.finder.Config.provider.purpose = Konfiguration oder UID-Referenz auf den QGIS-Provider, gegen den gesucht wird.

gws.plugin.qgis.finder.Config.sourceLayers.label = Durchsuchte Quell-Layer
gws.plugin.qgis.finder.Config.sourceLayers.purpose = Auswahl der QGIS-Layer, die in die Suche einbezogen werden.

# --- legend -----------------------------------------------------------------

gws.plugin.qgis.legend.Config.label = QGIS-Legende
gws.plugin.qgis.legend.Config.purpose = Legenden-Provider, der die QGIS-Server GetLegendGraphic-Schnittstelle nutzt und die Layer-Symbolisierung aus dem QGIS-Projekt rendert.
gws.plugin.qgis.legend.Config.whenToUse = Wenn die Legende exakt der QGIS-Symbolisierung entsprechen soll, inklusive regelbasierter und kategorisierter Stile.
gws.plugin.qgis.legend.Config.complexity = basic

gws.plugin.qgis.legend.Config.provider.label = QGIS-Provider
gws.plugin.qgis.legend.Config.provider.purpose = Konfiguration oder UID-Referenz auf den QGIS-Provider, von dem die Legende geladen wird.

gws.plugin.qgis.legend.Config.sourceLayers.label = Quell-Layer
gws.plugin.qgis.legend.Config.sourceLayers.purpose = Auswahl der QGIS-Layer, die in die Legende aufgenommen werden.

# --- model ------------------------------------------------------------------

gws.plugin.qgis.model.Config.label = QGIS-Datenmodell
gws.plugin.qgis.model.Config.purpose = Datenmodell auf Basis eines QGIS-Layers. Übernimmt Feldnamen, Aliase und Editier-Widgets aus der QGIS-Layer-Konfiguration.
gws.plugin.qgis.model.Config.whenToUse = Wenn die Felddefinitionen für Such-Ergebnisse oder Editier-Formulare aus dem QGIS-Projekt übernommen werden sollen.
gws.plugin.qgis.model.Config.complexity = intermediate

gws.plugin.qgis.model.Config.provider.label = QGIS-Provider
gws.plugin.qgis.model.Config.provider.purpose = Konfiguration oder UID-Referenz auf den QGIS-Provider.

gws.plugin.qgis.model.Config.sourceLayers.label = Quell-Layer
gws.plugin.qgis.model.Config.sourceLayers.purpose = Auswahl der QGIS-Layer, deren Attributstruktur als Datenmodell genutzt wird.

# --- template ---------------------------------------------------------------

gws.plugin.qgis.template.Config.label = QGIS-Druckvorlage
gws.plugin.qgis.template.Config.purpose = Druckvorlage auf Basis eines im QGIS-Projekt definierten Print-Layouts. Erzeugt PDF- oder Bild-Ausdrucke mit den im QGIS Composer angelegten Elementen wie Karte, Legende, Maßstab und Beschriftungen.
gws.plugin.qgis.template.Config.whenToUse = Wenn der Druck pixelgenau dem QGIS-Composer-Layout folgen soll.
gws.plugin.qgis.template.Config.complexity = intermediate
gws.plugin.qgis.template.Config.useCases = Behördliche Auszüge, Plotvorlagen, mehrseitige Atlas-Drucke aus QGIS.

gws.plugin.qgis.template.Config.provider.label = QGIS-Provider
gws.plugin.qgis.template.Config.provider.purpose = Konfiguration oder UID-Referenz auf den QGIS-Provider, der das Layout enthält.

gws.plugin.qgis.template.Config.index.label = Layout-Index
gws.plugin.qgis.template.Config.index.purpose = Position des Print-Layouts im QGIS-Projekt (0-basiert) oder Layout-Name.
gws.plugin.qgis.template.Config.index.example = 0

gws.plugin.qgis.template.Config.cssPath.label = CSS-Datei
gws.plugin.qgis.template.Config.cssPath.purpose = Pfad zu einer CSS-Datei, die für HTML-Bereiche im Layout angewendet wird.
gws.plugin.qgis.template.Config.cssPath.complexity = advanced

gws.plugin.qgis.template.Config.mapPosition.label = Hauptkarten-Position
gws.plugin.qgis.template.Config.mapPosition.purpose = Position der Hauptkarte im Layout, falls das Layout mehrere Map-Frames enthält.
gws.plugin.qgis.template.Config.mapPosition.complexity = advanced

# --- cli (CapsParams / CopyParams) ----------------------------------------

gws.plugin.qgis.cli.CapsParams.src.label = Quelle
gws.plugin.qgis.cli.CapsParams.src.purpose = Pfad zur QGIS-Projektdatei oder Postgres-Adresse `postgres:<dbUid>/<schema>/<projectName>`.

gws.plugin.qgis.cli.CapsParams.out.label = Ausgabedatei
gws.plugin.qgis.cli.CapsParams.out.purpose = Pfad der Datei, in die die Capabilities geschrieben werden.

gws.plugin.qgis.cli.CopyParams.src.label = Quelle
gws.plugin.qgis.cli.CopyParams.src.purpose = Pfad oder Postgres-Adresse `postgres:<dbUid>/<schema>/<projectName>` der Quell-QGIS-Projektdatei.

gws.plugin.qgis.cli.CopyParams.dst.label = Ziel
gws.plugin.qgis.cli.CopyParams.dst.purpose = Pfad oder Postgres-Adresse `postgres:<dbUid>/<schema>/<projectName>` der Ziel-QGIS-Projektdatei.

[en]

# --- provider ---------------------------------------------------------------

gws.plugin.qgis.provider.Config.label = QGIS provider
gws.plugin.qgis.provider.Config.purpose = Integrates a QGIS project into WebSuite. Reads the project file (.qgs/.qgz) directly from the file system or from PostgreSQL and proxies render and search requests to a QGIS Server.
gws.plugin.qgis.provider.Config.whenToUse = When the map and print configuration is maintained in QGIS Desktop and all layers, symbology and print layouts should be reused.
gws.plugin.qgis.provider.Config.complexity = intermediate
gws.plugin.qgis.provider.Config.useCases = Reuse of existing QGIS projects as web GIS maps, reuse of print layouts, automatic map updates when the QGIS project is saved.
gws.plugin.qgis.provider.Config.seeAlso = gws.plugin.qgis.layer.Config, gws.plugin.qgis.template.Config

gws.plugin.qgis.provider.Config.path.label = Project file
gws.plugin.qgis.provider.Config.path.purpose = Path to the QGIS project file (.qgs or .qgz). Alternative to dbUid/schema/projectName.
gws.plugin.qgis.provider.Config.path.example = "/data/projects/city.qgs"

gws.plugin.qgis.provider.Config.dbUid.label = Project database
gws.plugin.qgis.provider.Config.dbUid.purpose = UID of a configured PostgreSQL provider that stores the QGIS project (project-in-PostgreSQL). Alternative to path.
gws.plugin.qgis.provider.Config.dbUid.complexity = advanced

gws.plugin.qgis.provider.Config.schema.label = Database schema
gws.plugin.qgis.provider.Config.schema.purpose = Schema in the project database that holds the project data. Required when dbUid is set.
gws.plugin.qgis.provider.Config.schema.complexity = advanced
gws.plugin.qgis.provider.Config.schema.example = "public"

gws.plugin.qgis.provider.Config.projectName.label = Project name
gws.plugin.qgis.provider.Config.projectName.purpose = Name of the QGIS project inside the project database. Required when dbUid is set.
gws.plugin.qgis.provider.Config.projectName.complexity = advanced

gws.plugin.qgis.provider.Config.forceCrs.label = Force CRS
gws.plugin.qgis.provider.Config.forceCrs.purpose = Coordinate reference system used for QGIS Server requests, overriding the project CRS.
gws.plugin.qgis.provider.Config.forceCrs.complexity = advanced
gws.plugin.qgis.provider.Config.forceCrs.example = "EPSG:25832"

gws.plugin.qgis.provider.Config.extentBuffer.label = Extent buffer
gws.plugin.qgis.provider.Config.extentBuffer.purpose = Buffer in map units added to automatically computed layer extents.
gws.plugin.qgis.provider.Config.extentBuffer.complexity = advanced
gws.plugin.qgis.provider.Config.extentBuffer.example = 1000

gws.plugin.qgis.provider.Config.useCanvasExtent.label = Use canvas extent
gws.plugin.qgis.provider.Config.useCanvasExtent.purpose = If enabled, the canvas extent stored in the QGIS project is used as the project extent.
gws.plugin.qgis.provider.Config.useCanvasExtent.complexity = advanced

gws.plugin.qgis.provider.Config.directRender.label = Direct-render providers
gws.plugin.qgis.provider.Config.directRender.purpose = List of QGIS data provider types to render directly from the source instead of via QGIS Server.
gws.plugin.qgis.provider.Config.directRender.complexity = advanced
gws.plugin.qgis.provider.Config.directRender.example = ["wms", "wmts"]

gws.plugin.qgis.provider.Config.directSearch.label = Direct-search providers
gws.plugin.qgis.provider.Config.directSearch.purpose = List of QGIS data provider types whose search is performed directly against the source instead of via QGIS Server.
gws.plugin.qgis.provider.Config.directSearch.complexity = advanced
gws.plugin.qgis.provider.Config.directSearch.example = ["postgres", "wfs"]

gws.plugin.qgis.provider.Config.defaultLegendOptions.label = Default legend options
gws.plugin.qgis.provider.Config.defaultLegendOptions.purpose = Defaults for QGIS legend rendering (font size, symbol size, ...) applied to all layers of this provider unless overridden.
gws.plugin.qgis.provider.Config.defaultLegendOptions.complexity = advanced

gws.plugin.qgis.provider.Config.withWatch.label = Project monitoring
gws.plugin.qgis.provider.Config.withWatch.purpose = If enabled, the server watches the QGIS project file for changes and reloads automatically.
gws.plugin.qgis.provider.Config.withWatch.complexity = advanced

gws.plugin.qgis.provider.Config.watchFrequency.label = Monitoring frequency
gws.plugin.qgis.provider.Config.watchFrequency.purpose = Interval for change checks, in seconds or as a duration expression.
gws.plugin.qgis.provider.Config.watchFrequency.complexity = advanced
gws.plugin.qgis.provider.Config.watchFrequency.example = "30s"

# --- layer ------------------------------------------------------------------

gws.plugin.qgis.layer.Config.label = QGIS layer
gws.plugin.qgis.layer.Config.purpose = Integrates a QGIS layer group or single layer as a map layer. Reuses symbology, labelling, scale visibility and ordering from the QGIS project.
gws.plugin.qgis.layer.Config.whenToUse = Standard way to expose QGIS content as map layers in WebSuite. Preserves the layer tree from QGIS.
gws.plugin.qgis.layer.Config.complexity = intermediate
gws.plugin.qgis.layer.Config.useCases = Theme trees from QGIS, scale-dependent visibility, combined vector and raster layers with identical desktop symbology.
gws.plugin.qgis.layer.Config.seeAlso = gws.plugin.qgis.provider.Config, gws.plugin.qgis.flatlayer.Config

gws.plugin.qgis.layer.Config.provider.label = QGIS provider
gws.plugin.qgis.layer.Config.provider.purpose = Inline configuration or UID reference to the QGIS provider that supplies the layers.

gws.plugin.qgis.layer.Config.compositeRender.label = Render as one image
gws.plugin.qgis.layer.Config.compositeRender.purpose = If enabled, the layer group is rendered as a single image instead of per layer. More performant, but disables per-layer client-side toggles.
gws.plugin.qgis.layer.Config.compositeRender.complexity = advanced

gws.plugin.qgis.layer.Config.sqlFilters.label = Per-layer SQL filters
gws.plugin.qgis.layer.Config.sqlFilters.purpose = Per-layer SQL filter expressions sent as the QGIS FILTER parameter to QGIS Server.
gws.plugin.qgis.layer.Config.sqlFilters.complexity = advanced

# --- flatlayer --------------------------------------------------------------

gws.plugin.qgis.flatlayer.Config.label = Flat QGIS layer
gws.plugin.qgis.flatlayer.Config.purpose = Exposes one or more QGIS layers as a single flat map layer without tree structure. The selection of source layers is configured explicitly.
gws.plugin.qgis.flatlayer.Config.whenToUse = When only a curated subset of QGIS layers is needed as one map layer, without preserving the QGIS layer tree.
gws.plugin.qgis.flatlayer.Config.complexity = intermediate
gws.plugin.qgis.flatlayer.Config.seeAlso = gws.plugin.qgis.layer.Config

gws.plugin.qgis.flatlayer.Config.provider.label = QGIS provider
gws.plugin.qgis.flatlayer.Config.provider.purpose = Inline configuration or UID reference to the QGIS provider.

gws.plugin.qgis.flatlayer.Config.sourceLayers.label = Source-layer selection
gws.plugin.qgis.flatlayer.Config.sourceLayers.purpose = List or pattern describing the QGIS layers to include (by name or regex).

gws.plugin.qgis.flatlayer.Config.sqlFilters.label = Per-layer SQL filters
gws.plugin.qgis.flatlayer.Config.sqlFilters.purpose = Per-layer SQL filter expressions sent as the QGIS FILTER parameter to QGIS Server.
gws.plugin.qgis.flatlayer.Config.sqlFilters.complexity = advanced

# --- finder -----------------------------------------------------------------

gws.plugin.qgis.finder.Config.label = QGIS search
gws.plugin.qgis.finder.Config.purpose = Search provider that uses the QGIS Server GetFeatureInfo endpoint. Returns attribute data for click and full-text queries against project layers.
gws.plugin.qgis.finder.Config.whenToUse = When map searches should be served by QGIS Server instead of querying the database directly, e.g. when the QGIS project defines complex aliases, filters or joins.
gws.plugin.qgis.finder.Config.complexity = intermediate

gws.plugin.qgis.finder.Config.provider.label = QGIS provider
gws.plugin.qgis.finder.Config.provider.purpose = Inline configuration or UID reference to the QGIS provider being searched.

gws.plugin.qgis.finder.Config.sourceLayers.label = Searched source layers
gws.plugin.qgis.finder.Config.sourceLayers.purpose = Selection of QGIS layers to include in search.

# --- legend -----------------------------------------------------------------

gws.plugin.qgis.legend.Config.label = QGIS legend
gws.plugin.qgis.legend.Config.purpose = Legend provider that uses the QGIS Server GetLegendGraphic endpoint and renders the layer symbology from the QGIS project.
gws.plugin.qgis.legend.Config.whenToUse = When the legend must match QGIS symbology exactly, including rule-based and categorized styles.
gws.plugin.qgis.legend.Config.complexity = basic

gws.plugin.qgis.legend.Config.provider.label = QGIS provider
gws.plugin.qgis.legend.Config.provider.purpose = Inline configuration or UID reference to the QGIS provider supplying the legend.

gws.plugin.qgis.legend.Config.sourceLayers.label = Source layers
gws.plugin.qgis.legend.Config.sourceLayers.purpose = Selection of QGIS layers included in the legend.

# --- model ------------------------------------------------------------------

gws.plugin.qgis.model.Config.label = QGIS data model
gws.plugin.qgis.model.Config.purpose = Data model derived from a QGIS layer. Reuses field names, aliases and edit widgets from the QGIS layer configuration.
gws.plugin.qgis.model.Config.whenToUse = When the field definitions for search results or edit forms should come from the QGIS project.
gws.plugin.qgis.model.Config.complexity = intermediate

gws.plugin.qgis.model.Config.provider.label = QGIS provider
gws.plugin.qgis.model.Config.provider.purpose = Inline configuration or UID reference to the QGIS provider.

gws.plugin.qgis.model.Config.sourceLayers.label = Source layers
gws.plugin.qgis.model.Config.sourceLayers.purpose = Selection of QGIS layers whose attribute structure is used as the data model.

# --- template ---------------------------------------------------------------

gws.plugin.qgis.template.Config.label = QGIS print template
gws.plugin.qgis.template.Config.purpose = Print template based on a print layout defined in the QGIS project. Produces PDF or image prints using the elements designed in the QGIS Composer (map, legend, scale bar, labels).
gws.plugin.qgis.template.Config.whenToUse = When prints should follow the QGIS Composer layout pixel-perfectly.
gws.plugin.qgis.template.Config.complexity = intermediate
gws.plugin.qgis.template.Config.useCases = Official extracts, plot templates, multi-page atlas prints from QGIS.

gws.plugin.qgis.template.Config.provider.label = QGIS provider
gws.plugin.qgis.template.Config.provider.purpose = Inline configuration or UID reference to the QGIS provider that holds the layout.

gws.plugin.qgis.template.Config.index.label = Layout index
gws.plugin.qgis.template.Config.index.purpose = Index (0-based) or name of the print layout in the QGIS project.
gws.plugin.qgis.template.Config.index.example = 0

gws.plugin.qgis.template.Config.cssPath.label = CSS file
gws.plugin.qgis.template.Config.cssPath.purpose = Path to a CSS file applied to HTML areas of the layout.
gws.plugin.qgis.template.Config.cssPath.complexity = advanced

gws.plugin.qgis.template.Config.mapPosition.label = Main-map position
