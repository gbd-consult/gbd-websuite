# UX-Strings für das tile_layer-Plugin.
#
# Schlüsselformat: gws.plugin.tile_layer.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.

[de]

# --- provider ---------------------------------------------------------------

gws.plugin.tile_layer.provider.Config.label = Tile-Provider
gws.plugin.tile_layer.provider.Config.purpose = Konfiguration einer XYZ-Tile-Quelle. Beschreibt die URL mit Platzhaltern und das Tile-Grid.
gws.plugin.tile_layer.provider.Config.whenToUse = Für klassische Tile-Server wie OpenStreetMap, ESRI World Imagery oder eigene Tile-Caches.
gws.plugin.tile_layer.provider.Config.complexity = basic

gws.plugin.tile_layer.provider.Config.url.label = Tile-URL
gws.plugin.tile_layer.provider.Config.url.purpose = URL-Vorlage mit den Platzhaltern {x}, {y} und {z} für die Tile-Koordinaten.
gws.plugin.tile_layer.provider.Config.url.example = "https://tile.openstreetmap.org/{z}/{x}/{y}.png"

gws.plugin.tile_layer.provider.Config.grid.label = Tile-Grid
gws.plugin.tile_layer.provider.Config.grid.purpose = Beschreibung des Tile-Grids (Ursprung, Tile-Größe, CRS, Auflösungen). Default ist ein Web-Mercator-Standard-Grid mit 256-Pixel-Tiles ab Norden-Westen.
gws.plugin.tile_layer.provider.Config.grid.complexity = advanced

gws.plugin.tile_layer.provider.Config.maxRequests.label = Max. parallele Requests
gws.plugin.tile_layer.provider.Config.maxRequests.purpose = Maximale Anzahl gleichzeitiger Anfragen an die Tile-Quelle. 0 bedeutet unbegrenzt.
gws.plugin.tile_layer.provider.Config.maxRequests.complexity = advanced
gws.plugin.tile_layer.provider.Config.maxRequests.example = 4

# --- layer ------------------------------------------------------------------

gws.plugin.tile_layer.layer.Config.label = Tile-Layer
gws.plugin.tile_layer.layer.Config.purpose = Karten-Layer auf Basis einer XYZ-Tile-Quelle. Der MapProxy-Sidecar übernimmt Caching, Reprojektion und Skalierung der Kacheln.
gws.plugin.tile_layer.layer.Config.whenToUse = Wenn fertig gerenderte Kacheln (Raster-Tiles) als Basiskarte oder Hintergrund eingebunden werden sollen.
gws.plugin.tile_layer.layer.Config.complexity = basic
gws.plugin.tile_layer.layer.Config.useCases = OpenStreetMap als Hintergrund, eigene Vorberechnungs-Caches, Luftbild-Tiles, Drittanbieter-Basemaps.
gws.plugin.tile_layer.layer.Config.seeAlso = gws.plugin.mbtiles_layer.layer.Config

gws.plugin.tile_layer.layer.Config.provider.label = Tile-Provider
gws.plugin.tile_layer.layer.Config.provider.purpose = Inline-Konfiguration des Tile-Providers (URL und Grid).

gws.plugin.tile_layer.layer.Config.display.label = Anzeigemodus
gws.plugin.tile_layer.layer.Config.display.purpose = Wie der Layer im Client dargestellt wird (tile, client, ...). Default tile geht über den MapProxy-Cache; client liefert die Kachel-URL direkt an den Browser.
gws.plugin.tile_layer.layer.Config.display.complexity = advanced
gws.plugin.tile_layer.layer.Config.display.example = "tile"

[en]

# --- provider ---------------------------------------------------------------

gws.plugin.tile_layer.provider.Config.label = Tile provider
gws.plugin.tile_layer.provider.Config.purpose = Configuration of an XYZ tile source. Describes the URL with placeholders and the tile grid.
gws.plugin.tile_layer.provider.Config.whenToUse = For classic tile servers such as OpenStreetMap, ESRI World Imagery or own tile caches.
gws.plugin.tile_layer.provider.Config.complexity = basic

gws.plugin.tile_layer.provider.Config.url.label = Tile URL
gws.plugin.tile_layer.provider.Config.url.purpose = URL template with placeholders {x}, {y} and {z} for the tile coordinates.
gws.plugin.tile_layer.provider.Config.url.example = "https://tile.openstreetmap.org/{z}/{x}/{y}.png"

gws.plugin.tile_layer.provider.Config.grid.label = Tile grid
gws.plugin.tile_layer.provider.Config.grid.purpose = Description of the tile grid (origin, tile size, CRS, resolutions). Defaults to a Web Mercator standard grid with 256 px tiles, north-west origin.
gws.plugin.tile_layer.provider.Config.grid.complexity = advanced

gws.plugin.tile_layer.provider.Config.maxRequests.label = Max parallel requests
gws.plugin.tile_layer.provider.Config.maxRequests.purpose = Maximum number of concurrent requests to the tile source. 0 means unlimited.
gws.plugin.tile_layer.provider.Config.maxRequests.complexity = advanced
gws.plugin.tile_layer.provider.Config.maxRequests.example = 4

# --- layer ------------------------------------------------------------------

gws.plugin.tile_layer.layer.Config.label = Tile layer
gws.plugin.tile_layer.layer.Config.purpose = Map layer backed by an XYZ tile source. The MapProxy sidecar handles caching, reprojection and scaling of the tiles.
gws.plugin.tile_layer.layer.Config.whenToUse = When pre-rendered raster tiles should be used as a base map or background.
gws.plugin.tile_layer.layer.Config.complexity = basic
gws.plugin.tile_layer.layer.Config.useCases = OpenStreetMap backgrounds, own pre-rendered caches, aerial imagery tiles, third-party basemaps.
gws.plugin.tile_layer.layer.Config.seeAlso = gws.plugin.mbtiles_layer.layer.Config

gws.plugin.tile_layer.layer.Config.provider.label = Tile provider
gws.plugin.tile_layer.layer.Config.provider.purpose = Inline configuration of the tile provider (URL and grid).

gws.plugin.tile_layer.layer.Config.display.label = Display mode
gws.plugin.tile_layer.layer.Config.display.purpose = How the layer is rendered in the client (tile, client, ...). Default `tile` goes through the MapProxy cache; `client` sends the tile URL directly to the browser.
gws.plugin.tile_layer.layer.Config.display.complexity = advanced
gws.plugin.tile_layer.layer.Config.display.example = "tile"
