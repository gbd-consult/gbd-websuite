# UX-Strings für das mbtiles_layer-Plugin.
#
# Schlüsselformat: gws.plugin.mbtiles_layer.<modul>.<class>[.<property>].<feldname>

[de]

# --- provider ---------------------------------------------------------------

gws.plugin.mbtiles_layer.provider.Config.label = MBTiles-Provider
gws.plugin.mbtiles_layer.provider.Config.purpose = Liefert die in einer MBTiles-Datei (SQLite) abgelegten Raster-Kacheln. MBTiles ist ein kompaktes Container-Format für vorgerechnete Tile-Pyramiden.
gws.plugin.mbtiles_layer.provider.Config.whenToUse = Wenn vorgerechnete Tile-Pakete offline ausgeliefert werden sollen, etwa für Außendienst-Setups oder Pre-Rendering.
gws.plugin.mbtiles_layer.provider.Config.complexity = advanced

gws.plugin.mbtiles_layer.provider.Config.path.label = MBTiles-Datei
gws.plugin.mbtiles_layer.provider.Config.path.purpose = Pfad zur .mbtiles-Datei im Server-Dateisystem.
gws.plugin.mbtiles_layer.provider.Config.path.example = "/data/tiles/germany.mbtiles"

# --- layer ------------------------------------------------------------------

gws.plugin.mbtiles_layer.layer.Config.label = MBTiles-Layer
gws.plugin.mbtiles_layer.layer.Config.purpose = Karten-Layer auf Basis einer MBTiles-Datei. Liest Ausdehnung und CRS automatisch aus der Datei und rendert die Kacheln über MapServer.
gws.plugin.mbtiles_layer.layer.Config.whenToUse = Wenn Tile-Pakete (z.B. von TileMill, MapTiler, Mapbox) als Karten-Layer eingebunden werden sollen, ohne externen Tile-Server.
gws.plugin.mbtiles_layer.layer.Config.complexity = advanced
gws.plugin.mbtiles_layer.layer.Config.useCases = Offline-Karten, eigene Pre-Rendering-Pipelines, große Raster-Pakete in einer Datei.
gws.plugin.mbtiles_layer.layer.Config.seeAlso = gws.plugin.tile_layer.layer.Config

gws.plugin.mbtiles_layer.layer.Config.provider.label = MBTiles-Provider
gws.plugin.mbtiles_layer.layer.Config.provider.purpose = Inline-Konfiguration des MBTiles-Providers (Pfad zur Datei).

gws.plugin.mbtiles_layer.layer.Config.processing.label = Verarbeitungsdirektiven
gws.plugin.mbtiles_layer.layer.Config.processing.purpose = MapServer-PROCESSING-Direktiven, etwa für Resampling oder Bandauswahl.
gws.plugin.mbtiles_layer.layer.Config.processing.complexity = advanced
gws.plugin.mbtiles_layer.layer.Config.processing.example = ["RESAMPLE=BILINEAR"]

gws.plugin.mbtiles_layer.layer.Config.transparentColor.label = Transparenzfarbe
gws.plugin.mbtiles_layer.layer.Config.transparentColor.purpose = Farbe, die als transparent behandelt werden soll (Hex-Code oder rgb()).
gws.plugin.mbtiles_layer.layer.Config.transparentColor.complexity = advanced
gws.plugin.mbtiles_layer.layer.Config.transparentColor.example = "#ffffff"

[en]

# --- provider ---------------------------------------------------------------

gws.plugin.mbtiles_layer.provider.Config.label = MBTiles provider
gws.plugin.mbtiles_layer.provider.Config.purpose = Serves raster tiles stored in an MBTiles file (SQLite). MBTiles is a compact container format for pre-rendered tile pyramids.
gws.plugin.mbtiles_layer.provider.Config.whenToUse = When pre-rendered tile packages should be served offline, e.g. for field deployments or pre-rendering pipelines.
gws.plugin.mbtiles_layer.provider.Config.complexity = advanced

gws.plugin.mbtiles_layer.provider.Config.path.label = MBTiles file
gws.plugin.mbtiles_layer.provider.Config.path.purpose = Path to the .mbtiles file on the server file system.
gws.plugin.mbtiles_layer.provider.Config.path.example = "/data/tiles/germany.mbtiles"

# --- layer ------------------------------------------------------------------

gws.plugin.mbtiles_layer.layer.Config.label = MBTiles layer
gws.plugin.mbtiles_layer.layer.Config.purpose = Map layer backed by an MBTiles file. Detects extent and CRS automatically and renders tiles through MapServer.
gws.plugin.mbtiles_layer.layer.Config.whenToUse = When tile packages (e.g. produced by TileMill, MapTiler, Mapbox) should be used as a map layer without an external tile server.
gws.plugin.mbtiles_layer.layer.Config.complexity = advanced
gws.plugin.mbtiles_layer.layer.Config.useCases = Offline maps, own pre-rendering pipelines, large raster packages in a single file.
gws.plugin.mbtiles_layer.layer.Config.seeAlso = gws.plugin.tile_layer.layer.Config

gws.plugin.mbtiles_layer.layer.Config.provider.label = MBTiles provider
gws.plugin.mbtiles_layer.layer.Config.provider.purpose = Inline configuration of the MBTiles provider (file path).

gws.plugin.mbtiles_layer.layer.Config.processing.label = Processing directives
gws.plugin.mbtiles_layer.layer.Config.processing.purpose = MapServer PROCESSING directives, e.g. for resampling or band selection.
gws.plugin.mbtiles_layer.layer.Config.processing.complexity = advanced
gws.plugin.mbtiles_layer.layer.Config.processing.example = ["RESAMPLE=BILINEAR"]

gws.plugin.mbtiles_layer.layer.Config.transparentColor.label = Transparent color
gws.plugin.mbtiles_layer.layer.Config.transparentColor.purpose = Color to treat as transparent (hex code or rgb()).
gws.plugin.mbtiles_layer.layer.Config.transparentColor.complexity = advanced
gws.plugin.mbtiles_layer.layer.Config.transparentColor.example = "#ffffff"
