# UX-Strings für das OWS-Server-Plugin (WMS/WMTS/WFS/CSW).
#
# Schlüsselformat: gws.plugin.ows_server.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.
#
# Inhalte aus _doc/strings.ini, Klassen-Docstrings und der OGC-Spezifikation
# abgeleitet — keine Phantasie-Texte.

[de]

# --- wms (WMS-Server) -------------------------------------------------------

gws.plugin.ows_server.wms.Config.label = WMS-Server
gws.plugin.ows_server.wms.Config.purpose = Veröffentlicht Karten-Layer als OGC Web Map Service. Implementiert WMS 1.1.x und 1.3.0; SLD-Erweiterungen werden außer einem einfachen GetLegendGraphic nicht unterstützt.
gws.plugin.ows_server.wms.Config.whenToUse = Wenn Layer der WebSuite über das standardisierte WMS-Protokoll an externe GIS-Clients (QGIS, ArcGIS, Browser-Viewer) ausgeliefert werden sollen.
gws.plugin.ows_server.wms.Config.complexity = intermediate
gws.plugin.ows_server.wms.Config.useCases = Bereitstellung amtlicher Karten als WMS, Einbindung in Geoportale, Veröffentlichung von Fachdiensten mit INSPIRE-Konformität.

gws.plugin.ows_server.wms.Config.layerLimit.label = Layer-Limit
gws.plugin.ows_server.wms.Config.layerLimit.purpose = Maximale Anzahl Layer pro GetMap-Anfrage (WMS-Capabilities-Element LayerLimit). 0 deaktiviert die Begrenzung.
gws.plugin.ows_server.wms.Config.layerLimit.example = 10

gws.plugin.ows_server.wms.Config.maxPixelSize.label = Max-Pixel-Size
gws.plugin.ows_server.wms.Config.maxPixelSize.purpose = Maximale Bildkanten-Länge in Pixeln (WMS-Capabilities-Elemente MaxWidth/MaxHeight). 0 nutzt den Default 2048.
gws.plugin.ows_server.wms.Config.maxPixelSize.example = 4096

# --- wmts (WMTS-Server) -----------------------------------------------------

gws.plugin.ows_server.wmts.Config.label = WMTS-Server
gws.plugin.ows_server.wmts.Config.purpose = Veröffentlicht Karten-Kacheln als OGC Web Map Tile Service. Implementiert WMTS 1.0.0 mit GET/KVP-Anfragen.
gws.plugin.ows_server.wmts.Config.whenToUse = Wenn vorgerenderte oder gecachte Kachelbilder über das WMTS-Protokoll bereitgestellt werden sollen — performanter als WMS bei vielen Kartenaufrufen.
gws.plugin.ows_server.wmts.Config.complexity = intermediate
gws.plugin.ows_server.wmts.Config.useCases = Hintergrundkarten für Web-Viewer, Tile-Cache-Veröffentlichung über MapProxy, Performance-optimierte Geodatendienste.

# --- wfs (WFS-Server) -------------------------------------------------------

gws.plugin.ows_server.wfs.Config.label = WFS-Server
gws.plugin.ows_server.wfs.Config.purpose = Veröffentlicht Vektordaten als OGC Web Feature Service. Implementiert das WFS-2.0-Basic-Profil mit GET/KVP-Anfragen.
gws.plugin.ows_server.wfs.Config.whenToUse = Wenn Geometrie- und Sachdaten als download-/abfragbare Features (GML, GeoJSON) ausgeliefert werden sollen.
gws.plugin.ows_server.wfs.Config.complexity = intermediate
gws.plugin.ows_server.wfs.Config.useCases = INSPIRE-Downloaddienst, GeoJSON-Export für Web-Anwendungen, GetFeatureById über StoredQuery.

# --- csw (CSW-Katalog) ------------------------------------------------------

gws.plugin.ows_server.csw.Config.label = CSW-Katalog
gws.plugin.ows_server.csw.Config.purpose = Veröffentlicht Metadaten als OGC Catalogue Service for the Web. Basis-Implementierung mit eingeschränktem Funktionsumfang.
gws.plugin.ows_server.csw.Config.whenToUse = Wenn Metadaten zu Geodatensätzen und -diensten in einem Geoportal/Katalog auffindbar gemacht werden sollen.
gws.plugin.ows_server.csw.Config.complexity = advanced
gws.plugin.ows_server.csw.Config.useCases = INSPIRE-konforme Metadatenkataloge (ISO 19115), Dublin-Core-Metadaten für allgemeine Webportale.

gws.plugin.ows_server.csw.Config.profile.label = Metadaten-Profil
gws.plugin.ows_server.csw.Config.profile.purpose = Wählt das ausgelieferte Metadaten-Schema. ISO 19115 für INSPIRE-konforme Geodaten-Metadaten, DCMI (Dublin Core) für leichtgewichtige Allgemein-Metadaten.
gws.plugin.ows_server.csw.Config.profile.example = "ISO"

gws.plugin.ows_server.csw.Profile.label = CSW-Metadaten-Profil
gws.plugin.ows_server.csw.Profile.purpose = Aufzählungstyp der unterstützten Metadaten-Profile (ISO, DCMI).

# --- Object-Klassen (Runtime, in der Regel keine Konfiguration) -------------

gws.plugin.ows_server.wms.Object.label = WMS-Server (Runtime)
gws.plugin.ows_server.wms.Object.purpose = Laufzeit-Objekt des WMS-Dienstes.

gws.plugin.ows_server.wmts.Object.label = WMTS-Server (Runtime)
gws.plugin.ows_server.wmts.Object.purpose = Laufzeit-Objekt des WMTS-Dienstes.

gws.plugin.ows_server.wfs.Object.label = WFS-Server (Runtime)
gws.plugin.ows_server.wfs.Object.purpose = Laufzeit-Objekt des WFS-Dienstes.

gws.plugin.ows_server.csw.Object.label = CSW-Katalog (Runtime)
gws.plugin.ows_server.csw.Object.purpose = Laufzeit-Objekt des CSW-Dienstes.


[en]

# --- wms (WMS server) -------------------------------------------------------

gws.plugin.ows_server.wms.Config.label = WMS server
gws.plugin.ows_server.wms.Config.purpose = Publishes map layers as an OGC Web Map Service. Implements WMS 1.1.x and 1.3.0; SLD extensions are not supported except for a basic GetLegendGraphic.
gws.plugin.ows_server.wms.Config.whenToUse = When WebSuite layers should be exposed via the standard WMS protocol to external GIS clients (QGIS, ArcGIS, browser viewers).
gws.plugin.ows_server.wms.Config.complexity = intermediate
gws.plugin.ows_server.wms.Config.useCases = Publishing official maps as WMS, integration into geoportals, INSPIRE-compliant view services.

gws.plugin.ows_server.wms.Config.layerLimit.label = Layer limit
gws.plugin.ows_server.wms.Config.layerLimit.purpose = Maximum number of layers per GetMap request (WMS Capabilities LayerLimit). 0 disables the limit.
gws.plugin.ows_server.wms.Config.layerLimit.example = 10

gws.plugin.ows_server.wms.Config.maxPixelSize.label = Max pixel size
gws.plugin.ows_server.wms.Config.maxPixelSize.purpose = Maximum image edge length in pixels (WMS Capabilities MaxWidth/MaxHeight). 0 uses the default of 2048.
gws.plugin.ows_server.wms.Config.maxPixelSize.example = 4096

# --- wmts (WMTS server) -----------------------------------------------------

gws.plugin.ows_server.wmts.Config.label = WMTS server
gws.plugin.ows_server.wmts.Config.purpose = Publishes map tiles as an OGC Web Map Tile Service. Implements WMTS 1.0.0 with GET/KVP requests.
gws.plugin.ows_server.wmts.Config.whenToUse = When pre-rendered or cached tile images should be served via the WMTS protocol — more performant than WMS for high-volume map access.
gws.plugin.ows_server.wmts.Config.complexity = intermediate
gws.plugin.ows_server.wmts.Config.useCases = Background maps for web viewers, tile-cache publishing via MapProxy, performance-optimised map services.

# --- wfs (WFS server) -------------------------------------------------------

gws.plugin.ows_server.wfs.Config.label = WFS server
gws.plugin.ows_server.wfs.Config.purpose = Publishes vector data as an OGC Web Feature Service. Implements the WFS 2.0 Basic profile with GET/KVP requests.
gws.plugin.ows_server.wfs.Config.whenToUse = When geometry and attribute data should be served as downloadable/queryable features (GML, GeoJSON).
gws.plugin.ows_server.wfs.Config.complexity = intermediate
gws.plugin.ows_server.wfs.Config.useCases = INSPIRE download services, GeoJSON export for web applications, GetFeatureById via StoredQuery.

# --- csw (CSW catalog) ------------------------------------------------------

gws.plugin.ows_server.csw.Config.label = CSW catalog
gws.plugin.ows_server.csw.Config.purpose = Publishes metadata as an OGC Catalogue Service for the Web. Basic implementation with a limited feature set.
gws.plugin.ows_server.csw.Config.whenToUse = When metadata for spatial datasets and services should be discoverable in a geoportal/catalog.
gws.plugin.ows_server.csw.Config.complexity = advanced
gws.plugin.ows_server.csw.Config.useCases = INSPIRE-compliant metadata catalogs (ISO 19115), Dublin Core metadata for general web portals.

gws.plugin.ows_server.csw.Config.profile.label = Metadata profile
gws.plugin.ows_server.csw.Config.profile.purpose = Selects the metadata schema served. ISO 19115 for INSPIRE-compliant geodata metadata, DCMI (Dublin Core) for lightweight general-purpose metadata.
gws.plugin.ows_server.csw.Config.profile.example = "ISO"

gws.plugin.ows_server.csw.Profile.label = CSW metadata profile
gws.plugin.ows_server.csw.Profile.purpose = Enumeration of supported metadata profiles (ISO, DCMI).

