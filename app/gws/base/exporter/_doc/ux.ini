# UX-Strings für das Exporter-Subsystem (base/exporter).
#
# Schlüsselformat: gws.base.exporter.<modul>.<class>[.<property>].<feldname>
# Erlaubte Felder: label, purpose, whenToUse, complexity, useCases,
#                  docsLink, seeAlso, example.

[de]

# --- core --------------------------------------------------------------------

gws.base.exporter.core.Config.label = Export-Konfiguration
gws.base.exporter.core.Config.purpose = Definiert einen Exporter, der Vektor- oder Rasterdaten in ein externes Format schreibt (z. B. Shape, GeoPackage, CSV).
gws.base.exporter.core.Config.whenToUse = Pflicht für jedes Projekt, in dem Karteninhalte oder Suchergebnisse als Datei heruntergeladen werden sollen. Mehrere Exporter pro Projekt sind möglich.
gws.base.exporter.core.Config.complexity = intermediate
gws.base.exporter.core.Config.useCases = Download von Auswahl-Features als Shapefile, Daten-Export für Bürger-Anfragen, Übergabe an externe Fachverfahren.

gws.base.exporter.core.Config.title.label = Anzeigename
gws.base.exporter.core.Config.title.purpose = Anzeigename des Exporters im Auswahlmenü des Clients.
gws.base.exporter.core.Config.title.complexity = basic
gws.base.exporter.core.Config.title.example = "Shapefile-Export"

gws.base.exporter.core.Config.target.label = Zielformat
gws.base.exporter.core.Config.target.purpose = Zielformat des Exports (z. B. shapefile, gpkg, csv).
gws.base.exporter.core.Config.target.complexity = intermediate

gws.base.exporter.core.Config.targetPath.label = Zielpfad
gws.base.exporter.core.Config.targetPath.purpose = Optionaler Pfad, in den die Ausgabedatei geschrieben wird. Fehlt der Wert, legt der Exporter eine temporäre Datei an.
gws.base.exporter.core.Config.targetPath.complexity = advanced

# --- action ------------------------------------------------------------------

gws.base.exporter.action.Config.label = Export-Aktion
gws.base.exporter.action.Config.purpose = Aktiviert die Export-API (exporterStart, exporterStatus, exporterCancel, exporterOutput) für das Projekt. Eingeführt in Version 8.4.
gws.base.exporter.action.Config.whenToUse = In den Projekt-Aktionen aktivieren, sobald ein Exporter konfiguriert ist und der Client einen Download-Button anbieten soll.
gws.base.exporter.action.Config.complexity = basic

gws.base.exporter.action.CliParams.label = CLI-Parameter Export
gws.base.exporter.action.CliParams.purpose = Parameter für den Kommandozeilen-Export (gws exporter export). Liest eine zuvor gespeicherte Export-Anfrage aus einer JSON-Datei und schreibt das Ergebnis an einen Pfad.
gws.base.exporter.action.CliParams.complexity = advanced

gws.base.exporter.action.CliParams.project.label = Projekt-UID
gws.base.exporter.action.CliParams.project.purpose = UID des Projekts, in dessen Kontext der Export ausgeführt wird.

gws.base.exporter.action.CliParams.request.label = Anfrage-Datei
gws.base.exporter.action.CliParams.request.purpose = Pfad zur JSON-Datei mit der serialisierten Export-Anfrage.
gws.base.exporter.action.CliParams.request.example = "/data/export-request.json"

gws.base.exporter.action.CliParams.output.label = Ausgabepfad
gws.base.exporter.action.CliParams.output.purpose = Pfad, an den die erzeugte Export-Datei geschrieben wird.
gws.base.exporter.action.CliParams.output.example = "/tmp/export.zip"

[en]

# --- core --------------------------------------------------------------------

gws.base.exporter.core.Config.label = Exporter configuration
gws.base.exporter.core.Config.purpose = Defines an exporter that writes vector or raster data to an external format (e.g. shapefile, GeoPackage, CSV).
gws.base.exporter.core.Config.whenToUse = Required for any project that should let users download map content or search results as a file. Multiple exporters per project are allowed.
gws.base.exporter.core.Config.complexity = intermediate
gws.base.exporter.core.Config.useCases = Download of selected features as shapefile, data export for citizen requests, hand-off to external systems.

gws.base.exporter.core.Config.title.label = Display title
gws.base.exporter.core.Config.title.purpose = Display name of the exporter in the client's selection menu.
gws.base.exporter.core.Config.title.complexity = basic

gws.base.exporter.core.Config.target.label = Target format
gws.base.exporter.core.Config.target.purpose = Target format of the export (e.g. shapefile, gpkg, csv).
gws.base.exporter.core.Config.target.complexity = intermediate

gws.base.exporter.core.Config.targetPath.label = Target path
gws.base.exporter.core.Config.targetPath.purpose = Optional path to write the output file to. If empty, the exporter creates a temporary file.
gws.base.exporter.core.Config.targetPath.complexity = advanced

# --- action ------------------------------------------------------------------

gws.base.exporter.action.Config.label = Exporter action
gws.base.exporter.action.Config.purpose = Enables the export API (exporterStart, exporterStatus, exporterCancel, exporterOutput) for the project. Added in 8.4.
gws.base.exporter.action.Config.whenToUse = Enable in project actions once an exporter is configured and the client should offer a download button.
gws.base.exporter.action.Config.complexity = basic

gws.base.exporter.action.CliParams.label = Export CLI parameters
gws.base.exporter.action.CliParams.purpose = Parameters for the command-line export (gws exporter export). Reads a serialized export request from a JSON file and writes the result to a path.
gws.base.exporter.action.CliParams.complexity = advanced

gws.base.exporter.action.CliParams.project.label = Project UID
gws.base.exporter.action.CliParams.project.purpose = UID of the project the export runs against.

gws.base.exporter.action.CliParams.request.label = Request file
gws.base.exporter.action.CliParams.request.purpose = Path to the JSON file containing the serialized export request.

gws.base.exporter.action.CliParams.output.label = Output path
gws.base.exporter.action.CliParams.output.purpose = Path the generated export file is written to.
