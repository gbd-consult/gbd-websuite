# UX-Strings für das Auswahl-Werkzeug (Welle C).
#
# Schlüsselformat: gws.plugin.select_tool.<modul>.<class>[.<property>].<feldname>
# Inhalte konservativ aus Klassen-Docstrings abgeleitet — keine Phantasie-Texte.

[de]

# --- action ---------------------------------------------------------------

gws.plugin.select_tool.action.Config.label = Auswahl-Werkzeug
gws.plugin.select_tool.action.Config.purpose = Aktiviert ein Werkzeug, mit dem Anwender Objekte aus sichtbaren Layern per Klick oder Polygon in eine Auswahl-Liste übernehmen können. Die Auswahl steht für nachfolgende Schritte wie Drucken, Export oder Editieren bereit.
gws.plugin.select_tool.action.Config.whenToUse = In Karten-Anwendungen, in denen Anwender mehrere Objekte auswählen und damit weiterarbeiten sollen.
gws.plugin.select_tool.action.Config.complexity = basic
gws.plugin.select_tool.action.Config.useCases = Mehrere Flurstücke für einen Druckauftrag wählen, Objekte aus mehreren Layern sammeln, Auswahlen abspeichern und später wieder laden.

gws.plugin.select_tool.action.Config.storage.label = Speicher-Konfiguration
gws.plugin.select_tool.action.Config.storage.purpose = Optionale Konfiguration eines Speichers, in dem Anwender ihre Auswahlen unter einem Namen ablegen und später wieder laden können.

gws.plugin.select_tool.action.Config.tolerance.label = Klick-Toleranz
gws.plugin.select_tool.action.Config.tolerance.purpose = Toleranzradius um den Klickpunkt, in dem nach selektierbaren Objekten gesucht wird (Wert mit Einheit, z. B. Pixel oder Meter).
gws.plugin.select_tool.action.Config.tolerance.example = "10px"

# --- action.Props ---------------------------------------------------------

gws.plugin.select_tool.action.Props.storage.label = Speicher
gws.plugin.select_tool.action.Props.storage.purpose = An den Client gemeldete Storage-Eigenschaften für Auswahl-Ablagen.

gws.plugin.select_tool.action.Props.tolerance.label = Klick-Toleranz
gws.plugin.select_tool.action.Props.tolerance.purpose = An den Client gemeldete Klick-Toleranz für die Auswahl.

[en]

# --- action ---------------------------------------------------------------

gws.plugin.select_tool.action.Config.label = Selection tool
gws.plugin.select_tool.action.Config.purpose = Enables a tool that lets users add features from visible layers to a selection list, either by clicking or drawing a polygon. The resulting selection can be used by follow-up actions such as print, export or edit.
gws.plugin.select_tool.action.Config.whenToUse = In map applications where users need to pick several features and operate on them together.
gws.plugin.select_tool.action.Config.complexity = basic
gws.plugin.select_tool.action.Config.useCases = Pick several parcels for a print job, collect features across multiple layers, save and reload selections.

gws.plugin.select_tool.action.Config.storage.label = Storage configuration
gws.plugin.select_tool.action.Config.storage.purpose = Optional storage configuration that lets users save selections by name and reload them later.

gws.plugin.select_tool.action.Config.tolerance.label = Click tolerance
gws.plugin.select_tool.action.Config.tolerance.purpose = Tolerance radius around the click point used to find selectable features (value with unit, e.g. pixels or meters).
gws.plugin.select_tool.action.Config.tolerance.example = "10px"

# --- action.Props ---------------------------------------------------------

gws.plugin.select_tool.action.Props.storage.label = Storage
gws.plugin.select_tool.action.Props.storage.purpose = Storage properties published to the client for selection storage.

gws.plugin.select_tool.action.Props.tolerance.label = Click tolerance
gws.plugin.select_tool.action.Props.tolerance.purpose = Click tolerance reported to the client for the selection tool.
