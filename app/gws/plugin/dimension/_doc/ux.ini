# UX-Strings für plugin/dimension (Bemaßungs-Werkzeug).
#
# Schlüsselformat: gws.plugin.dimension.<class>[.<property>].<feldname>
#
# Inhalte konservativ aus Source (gws.ext.new.action('dimension')) und
# js/strings.ini abgeleitet — keine Phantasie-Texte. Das Modul stellt
# das clientseitige Bemaßungs-Werkzeug bereit (Linien-, Kreis- und
# Bogenbemaßung mit optionalem Snapping auf Layer und persistenter
# Speicherung).

[de]

# --- dimension.Config -------------------------------------------------------

gws.plugin.dimension.Config.label = Bemaßung
gws.plugin.dimension.Config.purpose = Aktiviert das Bemaßungs-Werkzeug im Client. Erlaubt das Zeichnen, Bearbeiten und Speichern von Linien-, Kreis- und Bogen-Bemaßungen in der Karte mit optionalem Snapping auf vorhandene Layer.
gws.plugin.dimension.Config.whenToUse = Wenn Anwender Strecken, Radien oder Winkel direkt in der Karte vermessen, beschriften und für spätere Druckausgaben speichern sollen.
gws.plugin.dimension.Config.complexity = intermediate
gws.plugin.dimension.Config.useCases = Maßketten in Bauplänen, Distanz- und Radius-Vermessung in Liegenschaften, dauerhaft gespeicherte Bemaßungs-Sets pro Nutzer/Projekt.

gws.plugin.dimension.Config.layerUids.label = Snap-Layer
gws.plugin.dimension.Config.layerUids.purpose = UIDs der Layer, auf deren Geometrien beim Zeichnen einer Bemaßung gefangen wird (Snapping). Leer = kein Snapping.
gws.plugin.dimension.Config.layerUids.complexity = intermediate

gws.plugin.dimension.Config.pixelTolerance.label = Snap-Toleranz (Pixel)
gws.plugin.dimension.Config.pixelTolerance.purpose = Maximaler Pixel-Abstand zum Snap-Ziel, ab dem das Werkzeug einrastet. Default: 10 Pixel.
gws.plugin.dimension.Config.pixelTolerance.example = 10

gws.plugin.dimension.Config.storage.label = Speicher
gws.plugin.dimension.Config.storage.purpose = Konfiguration des persistenten Speichers für Bemaßungs-Sets (Kategorie "Dimension"). Ohne diese Konfiguration können Anwender Bemaßungen nur temporär in der Sitzung halten.
gws.plugin.dimension.Config.storage.complexity = intermediate
gws.plugin.dimension.Config.storage.seeAlso = gws.base.storage.Config

# --- dimension.Object / dimension.Props -------------------------------------

gws.plugin.dimension.Object.label = Bemaßung (Object)
gws.plugin.dimension.Object.purpose = Laufzeit-Objekt der Dimension-Action.
gws.plugin.dimension.Object.complexity = advanced

gws.plugin.dimension.Props.label = Bemaßung (Client-Props)
gws.plugin.dimension.Props.purpose = An den Client gelieferte Eigenschaften der Dimension-Action.
gws.plugin.dimension.Props.complexity = advanced

gws.plugin.dimension.Props.layerUids.label = Snap-Layer
gws.plugin.dimension.Props.pixelTolerance.label = Snap-Toleranz (Pixel)
gws.plugin.dimension.Props.storage.label = Speicher

[en]

# --- dimension.Config -------------------------------------------------------

gws.plugin.dimension.Config.label = Dimension (measurement tool)
gws.plugin.dimension.Config.purpose = Enables the dimensioning tool in the client. Allows drawing, editing and storing line, circle and arc dimensions on the map with optional snapping to existing layers.
gws.plugin.dimension.Config.whenToUse = When users need to measure distances, radii or angles directly on the map, label them and save them for later print output.
gws.plugin.dimension.Config.complexity = intermediate
gws.plugin.dimension.Config.useCases = Dimension chains in construction plans, distance and radius measurements on cadastre data, persistent per-user/per-project dimension sets.

gws.plugin.dimension.Config.layerUids.label = Snap layers
gws.plugin.dimension.Config.layerUids.purpose = UIDs of the layers whose geometries the tool snaps to while drawing a dimension. Empty = no snapping.
gws.plugin.dimension.Config.layerUids.complexity = intermediate

gws.plugin.dimension.Config.pixelTolerance.label = Snap tolerance (pixels)
gws.plugin.dimension.Config.pixelTolerance.purpose = Maximum pixel distance to the snap target at which the tool snaps. Default: 10 pixels.
gws.plugin.dimension.Config.pixelTolerance.example = 10

gws.plugin.dimension.Config.storage.label = Storage
gws.plugin.dimension.Config.storage.purpose = Configuration of the persistent store for dimension sets (category "Dimension"). Without it, users can only keep dimensions for the current session.
gws.plugin.dimension.Config.storage.complexity = intermediate

# --- dimension.Object / dimension.Props -------------------------------------

gws.plugin.dimension.Object.label = Dimension (object)
gws.plugin.dimension.Object.purpose = Runtime object of the Dimension action.
gws.plugin.dimension.Object.complexity = advanced

gws.plugin.dimension.Props.label = Dimension (client props)
gws.plugin.dimension.Props.purpose = Properties of the Dimension action delivered to the client.
gws.plugin.dimension.Props.complexity = advanced

gws.plugin.dimension.Props.layerUids.label = Snap layers
gws.plugin.dimension.Props.pixelTolerance.label = Snap tolerance (pixels)
gws.plugin.dimension.Props.storage.label = Storage
