gws.plugin.ows_server.wms.Object.label = WMS server (runtime)
gws.plugin.ows_server.wms.Object.purpose = Runtime object of the WMS service.

gws.plugin.ows_server.wmts.Object.label = WMTS server (runtime)
gws.plugin.ows_server.wmts.Object.purpose = Runtime object of the WMTS service.

gws.plugin.ows_server.wfs.Object.label = WFS server (runtime)
gws.plugin.ows_server.wfs.Object.purpose = Runtime object of the WFS service.

gws.plugin.ows_server.csw.Object.label = CSW catalog (runtime)
gws.plugin.ows_server.csw.Object.purpose = Runtime object of the CSW service.
