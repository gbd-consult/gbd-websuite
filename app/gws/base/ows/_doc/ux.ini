# UX-Strings für OWS-Klassen (Client-Provider und Server-Service).
#
# Behandelt:
#   - client.cli.CapsParams: CLI-Tool zum Capabilities-Abruf
#   - client.provider.*: Konfiguration für entfernte WMS/WMTS/WFS-Quellen
#   - server.action.*: Anfragen an die OWS-Server-Aktion
#   - server.service.Config: gemeinsame Felder für eigene OWS-Dienste

[de]

# --- client.cli.CapsParams --------------------------------------------------

gws.base.ows.client.cli.CapsParams.out.label = Ausgabedatei
gws.base.ows.client.cli.CapsParams.out.purpose = Pfad zur Datei, in die die geparsten Capabilities geschrieben werden.

gws.base.ows.client.cli.CapsParams.src.label = Quelle
gws.base.ows.client.cli.CapsParams.src.purpose = Service-URL oder Pfad zu einer XML-Capabilities-Datei.

gws.base.ows.client.cli.CapsParams.type.label = Service-Typ
gws.base.ows.client.cli.CapsParams.type.purpose = Typ des OWS-Dienstes, z. B. WMS, WMTS oder WFS.
gws.base.ows.client.cli.CapsParams.type.example = "WMS"

# --- client.provider.AuthorizationConfig ------------------------------------

gws.base.ows.client.provider.AuthorizationConfig.password.label = Passwort
gws.base.ows.client.provider.AuthorizationConfig.password.purpose = Passwort für die Service-Authentifizierung.
gws.base.ows.client.provider.AuthorizationConfig.password.complexity = advanced

gws.base.ows.client.provider.AuthorizationConfig.type.label = Authentifizierungstyp
gws.base.ows.client.provider.AuthorizationConfig.type.purpose = Typ der Authentifizierung. Aktuell wird nur "basic" unterstützt.
gws.base.ows.client.provider.AuthorizationConfig.type.example = "basic"

gws.base.ows.client.provider.AuthorizationConfig.username.label = Benutzername
gws.base.ows.client.provider.AuthorizationConfig.username.purpose = Benutzername für die Service-Authentifizierung.

# --- client.provider.Config -------------------------------------------------

gws.base.ows.client.provider.Config.alwaysXY.label = Achsen erzwingen (XY)
gws.base.ows.client.provider.Config.alwaysXY.purpose = Erzwingt XY-Achsenreihenfolge auch für Lat/Lon-Projektionen. Hilfreich bei nicht standardkonformen Servern.
gws.base.ows.client.provider.Config.alwaysXY.complexity = advanced

gws.base.ows.client.provider.Config.authorization.label = Authentifizierung
gws.base.ows.client.provider.Config.authorization.purpose = Zugangsdaten für den entfernten OWS-Dienst.
gws.base.ows.client.provider.Config.authorization.complexity = advanced

gws.base.ows.client.provider.Config.capsCacheMaxAge.label = Cache-Dauer Capabilities
gws.base.ows.client.provider.Config.capsCacheMaxAge.purpose = Maximales Cache-Alter für Capabilities-Dokumente.
gws.base.ows.client.provider.Config.capsCacheMaxAge.complexity = advanced
gws.base.ows.client.provider.Config.capsCacheMaxAge.example = "1d"

gws.base.ows.client.provider.Config.forceCrs.label = CRS erzwingen
gws.base.ows.client.provider.Config.forceCrs.purpose = Verwendet dieses CRS für alle Anfragen, unabhängig von Capabilities.
gws.base.ows.client.provider.Config.forceCrs.complexity = advanced
gws.base.ows.client.provider.Config.forceCrs.example = "EPSG:25832"

gws.base.ows.client.provider.Config.maxRequests.label = Max. parallele Anfragen
gws.base.ows.client.provider.Config.maxRequests.purpose = Maximale Anzahl gleichzeitiger Anfragen an diese Quelle. 0 bedeutet kein Limit.
gws.base.ows.client.provider.Config.maxRequests.complexity = advanced

gws.base.ows.client.provider.Config.operations.label = Operationen
gws.base.ows.client.provider.Config.operations.purpose = Überschreibt die in den Capabilities angegebenen Operationen.
gws.base.ows.client.provider.Config.operations.complexity = advanced

gws.base.ows.client.provider.Config.url.label = Service-URL
gws.base.ows.client.provider.Config.url.purpose = URL des entfernten OWS-Dienstes.
gws.base.ows.client.provider.Config.url.example = "https://example.com/wms"

# --- client.provider.OperationConfig ----------------------------------------

gws.base.ows.client.provider.OperationConfig.formats.label = Formate
gws.base.ows.client.provider.OperationConfig.formats.purpose = Liste der von dieser Operation unterstützten Formate.

gws.base.ows.client.provider.OperationConfig.params.label = Parameter
gws.base.ows.client.provider.OperationConfig.params.purpose = Zusätzliche Parameter für die Operation.

gws.base.ows.client.provider.OperationConfig.postUrl.label = POST-URL
gws.base.ows.client.provider.OperationConfig.postUrl.purpose = URL für POST-Anfragen.
gws.base.ows.client.provider.OperationConfig.postUrl.complexity = advanced

gws.base.ows.client.provider.OperationConfig.url.label = GET-URL
gws.base.ows.client.provider.OperationConfig.url.purpose = URL für GET-Anfragen.

gws.base.ows.client.provider.OperationConfig.verb.label = OWS-Verb
gws.base.ows.client.provider.OperationConfig.verb.purpose = OWS-Operation, z. B. GetMap, GetCapabilities, GetFeatureInfo.

# --- server.action ----------------------------------------------------------

gws.base.ows.server.action.GetSchemaRequest.namespace.label = Namespace
gws.base.ows.server.action.GetSchemaRequest.namespace.purpose = XML-Namespace, dessen Schema abgerufen werden soll.

gws.base.ows.server.action.GetServiceRequest.serviceUid.label = Service-UID
gws.base.ows.server.action.GetServiceRequest.serviceUid.purpose = UID des aufzurufenden OWS-Dienstes.

# --- server.service.Config --------------------------------------------------

gws.base.ows.server.service.Config.defaultFeatureCount.label = Default-Feature-Anzahl
gws.base.ows.server.service.Config.defaultFeatureCount.purpose = Standardanzahl der Features pro Seite, wenn Clients keine Vorgabe machen.
gws.base.ows.server.service.Config.defaultFeatureCount.example = 1000

gws.base.ows.server.service.Config.extent.label = Ausdehnung
gws.base.ows.server.service.Config.extent.purpose = Räumliche Ausdehnung des Dienstes, in extentCrs oder im ersten unterstützten CRS.

gws.base.ows.server.service.Config.extentCrs.label = Ausdehnungs-CRS
gws.base.ows.server.service.Config.extentCrs.purpose = CRS, in dem die Ausdehnung angegeben ist.
gws.base.ows.server.service.Config.extentCrs.example = "EPSG:25832"

gws.base.ows.server.service.Config.imageFormats.label = Bildformate
gws.base.ows.server.service.Config.imageFormats.purpose = Liste der vom Dienst angebotenen Bildformate.
gws.base.ows.server.service.Config.imageFormats.complexity = advanced

gws.base.ows.server.service.Config.maxFeatureCount.label = Max. Feature-Anzahl
gws.base.ows.server.service.Config.maxFeatureCount.purpose = Obergrenze für Features pro Seite.
gws.base.ows.server.service.Config.maxFeatureCount.example = 10000

gws.base.ows.server.service.Config.metadata.label = Service-Metadaten
gws.base.ows.server.service.Config.metadata.purpose = Metadaten des Dienstes (Titel, Kontakt, Schlüsselwörter usw.).

gws.base.ows.server.service.Config.rootLayerUid.label = Wurzel-Layer
gws.base.ows.server.service.Config.rootLayerUid.purpose = UID des Layers, der als Wurzel des veröffentlichten Layerbaums dient.

gws.base.ows.server.service.Config.searchTolerance.label = Suchradius
gws.base.ows.server.service.Config.searchTolerance.purpose = Toleranz für Pixel-basierte Suchanfragen wie GetFeatureInfo.
gws.base.ows.server.service.Config.searchTolerance.example = "10px"

gws.base.ows.server.service.Config.supportedCrs.label = Unterstützte CRS
gws.base.ows.server.service.Config.supportedCrs.purpose = Liste der CRS, die der Dienst anbietet.

gws.base.ows.server.service.Config.templates.label = Templates
gws.base.ows.server.service.Config.templates.purpose = XML- und HTML-Templates für Antwortdokumente (z. B. GetFeatureInfo).
gws.base.ows.server.service.Config.templates.complexity = advanced

gws.base.ows.server.service.Config.updateSequence.label = UpdateSequence
gws.base.ows.server.service.Config.updateSequence.purpose = OWS-Update-Sequence-Wert für Capabilities-Dokumente.
gws.base.ows.server.service.Config.updateSequence.complexity = advanced

gws.base.ows.server.service.Config.withInspireMeta.label = INSPIRE-Metadaten
gws.base.ows.server.service.Config.withInspireMeta.purpose = Wenn aktiv, werden INSPIRE-Metadaten in die Antworten eingebettet.
gws.base.ows.server.service.Config.withInspireMeta.complexity = advanced

gws.base.ows.server.service.Config.withStrictParams.label = Strikte Parameterprüfung
gws.base.ows.server.service.Config.withStrictParams.purpose = Wenn aktiv, werden eingehende OWS-Parameter strikt validiert.
gws.base.ows.server.service.Config.withStrictParams.complexity = advanced

